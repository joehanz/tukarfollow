<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Watch Movie - TUKARFOLLOW</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* ====================================
       1. BASIC RESET & CORE STYLE
       ==================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #000000;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ====================================
       2. WATCH LAYOUT (77vh PLAYER & KOMENTAR)
       ==================================== */
    .watch-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 70px); /* Kurangi tinggi nav bawah (70px) */
      width: 100%;
    }

    /* Player Area (77vh) */
    .video-player-section {
      width: 100%;
      height: 77vh;
      background: #000;
      position: relative;
    }
    .video-player-section iframe, 
    .video-player-section video {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Layer Subtitle Melayang */
    .custom-subtitle-box {
      display: none; 
      position: absolute; 
      bottom: 12%; 
      left: 50%; 
      transform: translateX(-50%); 
      background: rgba(0,0,0,0.8); 
      color: #ffffff; 
      padding: 6px 16px; 
      border-radius: 6px; 
      font-size: 15px; 
      font-weight: 500; 
      text-align: center; 
      z-index: 99; 
      min-width: 75%; 
      max-width: 90%; 
      pointer-events: none; 
      text-shadow: 2px 2px 3px #000;
      border: 1px solid rgba(255,255,255,0.1);
      line-height: 1.4;
    }

    /* Tombol Sinkronisasi Subtitle */
    .sync-sub-btn {
      display: none;
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 101;
      background: rgba(255, 221, 87, 0.9);
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      align-items: center;
      gap: 5px;
      transition: all 0.2s ease;
    }
    .sync-sub-btn:active {
      transform: scale(0.95);
    }

    /* Comments Section (Sisanya di bawah) */
    .comments-section {
      width: 100%;
      flex: 1;
      background: #0d0d0d;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 15px;
      display: flex;
      flex-direction: column;
    }
    .comments-header {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ffdd57;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .comments-list-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }
    .comment-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }
    .comment-user {
      font-weight: 600;
      color: #38b6ff;
      margin-bottom: 2px;
    }
    .comment-text {
      color: #e0e0e0;
      line-height: 1.4;
    }

    /* ====================================
       3. SEARCH REAL-TIME FULLSCREEN LAYER
       ==================================== */
    .search-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #000000;
      z-index: 100;
      padding: 15px;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
    }
    .search-container.show {
      transform: translateY(0);
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 0 15px;
      height: 45px;
    }
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      padding-left: 10px;
    }
    .search-box input:focus {
      outline: none;
    }

    /* Layer Hasil Pencarian Menutup Halaman */
    .search-results-layer {
      position: fixed;
      top: 75px;
      left: 0;
      width: 100%;
      height: calc(100vh - 145px);
      background: #050505;
      z-index: 99;
      overflow-y: auto;
      padding: 15px;
      display: none;
    }
    .search-results-layer.active {
      display: block;
    }
    .search-item-row {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }
    .search-item-thumb {
      width: 50px;
      height: 70px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      background-color: #222;
    }
    .search-item-info h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .search-item-info p {
      font-size: 11px;
      color: #888;
    }

    /* ====================================
       4. SLIDE-UP INFO PANEL (UNTUK INPUT KOMEN)
       ==================================== */
    .info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #121212;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      z-index: 105;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
    }
    .info-panel.show {
      transform: translateY(0);
    }
    .panel-content {
      padding: 20px;
    }
    .form-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #fff;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 13px;
    }
    .form-group textarea {
      resize: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: 1px solid #ffdd57;
    }
    .submit-btn {
      background: #ffdd57;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-top: 5px;
    }

    .panel-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      z-index: 104;
      display: none;
    }
    .panel-backdrop.active {
      display: block;
    }

    /* ====================================
       5. BOTTOM NAVIGATION STYLE
       ==================================== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 110;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #888888;
      cursor: pointer;
      font-size: 11px;
    }
    .nav-item.active {
      color: #ffffff;
    }
    .nav-item span {
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="search-container" id="searchContainer">
    <div class="search-box">
      <i data-lucide="search" size="18" color="#888"></i>
      <input type="text" id="searchInput" placeholder="Cari film lain...">
    </div>
  </div>

  <div class="search-results-layer" id="searchResultsLayer"></div>

  <div class="watch-layout">
    <div class="video-player-section" id="playerArea">
      <button id="syncSubBtn" class="sync-sub-btn">
        <i data-lucide="refresh-cw" size="12"></i> Paskan Subtitle
      </button>
      <div id="customSubtitle" class="custom-subtitle-box"></div>
    </div>

    <div class="comments-section">
      <div class="comments-header">
        <i data-lucide="message-square" size="16"></i> Komentar Netizen
      </div>
      <div class="comments-list-container" id="commentList"></div>
    </div>
  </div>

  <div class="panel-backdrop" id="panelBackdrop" onclick="closeCommentForm()"></div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-content">
      <div class="form-title">Tulis Komentar Kamu</div>
      <div class="form-group">
        <input type="text" id="commentName" placeholder="Nama samaran kamu...">
        <textarea id="commentText" placeholder="Tulis opini/komentar film di sini..." rows="3" maxlength="300"></textarea>
        <button class="submit-btn" onclick="submitComment()">Kirim Komentar</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" id="navSearch">
      <i data-lucide="search" size="24"></i>
      <span>Search</span>
    </div>
    <div class="nav-item" id="navAddComment" style="color: #fff;">
      <i data-lucide="plus-circle" size="28"></i>
      <span>Add</span>
    </div>
    <div class="nav-item" id="navHome">
      <i data-lucide="home" size="24"></i>
      <span>Home</span>
    </div>
  </div>

  <script>
// KONFIGURASI API UTAMA
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8'; 
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec'; 

    // DOM Elements
    const searchContainer = document.getElementById('searchContainer');
    const searchInput = document.getElementById('searchInput');
    const searchResultsLayer = document.getElementById('searchResultsLayer');
    const playerArea = document.getElementById('playerArea');
    const commentList = document.getElementById('commentList');
    const infoPanel = document.getElementById('infoPanel');
    const panelBackdrop = document.getElementById('panelBackdrop');

    let currentMovieId = null;
    let allMoviesCache = []; 
    let myCustomMovies = [];

    // 1. Ambil Parameter ID Film dari URL (?id=123)
    function getMovieIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // 2. Memuat Database Movies & Data Kustom Lokal
    async function loadInitialData() {
      currentMovieId = parseInt(getMovieIdFromUrl());
      if (!currentMovieId) {
        playerArea.innerHTML = `<div style="padding:50px; text-align:center;">ID Film tidak ditemukan.</div>`;
        return;
      }

      try {
        const res = await fetch('movies.json');
        if(res.ok) myCustomMovies = await res.json();
      } catch(e) { console.warn("movies.json belum terbaca."); }

      // Setup Player Utama (Vidsrc Auto-Injek) & Tarik Komentar
      setupVideoPlayer(currentMovieId);
      loadComments(currentMovieId);

      // SCRIPT CADANGAN: Tetap muat engine parser lokal buat jaga-jaga kalau tombol sinkron diklik
      muatSubtitleVttOtomatis(currentMovieId);

      // PASANG DETEKSI ENTER KOMENTAR
      setTimeout(() => {
        const commentTextArea = document.getElementById('commentText');
        if (commentTextArea) {
          commentTextArea.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
              event.preventDefault(); 
              submitComment(); 
            }
          });
        }
      }, 500);

      try {
        const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=en-US&page=1`);
        if(res.ok) {
          const data = await res.json();
          allMoviesCache = data.results;
        }
      } catch(e) { console.error("Gagal membuat cache pencarian."); }
    }

// ============================================================================
    // 🖥️ 3. SETUP VIDEO PLAYER (VIDSRC STABLE + AUTO-SUBTITLE)
    // ============================================================================
    function setupVideoPlayer(tmdbId) {
      const customMovie = myCustomMovies.find(m => m.tmdb_id === tmdbId);
      
      // Reset isi player area dan kembalikan struktur box penampung
      playerArea.innerHTML = `
        <button id="syncSubBtn" class="sync-sub-btn"><i data-lucide="refresh-cw" size="12"></i> Paskan Subtitle</button>
        <div id="customSubtitle" class="custom-subtitle-box"></div>
      `; 

      // Bikin link otomatis ke file .vtt di repo GitHub Refs terbaru milikmu
      const githubSubUrl = `https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/${tmdbId}.vtt`;
      const encodedSubUrl = encodeURIComponent(githubSubUrl);

      let mediaHtml = '';

      if (customMovie) {
        if (customMovie.iframe && customMovie.iframe.trim() !== "") {
          mediaHtml = `<iframe src="${customMovie.iframe}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        } else if (customMovie.video && customMovie.video.trim() !== "") {
          mediaHtml = `<video src="${customMovie.video}" controls autoplay playsinline></video>`;
        } else {
          // SERVER UTAMA: Menggunakan Vidsrc.to (Jauh lebih stabil & anti-refused)
          mediaHtml = `
            <div style="width:100%; height:100%; position:relative;">
              <iframe id="mainPlayer" src="https://vidsrc.to/embed/movie/${tmdbId}?sub.id=${encodedSubUrl}&sub.info=${encodedSubUrl}" allowfullscreen style="width:100%; height:100%;"></iframe>
              <button onclick="switchServer(${tmdbId})" style="position:absolute; bottom:15px; left:15px; background:rgba(0,0,0,0.75); color:#ffdd57; border:1px solid #ffdd57; padding:5px 12px; font-size:11px; font-weight:600; border-radius:6px; cursor:pointer; z-index:102; box-shadow:0 2px 8px rgba(0,0,0,0.5);">
                🔄 Ganti Server (Jika Error)
              </button>
            </div>
          `;
        }
      } else {
        // Default langsung pakai server Vidsrc.to yang aman dari error koneksi
        mediaHtml = `
          <div style="width:100%; height:100%; position:relative;">
            <iframe id="mainPlayer" src="https://vidsrc.to/embed/movie/${tmdbId}?sub.id=${encodedSubUrl}&sub.info=${encodedSubUrl}" allowfullscreen style="width:100%; height:100%;"></iframe>
            <button onclick="switchServer(${tmdbId})" style="position:absolute; bottom:15px; left:15px; background:rgba(0,0,0,0.75); color:#ffdd57; border:1px solid #ffdd57; padding:5px 12px; font-size:11px; font-weight:600; border-radius:6px; cursor:pointer; z-index:102; box-shadow:0 2px 8px rgba(0,0,0,0.5);">
              🔄 Ganti Server (Jika Error)
            </button>
          </div>
        `;
      }
      
      playerArea.insertAdjacentHTML('afterbegin', mediaHtml);
    }

    // Fungsi saklar rahasia untuk lompat server cadangan jika Vidsrc utama lagi ngadat
    function switchServer(tmdbId) {
      const player = document.getElementById('mainPlayer');
      if (player) {
        if (player.src.includes('vidsrc.to')) {
          // Jika server utama error, lempar ke vsembed yang anti-blokir
          player.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
          alert("Beralih ke Server Cadangan (vsembed)...");
        } else {
          const githubSubUrl = `https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/${tmdbId}.vtt`;
          const encodedSubUrl = encodeURIComponent(githubSubUrl);
          player.src = `https://vidsrc.to/embed/movie/${tmdbId}?sub.id=${encodedSubUrl}&sub.info=${encodedSubUrl}`;
          alert("Beralih kembali ke Server Utama (Vidsrc)...");
        }
      }
    }

    // ============================================================================
    // 🚀 ENGINE PARSER SCRIPT CADANGAN (UNTUK LAYER TOMBOL MANUAL)
    // ============================================================================
    async function muatSubtitleVttOtomatis(movieId) {
      const subtitleBox = document.getElementById('customSubtitle');
      const syncBtn = document.getElementById('syncSubBtn');
      if (!subtitleBox || !syncBtn) return;

      let parsedCues = [];
      let subInterval = null;

      try {
        const vttUrl = `https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/${movieId}.vtt`;
        const response = await fetch(vttUrl);
        if (!response.ok) return; 

        const vttText = await response.text();
        parsedCues = parseVTT(vttText);

        syncBtn.style.display = 'flex';
        if (window.lucide) lucide.createIcons();

        syncBtn.addEventListener('click', () => {
          if (subInterval) clearInterval(subInterval);
          subtitleBox.style.display = 'block';
          subtitleBox.innerText = "Subtitle disinkronkan...";
          const startTime = Date.now();

          subInterval = setInterval(() => {
            const elapsedSeconds = (Date.now() - startTime) / 1000;
            const currentCue = parsedCues.find(cue => elapsedSeconds >= cue.start && elapsedSeconds <= cue.end);
            if (currentCue) {
              subtitleBox.innerHTML = currentCue.text;
            } else {
              subtitleBox.innerHTML = ""; 
            }
          }, 250);

          syncBtn.innerHTML = `<i data-lucide="check-circle" size="12"></i> Sinkron Berjalan`;
          syncBtn.style.background = 'rgba(56, 182, 255, 0.9)';
          syncBtn.style.color = '#fff';
          if (window.lucide) lucide.createIcons();
        });
      } catch (e) { console.log("Engine cadangan siap siaga."); }
    }

    function parseVTT(vttText) {
      const cleanText = vttText.replace(/\r\n/g, '\n');
      const blocks = cleanText.split('\n\n');
      const cues = [];
      blocks.forEach(block => {
        const lines = block.trim().split('\n');
        if (lines.length >= 2) {
          let timeLine = lines[0];
          let textLines = lines.slice(1);
          if (!timeLine.includes('-->') && lines[1] && lines[1].includes('-->')) {
            timeLine = lines[1];
            textLines = lines.slice(2);
          }
          if (timeLine && timeLine.includes('-->')) {
            const times = timeLine.split('-->');
            const startSec = timeToSecondsVTT(times[0].trim());
            const endSec = timeToSecondsVTT(times[1].trim());
            const text = textLines.join('<br>');
            if (!isNaN(startSec) && !isNaN(endSec)) {
              cues.push({ start: startSec, end: endSec, text: text });
            }
          }
        }
      });
      return cues;
    }

    function timeToSecondsVTT(timeStr) {
      const parts = timeStr.split(':');
      let seconds = 0;
      if (parts.length === 3) {
        seconds += parseInt(parts[0], 10) * 3600;
        seconds += parseInt(parts[1], 10) * 60;
        seconds += parseFloat(parts[2]);
      } else if (parts.length === 2) {
        seconds += parseInt(parts[0], 10) * 60;
        seconds += parseFloat(parts[1]);
      }
      return seconds;
    }

    // 4. Ambil Komentar dari Google Spreadsheet via Apps Script
    async function loadComments(tmdbId) {
      commentList.innerHTML = '<div style="opacity:0.5; font-size:12px; padding:10px 0;">Memuat komentar netizen...</div>';
      try {
        const response = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${tmdbId}`);
        const resData = await response.json();
        if (resData.status === "success" && resData.data.length > 0) {
          commentList.innerHTML = resData.data.map(c => `
            <div class="comment-item">
              <div class="comment-user">@${c.nama}</div>
              <div class="comment-text">${c.komentar}</div>
            </div>
          `).join('');
        } else {
          commentList.innerHTML = '<div style="opacity:0.4; font-size:12px; font-style:italic; padding:15px 0; text-align:center;">Belum ada komentar. Yuk jadi yang pertama coret-coret!</div>';
        }
      } catch (e) {
        commentList.innerHTML = '<div style="color:#ff6b6b; font-size:12px; padding:10px 0;">Gagal memuat komentar. Pastikan URL Apps Script benar.</div>';
      }
    }

    // 5. Kirim Komentar Baru ke Spreadsheet
    async function submitComment() {
      const nameInput = document.getElementById('commentName');
      const textInput = document.getElementById('commentText');
      const nama = nameInput.value.trim();
      const komentar = textInput.value.trim();

      if (!nama || !komentar) {
        alert("Isi nama dan komentar dulu, brader!");
        return;
      }

      commentList.innerHTML = '<div style="opacity:0.5; font-size:12px; padding:10px 0;">Mengirim komentar baru...</div>';
      closeCommentForm();

      try {
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tmdbId: currentMovieId, nama: nama, komentar: komentar })
        });
        textInput.value = '';
        setTimeout(() => { loadComments(currentMovieId); }, 1200);
      } catch(e) {
        alert("Gagal mengirim data.");
        loadComments(currentMovieId);
      }
    }

    // 6. Kontrol Form Input Komen (Slide Up / Slide Down)
    function openCommentForm() {
      infoPanel.classList.add('show');
      panelBackdrop.classList.add('active');
    }
    function closeCommentForm() {
      infoPanel.classList.remove('show');
      panelBackdrop.classList.remove('active');
    }

    // Tombol Cari (Buka Tutup Layer)
    document.getElementById('navSearch').addEventListener('click', (e) => {
      e.stopPropagation();
      const isShowing = searchContainer.classList.toggle('show');
      if (!isShowing) {
        searchInput.value = "";
        searchResultsLayer.classList.remove('active');
      } else {
        setTimeout(() => searchInput.focus(), 100);
      }
    });

    // Mesin Pencari Real-Time Super Sensitif
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase().trim();
        if (keyword === "") {
          searchResultsLayer.classList.remove('active');
          return;
        }

        searchResultsLayer.classList.add('active');
        const cleanKeyword = keyword.replace(/\s+/g, '');

        const filtered = allMoviesCache.filter(movie => {
          const customData = myCustomMovies.find(m => m.tmdb_id === movie.id);
          const rawTitle = customData ? customData.title : movie.title;
          return rawTitle.toLowerCase().replace(/\s+/g, '').includes(cleanKeyword);
        });

        if(filtered.length > 0) {
          searchResultsLayer.innerHTML = filtered.map(movie => {
            const customData = myCustomMovies.find(m => m.tmdb_id === movie.id);
            const poster = (customData && customData.image) ? customData.image : `${IMAGE_URL}${movie.poster_path}`;
            const title = customData ? customData.title : movie.title;
            const date = customData ? customData.release_date : movie.release_date;
            const year = date ? date.split('-')[0] : '-';

            return `
              <div class="search-item-row" onclick="navigateToMovie(${movie.id})">
                <div class="search-item-thumb" style="background-image:url('${poster}')"></div>
                <div class="search-item-info">
                  <h4>${title}</h4>
                  <p>Tahun: ${year}</p>
                </div>
              </div>
            `;
          }).join('');
        } else {
          searchResultsLayer.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.5; font-size:13px;">Film tidak ditemukan, coba kata kunci lain.</div>';
        }
      });
    }

    function navigateToMovie(id) {
      window.location.href = `watch.html?id=${id}`;
    }

    document.getElementById('navAddComment').addEventListener('click', openCommentForm);

    document.getElementById('navHome').addEventListener('click', () => {
      if (document.referrer && document.referrer.includes(window.location.hostname)) {
        window.history.back(); 
      } else {
        window.location.href = 'index.html'; 
      }
    });

    // Inisialisasi Lucide Icons & Data Booting
    window.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
      loadInitialData();
    });
  </script>
</body>
</html>
