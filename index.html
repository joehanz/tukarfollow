<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://raw.githubusercontent.com/joehanz/csstukarfollow/main/css/skin.css">

</head>

<body>

<!-- NAV -->
<div class="topnav" id="myTopnav">
  <a href="#home" class="active">Home</a>
  <a href="#news">News</a>
  <a href="#contact">Contact</a>

  <div class="dropdown">
    <button class="dropbtn">Dropdown 
      <i class="fa fa-caret-down"></i>
    </button>
    <div class="dropdown-content">
      <a href="#">Link 1</a>
      <a href="#">Link 2</a>
      <a href="#">Link 3</a>
    </div>
  </div> 

  <a href="#about">About</a>

  <a href="javascript:void(0);" class="icon" onclick="myFunction()">&#9776;</a>
</div>

<!-- MOVIES GRID -->
<div id="movies" class="grid"></div>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

/* LOAD movies.json */
fetch("movies.json")
  .then(res => res.json())
  .then(data => {
    const box = document.getElementById("movies");

    data.forEach(movie => {
      box.innerHTML += `
        <div class="card" onclick="openMovie('${movie.id || movie.title}')">
          <img src="${movie.image}">
          <div class="title">${movie.title}</div>
        </div>
      `;
    });
  });

function openMovie(id){
  window.location.href = "watch.html?id=" + id;
}
</script>

</body>
</html>
