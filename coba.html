<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>TUKARFOLLOW - Nonton Film Subtitle Indonesia</title>
  <meta name="description" content="Nonton film terbaru dengan kualitas HD dan subtitle Indonesia lengkap." />
  <meta name="keywords" content="nonton film, streaming, sub indo, bioskop online" />
  <meta name="robots" content="index, follow" />

  <link rel="icon" href="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" type="image/x-icon" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #0a0a0a; color: #fff; overflow-x: hidden; }

    body.fullscreen-active { overflow: hidden; }
    .video-main-wrapper.fullscreen {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      max-width: none; border-radius: 0; z-index: 9999; background: #000;
    }

    .watch-layout { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .video-main-wrapper {
      position: relative; width: 100%; max-width: 1200px; aspect-ratio: 16/9;
      background: #000; overflow: hidden; border-radius: 12px;
    }
    #filmIframe {
      width: 100%; height: 100%; border: none; background: #000;
      display: block;
    }
    .watermark { position: absolute; top: 16px; left: 16px; opacity: 0.6; pointer-events: none; }
    .watermark img { width: 40px; }

    .subtitle-layer {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 20px 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .subtitle-text {
      text-align: center; font-size: 18px; font-weight: 500;
      text-shadow: 0 2px 4px #000; min-height: 32px;
    }
    .subtitle-controls {
      display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 12px;
      background: rgba(255,255,255,0.08); padding: 10px 16px;
      border-radius: 12px; backdrop-filter: blur(10px);
    }
    .ctrl-btn {
      width: 40px; height: 40px; border-radius: 8px; border: none;
      background: rgba(255,255,255,0.15); color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.25); }
    .time-digital { font-size: 14px; min-width: 90px; text-align: center; }

    @media (max-width:768px) {
      .watch-layout { padding:0; }
      .video-main-wrapper { border-radius:0; }
      .subtitle-text { font-size:16px; }
      .ctrl-btn { width:36px; height:36px; }
    }
  </style>
</head>
<body>

<div class="watch-layout">
  <div class="video-main-wrapper" id="videoWrapper">
    <!-- Tetap vsembed.ru, izin pas biar nggak gelap -->
    <iframe 
      id="filmIframe" 
      src="" 
      allowfullscreen
      allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <div class="watermark"><img src="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" alt="Logo"></div>

    <div class="subtitle-layer">
      <div class="subtitle-text" id="subText"></div>
      <div class="subtitle-controls">
        <button class="ctrl-btn" id="btnMundur" title="Mundur 10d"><i data-lucide="rotate-ccw"></i></button>
        <button class="ctrl-btn" id="btnMain" title="Putar/Jeda"><i data-lucide="play"></i></button>
        <button class="ctrl-btn" id="btnMaju" title="Maju 10d"><i data-lucide="rotate-cw"></i></button>
        <div class="time-digital" id="jamTayang">00:00:00</div>
        <button class="ctrl-btn" id="btnHome" title="Beranda"><i data-lucide="home"></i></button>
        <button class="ctrl-btn" id="btnFullscreen" title="Layar Penuh"><i data-lucide="maximize"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

const filmIframe = document.getElementById('filmIframe');
const subText = document.getElementById('subText');
const jamTayang = document.getElementById('jamTayang');
const btnMain = document.getElementById('btnMain');
const btnMundur = document.getElementById('btnMundur');
const btnMaju = document.getElementById('btnMaju');
const btnFullscreen = document.getElementById('btnFullscreen');
const btnHome = document.getElementById('btnHome');
const videoWrapper = document.getElementById('videoWrapper');

let subtitles = [];
let waktuSekarang = 0;
let pemutarTimer = null;
let sedangMain = false;
let isFullscreen = false;

// Format waktu
function ubahKeWaktu(detik) {
  if (isNaN(detik) || detik < 0) detik = 0;
  const j = String(Math.floor(detik/3600)).padStart(2,'0');
  const m = String(Math.floor((detik%3600)/60)).padStart(2,'0');
  const d = String(Math.floor(detik%60)).padStart(2,'0');
  return `${j}:${m}:${d}`;
}

function ubahKeDetik(waktuStr) {
  if (!waktuStr) return 0;
  const b = waktuStr.trim().split(':');
  return b.length===3 ? (+b[0]*3600)+(+b[1]*60)+(+b[2]) : b.length===2 ? (+b[0]*60)+(+b[1]) : 0;
}

// Perbarui tampilan subtitle
function perbaruiSub() {
  const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
  subText.textContent = aktif ? aktif.teks : "";
  jamTayang.textContent = ubahKeWaktu(waktuSekarang);
}

// ✅ MANIPULASI UTAMA: Picu waktu subtitle pas tombol ditekan
function mulaiPutar() {
  if (pemutarTimer) clearInterval(pemutarTimer);
  sedangMain = true;
  btnMain.innerHTML = '<i data-lucide="pause"></i>';
  lucide.createIcons();
  // Jalankan hitungan detik subtitle
  pemutarTimer = setInterval(() => {
    waktuSekarang++;
    perbaruiSub();
  }, 1000);
  // Coba kirim ke vsembed (walaupun jarang dengar, nggak apa)
  try {
    filmIframe.contentWindow.postMessage({cmd:"play"}, "*");
  }catch(e){}
}

function hentikanPutar() {
  sedangMain = false;
  btnMain.innerHTML = '<i data-lucide="play"></i>';
  lucide.createIcons();
  clearInterval(pemutarTimer);
  try {
    filmIframe.contentWindow.postMessage({cmd:"pause"}, "*");
  }catch(e){}
}

function geserWaktu(ubah) {
  waktuSekarang = Math.max(0, waktuSekarang + ubah);
  perbaruiSub();
  try {
    filmIframe.contentWindow.postMessage({cmd:"seek", time:waktuSekarang}, "*");
  }catch(e){}
}

// Baca subtitle
async function muatSub(id) {
  subtitles = []; waktuSekarang = 0; perbaruiSub();
  try {
    const r = await fetch(`${SUBTITLE_URL}${id}.vtt`, {cache:"no-cache"});
    if (!r.ok) throw "";
    const t = await r.text();
    const baris = t.split("\n").map(b=>b.trim()).filter(Boolean);
    let i = baris[0].toUpperCase()==="WEBVTT" ? 1 : 0;
    while(i<baris.length) {
      if (baris[i].includes("-->")) {
        const [mulaiStr, selesaiStr] = baris[i].split("-->");
        const mulai = ubahKeDetik(mulaiStr);
        const selesai = ubahKeDetik(selesaiStr);
        let teks = ""; i++;
        while(i<baris.length && !baris[i].includes("-->")) teks += baris[i++] + " ";
        if (mulai<selesai && teks.trim()) subtitles.push({mulai, selesai, teks:teks.trim()});
      } else i++;
    }
  }catch{
    subText.textContent = "Subtitle tidak tersedia";
  }
}

// Layar penuh
function toggleFullscreen() {
  if (!isFullscreen) {
    videoWrapper.classList.add("fullscreen");
    btnFullscreen.innerHTML = '<i data-lucide="minimize"></i>';
    lucide.createIcons();
    isFullscreen = true;
    videoWrapper.requestFullscreen?.() || videoWrapper.webkitRequestFullscreen?.();
  } else {
    videoWrapper.classList.remove("fullscreen");
    btnFullscreen.innerHTML = '<i data-lucide="maximize"></i>';
    lucide.createIcons();
    isFullscreen = false;
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
  }
}

// Pasang vsembed.ru
function pasangPemutar(tmdbId) {
  filmIframe.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
}

function ambilId() {
  return new URLSearchParams(window.location.search).get("id") || "";
}

// Jalankan awal
window.addEventListener("DOMContentLoaded", async () => {
  lucide.createIcons();
  const id = ambilId();
  if (!id) {
    subText.textContent = "ID film tidak ditemukan";
    return;
  }
  pasangPemutar(id);
  await muatSub(id);
});

// Tombol
btnMain.addEventListener("click", () => sedangMain ? hentikanPutar() : mulaiPutar());
btnMundur.addEventListener("click", () => geserWaktu(-10));
btnMaju.addEventListener("click", () => geserWaktu(+10));
btnFullscreen.addEventListener("click", toggleFullscreen);
btnHome.addEventListener("click", () => window.history.back());

// Deteksi keluar layar penuh
document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement && isFullscreen) toggleFullscreen();
});
document.addEventListener("webkitfullscreenchange", () => {
  if (!document.webkitFullscreenElement && isFullscreen) toggleFullscreen();
});
</script>

</body>
</html>
