<!-- ===== POPUP ===== -->
<div class="tv-popup" id="tvPopup">
  <div class="tv-box">
    <span class="close-tv" onclick="closeTV()">✖</span>

    <div class="tv-frame">
      <iframe
        id="tvFrame"
        scrolling="no"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen
        webkitallowfullscreen
        mozallowfullscreen
      >
      </iframe>
    </div>
  </div>
</div>

<style>
  /* GRID */
  .tv-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:15px;
    padding:20px;
    cursor: pointer;
  }

  .tv-item{
    background:#111;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    transition:.3s;
  }

  .tv-item:hover{
    transform:translateY(-5px);
    background:#1a1a1a;
  }

  .tv-item img{
    max-width:100%;
    height:50px;
    object-fit:contain;
  }


  /* POPUP FULL CENTER */
  .tv-popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:flex-start; /* naik ke atas */
    padding-top:3vh; /* atur tinggi turun dikit */
    z-index:99999;
  }

  /* BOX SESUAI REQUEST */
  .tv-box{
    width:90%;
    height:96vh;
    position:relative;
  }

  /* FRAME FIX BIAR GAK KE POTONG */
  .tv-frame{
    width:100%;
    height:96vh;
    background:#000;
    overflow:hidden;
    border-radius:10px;
  }

  /* IFRAME FULL */
  .tv-frame iframe{
    width:100%;
    height:96vh;
    border:0;
    display:block;
  }


  /* CLOSE */
  .close-tv{
    position:absolute;
    top:0px;
    right:0;
    font-size:28px;
    color:#fff;
    cursor:pointer;
  }
</style>

<script>
  function openTV(url){
    const popup = document.getElementById("tvPopup");
    const frame = document.getElementById("tvFrame");

    frame.src = url;
    popup.style.display = "flex";
  }

  function closeTV(){
    document.getElementById("tvPopup").style.display = "none";
    document.getElementById("tvFrame").src = "";
  }
</script>
