<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
}

header{
position:sticky;
top:0;
z-index:100;
background:#000;
padding:15px;
}

.menu{
display:flex;
gap:10px;
}

button{
padding:10px 15px;
border:0;
border-radius:8px;
cursor:pointer;
}

.active{
background:#e50914;
color:#fff;
}

.grid{
padding:15px;
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(150px,1fr));
gap:15px;
}

.card{
background:#222;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.title{
padding:10px;
font-size:14px;
}

.pagination{
display:flex;
justify-content:center;
gap:10px;
padding:20px;
align-items:center;
}

.playerBox{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.playerWrap{
width:90%;
height:85%;
position:relative;
}

.close{
position:absolute;
right:0;
top:-40px;
font-size:30px;
cursor:pointer;
}

iframe{
width:100%;
height:100%;
border:0;
border-radius:10px;
}

</style>
</head>

<body>

<header>

<div class="menu">

<button
class="active"
onclick="loadIndonesia(this)">
Film Indonesia
</button>

<button
onclick="loadLuar(this)">
Film Luar
</button>

</div>

</header>

<div id="movies" class="grid">
Loading...
</div>

<div class="pagination">

<button onclick="prevPage()">
◀ Prev
</button>

<div id="pageNum">
1
</div>

<button onclick="nextPage()">
Next ▶
</button>

</div>

<div
class="playerBox"
id="playerBox">

<div class="playerWrap">

<div
class="close"
onclick="tutup()">
✕
</div>

<iframe
id="player"
style="width:100%;height:100%;"
frameborder="0"
referrerpolicy="origin"
allowfullscreen>
</iframe>

</div>

</div>

<script>

const API_KEY="MASUKKAN_API_TMDB";

let page=1;
let mode="id";

const movies=
document.getElementById("movies");

async function ambilData(){

movies.innerHTML=
"Loading...";

let url="";

if(mode=="id"){

url=
`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_origin_country=ID&page=${page}`;

}else{

url=
`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&without_origin_country=ID&page=${page}`;

}

try{

const res=
await fetch(url);

const data=
await res.json();

tampil(data.results);

document
.getElementById(
"pageNum"
)
.innerText=page;

}catch(err){

movies.innerHTML=
"Gagal ambil data";

console.log(err);

}

}

function tampil(data){

movies.innerHTML="";

data.forEach(movie=>{

if(!movie.poster_path)
return;

movies.innerHTML+=`

<div class="card"
onclick="putar(${movie.id})">

<img src=
"https://image.tmdb.org/t/p/w500${movie.poster_path}">

<div class="title">
${movie.title}
</div>

</div>

`;

});

}

function putar(id){

document
.getElementById(
"playerBox"
)
.style.display=
"flex";

document
.getElementById(
"player"
)
.src=
`https://vsembed.ru/embed/movie?tmdb=${id}`;

}

function tutup(){

document
.getElementById(
"playerBox"
)
.style.display=
"none";

document
.getElementById(
"player"
)
.src="";

}

function loadIndonesia(btn){

mode="id";
page=1;

aktif(btn);

ambilData();

}

function loadLuar(btn){

mode="luar";
page=1;

aktif(btn);

ambilData();

}

function aktif(btn){

document
.querySelectorAll(
".menu button"
)
.forEach(x=>
x.classList.remove(
"active"
));

btn.classList.add(
"active"
);

}

function nextPage(){

page++;
ambilData();

window.scrollTo(
0,
0
);

}

function prevPage(){

if(page>1){

page--;

ambilData();

window.scrollTo(
0,
0
);

}

}

ambilData();

</script>

</body>
</html>
