<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Watch Movie - TUKARFOLLOW</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* ====================================
       1. BASIC RESET & CORE STYLE
       ==================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #000000;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ====================================
       2. WATCH LAYOUT (77vh PLAYER & KOMENTAR)
       ==================================== */
    .watch-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 70px); /* Kurangi tinggi nav bawah (70px) */
      width: 100%;
    }

    /* Player Area (77vh) */
    .video-player-section {
      width: 100%;
      height: 77vh;
      background: #000;
      position: relative;
    }
    .video-player-section iframe, 
    .video-player-section video {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Layer Subtitle Melayang */
    .custom-subtitle-box {
      display: none; 
      position: absolute; 
      bottom: 12%; 
      left: 50%; 
      transform: translateX(-50%); 
      background: rgba(0,0,0,0.8); 
      color: #ffffff; 
      padding: 6px 16px; 
      border-radius: 6px; 
      font-size: 15px; 
      font-weight: 500; 
      text-align: center; 
      z-index: 99; 
      min-width: 75%; 
      max-width: 90%; 
      pointer-events: none; 
      text-shadow: 2px 2px 3px #000;
      border: 1px solid rgba(255,255,255,0.1);
      line-height: 1.4;
    }

    /* Tombol Sinkronisasi Subtitle */
    .sync-sub-btn {
      display: none;
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 101;
      background: rgba(255, 221, 87, 0.9);
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      align-items: center;
      gap: 5px;
      transition: all 0.2s ease;
    }
    .sync-sub-btn:active {
      transform: scale(0.95);
    }

    /* Comments Section (Sisanya di bawah) */
    .comments-section {
      width: 100%;
      flex: 1;
      background: #0d0d0d;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 15px;
      display: flex;
      flex-direction: column;
    }
    .comments-header {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ffdd57;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .comments-list-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }
    .comment-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }
    .comment-user {
      font-weight: 600;
      color: #38b6ff;
      margin-bottom: 2px;
    }
    .comment-text {
      color: #e0e0e0;
      line-height: 1.4;
    }

    /* ====================================
       3. SEARCH REAL-TIME FULLSCREEN LAYER
       ==================================== */
    .search-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #000000;
      z-index: 100;
      padding: 15px;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
    }
    .search-container.show {
      transform: translateY(0);
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 0 15px;
      height: 45px;
    }
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      padding-left: 10px;
    }
    .search-box input:focus {
      outline: none;
    }

    /* Layer Hasil Pencarian Menutup Halaman */
    .search-results-layer {
      position: fixed;
      top: 75px;
      left: 0;
      width: 100%;
      height: calc(100vh - 145px);
      background: #050505;
      z-index: 99;
      overflow-y: auto;
      padding: 15px;
      display: none;
    }
    .search-results-layer.active {
      display: block;
    }
    .search-item-row {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }
    .search-item-thumb {
      width: 50px;
      height: 70px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      background-color: #222;
    }
    .search-item-info h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .search-item-info p {
      font-size: 11px;
      color: #888;
    }

    /* ====================================
       4. SLIDE-UP INFO PANEL (UNTUK INPUT KOMEN)
       ==================================== */
    .info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #121212;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      z-index: 105;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
    }
    .info-panel.show {
      transform: translateY(0);
    }
    .panel-content {
      padding: 20px;
    }
    .form-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #fff;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 13px;
    }
    .form-group textarea {
      resize: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: 1px solid #ffdd57;
    }
    .submit-btn {
      background: #ffdd57;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-top: 5px;
    }

    .panel-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      z-index: 104;
      display: none;
    }
    .panel-backdrop.active {
      display: block;
    }

    /* ====================================
       5. BOTTOM NAVIGATION STYLE
       ==================================== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 110;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #888888;
      cursor: pointer;
      font-size: 11px;
    }
    .nav-item.active {
      color: #ffffff;
    }
    .nav-item span {
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="search-container" id="searchContainer">
    <div class="search-box">
      <i data-lucide="search" size="18" color="#888"></i>
      <input type="text" id="searchInput" placeholder="Cari film lain...">
    </div>
  </div>

  <div class="search-results-layer" id="searchResultsLayer"></div>

  <div class="watch-layout">
    <div class="video-player-section" id="playerArea">
      <button id="syncSubBtn" class="sync-sub-btn">
        <i data-lucide="refresh-cw" size="12"></i> Paskan Subtitle
      </button>
      <div id="customSubtitle" class="custom-subtitle-box"></div>
    </div>

    <div class="comments-section">
      <div class="comments-header">
        <i data-lucide="message-square" size="16"></i> Komentar Netizen
      </div>
      <div class="comments-list-container" id="commentList"></div>
    </div>
  </div>

  <div class="panel-backdrop" id="panelBackdrop" onclick="closeCommentForm()"></div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-content">
      <div class="form-title">Tulis Komentar Kamu</div>
      <div class="form-group">
        <input type="text" id="commentName" placeholder="Nama samaran kamu...">
        <textarea id="commentText" placeholder="Tulis opini/komentar film di sini..." rows="3" maxlength="300"></textarea>
        <button class="submit-btn" onclick="submitComment()">Kirim Komentar</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" id="navSearch">
      <i data-lucide="search" size="24"></i>
      <span>Search</span>
    </div>
    <div class="nav-item" id="navAddComment" style="color: #fff;">
      <i data-lucide="plus-circle" size="28"></i>
      <span>Add</span>
    </div>
    <div class="nav-item" id="navHome">
      <i data-lucide="home" size="24"></i>
      <span>Home</span>
    </div>
  </div>

  <script>
// ============================================================================
    // 🖥️ 3. SETUP VIDEO PLAYER (VIDSRC STABLE + AUTO-SUBTITLE)
    // ============================================================================
    function setupVideoPlayer(tmdbId) {
      const customMovie = myCustomMovies.find(m => m.tmdb_id === tmdbId);
      
      // Reset isi player area dan kembalikan struktur box penampung
      playerArea.innerHTML = `
        <button id="syncSubBtn" class="sync-sub-btn"><i data-lucide="refresh-cw" size="12"></i> Paskan Subtitle</button>
        <div id="customSubtitle" class="custom-subtitle-box"></div>
      `; 

      // Bikin link otomatis ke file .vtt di repo GitHub Refs terbaru milikmu
      const githubSubUrl = `https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/${tmdbId}.vtt`;
      const encodedSubUrl = encodeURIComponent(githubSubUrl);

      let mediaHtml = '';

      if (customMovie) {
        if (customMovie.iframe && customMovie.iframe.trim() !== "") {
          mediaHtml = `<iframe src="${customMovie.iframe}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        } else if (customMovie.video && customMovie.video.trim() !== "") {
          mediaHtml = `<video src="${customMovie.video}" controls autoplay playsinline></video>`;
        } else {
          // SERVER UTAMA: Menggunakan Vidsrc.to (Jauh lebih stabil & anti-refused)
          mediaHtml = `
            <div style="width:100%; height:100%; position:relative;">
              <iframe id="mainPlayer" src="https://vidsrc.to/embed/movie/${tmdbId}?sub.id=${encodedSubUrl}&sub.info=${encodedSubUrl}" allowfullscreen style="width:100%; height:100%;"></iframe>
              <button onclick="switchServer(${tmdbId})" style="position:absolute; bottom:15px; left:15px; background:rgba(0,0,0,0.75); color:#ffdd57; border:1px solid #ffdd57; padding:5px 12px; font-size:11px; font-weight:600; border-radius:6px; cursor:pointer; z-index:102; box-shadow:0 2px 8px rgba(0,0,0,0.5);">
                🔄 Ganti Server (Jika Error)
              </button>
            </div>
          `;
        }
      } else {
        // Default langsung pakai server Vidsrc.to yang aman dari error koneksi
        mediaHtml = `
          <div style="width:100%; height:100%; position:relative;">
            <iframe id="mainPlayer" src="https://vidsrc.to/embed/movie/${tmdbId}?sub.id=${encodedSubUrl}&sub.info=${encodedSubUrl}" allowfullscreen style="width:100%; height:100%;"></iframe>
            <button onclick="switchServer(${tmdbId})" style="position:absolute; bottom:15px; left:15px; background:rgba(0,0,0,0.75); color:#ffdd57; border:1px solid #ffdd57; padding:5px 12px; font-size:11px; font-weight:600; border-radius:6px; cursor:pointer; z-index:102; box-shadow:0 2px 8px rgba(0,0,0,0.5);">
              🔄 Ganti Server (Jika Error)
            </button>
          </div>
        `;
      }
      
      playerArea.insertAdjacentHTML('afterbegin', mediaHtml);
    }

    // Fungsi saklar rahasia untuk lompat server cadangan jika Vidsrc utama lagi ngadat
    function switchServer(tmdbId) {
      const player = document.getElementById('mainPlayer');
      if (player) {
        if (player.src.includes('vidsrc.to')) {
          // Jika server utama error, lempar ke vsembed yang anti-blokir
          player.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
          alert("Beralih ke Server Cadangan (vsembed)...");
        } else {
          const githubSubUrl = `https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/${tmdbId}.vtt`;
          const encodedSubUrl = encodeURIComponent(githubSubUrl);
          player.src = `https://vidsrc.to/embed/movie/${tmdbId}?sub.id=${encodedSubUrl}&sub.info=${encodedSubUrl}`;
          alert("Beralih kembali ke Server Utama (Vidsrc)...");
        }
      }
    }
  </script>
</body>
</html>
