<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Film Indonesia</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        header {
            margin-bottom: 30px;
            text-align: center;
        }
        h1 {
            color: #e50914;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background-color: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }
        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .movie-poster {
            width: 100%;
            height: 270px;
            object-fit: cover;
            background-color: #333;
        }
        .movie-info {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .movie-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .movie-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #aaaaaa;
        }
        .rating {
            color: #ffb400;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bioskop Indonesia</h1>
        <p>Streaming Film Indonesia Terpopuler</p>
    </header>

    <main class="grid-container" id="movie-grid">
        <div class="loading">Memuat film...</div>
    </main>

    <script>
        // Konfigurasi API
        const API_KEY = 'b3b893873ed1bb7f175b2707afeea2a0';
        const BASE_URL = 'https://themoviedb.org';
        const IMAGE_URL = 'https://tmdb.org';
        const PLAYER_URL = 'https://vsembed.ru/embed/movie?tmdb=';

        // Fungsi mengambil data film Indonesia dari TMDB
        async function fetchIndonesianMovies() {
            const gridContainer = document.getElementById('movie-grid');
            
            try {
                // Menampilkan film dengan bahasa asli Indonesia (id) dan negara asal Indonesia (ID)
                const response = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_original_language=id&region=ID&sort_by=popularity.desc`);
                const data = await response.json();
                
                // Bersihkan pesan loading
                gridContainer.innerHTML = '';

                if (data.results && data.results.length > 0) {
                    data.results.forEach(movie => {
                        // Validasi gambar poster, jika tidak ada gunakan placeholder
                        const posterPath = movie.poster_path ? `${IMAGE_URL}${movie.poster_path}` : 'https://placeholder.com';
                        const releaseYear = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';
                        const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '0.0';
                        
                        // Membuat link tujuan dinamis hanya mengambil ID TMDB saja
                        const targetPlayerUrl = `${PLAYER_URL}${movie.id}`;

                        // Struktur elemen Card HTML
                        const movieCard = document.createElement('a');
                        movieCard.className = 'movie-card';
                        movieCard.href = targetPlayerUrl;
                        movieCard.target = '_blank'; // Membuka pemutar video di tab baru

                        movieCard.innerHTML = `
                            <img class="movie-poster" src="${posterPath}" alt="${movie.title}" loading="lazy">
                            <div class="movie-info">
                                <div class="movie-title">${movie.title}</div>
                                <div class="movie-meta">
                                    <span>${releaseYear}</span>
                                    <span class="rating">⭐ ${rating}</span>
                                </div>
                            </div>
                        `;

                        gridContainer.appendChild(movieCard);
                    });
                } else {
                    gridContainer.innerHTML = '<div class="loading">Film tidak ditemukan.</div>';
                }

            } catch (error) {
                console.error('Error fetching data:', error);
                gridContainer.innerHTML = '<div class="loading">Gagal memuat data film. Coba lagi nanti.</div>';
            }
        }

        // Jalankan fungsi saat halaman selesai dimuat
        document.addEventListener('DOMContentLoaded', fetchIndonesianMovies);
    </script>
</body>
</html>
