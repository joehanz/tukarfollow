<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template TMDB - Klik Poster Putar</title>
    <!-- Pemutar Video -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.8.2/plyr.css">
    <script src="https://cdn.plyr.io/3.8.2/plyr.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { max-width: 900px; margin: 20px auto; padding: 0 15px; background: #f5f5f5; }

        /* Area Poster & Info */
        .film-card {
            display: flex;
            gap: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        .film-card:hover { transform: scale(1.01); }
        .poster {
            width: 185px;
            height: 278px;
            border-radius: 6px;
            object-fit: cover;
            background: #eee;
        }
        .info { flex: 1; }
        .info h2 { margin-bottom: 10px; color: #222; }
        .info p { color: #555; line-height: 1.5; margin-bottom: 8px; }
        .klik-info { font-size: 13px; color: #007bff; font-weight: bold; }

        /* Area Pemutar */
        .player-wrap {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }
        #player { width: 100%; height: 480px; background: #000; border-radius: 6px; }
    </style>
</head>
<body>

    <!-- Kartu Film (Poster + Info) -->
    <div class="film-card" id="filmArea" data-tmdb-id="550">
        <img class="poster" id="poster" alt="Poster Film">
        <div class="info">
            <h2 id="judul">Memuat...</h2>
            <p id="ringkasan">Sedang mengambil data dari TMDB...</p>
            <p class="klik-info">👉 Klik poster atau area ini untuk mulai memutar</p>
        </div>
    </div>

    <!-- Pemutar Video -->
    <div class="player-wrap" id="playerArea">
        <video id="player" controls playsinline></video>
    </div>

    <script>
        // === DATA DARI KAMU ===
        const API_KEY        = 'c000d7b8b0f5ee16b98b6103009745d8';
        const BASE_URL       = 'https://api.themoviedb.org/3';
        const IMAGE_URL      = 'https://image.tmdb.org/t/p/w185';
        const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
        const SUBTITLE_URL   = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

        // Inisialisasi pemutar
        const player = new Plyr('#player');

        // Ambil & tampilkan data film dari TMDB
        async function muatDataFilm(tmdbId) {
            try {
                const res = await fetch(`${BASE_URL}/movie/${tmdbId}?api_key=${API_KEY}&language=id-ID`);
                if (!res.ok) throw new Error("ID tidak ditemukan");
                const data = await res.json();

                document.getElementById('poster').src = data.poster_path ? `${IMAGE_URL}${data.poster_path}` : 'placeholder.jpg';
                document.getElementById('judul').textContent = data.title;
                document.getElementById('ringkasan').textContent = data.overview || "Tidak ada keterangan untuk film ini.";
            } catch (err) {
                document.getElementById('judul').textContent = "Gagal Memuat";
                document.getElementById('ringkasan').textContent = err.message;
            }
        }

        // Putar video saat diklik
        async function putarFilm() {
            const tmdbId = this.dataset.tmdbId;
            if (!tmdbId) return;

            // Ambil link video
            const resLink = await fetch(`${URL_APPS_SCRIPT}?id=${tmdbId}`);
            const hasil = await resLink.json();
            const linkVideo = hasil.data?.[0]?.link;

            if (!linkVideo) {
                alert("Maaf, link video belum tersedia untuk film ini.");
                return;
            }

            // Ambil subtitle
            const linkSub = `${SUBTITLE_URL}${tmdbId}/id.vtt`;

            // Tampilkan pemutar & masukkan sumber
            const playerArea = document.getElementById('playerArea');
            playerArea.style.display = 'block';

            player.source = {
                type: 'video',
                title: document.getElementById('judul').textContent,
                poster: document.getElementById('poster').src,
                sources: [{ src: linkVideo, type: 'video/mp4' }],
                tracks: [{ kind: 'subtitles', label: 'Bahasa Indonesia', srclang: 'id', src: linkSub, default: true }]
            };

            // Gulir otomatis ke pemutar
            playerArea.scrollIntoView({ behavior: 'smooth' });
        }

        // Jalankan awal
        const idAwal = document.getElementById('filmArea').dataset.tmdbId;
        muatDataFilm(idAwal);
        document.getElementById('filmArea').addEventListener('click', putarFilm);
    </script>

</body>
</html>
