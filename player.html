<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Subtitle Berjalan Otomatis</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      max-width: 800px; 
      margin: 40px auto; 
      padding: 0 20px; 
      text-align: center;
    }
    .waktu {
      font-size: 28px;
      font-weight: bold;
      color: #222;
      margin: 20px 0;
    }
    .kotak-teks {
      font-size: 22px;
      line-height: 1.7;
      min-height: 100px;
      padding: 25px;
      background: #f8f9fa;
      border-radius: 10px;
      margin: 25px 0;
      color: #000;
      border: 1px solid #e0e0e0;
    }
    button {
      padding: 12px 22px;
      font-size: 17px;
      margin: 0 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }
    .mulai { background: #28a745; }
    .jeda { background: #ffc107; color: #222; }
    .ulang { background: #17a2b8; }
  </style>
</head>
<body>

  <h2>Subtitle Berjalan Otomatis</h2>

  <div class="waktu" id="tampilWaktu">00:00:00</div>

  <div class="kotak-teks" id="tampilSubtitle">
    Tekan tombol Mulai untuk memulai...
  </div>

  <button class="mulai" onclick="mulai()">Mulai</button>
  <button class="jeda" onclick="jeda()">Jeda</button>
  <button class="ulang" onclick="ulang()">Ulang</button>

<script>
// Link langsung ke file subtitle kamu
const URL_VTT = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/1314481.vtt";

let daftarSub = [];
let waktuMulai = 0;
let timer = null;
let sedangJalan = false;

// Ubah format waktu (00:00:30.547) jadi detik
function keDetik(strWaktu) {
  const bagian = strWaktu.split(':');
  const jam = Number(bagian[0]);
  const menit = Number(bagian[1]);
  const detik = Number(bagian[2]);
  return jam * 3600 + menit * 60 + detik;
}

// Ubah detik jadi format jam:menit:detik
function keJam(detik) {
  const j = Math.floor(detik / 3600).toString().padStart(2, '0');
  const m = Math.floor((detik % 3600) / 60).toString().padStart(2, '0');
  const d = Math.floor(detik % 60).toString().padStart(2, '0');
  return `${j}:${m}:${d}`;
}

// Baca dan olah file VTT
async function muatSubtitle() {
  try {
    const res = await fetch(URL_VTT);
    if (!res.ok) throw new Error("File tidak bisa diakses");

    const teks = await res.text();
    const baris = teks.split('\n').map(b => b.trim());
    let i = 0;
    daftarSub = [];

    if (baris[0].toUpperCase() === "WEBVTT") i++;

    while (i < baris.length) {
      if (baris[i].includes("-->")) {
        const [awalStr, akhirStr] = baris[i].split('-->').map(s => s.trim());
        i++;
        let teksSub = "";
        while (i < baris.length && baris[i] !== "") {
          teksSub += baris[i] + " ";
          i++;
        }
        daftarSub.push({
          awal: keDetik(awalStr),
          akhir: keDetik(akhirStr),
          teks: teksSub.trim()
        });
      }
      i++;
    }
  } catch (err) {
    document.getElementById("tampilSubtitle").innerHTML = "Gagal memuat: " + err.message;
  }
}

// Cari teks yang harus tampil pada waktu sekarang
function cekSubtitle(waktuSekarang) {
  const elemen = document.getElementById("tampilSubtitle");
  const cocok = daftarSub.find(s => waktuSekarang >= s.awal && waktuSekarang <= s.akhir);
  elemen.innerHTML = cocok ? cocok.teks : "";
}

// Tombol mulai
function mulai() {
  if (!daftarSub.length) { muatSubtitle().then(mulai); return; }
  if (sedangJalan) return;
  sedangJalan = true;
  const waktuAwal = Date.now() - waktuMulai * 1000;
  timer = setInterval(() => {
    waktuMulai = (Date.now() - waktuAwal) / 1000;
    document.getElementById("tampilWaktu").textContent = keJam(waktuMulai);
    cekSubtitle(waktuMulai);
  }, 100);
}

// Tombol jeda
function jeda() {
  sedangJalan = false;
  clearInterval(timer);
}

// Tombol ulang dari awal
function ulang() {
  jeda();
  waktuMulai = 0;
  document.getElementById("tampilWaktu").textContent = "00:00:00";
  document.getElementById("tampilSubtitle").innerHTML = "";
}

// Muat otomatis saat halaman dibuka
muatSubtitle();
</script>

</body>
</html>
