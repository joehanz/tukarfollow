<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Detail</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#111;color:#fff}

/* NAV */
nav{
display:flex;
align-items:center;
gap:15px;
padding:12px;
background:#000;
position:sticky;
top:0;
z-index:1000;
}

.logo{color:#e50914;font-weight:bold}

nav a{
color:#fff;
text-decoration:none;
font-size:13px;
opacity:.8;
}

nav a:hover{opacity:1}

input{
flex:1;
padding:7px;
border-radius:6px;
border:none;
}

/* PLAYER */
.player{
width:100%;
aspect-ratio:16/9;
background:#000;
}

iframe{
width:100%;
height:100%;
border:0;
}

/* INFO */
.info{
padding:15px;
}

.info h2{margin-bottom:10px}

.meta{
font-size:13px;
opacity:.8;
margin:5px 0;
}

/* RELATED */
.related-title{
padding:15px;
font-size:14px;
opacity:.8;
}

.related{
display:flex;
gap:10px;
overflow-x:auto;
padding:0 15px 20px;
scroll-snap-type:x mandatory;
}

.rel-card{
min-width:120px;
cursor:pointer;
scroll-snap-align:start;
}

.rel-card img{
width:100%;
border-radius:6px;
}

.rel-card div{
font-size:11px;
opacity:.8;
margin-top:5px;
}
</style>
</head>

<body>

<nav>
<div class="logo">MOVIE+</div>

<input placeholder="Search coming soon">

<a href="uji.html">Home</a>
<a href="uji.html">All Movies</a>
<a href="uji.html">Film Luar</a>
<a href="uji.html">Film Indonesia</a>
</nav>

<div class="player">
<iframe id="player" allowfullscreen></iframe>
</div>

<div class="info" id="info">Loading...</div>

<div class="related-title">Related Movies</div>
<div class="related" id="related"></div>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";
const id=new URLSearchParams(location.search).get("id");

async function load(){

// DETAIL
const res=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
);

const m=await res.json();

document.getElementById("player").src=
`https://vsembed.ru/embed/movie?tmdb=${id}`;

document.getElementById("info").innerHTML=`
<h2>${m.title}</h2>
<div class="meta">⭐ ${m.vote_average}</div>
<div class="meta">🌍 ${m.production_countries.map(c=>c.name).join(", ")}</div>
<div class="meta">🎭 ${m.genres.map(g=>g.name).join(", ")}</div>
<div class="meta">📅 ${m.release_date}</div>
<p style="margin-top:10px">${m.overview}</p>
`;

// RELATED
const rel=await fetch(
`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`
);

const r=await rel.json();

const box=document.getElementById("related");
box.innerHTML="";

r.results.slice(0,10).forEach(v=>{

box.innerHTML+=`
<div class="rel-card" onclick="go(${v.id})">
<img src="https://image.tmdb.org/t/p/w200${v.poster_path}">
<div>${v.title}</div>
</div>
`;

});

}

function go(id){
location.href=`uji2.html?id=${id}`;
}

load();

</script>

</body>
</html>
