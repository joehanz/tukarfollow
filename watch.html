<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Movie</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- =========================
     NAVBAR
========================= -->

<header class="navbar">

  <div class="nav-left">
    <a href="index.html" class="logo-wrap">
      <div class="logo-icon">▶</div>
      <div class="logo-text">MovieHub</div>
    </a>
  </div>

  <div class="nav-right desktop-nav">

    <input
      type="text"
      id="searchInput"
      placeholder="Cari film atau series..."
      class="search-input"
    >

    <select id="genreSelect">
      <option value="">Semua Genre</option>
    </select>

    <select id="yearSelect">
      <option value="">Semua Rilis</option>
      <option value="2026">2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="classic">Klasik</option>
    </select>

  </div>

  <button id="burgerBtn" class="burger-btn">
    ☰
  </button>

</header>

<!-- =========================
     MOBILE MENU
========================= -->

<div id="mobileMenu" class="mobile-menu">

  <input
    type="text"
    id="searchInputMobile"
    placeholder="Cari film atau series..."
    class="search-input"
  >

  <select id="genreSelectMobile">
    <option value="">Semua Genre</option>
  </select>

  <select id="yearSelectMobile">
    <option value="">Semua Rilis</option>
    <option value="2026">2026</option>
    <option value="2025">2025</option>
    <option value="2024">2024</option>
    <option value="classic">Klasik</option>
  </select>

</div>

<!-- =========================
     PLAYER SECTION
========================= -->

<section class="watch-container">

  <div class="player-wrap">

    <iframe
      id="playerFrame"
      class="player-frame"
      allowfullscreen
      frameborder="0">
    </iframe>

    <!-- =====================
         LAYER 1
    ====================== -->

    <div id="overlayOne" class="overlay-layer">

      <img
        src="images/layer1.webp"
        alt=""
        class="overlay-image"
      >

    </div>

    <!-- =====================
         LAYER 2
    ====================== -->

    <div id="overlayTwo" class="overlay-layer hidden">

      <img
        id="bannerImage"
        src=""
        alt=""
        class="overlay-image"
      >

      <div class="overlay-buttons">

        <button
          id="supportBtn"
          class="support-btn">
          SUPPORT
        </button>

        <button
          id="skipBtn"
          class="skip-btn">
          SKIP
        </button>

      </div>

    </div>

  </div>

</section>

<!-- =========================
     INFO MOVIE
========================= -->

<section class="movie-info-wrap">

  <div class="movie-info-grid">

    <div class="movie-poster-box">

      <img
        id="moviePoster"
        src=""
        alt=""
      >

    </div>

    <div class="movie-detail-box">

      <h1 id="movieTitle">
        Loading...
      </h1>

      <div id="movieMeta"
           class="movie-meta">
      </div>

      <p id="movieOverview"
         class="movie-overview">
      </p>

      <!-- =====================
           SERIES ONLY
      ====================== -->

      <div
        id="tvControls"
        class="tv-controls hidden">

        <select id="seasonSelect">

        </select>

        <select id="episodeSelect">

        </select>

        <button id="playEpisodeBtn">
          Play
        </button>

      </div>

    </div>

  </div>

</section>

<!-- =========================
     RELATED MOVIES
========================= -->

<section class="related-section">

  <h2>
    Related Movies
  </h2>

  <div class="related-wrap">

    <button
      id="relatedPrev"
      class="related-arrow left-arrow">
      ❮
    </button>

    <div
      id="relatedRow"
      class="related-row">

    </div>

    <button
      id="relatedNext"
      class="related-arrow right-arrow">
      ❯
    </button>

  </div>

</section>

<!-- =========================
     FOOTER
========================= -->

<footer class="footer">

  <div class="footer-col">
    <h3>Tentang</h3>
    <p>
      Portal film dan series berbasis TMDB.
    </p>
  </div>

  <div class="footer-col">
    <h3>Kategori</h3>
    <ul>
      <li>Movie</li>
      <li>TV Series</li>
      <li>Indonesia</li>
    </ul>
  </div>

  <div class="footer-col">
    <h3>Informasi</h3>
    <ul>
      <li>Disclaimer</li>
      <li>Privacy Policy</li>
      <li>DMCA</li>
    </ul>
  </div>

  <div class="footer-col">
    <h3>Kontak</h3>
    <ul>
      <li>Email</li>
      <li>Telegram</li>
      <li>Facebook</li>
    </ul>
  </div>

</footer>

     CONFIG
========================= -->

},

 url:"https://site3.com"
}

];

</script>

<script src="script.html"></script>

</body>
</html>
