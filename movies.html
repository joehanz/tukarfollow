<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tukar Follow - Watch Movies Online</title>

<meta name="description" content="Watch latest movies online subtitle indonesia full HD.">
<meta name="keywords" content="movie, streaming, subtitle indonesia, film online">
<meta name="theme-color" content="#0d1117">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d1117;
font-family:'Poppins',sans-serif;
color:#fff;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 45px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
background:rgba(0,0,0,.55);
backdrop-filter:blur(10px);
}

.logo{
font-size:30px;
font-weight:700;
color:#01b4e4;
}

nav{
display:flex;
gap:25px;
}

nav a{
color:#fff;
text-decoration:none;
font-size:14px;
transition:.3s;
}

nav a:hover{
color:#01b4e4;
}

.search-box{
width:260px;
height:44px;
background:#fff;
border-radius:50px;
padding:0 18px;
display:flex;
align-items:center;
}

.search-box input{
border:none;
outline:none;
width:100%;
font-size:14px;
}

/* HERO */

.hero{
height:75vh;
position:relative;
display:flex;
align-items:flex-end;
padding:70px;
background-size:cover;
background-position:center;
}

.hero::before{
content:'';
position:absolute;
inset:0;
background:
linear-gradient(to top, rgba(13,17,23,1), rgba(0,0,0,.2));
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero-tag{
display:inline-block;
padding:6px 16px;
background:#01b4e4;
border-radius:50px;
font-size:13px;
margin-bottom:20px;
}

.hero h1{
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:15px;
line-height:1.8;
color:#ddd;
}

/* SECTION */

.section{
padding:40px 50px;
}

.section-title{
font-size:28px;
font-weight:600;
margin-bottom:25px;
}

/* GRID */

.movie-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:22px;
}

.movie-card{
background:#161b22;
border-radius:18px;
overflow:hidden;
transition:.35s;
cursor:pointer;
}

.movie-card:hover{
transform:translateY(-8px);
}

.movie-card img{
width:100%;
height:270px;
object-fit:cover;
display:block;
}

.movie-info{
padding:14px;
}

.movie-info h3{
font-size:15px;
margin-bottom:8px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.movie-info span{
font-size:13px;
color:#01b4e4;
}

/* PAGINATION */

.pagination{
display:flex;
justify-content:center;
gap:10px;
margin-top:40px;
flex-wrap:wrap;
}

.page-btn{
width:42px;
height:42px;
border-radius:50%;
background:#161b22;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.3s;
}

.page-btn:hover,
.page-btn.active{
background:#01b4e4;
}

/* FOOTER */

footer{
padding:35px;
text-align:center;
color:#888;
font-size:14px;
}

/* MOBILE */

@media(max-width:900px){

header{
padding:15px 20px;
flex-wrap:wrap;
gap:15px;
}

nav{
width:100%;
justify-content:center;
overflow:auto;
}

.search-box{
width:100%;
}

.hero{
height:65vh;
padding:30px 20px;
}

.hero h1{
font-size:36px;
}

.section{
padding:30px 20px;
}

.movie-grid{
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.movie-card img{
height:240px;
}

}

</style>
</head>
<body>

<header>

<div class="logo">TUKARFOLLOW</div>

<nav>
<a href="index.html">Home</a>
<a href="movies.html">Movies</a>
<a href="indonesia.html">Indonesia</a>
</nav>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search movie...">
</div>

</header>

<!-- HERO -->

<section class="hero" id="hero">

<div class="hero-content">

<div class="hero-tag">Manual Update</div>

<h1 id="heroTitle">Loading...</h1>

<p id="heroOverview">
Please wait...
</p>

</div>

</section>

<!-- MOVIES -->

<section class="section">

<h2 class="section-title">Latest Movies</h2>

<div class="movie-grid" id="movieGrid"></div>

<div class="pagination" id="pagination"></div>

</section>

<footer>
© 2026 Movies Collection
</footer>

<script>

const movieGrid = document.getElementById("movieGrid");
const pagination = document.getElementById("pagination");

const hero = document.getElementById("hero");
const heroTitle = document.getElementById("heroTitle");
const heroOverview = document.getElementById("heroOverview");

let allMovies = [];
let currentPage = 1;
const perPage = 12;

/* LOAD JSON */

async function loadMovies(){

const res = await fetch("movies.json");

allMovies = await res.json();

loadHero();

renderMovies(currentPage);

}

/* HERO */

function loadHero(){

const latest = allMovies[0];

hero.style.backgroundImage =
`url(${latest.poster})`;

heroTitle.innerHTML =
latest.title;

heroOverview.innerHTML =
latest.sinopsis;

}

/* RENDER */

function renderMovies(page){

currentPage = page;

movieGrid.innerHTML = "";

const start = (page - 1) * perPage;
const end = start + perPage;

const movies = allMovies.slice(start,end);

movies.forEach((movie,index)=>{

movieGrid.innerHTML += `

<a href="watch.html?id=${start + index}"
style="text-decoration:none;color:white;">

<div class="movie-card">

<img src="${movie.poster}" loading="lazy">

<div class="movie-info">

<h3>${movie.title}</h3>

<span>${movie.extra}</span>

</div>

</div>

</a>

`;

});

renderPagination();

}

/* PAGINATION */

function renderPagination(){

pagination.innerHTML = "";

const totalPages =
Math.ceil(allMovies.length / perPage);

let start = currentPage - 2;
let end = currentPage + 2;

if(start < 1) start = 1;
if(end > totalPages) end = totalPages;

if(currentPage > 1){

pagination.innerHTML += `
<div class="page-btn"
onclick="renderMovies(${currentPage - 1})">
‹
</div>
`;

}

for(let i=start;i<=end;i++){

pagination.innerHTML += `

<div class="page-btn ${currentPage===i?'active':''}"
onclick="renderMovies(${i})">

${i}

</div>

`;

}

if(currentPage < totalPages){

pagination.innerHTML += `
<div class="page-btn"
onclick="renderMovies(${currentPage + 1})">
›
</div>
`;

}

}

/* SEARCH */

document
.getElementById("searchInput")
.addEventListener("keyup",(e)=>{

const value =
e.target.value.toLowerCase();

if(value.length < 1){

renderMovies(1);
return;

}

const filtered =
allMovies.filter(movie=>
movie.title.toLowerCase().includes(value)
);

movieGrid.innerHTML = "";

filtered.forEach((movie,index)=>{

movieGrid.innerHTML += `

<a href="watch.html?id=${index}"
style="text-decoration:none;color:white;">

<div class="movie-card">

<img src="${movie.poster}">

<div class="movie-info">

<h3>${movie.title}</h3>

<span>${movie.extra}</span>

</div>

</div>

</a>

`;

});

pagination.innerHTML = "";

});

/* START */

loadMovies();

</script>

</body>
</html>
