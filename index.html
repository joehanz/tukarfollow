<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Movie TikTok Style</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white overflow-x-hidden">

  <!-- Sidebar -->
  <div class="fixed left-0 top-0 h-screen w-20 bg-gray-900 flex flex-col items-center pt-6">
    <ul class="space-y-6">
      <li class="cursor-pointer">🏠</li>
      <li class="cursor-pointer">🎬</li>
      <li class="cursor-pointer">📺</li>
      <li class="cursor-pointer">⭐</li>
    </ul>
  </div>

  <!-- Feed -->
  <div id="feed" class="ml-24 h-screen overflow-y-scroll snap-y snap-mandatory">
    <!-- Movie cards akan diinject dari JS -->
  </div>

  <script src="script.js"></script>
</body>
</html>
