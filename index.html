<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* HERO */
.hero {
  height: 60vh;
  background: linear-gradient(to top, #000, transparent),
              url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
  background-size: cover;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

.hero h1 {
  font-size: 28px;
}

/* SECTION */
.section {
  padding: 10px 15px;
}

.section h2 {
  font-size: 18px;
  margin: 10px 0;
}

/* ROW STYLE NETFLIX */
.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding-bottom: 10px;
}

.row::-webkit-scrollbar {
  display: none;
}

/* CARD */
.card {
  min-width: 140px;
  cursor: pointer;
  transition: 0.2s;
}

.card img {
  width: 140px;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
  transition: 0.2s;
}

.card:hover img {
  transform: scale(1.08);
  box-shadow: 0 10px 20px rgba(255,0,0,0.3);
}

.title {
  font-size: 12px;
  margin-top: 5px;
  opacity: 0.8;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>🎬 Watch Unlimited Movies</h1>
    <p style="opacity:0.7">Klik film untuk mulai nonton</p>
  </div>
</div>

<!-- SECTION -->
<div class="section">
  <h2>🔥 Trending Movies</h2>
  <div class="row" id="movieRow"></div>
</div>

<script>
// load JSON
fetch('movies.json')
.then(res => res.json())
.then(data => {
  const row = document.getElementById('movieRow');

  data.forEach(movie => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${movie.poster}">
      <div class="title">${movie.title}</div>
    `;

    div.onclick = () => {
      window.location.href = "watch.html?play=" + encodeURIComponent(movie.embed);
    };

    row.appendChild(div);
  });
});
</script>

</body>
</html>
