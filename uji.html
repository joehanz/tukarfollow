<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Hub</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0b0f;color:#fff}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
color:#ff2e2e;
font-weight:bold;
}

/* DESKTOP MENU */
.nav-right{
display:flex;
gap:12px;
align-items:center;
}

.nav-right input{
padding:7px 10px;
border-radius:8px;
border:none;
outline:none;
background:#1a1a1f;
color:#fff;
}

.nav-right a{
color:#ddd;
text-decoration:none;
font-size:13px;
}

/* BURGER */
.burger{
display:none;
font-size:22px;
cursor:pointer;
color:#fff;
}

/* MOBILE MENU */
.mobile-menu{
display:flex;
flex-direction:column;
position:fixed;
top:60px;
right:0;
width:220px;
background:#000;
padding:15px;
gap:10px;
transform:translateX(100%);
transition:.3s;
z-index:999;
}

.mobile-menu.show{
transform:translateX(0);
}

.mobile-menu a{
color:#fff;
text-decoration:none;
padding:8px 0;
border-bottom:1px solid #222;
}

/* MOBILE RULE */
@media(max-width:768px){
.nav-right{display:none;}
.burger{display:block;}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:14px;
padding:25px;
max-width:1300px;
margin:auto;
}

@media(max-width:1000px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}

/* CARD */
.card{
cursor:pointer;
transition:.25s;
border-radius:10px;
overflow:hidden;
background:#141420;
box-shadow:0 4px 15px rgba(0,0,0,.3);
}

.card:hover{
transform:scale(1.06);
box-shadow:0 10px 25px rgba(255,0,0,.15);
}

.card img{
width:100%;
display:block;
}

.title{
padding:8px;
font-size:12px;
opacity:.8;
}

/* PAGINATION */
.pagination{
display:flex;
justify-content:center;
gap:8px;
padding:20px;
flex-wrap:wrap;
}

.pagination button{
background:#1a1a22;
color:#fff;
border:none;
padding:7px 12px;
border-radius:10px;
cursor:pointer;
}

.pagination button:hover{
background:#ff2e2e;
}

/* FOOTER */
footer{
background:#000;
padding:35px 20px;
margin-top:40px;
border-top:1px solid rgba(255,255,255,.05);
}

.footer-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:1200px;
margin:auto;
font-size:13px;
opacity:.7;
}

@media(max-width:700px){
.footer-grid{grid-template-columns:repeat(2,1fr)}
}

</style>
</head>

<body>

<!-- NAV CLEAN -->
<nav>
<div class="logo">MOVIE+</div>

<div class="nav-right">
<input id="search" placeholder="Search..." oninput="searchMovie()">
<a href="uji.html">Home</a>
<a href="#" onclick="setMode('id')">Local</a>
</div>

<div class="burger" onclick="toggleMenu()">☰</div>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
<input placeholder="Search..." oninput="searchMovieMobile()">
<a href="uji.html">Home</a>
<a href="#" onclick="setMode('id')">Local</a>
</div>

<!-- GRID -->
<div id="grid" class="grid"></div>

<!-- PAGINATION -->
<div class="pagination" id="pagination"></div>

<!-- FOOTER -->
<footer>
<div class="footer-grid">
<div>About</div>
<div>DMCA</div>
<div>Privacy</div>
<div>Contact</div>
</div>
</footer>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";

let page=1,mode="all",query="";

function toggleMenu(){
document.getElementById("mobileMenu")
.classList.toggle("show");
}

/* LOAD */
async function load(){

let url="";

if(query){
url=`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${query}&page=${page}`;
}else if(mode==="id"){
url=`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_origin_country=ID&page=${page}`;
}else if(mode==="luar"){
url=`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&without_origin_country=ID&page=${page}`;
}else{
url=`https://api.themoviedb.org/3/trending/movie/week?api_key=${KEY}&page=${page}`;
}

const data=await fetch(url).then(r=>r.json());

render(data.results);
renderPagination(data.page);

}

function render(d){
let h="";
d.forEach(m=>{
if(!m.poster_path)return;
h+=`
<div class="card" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div class="title">${m.title}</div>
</div>`;
});
document.getElementById("grid").innerHTML=h;
}

function renderPagination(p){
let h="";
for(let i=p;i<p+6;i++){
h+=`<button onclick="goPage(${i})">${i}</button>`;
}
h+=`<button onclick="nextSet()">›</button>`;
document.getElementById("pagination").innerHTML=h;
}

function goPage(p){page=p;load()}
function nextSet(){page+=6;load()}
function go(id){location.href=`uji2.html?id=${id}`}

function setMode(m){mode=m;query="";page=1;load()}
function searchMovie(){query=document.getElementById("search").value;page=1;load()}
function searchMovieMobile(){query=document.querySelector("#mobileMenu input").value;page=1;load()}

load();

</script>

</body>
</html>
