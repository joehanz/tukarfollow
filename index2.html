<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1.0"
/>

<title>Movie2</title>

<link
rel="stylesheet"
href="style2.css"
/>

</head>
<body>

<!-- NAVBAR -->

<nav class="nav">

<div class="logo">
Movie2
</div>

<div
class="burger"
id="burger"
>
☰
</div>

<div
class="navMenu"
id="navMenu"
>

<div class="searchWrap">

<input
type="text"
id="searchInput"
placeholder="Search movies..."
autocomplete="off"
/>

<button
id="searchBtn"
>
Search
</button>

</div>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<h1>
Watch Movies & Series
</h1>

<p>
Random content from your library
</p>

</section>


<!-- GRID -->

<section
class="movieSection"
>

<div
id="movieGrid"
class="movieGrid"
>

<!-- generated by script2.js -->

</div>

</section>


<!-- LOADING -->

<div
id="loading"
class="loading"
>

Loading...

</div>


<script src="config2.js"></script>

<script src="script2.js"></script>

</body>
</html>
