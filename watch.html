<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>TUKARFOLLOW - Nonton Film</title>
  <meta name="description" content="Nonton streaming film dan serial TV terbaru gratis dengan kualitas HD dan subtitle Indonesia." />
  <meta name="keywords" content="nonton film gratis, streaming movie sub indo, bioskop online" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="id" />

  <link rel="icon" href="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" type="image/x-icon" />
  <link rel="apple-touch-icon" href="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" />

  <meta property="og:type" content="video.movie" />
  <meta property="og:title" content="TUKARFOLLOW" />
  <meta property="og:description" content="Nonton film dan serial TV terbaru sub Indonesia." />
  <meta property="og:url" content="https://tukarfollow.web.id/watch.html" />
  <meta property="og:image" content="https://tukarfollow.web.id/banner/banner-tukarfollow.webp" />
  <meta property="og:site_name" content="TUKARFOLLOW" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- CSS DIPERBAIKI SESUAI PERMINTAAN -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #0a0a0a;
      color: #ffffff;
      overflow-x: hidden;
    }

    .comments-panel {
      position: fixed;
      top: 0;
      right: -380px;
      width: 360px;
      height: 100vh;
      background: #121212;
      border-left: 1px solid #2a2a2a;
      z-index: 999;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .comments-panel.open {
      right: 0;
    }

    .comments-header {
      padding: 16px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
    }

    .close-comments {
      background: none;
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .close-comments:hover {
      background: #2a2a2a;
    }

    .comments-section {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    .empty-comments {
      text-align: center;
      color: #888;
      padding: 40px 20px;
      font-size: 14px;
    }

    .comment-item {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #2a2a2a;
    }

    .comment-name {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 4px;
      color: #4facff;
    }

    .comment-text {
      font-size: 13px;
      line-height: 1.5;
      color: #ddd;
      margin-bottom: 6px;
    }

    .comment-date {
      font-size: 11px;
      color: #777;
    }

    .watch-layout {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    .video-main-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      margin: 0;
      padding: 0;
      border-radius: 0;
      overflow: hidden;
      background: #000;
    }

    #filmIframe {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: cover;
    }

    .watermark-logo {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      opacity: 0.6;
      pointer-events: none;
    }

    .watermark-logo img {
      width: 60px;
      height: auto;
    }

    .subtitle-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 20px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: opacity 0.3s ease;
    }

    .subtitle-layer.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .subtitle-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }

    .ctrl-btn svg {
      width: 20px;
      height: 20px;
    }

    .search-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 90;
      width: 90%;
      max-width: 600px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .search-container.show {
      opacity: 1;
      visibility: visible;
    }

    .search-box {
      background: rgba(20,20,20,0.95);
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .search-box i {
      margin-right: 10px;
      color: #aaa;
    }

    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
    }

    #searchInput::placeholder {
      color: #888;
    }

    .search-results-layer {
      margin-top: 8px;
      background: rgba(20,20,20,0.95);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      max-height: 400px;
      overflow-y: auto;
      display: none;
    }

    .search-results-layer.active {
      display: block;
    }

    .search-item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-item-row:hover {
      background: rgba(255,255,255,0.1);
    }

    .search-item-thumb {
      width: 50px;
      height: 70px;
      background-size: cover;
      background-position: center;
      border-radius: 6px;
    }

    .search-item-info h4 {
      font-size: 14px;
      margin-bottom: 2px;
    }

    .search-item-info p {
      font-size: 12px;
      color: #999;
    }

    .panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .panel-backdrop.active {
      opacity: 1;
      visibility: visible;
    }

    .info-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 999;
      width: 90%;
      max-width: 420px;
      background: #1a1a1a;
      border-radius: 14px;
      border: 1px solid #2e2e2e;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .info-panel.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .form-title {
      font-size: 16px;
      font-weight: 600;
      padding: 16px;
      border-bottom: 1px solid #2e2e2e;
    }

    .form-group {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: #252525;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4facff;
    }

    .submit-btn {
      background: #2563eb;
      border: none;
      color: #fff;
      font-weight: 500;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #1d4ed8;
    }

    @media (max-width: 768px) {
      .video-main-wrapper {
        border-radius: 0;
        aspect-ratio: auto;
        min-height: 80vh;
      }
      .ctrl-btn {
        width: 36px;
        height: 36px;
      }
      .comments-panel {
        width: 90%;
        right: -95%;
      }
    }
  </style>
</head>
<body>
  <div class="comments-panel" id="commentsPanel">
    <div class="comments-header" id="commentsHeader">
      <span><i data-lucide="message-square" size="16"></i> Komentar Netizen</span>
      <button class="close-comments" id="closeCommentsBtn">&times;</button>
    </div>
    <div class="comments-section" id="commentsSection">
      <div class="comments-list-container" id="commentList">
        <div class="empty-comments">Buka untuk melihat komentar...</div>
      </div>
    </div>
  </div>

  <div class="watch-layout" id="watchLayout">
    <div class="video-main-wrapper" id="videoWrapper">
      <iframe id="filmIframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>

      <div class="watermark-logo">
        <img src="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" alt="TukarFollow" />
      </div>

      <div class="subtitle-layer" id="subLayer">
        <div class="subtitle-controls">
          <!-- NAVIGASI SESUAI PERMINTAAN -->
          <button class="ctrl-btn" id="btnHomeBack" title="Kembali ke halaman sebelumnya">
            <i data-lucide="arrow-left"></i>
          </button>
          <button class="ctrl-btn" id="btnAddComment" title="Tulis Komentar">
            <i data-lucide="plus-circle"></i>
          </button>
          <button class="ctrl-btn" id="btnViewComments" title="Lihat Daftar Komentar">
            <i data-lucide="message-square"></i>
          </button>
          <button class="ctrl-btn" id="btnFullscreen" title="Layar Penuh">
            <i data-lucide="maximize"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="search-container" id="searchContainer">
    <div class="search-box">
      <i data-lucide="search" size="18" color="#888"></i>
      <input type="text" id="searchInput" placeholder="Cari film lain..." />
    </div>
  </div>

  <div class="search-results-layer" id="searchResultsLayer"></div>

  <div class="panel-backdrop" id="panelBackdrop" onclick="tutupFormKomen()"></div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-content">
      <div class="form-title">Tulis Komentar Kamu</div>
      <div class="form-group">
        <input type="text" id="commentName" placeholder="Nama samaran kamu..." />
        <textarea id="commentText" placeholder="Tulis opini/komentar film di sini..." rows="3" maxlength="300"></textarea>
        <button class="submit-btn" onclick="kirimKomentar()">Kirim Komentar</button>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
    const MOVIES_JSON_PATH = './movies.json';

    const videoWrapper = document.getElementById('videoWrapper');
    const filmIframe = document.getElementById('filmIframe');
    const btnHomeBack = document.getElementById('btnHomeBack');
    const btnAddComment = document.getElementById('btnAddComment');
    const btnViewComments = document.getElementById('btnViewComments');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const commentsPanel = document.getElementById('commentsPanel');
    const closeCommentsBtn = document.getElementById('closeCommentsBtn');
    const commentListEl = document.getElementById('commentList');
    const infoPanel = document.getElementById('infoPanel');
    const panelBackdrop = document.getElementById('panelBackdrop');
    const subLayer = document.getElementById('subLayer');
    const watchLayout = document.getElementById('watchLayout');

    let currentMovieId = null;
    let allMoviesCache = [];
    let doubleClickTimer;

    // ====================================
    // LOGIKA UTAMA: BACA MOVIES.JSON
    // ====================================
    function ambilIdDariUrl() {
      const param = new URLSearchParams(window.location.search);
      return param.get('id');
    }

    async function cekDanMuatFilm(tmdbId) {
      try {
        const res = await fetch(MOVIES_JSON_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error("File tidak ditemukan");
        const daftarFilm = await res.json();
        const filmKetemu = daftarFilm.find(f => Number(f.tmdb_id) === Number(tmdbId));

        if (filmKetemu) {
          console.log("✅ Ditemukan di JSON:", filmKetemu.title);
          filmIframe.src = filmKetemu.iframe;
        } else {
          console.log("❌ Tidak ada di JSON, pakai vsembed");
          filmIframe.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
        }
      } catch (err) {
        console.warn("Gagal baca JSON, pakai vsembed:", err);
        filmIframe.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
      }
    }

    // ====================================
    // KONTROL & FUNGSI
    // ====================================
    btnHomeBack.addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'index.html';
      }
    });

    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        videoWrapper.requestFullscreen?.() || videoWrapper.webkitRequestFullscreen?.() || videoWrapper.mozRequestFullScreen?.() || videoWrapper.msRequestFullscreen?.();
      } else {
        document.exitFullscreen?.() || document.webkitExitFullscreen?.() || document.mozCancelFullScreen?.() || document.msExitFullscreen?.();
      }
    });

    // Tutup panel info dengan klik 2x
    document.addEventListener('click', (e) => {
      if (infoPanel.classList.contains('show')) {
        clearTimeout(doubleClickTimer);
        doubleClickTimer = setTimeout(() => {
          tutupFormKomen();
        }, 300);
      }
    });

    // Komentar
    btnAddComment.addEventListener('click', bukaFormKomen);
    btnViewComments.addEventListener('click', () => {
      const buka = commentsPanel.classList.toggle('open');
      if (buka) muatKomentar();
    });

    closeCommentsBtn.addEventListener('click', () => commentsPanel.classList.remove('open'));

    async function muatKomentar() {
      if (!currentMovieId) return;
      commentListEl.innerHTML = '<div class="empty-comments">Memuat komentar...</div>';
      try {
        const res = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${currentMovieId}`);
        const hasil = await res.json();
        if (hasil.status !== "success" || !hasil.data.length) {
          commentListEl.innerHTML = '<div class="empty-comments">Belum ada komentar</div>';
          return;
        }
        commentListEl.innerHTML = hasil.data.map(item => `
          <div class="comment-item">
            <div class="comment-name">${item.nama || 'Anonim'}</div>
            <div class="comment-text">${item.komentar || ''}</div>
            <div class="comment-date">${new Date(item.timestamp).toLocaleString('id-ID')}</div>
          </div>
        `).join('');
      } catch {
        commentListEl.innerHTML = '<div class="empty-comments">Gagal memuat</div>';
      }
    }

    function bukaFormKomen() {
      infoPanel.classList.add('show');
      panelBackdrop.classList.add('active');
    }
    function tutupFormKomen() {
      infoPanel.classList.remove('show');
      panelBackdrop.classList.remove('active');
    }

    async function kirimKomentar() {
      const nama = document.getElementById('commentName').value.trim();
      const teks = document.getElementById('commentText').value.trim();
      if (!nama || !teks) return alert("Isi nama dan komentar dulu!");
      tutupFormKomen();
      try {
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ tmdbId: currentMovieId, nama, komentar: teks })
        });
        setTimeout(muatKomentar, 800);
      } catch {
        alert("Gagal mengirim komentar");
      }
    }

    // Sembunyikan kontrol otomatis
    let timerSembunyiKontrol;
    const WAKTU_TUNGGU = 2000;
    function tampilkanKontrol() {
      subLayer.classList.remove('hidden');
      clearTimeout(timerSembunyiKontrol);
      timerSembunyiKontrol = setTimeout(() => subLayer.classList.add('hidden'), WAKTU_TUNGGU);
    }
    document.addEventListener('mousemove', tampilkanKontrol, { passive: true });
    document.addEventListener('touchstart', tampilkanKontrol, { passive: true });

    // Jalankan semua
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      currentMovieId = ambilIdDariUrl();
      if (!currentMovieId) {
        videoWrapper.innerHTML = `<div style="padding:50px; text-align:center;">ID Film tidak ditemukan</div>`;
        return;
      }
      cekDanMuatFilm(currentMovieId);
    });
  </script>
</body>
</html>
