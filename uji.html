<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Hub</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#0b0b0f;color:#fff}

/* NAV GLASS */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

.logo{color:#ff2e2e;font-weight:bold}

nav a{
color:#ddd;
margin-left:12px;
text-decoration:none;
font-size:13px;
}

nav a:hover{color:#fff}

/* PLAYER */
.player{
width:100%;
height:77vh;
background:#000;
border-bottom:1px solid rgba(255,255,255,.05);
}

iframe{width:100%;height:100%;border:0}

/* INFO CARD */
.info{
max-width:1200px;
margin:20px auto;
padding:20px;
background:#141420;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

/* RELATED */
.rel-wrap{
max-width:1200px;
margin:20px auto;
position:relative;
overflow:hidden;
}

.rel-box{
display:flex;
gap:12px;
transition:.3s;
}

.rel-card{
min-width:140px;
cursor:pointer;
transition:.2s;
}

.rel-card:hover{transform:scale(1.05)}

.rel-card img{
width:100%;
border-radius:10px;
}

/* ARROW */
.arrow{
position:absolute;
top:40%;
background:#000;
color:#fff;
border:none;
padding:10px;
cursor:pointer;
opacity:.7;
}

.arrow:hover{opacity:1}

.left{left:0}
.right{right:0}

@media(max-width:768px){
.arrow{display:none}
}

footer{
background:#000;
padding:35px 20px;
margin-top:40px;
border-top:1px solid rgba(255,255,255,.05);
}

.footer-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:1200px;
margin:auto;
font-size:13px;
opacity:.7;
}

@media(max-width:700px){
.footer-grid{grid-template-columns:repeat(2,1fr)}
}

</style>
</head>

<body>

<nav>
<div class="logo">MOVIE+</div>

<div class="nav-right">
<input placeholder="Search...">
<a href="uji.html">Home</a>
<a href="uji.html">All</a>
<a href="uji.html">Abroad</a>
<a href="uji.html">Local</a>
</div>

<div class="burger" onclick="toggleMenu()">☰</div>
</nav>

<div class="mobile-menu" id="mobileMenu">
<a href="uji.html">Home</a>
<a href="uji.html">All</a>
<a href="uji.html">Abroad</a>
<a href="uji.html">Local</a>
</div>

<div id="grid" class="grid"></div>

<div class="pagination" id="pagination"></div>

<footer>
<div class="footer-grid">
<div>About</div>
<div>DMCA</div>
<div>Privacy</div>
<div>Contact</div>
</div>
</footer>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";
let page=1,mode="all",query="";

async function load(){

let url="";

if(query){
url=`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${query}&page=${page}`;
}else if(mode==="id"){
url=`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_origin_country=ID&page=${page}`;
}else if(mode==="luar"){
url=`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&without_origin_country=ID&page=${page}`;
}else{
url=`https://api.themoviedb.org/3/trending/movie/week?api_key=${KEY}&page=${page}`;
}

const data=await fetch(url).then(r=>r.json());

render(data.results);
renderPagination(data.page);

}

function render(d){
let h="";
d.forEach(m=>{
if(!m.poster_path)return;

h+=`
<div class="card" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div class="title">${m.title}</div>
</div>`;
});

document.getElementById("grid").innerHTML=h;
}

function renderPagination(p){
let h="";
for(let i=p;i<p+6;i++){
h+=`<button onclick="goPage(${i})">${i}</button>`;
}
h+=`<button onclick="nextSet()">›</button>`;
document.getElementById("pagination").innerHTML=h;
}

function goPage(p){page=p;load()}
function nextSet(){page+=6;load()}
function go(id){location.href=`uji2.html?id=${id}`}

function setMode(m){mode=m;query="";page=1;load()}
function searchMovie(){query=document.getElementById("search").value;page=1;load()}

load();

</script>

</body>
</html>
