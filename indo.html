<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IndoMovie Stream</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0d0d0d;
      color:#fff;
    }

    header{
      padding:20px;
      background:#111;
      position:sticky;
      top:0;
      z-index:99;
      box-shadow:0 2px 10px rgba(0,0,0,.5);
    }

    header h1{
      font-size:28px;
      color:#ff1e1e;
    }

    .search-box{
      margin-top:15px;
    }

    .search-box input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1c1c1c;
      color:#fff;
      outline:none;
      font-size:16px;
    }

    .movie-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
      gap:20px;
      padding:20px;
    }

    .movie-card{
      background:#151515;
      border-radius:15px;
      overflow:hidden;
      transition:.3s;
      cursor:pointer;
      box-shadow:0 5px 15px rgba(0,0,0,.4);
    }

    .movie-card:hover{
      transform:translateY(-5px) scale(1.02);
    }

    .movie-card img{
      width:100%;
      height:260px;
      object-fit:cover;
      display:block;
    }

    .movie-info{
      padding:12px;
    }

    .movie-title{
      font-size:15px;
      font-weight:bold;
      line-height:1.4;
      margin-bottom:8px;
    }

    .movie-date{
      color:#aaa;
      font-size:13px;
    }

    /* PLAYER MODAL */

    .player-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.95);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:20px;
    }

    .player-box{
      width:100%;
      max-width:1200px;
      position:relative;
    }

    .player-box iframe{
      width:100%;
      height:80vh;
      border:none;
      border-radius:15px;
      background:#000;
    }

    .close-btn{
      position:absolute;
      top:-50px;
      right:0;
      background:red;
      color:#fff;
      border:none;
      padding:10px 18px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
    }

    @media(max-width:768px){
      .movie-card img{
        height:230px;
      }

      .player-box iframe{
        height:60vh;
      }
    }

    /* TAMBAHKAN KE CSS */

.pagination{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  padding:20px 20px 40px;
  flex-wrap:wrap;
}

.pagination button{
  padding:10px 15px;
  border:none;
  background:#1d1d1d;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  transition:.3s;
}

.pagination button:hover{
  background:red;
}

.pagination button.active{
  background:red;
}
  </style>
</head>
<body>

<header>
  <h1>INDO MOVIE STREAM</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari film Indonesia...">
  </div>
</header>

<div class="movie-grid" id="movieGrid"></div>
  <!-- TAMBAHKAN DI BAWAH GRID -->
<div class="pagination" id="pagination"></div>

<!-- PLAYER -->

<div class="player-modal" id="playerModal">
  <div class="player-box">
    <button class="close-btn" onclick="closePlayer()">Tutup</button>
    <iframe id="playerFrame" allowfullscreen></iframe>
  </div>
</div>

<script>
/* GANTI SEMUA SCRIPT LAMA DENGAN INI */

const API_KEY = "b3b893873ed1bb7f175b2707afeea2a0";

const movieGrid = document.getElementById("movieGrid");
const searchInput = document.getElementById("searchInput");
const pagination = document.getElementById("pagination");

let allMovies = [];

// PAGINATION
let currentPage = 1;
const itemsPerPage = 26;

// AMBIL BANYAK PAGE FILM INDONESIA
async function fetchMovies(){

  allMovies = [];

  // JUMLAH PAGE YANG DIAMBIL
  // 1 PAGE ≈ 20 FILM
  // 50 PAGE ≈ 1000 FILM
  const totalPages = 50;

  for(let page = 1; page <= totalPages; page++){

    const url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=id&sort_by=popularity.desc&page=${page}`;

    try{

      const res = await fetch(url);

      const data = await res.json();

      if(data.results){

        allMovies.push(...data.results);

      }

    }catch(err){

      console.log("Error page", page);

    }

  }

  // HAPUS DUPLIKAT
  allMovies = allMovies.filter(
    (movie, index, self) =>
      index === self.findIndex(m => m.id === movie.id)
  );

  renderMovies();
  renderPagination();

}

// RENDER GRID
function renderMovies(filteredMovies = allMovies){

  movieGrid.innerHTML = "";

  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;

  const paginatedMovies = filteredMovies.slice(start, end);

  paginatedMovies.forEach(movie => {

    const poster = movie.poster_path
      ? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
      : `https://via.placeholder.com/500x750?text=No+Image`;

    const card = document.createElement("div");

    card.className = "movie-card";

    card.innerHTML = `
      <img src="${poster}" alt="${movie.title}">

      <div class="movie-info">
        <div class="movie-title">${movie.title}</div>
        <div class="movie-date">${movie.release_date || '-'}</div>
      </div>
    `;

    card.onclick = () => {
      openPlayer(movie.id);
    };

    movieGrid.appendChild(card);

  });

}

// PAGINATION BUTTON
function renderPagination(filteredMovies = allMovies){

  pagination.innerHTML = "";

  const totalPages = Math.ceil(filteredMovies.length / itemsPerPage);

  for(let i = 1; i <= totalPages; i++){

    const btn = document.createElement("button");

    btn.innerText = i;

    if(i === currentPage){
      btn.classList.add("active");
    }

    btn.onclick = () => {

      currentPage = i;

      renderMovies(filteredMovies);
      renderPagination(filteredMovies);

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });

    };

    pagination.appendChild(btn);

  }

}

// PLAYER
function openPlayer(tmdbId){

  const embedUrl = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;

  document.getElementById("playerFrame").src = embedUrl;

  document.getElementById("playerModal").style.display = "flex";

}

// CLOSE PLAYER
function closePlayer(){

  document.getElementById("playerModal").style.display = "none";

  document.getElementById("playerFrame").src = "";

}

// SEARCH
searchInput.addEventListener("input", function(){

  const value = this.value.toLowerCase();

  const filtered = allMovies.filter(movie =>
    movie.title.toLowerCase().includes(value)
  );

  currentPage = 1;

  renderMovies(filtered);
  renderPagination(filtered);

});

fetchMovies();
</script>

</body>
</html>
