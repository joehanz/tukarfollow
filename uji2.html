<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Detail</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#0b0b0f;color:#fff}

/* NAV GLASS */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

.logo{color:#ff2e2e;font-weight:bold}

nav a{
color:#ddd;
margin-left:12px;
text-decoration:none;
font-size:13px;
}

nav a:hover{color:#fff}

/* PLAYER */
.player{
width:100%;
height:77vh;
background:#000;
border-bottom:1px solid rgba(255,255,255,.05);
}

iframe{width:100%;height:100%;border:0}

/* INFO CARD */
.info{
max-width:1200px;
margin:20px auto;
padding:20px;
background:#141420;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

/* RELATED */
.rel-wrap{
max-width:1200px;
margin:20px auto;
position:relative;
overflow:hidden;
}

.rel-box{
display:flex;
gap:12px;
transition:.3s;
}

.rel-card{
min-width:140px;
cursor:pointer;
transition:.2s;
}

.rel-card:hover{transform:scale(1.05)}

.rel-card img{
width:100%;
border-radius:10px;
}

/* ARROW */
.arrow{
position:absolute;
top:40%;
background:#000;
color:#fff;
border:none;
padding:10px;
cursor:pointer;
opacity:.7;
}

.arrow:hover{opacity:1}

.left{left:0}
.right{right:0}

@media(max-width:768px){
.arrow{display:none}
}

footer{
background:#000;
padding:35px 20px;
margin-top:40px;
border-top:1px solid rgba(255,255,255,.05);
}

.footer-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:1200px;
margin:auto;
font-size:13px;
opacity:.7;
}

@media(max-width:700px){
.footer-grid{grid-template-columns:repeat(2,1fr)}
}

</style>
</head>

<body>

<nav>
<div class="logo">MOVIE+</div>
<div>
<a href="uji.html">Home</a>
<a href="uji.html">All</a>
<a href="uji.html">Abroad</a>
<a href="uji.html">Local</a>
</div>
</nav>

<div class="player">
<iframe id="player"></iframe>
</div>

<div class="info" id="info"></div>

<div class="rel-wrap">
<button class="arrow left" onclick="move(-1)">‹</button>
<button class="arrow right" onclick="move(1)">›</button>

<div class="rel-box" id="rel"></div>
</div>

<footer>
<div class="footer-grid">
<div>About</div>
<div>DMCA</div>
<div>Privacy</div>
<div>Contact</div>
</div>
</footer>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";
const id=new URLSearchParams(location.search).get("id");

async function load(){

const m=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
).then(r=>r.json());

document.getElementById("player").src=
`https://vsembed.ru/embed/movie?tmdb=${id}`;

document.getElementById("info").innerHTML=`
<h2>${m.title}</h2>
<p>⭐ ${m.vote_average}</p>
<p>🌍 ${m.production_countries.map(c=>c.name).join(", ")}</p>
<p>🎭 ${m.genres.map(g=>g.name).join(", ")}</p>
<p>${m.overview}</p>
`;

const r=await fetch(
`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`
).then(r=>r.json());

let h="";
r.results.slice(0,10).forEach(v=>{
h+=`
<div class="rel-card" onclick="go(${v.id})">
<img src="https://image.tmdb.org/t/p/w200${v.poster_path}">
</div>`;
});

document.getElementById("rel").innerHTML=h;

}

function go(i){location.href=`uji2.html?id=${i}`}
function move(x){document.getElementById("rel").scrollBy({left:x*300,behavior:"smooth"})}

load();

</script>

</body>
</html>
