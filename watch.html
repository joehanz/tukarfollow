<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Film - tukarfollow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR (Tetap Disertakan Agar Konsisten) -->
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">tukarfollow</a>
        </div>
    </header>

    <!-- PEMUTAR VIDEO & DETAIL -->
    <main class="main-content watch-container">
        <div class="player-wrapper">
            <h1 id="watchTitle">Memuat Judul Film...</h1>
            
            <!-- Area Player yang Akan Mendeteksi Double Click Iklan -->
            <div class="video-player-area" id="playerArea">
                <div class="ad-overlay" id="adOverlay"></div>
                <div id="videoContainer" class="video-container">
                    <!-- Iframe atau Video Player Diinjeksi di Sini -->
                </div>
            </div>
            
            <div class="movie-meta">
                <p><strong>Genre:</strong> <span id="watchGenre">-</span></p>
                <p><strong>Tanggal Rilis:</strong> <span id="watchRelease">-</span></p>
                <p><strong>Negara:</strong> <span id="watchCountry">-</span></p>
            </div>
            
            <div class="sinopsis-box">
                <h3>Sinopsis</h3>
                <p id="watchSinopsis">Memuat sinopsis...</p>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer-grid">
        <div class="footer-col"><h3>tukarfollow</h3><p>Platform streaming gratis terbaik.</p></div>
        <div class="footer-col"><h3>Jelajahi</h3><ul><li><a href="index.html">Beranda</a></li></ul></div>
        <div class="footer-col"><h3>Kategori</h3><ul><li><a href="#">Film Terkini</a></li></ul></div>
        <div class="footer-col"><h3>Bantuan</h3><ul><li><a href="#">Kontak</a></li></ul></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
