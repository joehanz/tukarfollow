<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Series Streaming - TukarFollow</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
SERIES GRID
========================= */

.series-container{
max-width:1400px;
margin:auto;
padding:20px;
}

.series-filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.series-filters input,
.series-filters select{
padding:12px;
border:none;
border-radius:10px;
background:#141b22;
color:#fff;
}

.series-filters input{
flex:1;
min-width:250px;
}


.series-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(180px,1fr));
gap:20px;
padding-bottom:40px;
}

.series-card{
position:relative;
overflow:hidden;
border-radius:14px;
background:#141b22;
cursor:pointer;
transition:.3s;
}

.series-card:hover{
transform:translateY(-5px);
box-shadow:
0 0 25px rgba(0,212,255,.25);
}

.series-poster{
width:100%;
height:270px;
object-fit:cover;
display:block;
}

.series-title{
padding:10px;
font-size:14px;
font-weight:600;
text-align:center;
color:#fff;
}

.series-year{
position:absolute;
top:10px;
right:10px;
background:#00d4ff;
color:#000;
font-size:12px;
font-weight:bold;
padding:4px 8px;
border-radius:8px;
}

/* =========================
PAGINATION
========================= */

.pagination-wrap{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
flex-wrap:wrap;
margin:30px 0;
}

.pagination-wrap button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#141b22;
color:#fff;
cursor:pointer;
}

.pagination-wrap button.active{
background:#00d4ff;
color:#000;
font-weight:bold;
}

@media(max-width:768px){

.series-grid{
grid-template-columns:
repeat(auto-fill,minmax(140px,1fr));
gap:12px;
}

.series-poster{
height:220px;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="nav-logo">

<a href="index.html">

TUKARFOLLOW

</a>

</div>

</nav>

<div class="series-container">

  <div class="series-filters">

<input
type="text"
id="searchInput"
placeholder="Cari series...">

<select id="genreFilter">
<option value="">Semua Genre</option>
</select>

<select id="yearFilter">
<option value="">Semua Tahun</option>
<option value="2026">2026</option>
<option value="2025">2025</option>
<option value="2024">2024</option>
<option value="classic">Classic</option>
</select>

</div>


<div
class="series-grid"
id="seriesGrid">
</div>

<div
class="pagination-wrap"
id="pagination">
</div>

</div>

<script>

const API_KEY="b3b893873ed1bb7f175b2707afeea2a0";

let currentPage=1;
let totalPages=1;

const seriesGrid=
document.getElementById("seriesGrid");

const pagination=
document.getElementById("pagination");

const searchInput=
document.getElementById("searchInput");

const genreFilter=
document.getElementById("genreFilter");

const yearFilter=
document.getElementById("yearFilter");

let allSeries=[];
let filteredSeries=[];
let genreMap={};

/* =========================
HELPER
========================= */

function safeYear(date){

if(!date) return "";

return String(date).substring(0,4);

}

function poster(path){

if(!path){

return "https://via.placeholder.com/500x750?text=No+Image";

}

return `https://image.tmdb.org/t/p/w500${path}`;

}

/* =========================
LOAD GENRES
========================= */

async function loadGenres(){

try{

const res=
await fetch(
`https://api.themoviedb.org/3/genre/tv/list?api_key=${API_KEY}`
);

const data=
await res.json();

(data.genres||[])
.forEach(g=>{

genreMap[g.id]=g.name;

if(genreFilter){

genreFilter.innerHTML+=`
<option value="${g.name}">
${g.name}
</option>
`;

}

});

}catch(e){

console.log(e);

}

}

/* =========================
LOAD SERIES
========================= */

async function loadSeries(page=1){

currentPage=page;

try{

const res=
await fetch(
`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&page=${page}`
);

const data=
await res.json();

allSeries=
data.results||[];

filteredSeries=
[...allSeries];

totalPages=
Math.min(
data.total_pages||1,
500
);

applyFilters(false);

window.scrollTo({
top:0,
behavior:"smooth"
});

}catch(e){

console.log(e);

}

}

/* =========================
GRID
========================= */

function renderGrid(list){

seriesGrid.innerHTML="";

list.forEach(tv=>{

const title=
tv.name || "Unknown";

const year=
safeYear(
tv.first_air_date
);

seriesGrid.innerHTML+=`

<a
class="series-card"
href="serieswatch.html?id=${tv.id}">

<span class="series-year">
${year}
</span>

<img
class="series-poster"
src="${poster(tv.poster_path)}"
alt="${title}"
loading="lazy">

<div class="series-title">
${title}
</div>

</a>

`;

});

}

/* =========================
PAGINATION
========================= */

function renderPagination(){

pagination.innerHTML="";

let start=
Math.floor(
(currentPage-1)/5
)*5+1;

let end=
start+4;

if(start>1){

pagination.innerHTML+=`

<button
onclick="loadSeries(${start-1})">

&lt;

</button>

`;

}

for(
let i=start;
i<=end;
i++
){

if(i>totalPages)
break;

pagination.innerHTML+=`

<button
class="${
i===currentPage
?
'active'
:
''
}"

onclick="loadSeries(${i})">

${i}

</button>

`;

}

if(end<totalPages){

pagination.innerHTML+=`

<button
onclick="loadSeries(${end+1})">

&gt;

</button>

`;

}

}

/* =========================
FILTER
========================= */

function applyFilters(resetPage=true){

const keyword=
(searchInput?.value||"")
.toLowerCase();

const genre=
genreFilter?.value||"";

const year=
yearFilter?.value||"";

filteredSeries=
allSeries.filter(tv=>{

const title=
(tv.name||"")
.toLowerCase();

const tvYear=
String(
tv.first_air_date||""
).substring(0,4);

const genres=
(tv.genre_ids||[])
.map(id=>genreMap[id]||"");

const passSearch=
title.includes(keyword);

const passGenre=
!genre ||
genres.includes(genre);

let passYear=true;

if(year==="2026"){
passYear=tvYear==="2026";
}
else if(year==="2025"){
passYear=tvYear==="2025";
}
else if(year==="2024"){
passYear=tvYear==="2024";
}
else if(year==="classic"){
passYear=
parseInt(tvYear||0)<2024;
}

return(
passSearch &&
passGenre &&
passYear
);

});

if(resetPage){

currentPage=1;

}

renderGrid(
filteredSeries
);

renderPagination();

}

/* =========================
EVENTS
========================= */

if(searchInput){

searchInput.oninput=
()=>applyFilters();

}

if(genreFilter){

genreFilter.onchange=
()=>applyFilters();

}

if(yearFilter){

yearFilter.onchange=
()=>applyFilters();

}

/* =========================
INIT
========================= */

async function init(){

await loadGenres();

await loadSeries(1);

}

init();

</script>


</body>
</html>
