<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Movie</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href='https://cdn.jsdelivr.net/gh/joehanz/csstukarfollow@main/style.css' rel='stylesheet'/>

<style>
/* SAFE WATCH FIX (NO CONFLICT) */
body{
  background:#000;
}

/* player override pakai CSS kamu */
.player-wrap{
  margin-top:60px;
}

/* extra spacing safety */
.post-info{
  padding:15px;
}

/* related grid spacing */
.related{
  padding:15px;
}

/* desktop layout */
.watch-layout{
  display:flex;
  gap:20px;
}

.left-watch{
  flex:2;
}

.right-watch{
  flex:1;
  padding:15px;
  background:#0d0d12;
  border-radius:10px;
}

/* iframe safety */
iframe{
  width:100%;
  height:70vh;
  border:0;
  background:#000;
}

/* title fix */
.watch-title{
  font-size:22px;
  font-weight:700;
  margin:10px 0;
}

/* loading */
.loading{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:.7;
}
</style>
</head>

<body>

<!-- NAV (PAKAI CSS KAMU FULL) -->
<nav id='topNav'>

  <a class='logo' href='/'>STREAM</a>

  <div class='nav-right' id='navRight'>

    <form action='/search' method='get'>
      <input name='q' placeholder='Cari film...' type='text'/>
      <button>GO</button>
    </form>

    <div class='dropdown'>
      <span>Menu ▼</span>
      <div class='dropdown-menu'>
        <a href='/'>Home</a>
        <a href='#' onclick="history.back()">Back</a>
      </div>
    </div>

  </div>

  <div class='burger' onclick='toggleNav()'>☰</div>

</nav>

<!-- WATCH CONTAINER -->
<div class="watch-layout">

  <!-- LEFT -->
  <div class="left-watch">

    <div class="player-wrap">
      <div class="loading" id="loading">Loading player...</div>
      <iframe id="frame" allowfullscreen></iframe>
    </div>

    <div class="post-info">
      <h1 class="watch-title" id="title">Loading...</h1>

      <div class="meta" id="meta">
        Loading meta...
      </div>

      <p id="desc">
        Loading description...
      </p>
    </div>

  </div>

  <!-- RIGHT (RELATED) -->
  <div class="right-watch">

    <h3>Related Movies</h3>

    <div class="grid" id="related"></div>

  </div>

</div>

<script>

const API = "9e335d21d35f04917b218bae7adc881f";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const frame = document.getElementById("frame");
const loading = document.getElementById("loading");

/* LOAD DETAIL */
async function loadMovie(){

  if(!id){
    document.getElementById("title").innerText = "No Movie Found";
    return;
  }

  const res = await fetch(
    "https://api.themoviedb.org/3/movie/"
    + id
    + "?api_key="
    + API
    + "&append_to_response=external_ids"
  );

  const data = await res.json();

  document.getElementById("title").innerText = data.title;

  document.getElementById("meta").innerText =
    "Release: " + data.release_date + " | Rating: " + data.vote_average;

  document.getElementById("desc").innerText = data.overview;

  const imdb = data.external_ids.imdb_id;

  if(imdb){
    frame.src = "https://vsembed.su/embed/movie?imdb=" + imdb;
  }

  frame.onload = () => {
    loading.style.display = "none";
  };

  loadRelated();
}

/* RELATED */
async function loadRelated(){

  const res = await fetch(
    "https://api.themoviedb.org/3/movie/"
    + id
    + "/recommendations?api_key="
    + API
  );

  const data = await res.json();

  const grid = document.getElementById("related");
  grid.innerHTML = "";

  data.results.slice(0,12).forEach(m => {

    if(!m.poster_path) return;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
      <div class="card-title">${m.title}</div>
    `;

    div.onclick = () => {
      window.location.href = "watch.html?id=" + m.id;
    };

    grid.appendChild(div);
  });
}

/* NAV */
function toggleNav(){
  document.getElementById("navRight").classList.toggle("active");
}

loadMovie();

</script>

</body>
</html>
