<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player dengan Vsembed + Subtitle</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
    .player-container { position:relative; width:80%; margin:auto; aspect-ratio:16/9; }
    iframe { width:100%; height:100%; border:none; }
    .transcript { margin:20px auto; width:80%; background:#111; padding:10px; border-radius:6px; }
    .cue { margin:5px 0; }
  </style>
</head>
<body>
  <div class="player-container">
    <iframe src="https://vsembed.ru/embed/movie?tmdb=1273221"
            allowfullscreen></iframe>
  </div>
  <div class="transcript" id="transcript">Loading subtitle…</div>

  <script>
    fetch("subtitles/1273221.vtt")
      .then(res => res.text())
      .then(data => {
        const lines = data.split("\n");
        let html = "";
        lines.forEach(line => {
          if (line && !line.includes("-->") && line !== "WEBVTT") {
            html += `<div class="cue">${line}</div>`;
          }
        });
        document.getElementById("transcript").innerHTML = html;
      });
  </script>
</body>
</html>
