<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Detail</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0b0f;color:#fff}

/* NAV FIX PROPER */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
color:#ff2e2e;
font-weight:bold;
flex:0 0 auto;
}

.nav-right{
display:flex;
gap:12px;
align-items:center;
flex:0 0 auto;
}

.nav-right input{
padding:7px 10px;
border-radius:8px;
border:none;
outline:none;
background:#1a1a1f;
color:#fff;
min-width:140px;
}

.nav-right a{
color:#ddd;
text-decoration:none;
font-size:13px;
white-space:nowrap;
}

.burger{
display:none;
font-size:22px;
cursor:pointer;
color:#fff;
}

.mobile-menu{
position:fixed;
top:60px;
right:0;
width:220px;
background:#000;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
transform:translateX(100%);
transition:.3s;
z-index:999;
}

.mobile-menu.show{
transform:translateX(0);
}

.mobile-menu a{
color:#fff;
text-decoration:none;
padding:8px 0;
border-bottom:1px solid #222;
}

@media(max-width:768px){
.nav-right{display:none;}
.burger{display:block;}
}

/* PLAYER */
.player{
width:100%;
height:77vh;
background:#000;
position:relative;
}

iframe{width:100%;height:100%;border:0}

.playLayer{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.5);
cursor:pointer;
font-size:22px;
font-weight:bold;
}

.info{
max-width:1200px;
margin:20px auto;
padding:20px;
background:#141420;
border-radius:12px;
}

/* RELATED */
.rel-wrap{
max-width:1200px;
margin:20px auto;
position:relative;
padding:10px;
}

.rel-box{
display:flex;
gap:12px;
overflow-x:auto;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}

.rel-box::-webkit-scrollbar{
display:none;
}

.rel-card{
min-width:140px;
scroll-snap-align:start;
flex:0 0 auto;
cursor:pointer;
}

.rel-card img{
width:100%;
border-radius:10px;
}

.arrow{
position:absolute;
top:40%;
background:#000;
color:#fff;
border:none;
padding:10px;
cursor:pointer;
opacity:.8;
z-index:10;
}

.arrow:hover{opacity:1}
.left{left:0}
.right{right:0}

@media(max-width:768px){
.arrow{display:none}
}

footer{
background:#000;
padding:30px 15px;
margin-top:40px;
}

.footer-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:1200px;
margin:auto;
font-size:13px;
opacity:.7;
}

@media(max-width:700px){
.footer-grid{grid-template-columns:repeat(2,1fr)}
}

</style>
</head>

<body>

<nav>
<div class="logo">MOVIE+</div>

<div class="nav-right">
<input id="search" placeholder="Search..." oninput="searchMovie()">
<a href="uji.html">Home</a>
<a href="#" onclick="loadLocal()">Local</a>
</div>

<div class="burger" onclick="toggleMenu()">☰</div>
</nav>

<div class="mobile-menu" id="mobileMenu">
<input placeholder="Search..." oninput="searchMovieMobile()">
<a href="uji.html">Home</a>
<a href="#" onclick="loadLocal()">Local</a>
</div>

<div class="player">
<iframe id="player"></iframe>
<div class="playLayer" id="playLayer">▶ PLAY</div>
</div>

<div class="info" id="info"></div>

<div class="rel-wrap">
<button class="arrow left" onclick="move(-1)">‹</button>
<button class="arrow right" onclick="move(1)">›</button>
<div class="rel-box" id="rel"></div>
</div>

<footer>
<div class="footer-grid">
<div>About</div>
<div>DMCA</div>
<div>Privacy</div>
<div>Contact</div>
</div>
</footer>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";
const id=new URLSearchParams(location.search).get("id");

const ads=[
"https://rajarayap.com",
"https://caturbangunsentosa.blogspot.com",
"https://ptdwiprima.blogspot.com"
];

let adsState=false;
let items=[];

/* BURGER */
function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("show");
}

/* SEARCH (MANDIRI DI uji2) */
function searchMovie(){
const val=document.getElementById("search")?.value||"";
if(!val.trim()) return;

fetch(`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${val}`)
.then(r=>r.json())
.then(d=>{
items=d.results.slice(0,15);
render();
});
}

/* MOBILE SEARCH */
function searchMovieMobile(){
const el=document.querySelector("#mobileMenu input");
if(!el) return;
const val=el.value||"";
if(!val.trim()) return;

fetch(`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${val}`)
.then(r=>r.json())
.then(d=>{
items=d.results.slice(0,15);
render();
});
}

/* LOCAL MODE (MANDIRI DI uji2) */
function loadLocal(){
fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_origin_country=ID`)
.then(r=>r.json())
.then(d=>{
items=d.results.slice(0,15);
render();
});
}

/* PLAY GATE */
document.getElementById("playLayer").onclick=function(){

if(!adsState){
adsState=true;
window.open(
ads[Math.floor(Math.random()*ads.length)],
"_blank"
);
return;
}

this.style.display="none";

document.getElementById("player").src=
`https://vsembed.ru/embed/movie?tmdb=${id}`;
};

/* LOAD DETAIL */
async function load(){

const m=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
).then(r=>r.json());

document.getElementById("info").innerHTML=`
<h2>${m.title}</h2>
<p>⭐ ${m.vote_average}</p>
<p>🌍 ${m.production_countries.map(c=>c.name).join(", ")}</p>
<p>🎭 ${m.genres.map(g=>g.name).join(", ")}</p>
<p>${m.overview}</p>
`;

const r=await fetch(
`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`
).then(r=>r.json());

items=r.results.slice(0,15);
render();
}

function render(){

let h="";
items.forEach(v=>{
h+=`
<div class="rel-card" onclick="go(${v.id})">
<img src="https://image.tmdb.org/t/p/w200${v.poster_path}">
</div>`;
});

document.getElementById("rel").innerHTML=h;
}

function move(dir){
document.getElementById("rel").scrollBy({
left:dir*300,
behavior:"smooth"
});
}

function go(i){
location.href=`uji2.html?id=${i}`;
}

load();

</script>

</body>
</html>
