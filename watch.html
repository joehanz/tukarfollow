<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watch Movie</title>

<link rel="stylesheet" href="style2.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body{
margin:0;
background:#0f0f14;
color:#fff;
font-family:Arial;
}

/* NAVBAR */
header{
background:#111;
padding:100px 15px;
position:sticky;
top:0;
z-index:1000;
}

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

.logo{display:flex;gap:8px;font-weight:bold;text-decoration: none;color:#fff;}

#navMenu{
display:flex;
gap:15px;
list-style:none;
}

#navMenu li a{
color:#fff;
text-decoration:none;
cursor:pointer;
}

.searchBox{
display:flex;
align-items:center;
gap:5px;
background:#222;
padding:5px 10px;
border-radius:8px;
}

#burger{display:none;cursor:pointer;}

#mobileMenu{
display:none;
flex-direction:column;
background:#111;
padding:10px;
}

/* PLAYER */
#heroPlayer{
width:100%;
height:60vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

#heroPlayer iframe{
width:100%;
height:100%;
border:none;
}

/* INFO */
#infoBox{padding:20px;}

.badge{
display:inline-block;
padding:4px 10px;
background:#222;
border-radius:6px;
margin-right:5px;
font-size:12px;
}

/* RELATED */
#relatedWrap{
padding:20px;
position:relative;
}

/* FLOAT ARROW EDGE */
.arrowFloat{
position:absolute;
top:55%;
transform:translateY(-50%);
background:#222;
border:none;
color:#fff;
padding:10px 12px;
cursor:pointer;
z-index:9999;
opacity:.8;
}

#leftArrow{left:5px;}
#rightArrow{right:5px;}

.scrollWrap{
display:flex;
overflow-x:auto;
gap:10px;
scroll-behavior:smooth;
}

.relCard{
min-width:140px;
cursor:pointer;
}

.relCard img{
width:100%;
border-radius:10px;
}

.relTitle{
font-size:12px;
margin-top:5px;
}

.scrollWrap::-webkit-scrollbar{display:none;}

@media(max-width:768px){
#navMenu{display:none;}
#burger{display:block;}
.arrowFloat{display:none;} /* mobile swipe only */
}

/* SEARCH GRID MODE */
#gridMode{
display:none;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:10px;
}

.card{
background:#1a1a1a;
padding:8px;
border-radius:10px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:8px;
}
</style>
</head>

<body>

<!-- NAV -->
<header>
<nav class="navbar">

<a href="/" class="logo">
  <i class="fa-solid fa-film"></i>
  <span>TukarFollow</span>
</a>

<ul id="navMenu">
<li><a onclick="setMode('movie')">Movies</a></li>
<li><a onclick="setMode('tv')">Series</a></li>
</ul>

<div class="searchBox">
<input type="text" id="search" placeholder="Cari film..." oninput="searchMovie()">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div id="burger">
<i class="fa-solid fa-bars"></i>
</div>
</nav>

<div id="mobileMenu">
<a onclick="setMode('movie')">Movies</a>
<a onclick="setMode('tv')">Series</a>
<input id="mobileSearch" oninput="searchMovie()" placeholder="Cari film...">
</div>
</header>

<!-- PLAYER -->
<div id="heroPlayer">Loading...</div>

<!-- INFO -->
<div id="infoBox"></div>

<!-- GRID MODE RESULT -->
<div id="gridMode"></div>

<!-- RELATED -->
<div id="relatedWrap">

<button id="leftArrow" class="arrowFloat" onclick="scrollRel(-1)">‹</button>
<button id="rightArrow" class="arrowFloat" onclick="scrollRel(1)">›</button>

<div class="scrollWrap" id="relGrid"></div>

</div>

<script>
const KEY="b3b893873ed1bb7f175b2707afeea2a0";
let moviesData=[];

let mode="movie";
let searchMode=false;

const id=new URLSearchParams(location.search).get("id");

fetch("movies.json").then(r=>r.json()).then(d=>{moviesData=d;init();});

async function init(){
const tmdb=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`).then(r=>r.json());

const match=findMatch(tmdb.title||"");

renderPlayer(match);
renderInfo(match,tmdb);
loadRelated();
}

/* MODE SWITCH */
function setMode(m){
mode=m;
searchMode=true;
toggleView();
searchMovie();
}

/* SEARCH */
function searchMovie(){
const q=document.getElementById("search").value;
if(!q)return;

toggleView(true);

fetch(`https://api.themoviedb.org/3/search/${mode}?api_key=${KEY}&query=${q}`)
.then(r=>r.json())
.then(d=>{
renderGrid(d.results||[]);
});
}

/* TOGGLE VIEW */
function toggleView(showGrid=false){
document.getElementById("heroPlayer").style.display=showGrid?"none":"flex";
document.getElementById("infoBox").style.display=showGrid?"none":"block";
document.getElementById("gridMode").style.display=showGrid?"grid":"none";
}

/* GRID */
function renderGrid(list){
const el=document.getElementById("gridMode");
el.innerHTML="";

list.forEach(m=>{
if(!m.poster_path)return;

el.innerHTML+=`
<div class="card" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div>${m.title||m.name}</div>
</div>
`;
});
}

/* MATCH */
function clean(t){
return t.toLowerCase().replace(/\(\d{4}\)/g,"").replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
}

function similarity(a,b){
a=clean(a);b=clean(b);
let aa=a.split(" "),bb=b.split(" ");
let hit=0;
aa.forEach(x=>{if(bb.includes(x))hit++;});
return hit/Math.max(aa.length,bb.length);
}

function findMatch(t){
let best=null,score=0;
moviesData.forEach(m=>{
let s=similarity(t,m.title);
if(s>=0.8&&s>score){best=m;score=s;}
});
return best;
}

/* PLAYER */
function renderPlayer(m){
const el=document.getElementById("heroPlayer");
if(!m||!m.iframe){
el.innerHTML="Video unavailable";
return;
}
el.innerHTML=`<iframe src="${m.iframe}" allowfullscreen></iframe>`;
}

/* INFO */
function renderInfo(m,tmdb){
const el=document.getElementById("infoBox");
if(!m){
el.innerHTML=`<h2>${tmdb.title}</h2><p>Video unavailable</p>`;
return;
}
el.innerHTML=`
<h2>${m.title}</h2>
<div>
<span class="badge">${(m.genre||[]).join(", ")}</span>
<span class="badge">${m.release_date||"-"}</span>
<span class="badge">${m.country||"-"}</span>
</div>
<p>${m.sinopsis||""}</p>
`;
}

/* RELATED */
function loadRelated(){
fetch(`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>renderRelated(d.results||[]));
}

function renderRelated(list){
const el=document.getElementById("relGrid");
el.innerHTML="";
list.slice(0,10).forEach(m=>{
if(!m.poster_path)return;

el.innerHTML+=`
<div class="relCard" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div class="relTitle">${m.title}</div>
</div>
`;
});
}

function scrollRel(d){
document.getElementById("relGrid")
.scrollBy({left:d*300,behavior:"smooth"});
}

function go(id){
location.href="watch.html?id="+id;
}
</script>

</body>
</html>
