<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMDB Pemutar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: #111; color: #fff; padding: 15px; }

        /* Daftar Poster */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .item { cursor: pointer; border-radius: 6px; overflow: hidden; background: #222; }
        .item img { width: 100%; display: block; }
        .item p { padding: 6px; text-align: center; font-size: 13px; }

        /* Pemutar */
        .pemutar { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .sub { position: absolute; bottom: 60px; left: 0; right: 0; text-align: center; font-size: 22px; color: #fff; text-shadow: 0 0 3px #000; padding: 0 15px; pointer-events: none; }
        .kembali { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>

<!-- Daftar Film -->
<div class="grid" id="daftar"></div>

<!-- Layar Pemutar -->
<div class="pemutar" id="layarPutar">
    <button class="kembali" onclick="kembali()">← Kembali</button>
    <iframe id="vid"></iframe>
    <div class="sub" id="teksSub"></div>
</div>

<script>
// Pengaturan
const API_KEY = "c000d7b8b0f5ee16b98b6103009745d8";
const EMBED = "https://vsembed.ru/embed/movie?tmdb=";
const SUB_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

let daftarSub = [];
let waktu = 0;
let timer = null;

// Ambil daftar film
async function muatFilm() {
    const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=id-ID`);
    const data = await res.json();
    const wadah = document.getElementById("daftar");
    wadah.innerHTML = "";

    data.results.forEach(film => {
        if (!film.poster_path) return;
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `<img src="https://image.tmdb.org/t/p/w300${film.poster_path}"><p>${film.title}</p>`;
        el.onclick = () => putar(film.id);
        wadah.appendChild(el);
    });
}

// Putar film
function putar(id) {
    document.getElementById("daftar").style.display = "none";
    document.getElementById("layarPutar").style.display = "block";
    document.getElementById("vid").src = EMBED + id;

    // Reset
    waktu = 0;
    daftarSub = [];
    if (timer) clearInterval(timer);

    // Muat subtitle
    bacaSub(id);

    // Mulai hitung waktu
    timer = setInterval(() => {
        waktu += 1;
        tampilkanSub();
    }, 1000);
}

// Baca file VTT
async function bacaSub(id) {
    try {
        const res = await fetch(SUB_URL + id + ".vtt");
        if (!res.ok) return;
        const teks = await res.text();
        daftarSub = olahVTT(teks);
    } catch (e) {
        daftarSub = [];
    }
}

// Olah format VTT
function olahVTT(teks) {
    const baris = teks.split("\n").map(b => b.trim()).filter(b => b);
    const hasil = [];
    let i = 0;
    if (baris[0].toUpperCase() === "WEBVTT") i++;

    while (i < baris.length) {
        if (baris[i].includes("-->")) {
            const [mulaiStr, selesaiStr] = baris[i].split("-->").map(w => w.trim());
            const mulai = ubahKeDetik(mulaiStr);
            const selesai = ubahKeDetik(selesaiStr);
            let teks = "";
            i++;
            while (i < baris.length && !baris[i].includes("-->")) {
                teks += baris[i] + " ";
                i++;
            }
            hasil.push({mulai, selesai, teks: teks.trim()});
        } else {
            i++;
        }
    }
    return hasil;
}

// Ubah waktu ke detik
function ubahKeDetik(waktuStr) {
    const [j, m, d] = waktuStr.split(":");
    const [dt, mdt] = d.split(".");
    return Number(j)*3600 + Number(m)*60 + Number(dt) + (Number(mdt||0)/1000);
}

// Tampilkan subtitle sesuai waktu
function tampilkanSub() {
    const aktif = daftarSub.find(s => waktu >= s.mulai && waktu <= s.selesai);
    document.getElementById("teksSub").textContent = aktif ? aktif.teks : "";
}

// Kembali ke daftar
function kembali() {
    document.getElementById("layarPutar").style.display = "none";
    document.getElementById("daftar").style.display = "grid";
    document.getElementById("vid").src = "";
    if (timer) clearInterval(timer);
}

// Jalankan awal
muatFilm();
</script>

</body>
</html>
