<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hybrid Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href='https://cdn.jsdelivr.net/gh/joehanz/csstukarfollow@main/style.css' rel='stylesheet'/>

<style>
/* ===== FIX GRID SAFE MOBILE ===== */
.grid{
  padding:15px;
}

@media(max-width:600px){
  .grid{
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:10px;
  }

  .card img{
    height:240px;
  }
}

/* ===== HERO FIX ===== */
.hero{
  height:55vh;
  background:
    linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.2), rgba(0,0,0,0.85)),
    url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav id='topNav'>

  <a class='logo' href='/'>STREAM</a>

  <div class='nav-right' id='navRight'>

    <form action='/search' method='get'>
      <input name='q' placeholder='Cari film...' type='text'/>
      <button>GO</button>
    </form>

    <div class='dropdown'>
      <span>Film ▼</span>
      <div class='dropdown-menu'>
        <a href='/'>Indonesian Movies</a>
        <a href='/search'>Sub 🇮🇩 Movies</a>
      </div>
    </div>

    <div class='dropdown'>
      <span>Genre ▼</span>
      <div class='dropdown-menu'>
        <a href='#' onclick="filterGenre('action')">Action</a>
        <a href='#' onclick="filterGenre('comedy')">Comedy</a>
        <a href='#' onclick="filterGenre('drama')">Drama</a>
      </div>
    </div>

    <div class='dropdown'>
      <span>Country ▼</span>
      <div class='dropdown-menu'>
        <a href='#'>Indonesia</a>
        <a href='#'>USA</a>
        <a href='#'>Korea</a>
      </div>
    </div>

    <div class='dropdown'>
      <span>Release ▼</span>
      <div class='dropdown-menu'>
        <a href='#'>2026</a>
        <a href='#'>2025</a>
        <a href='#'>2024</a>
      </div>
    </div>

  </div>

  <div class='burger' onclick='toggleNav()'>☰</div>

</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Unlimited Movies</h1>
    <p>Manual + TMDB Hybrid</p>
  </div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- MODAL PLAYER -->
<div class="modal" id="modal">
  <iframe id="player" allowfullscreen></iframe>
</div>

<!-- SCRIPT -->
<script>

const API = "9e335d21d35f04917b218bae7adc881f";

let manual = [
  {
    title:"Manual Film 1",
    poster:"https://via.placeholder.com/300x450",
    embed:"https://example.com",
    imdb:"tt1234567"
  }
];

let tmdb = [];

function toggleNav(){
  document.getElementById("navRight").classList.toggle("active");
}

async function loadTMDB(){

  const url =
    "https://api.themoviedb.org/3/discover/movie?api_key="
    + API
    + "&with_original_language=id";

  const res = await fetch(url);
  const data = await res.json();

  tmdb = data.results;

  render();
}

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let all = [...manual, ...tmdb];

  all.forEach(movie => {

    if(!movie.poster_path && !movie.poster) return;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w300${movie.poster_path || movie.poster}">
      <div class="card-title">${movie.title}</div>
    `;

    div.onclick = async () => {

      let imdb = movie.imdb;

      if(!imdb){

        const r = await fetch(
          "https://api.themoviedb.org/3/movie/"
          + movie.id
          + "?api_key="
          + API
          + "&append_to_response=external_ids"
        );

        const d = await r.json();
        imdb = d.external_ids.imdb_id;
      }

      if(!imdb) return;

      document.getElementById("modal").style.display = "block";
      document.getElementById("player").src =
        "https://vsembed.su/embed/movie?imdb=" + imdb;
    };

    grid.appendChild(div);
  });
}

function filterGenre(g){
  alert("Filter: " + g);
}

loadTMDB();

</script>

</body>
</html>
