<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">Nonton Streaming Movie Sub Indo Gratis - tukarfollow</title>
    <meta id="metaDesc" name="description" content="Nonton film streaming movie sub indo gratis terlengkap dengan kualitas lancar kualitas HD terbaik.">
    <link rel="icon" type="image/png" href="https://googleusercontent.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR UTAMA (Sama Persis) -->
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">tukarfollow</a>
            <button class="burger-menu" id="burgerBtn">
                <span></span><span></span><span></span>
            </button>
            <nav class="nav-menu" id="navMenu">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Cari film di sini...">
                </div>
            </nav>
        </div>
    </header>

    <!-- VIDEO PLAYER & DETAIL -->
    <main class="main-content watch-container">
        <div class="player-wrapper">
            <h1 id="watchTitle">Memuat Judul...</h1>
            
            <div class="video-player-area" id="playerArea">
                <div class="ad-overlay" id="adOverlay"></div>
                <div id="videoContainer" class="video-container">
                    <!-- Player Diinjeksi di Sini -->
                </div>
            </div>
            
            <div class="movie-meta">
                <p><strong>Genre:</strong> <span id="watchGenre">-</span></p>
                <p><strong>Rilis:</strong> <span id="watchRelease">-</span></p>
                <p><strong>Negara:</strong> <span id="watchCountry">-</span></p>
            </div>
            
            <div class="sinopsis-box">
                <h3>Sinopsis</h3>
                <p id="watchSinopsis">Memuat sinopsis...</p>
            </div>

            <!-- FILM SERUPA CAROUSEL -->
            <section class="related-section">
                <h3>Film Serupa</h3>
                <div class="carousel-container">
                    <button class="carousel-btn prev-btn" id="slidePrev">❮</button>
                    <div class="movie-carousel" id="relatedGrid">
                        <!-- Diisi Otomatis -->
                    </div>
                    <button class="carousel-btn next-btn" id="slideNext">❯</button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer-grid">
        <div class="footer-col"><h3>tukarfollow</h3><p>Platform streaming gratis terlengkap.</p></div>
        <div class="footer-col"><h3>Jelajahi</h3><ul><li><a href="index.html">Beranda</a></li></ul></div>
        <div class="footer-col"><h3>Kategori</h3><ul><li><a href="#">Aksi Seru</a></li></ul></div>
        <div class="footer-col"><h3>Bantuan</h3><ul><li><a href="#">Kontak Kami</a></li></ul></div>
    </footer>

    <script src="watch.js"></script>
</body>
</html>
