<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watch Movie</title>

<link rel="stylesheet" href="style2.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body{
margin:0;
background:#0f0f14;
color:#fff;
font-family:Arial;
}

/* ================= NAVBAR (SAME AS INDEX STYLE) ================= */
header{
background:#111;
padding:10px 15px;
position:sticky;
top:0;
z-index:1000;
}

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

.logo{
display:flex;
align-items:center;
gap:8px;
font-weight:bold;
}

#navMenu{
display:flex;
gap:15px;
list-style:none;
}

#navMenu li a{
color:#fff;
text-decoration:none;
}

.searchBox{
display:flex;
align-items:center;
gap:5px;
background:#222;
padding:5px 10px;
border-radius:8px;
}

#burger{
display:none;
cursor:pointer;
}

#mobileMenu{
display:none;
flex-direction:column;
background:#111;
padding:10px;
}

/* ================= PLAYER ================= */
#heroPlayer{
width:100%;
height:60vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

#heroPlayer iframe{
width:100%;
height:100%;
border:none;
}

/* ================= INFO ================= */
#infoBox{
padding:20px;
}

#infoBox h1{
margin:0 0 10px;
font-size:22px;
}

.meta{
opacity:.8;
font-size:14px;
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:4px 10px;
background:#222;
border-radius:6px;
margin-right:5px;
font-size:12px;
}

/* ================= RELATED ================= */
#relatedWrap{
padding:20px;
}

/* ARROW DI ATAS GRID */
.relatedTop{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.arrowBtn{
background:#222;
border:none;
color:#fff;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
}

.scrollWrap{
display:flex;
overflow-x:auto;
gap:10px;
scroll-behavior:smooth;
}

.relCard{
min-width:140px;
cursor:pointer;
}

.relCard img{
width:100%;
border-radius:10px;
}

.relTitle{
font-size:12px;
margin-top:5px;
}

.scrollWrap::-webkit-scrollbar{
display:none;
}

/* MOBILE */
@media(max-width:768px){
#navMenu{display:none;}
#burger{display:block;}
}
</style>
</head>

<body>

<!-- NAVBAR (COPY INDEX BEHAVIOR) -->
<header>
<nav class="navbar">

<div class="logo">
<i class="fa-solid fa-film"></i>
<span>TukarFollow</span>
</div>

<ul id="navMenu">
<li><a href="#" id="moviesBtn">Movies</a></li>
<li><a href="#" id="seriesBtn">Series</a></li>
</ul>

<div class="searchBox">
<input type="text" id="search" placeholder="Cari film...">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div id="burger">
<i class="fa-solid fa-bars"></i>
</div>
</nav>

<div id="mobileMenu">
<a href="#" id="mobileMovies">Movies</a>
<a href="#" id="mobileSeries">Series</a>
<input type="text" id="mobileSearch" placeholder="Cari film...">
</div>
</header>

<!-- PLAYER -->
<div id="heroPlayer">Loading...</div>

<!-- INFO -->
<div id="infoBox"></div>

<!-- RELATED -->
<div id="relatedWrap">

<div class="relatedTop">
<button class="arrowBtn" onclick="scrollRel(-1)">‹</button>
<button class="arrowBtn" onclick="scrollRel(1)">›</button>
</div>

<div class="scrollWrap" id="relGrid"></div>

</div>

<script>
const KEY="b3b893873ed1bb7f175b2707afeea2a0";
let moviesData=[];

fetch("movies.json")
.then(r=>r.json())
.then(d=>{moviesData=d;init();});

const id=new URLSearchParams(location.search).get("id");

async function init(){
const tmdb=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
).then(r=>r.json());

const title=tmdb.title||"";
const match=findMatch(title);

renderPlayer(match);
renderInfo(match,tmdb);
loadRelated();
}

/* MATCH */
function clean(t){
return t.toLowerCase()
.replace(/\(\d{4}\)/g,"")
.replace(/[^a-z0-9 ]/g," ")
.replace(/\s+/g," ")
.trim();
}

function similarity(a,b){
a=clean(a); b=clean(b);
let aa=a.split(" ");
let bb=b.split(" ");
let hit=0;
aa.forEach(x=>{if(bb.includes(x))hit++;});
return hit/Math.max(aa.length,bb.length);
}

function findMatch(title){
let best=null,score=0;
moviesData.forEach(m=>{
let s=similarity(title,m.title);
if(s>=0.8 && s>score){
best=m;score=s;
}
});
return best;
}

/* PLAYER */
function renderPlayer(m){
const el=document.getElementById("heroPlayer");

if(!m||!m.iframe){
el.innerHTML="<h2>Video unavailable</h2>";
return;
}

el.innerHTML=`<iframe src="${m.iframe}" allowfullscreen></iframe>`;
}

/* INFO */
function renderInfo(m,tmdb){
const el=document.getElementById("infoBox");

if(!m){
el.innerHTML=`<h1>${tmdb.title}</h1><p>Video unavailable</p>`;
return;
}

el.innerHTML=`
<h1>${m.title}</h1>
<div class="meta">
<span class="badge">${(m.genre||[]).join(", ")}</span>
<span class="badge">${m.release_date||"-"}</span>
<span class="badge">${m.country||"-"}</span>
</div>
<p>${m.sinopsis||""}</p>
`;
}

/* RELATED */
function loadRelated(){
fetch(`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>renderRelated(d.results||[]));
}

function renderRelated(list){
const el=document.getElementById("relGrid");
el.innerHTML="";

list.slice(0,10).forEach(m=>{
if(!m.poster_path)return;

el.innerHTML+=`
<div class="relCard" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div class="relTitle">${m.title}</div>
</div>
`;
});
}

function scrollRel(dir){
document.getElementById("relGrid")
.scrollBy({left:dir*300,behavior:"smooth"});
}

function go(id){
location.href="watch.html?id="+id;
}
</script>

</body>
</html>
