<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watch Movie</title>

<link rel="stylesheet" href="style2.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body{
margin:0;
background:#0f0f14;
color:#fff;
font-family:Arial;
}

/* PLAYER */
#heroPlayer{
width:100%;
height:60vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

#heroPlayer iframe{
width:100%;
height:100%;
border:none;
}

/* INFO */
#infoBox{
padding:20px;
}

#infoBox h1{
margin:0 0 10px;
font-size:22px;
}

.meta{
opacity:.8;
font-size:14px;
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:4px 10px;
background:#222;
border-radius:6px;
margin-right:5px;
font-size:12px;
}

/* RELATED */
#relatedWrap{
padding:20px;
}

.relatedHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.scrollWrap{
display:flex;
overflow-x:auto;
gap:10px;
scroll-behavior:smooth;
}

.relCard{
min-width:140px;
cursor:pointer;
}

.relCard img{
width:100%;
border-radius:10px;
}

.relTitle{
font-size:12px;
margin-top:5px;
}

/* ARROW */
.arrowBtn{
background:#222;
border:none;
color:#fff;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
}

/* HIDE SCROLLBAR */
.scrollWrap::-webkit-scrollbar{
display:none;
}
</style>
</head>

<body>

<!-- PLAYER -->
<div id="heroPlayer">
Loading...
</div>

<!-- INFO -->
<div id="infoBox"></div>

<!-- RELATED -->
<div id="relatedWrap">

<div class="relatedHeader">
<h3>Related Movies</h3>

<div>
<button class="arrowBtn" onclick="scrollRel(-1)">‹</button>
<button class="arrowBtn" onclick="scrollRel(1)">›</button>
</div>

</div>

<div class="scrollWrap" id="relGrid"></div>

</div>

<script>
const KEY = "b3b893873ed1bb7f175b2707afeea2a0";

let moviesData = [];

/* LOAD MOVIES.JSON */
fetch("movies.json")
.then(r => r.json())
.then(data => {
moviesData = data;
init();
});

/* GET TMDB ID */
const id = new URLSearchParams(location.search).get("id");

/* INIT */
async function init(){
const tmdb = await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
).then(r => r.json());

const title = tmdb.title || "";

/* MATCH LOCAL MOVIE */
const match = findMatch(title);

/* RENDER PLAYER */
renderPlayer(match);

/* RENDER INFO */
renderInfo(match, tmdb);

/* RELATED */
loadRelated();
}

/* FUZZY MATCH 80% */
function similarity(a,b){
a = clean(a);
b = clean(b);

let aa = a.split(" ");
let bb = b.split(" ");

let hit = 0;

aa.forEach(x=>{
if(bb.includes(x)) hit++;
});

return hit / Math.max(aa.length,bb.length);
}

function clean(t){
return t.toLowerCase()
.replace(/\(\d{4}\)/g,"")
.replace(/[^a-z0-9 ]/g," ")
.replace(/\s+/g," ")
.trim();
}

function findMatch(title){
let best = null;
let score = 0;

moviesData.forEach(m=>{
let s = similarity(title, m.title);
if(s >= 0.8 && s > score){
best = m;
score = s;
}
});

return best;
}

/* PLAYER */
function renderPlayer(movie){
const el = document.getElementById("heroPlayer");

if(!movie || !movie.iframe){
el.innerHTML = `<h2>Video unavailable</h2>`;
return;
}

el.innerHTML = `
<iframe src="${movie.iframe}" allowfullscreen></iframe>
`;
}

/* INFO */
function renderInfo(movie, tmdb){
const el = document.getElementById("infoBox");

if(!movie){
el.innerHTML = `
<h1>${tmdb.title}</h1>
<p>⚠️ Video unavailable (not in database)</p>
`;
return;
}

el.innerHTML = `
<h1>${movie.title}</h1>

<div class="meta">
<span class="badge">${movie.genre?.join(", ") || "-"}</span>
<span class="badge">${movie.release_date || "-"}</span>
<span class="badge">${movie.country || "-"}</span>
</div>

<p>${movie.sinopsis || ""}</p>
`;
}

/* RELATED TMDB */
function loadRelated(){
fetch(
`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`
)
.then(r=>r.json())
.then(data=>{
renderRelated(data.results || []);
});
}

function renderRelated(list){
const el = document.getElementById("relGrid");
el.innerHTML = "";

list.slice(0,10).forEach(m=>{
if(!m.poster_path) return;

el.innerHTML += `
<div class="relCard" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div class="relTitle">${m.title}</div>
</div>
`;
});
}

function scrollRel(dir){
document.getElementById("relGrid")
.scrollBy({left: dir * 300, behavior:"smooth"});
}

function go(id){
location.href = "watch.html?id=" + id;
}
</script>

</body>
</html>
