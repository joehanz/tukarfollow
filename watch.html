<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Watch Movie - TUKARFOLLOW</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #000000;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .watch-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 70px);
      width: 100%;
    }

    /* ✅ Kontainer utama: target layar penuh */
    .video-main-wrapper {
      width: 100%;
      height: 77vh;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .video-main-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ✅ Lapisan sub & kontrol tetap di atas */
    .subtitle-layer {
      position: absolute;
      bottom: 5%;
      left: 0;
      width: 100%;
      z-index: 99999;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .subtitle-text {
      display: inline-block;
      background: rgba(0, 0, 0, 0.75);
      color: #ffff00;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 4px;
      line-height: 1.5;
      text-shadow: 0 0 6px rgba(0,0,0,0.95);
      max-width: 90%;
      text-align: center;
      word-wrap: break-word;
      pointer-events: auto;
    }

    .subtitle-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.85);
      padding: 6px 14px;
      border-radius: 30px;
      pointer-events: auto;
      box-shadow: 0 0 12px rgba(0,0,0,0.6);
    }

    .ctrl-btn {
      background: #ffdd57;
      color: #000;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .ctrl-btn:hover {
      background: #fff280;
      transform: scale(1.08);
    }

    .time-digital {
      color: #ffdd57;
      font-family: monospace;
      font-size: 19px;
      font-weight: 600;
      min-width: 85px;
      text-align: center;
    }

    /* ✅ Tetap terlihat saat masuk layar penuh */
    .video-main-wrapper:fullscreen .subtitle-layer,
    .video-main-wrapper:-webkit-full-screen .subtitle-layer,
    .video-main-wrapper:-moz-full-screen .subtitle-layer,
    .video-main-wrapper:-ms-fullscreen .subtitle-layer {
      position: absolute;
      z-index: 999999;
    }

    /* Sisa gaya */
    .comments-section {
      width: 100%;
      flex: 1;
      background: #0d0d0d;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 15px;
      display: flex;
      flex-direction: column;
    }
    .comments-header {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ffdd57;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .comments-list-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }
    .comment-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }
    .comment-user {
      font-weight: 600;
      color: #38b6ff;
      margin-bottom: 2px;
    }
    .comment-text {
      color: #e0e0e0;
      line-height: 1.4;
    }

    .search-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #000000;
      z-index: 100;
      padding: 15px;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
    }
    .search-container.show {
      transform: translateY(0);
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 0 15px;
      height: 45px;
    }
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      padding-left: 10px;
    }
    .search-box input:focus {
      outline: none;
    }

    .search-results-layer {
      position: fixed;
      top: 75px;
      left: 0;
      width: 100%;
      height: calc(100vh - 145px);
      background: #050505;
      z-index: 99;
      overflow-y: auto;
      padding: 15px;
      display: none;
    }
    .search-results-layer.active {
      display: block;
    }
    .search-item-row {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }
    .search-item-thumb {
      width: 50px;
      height: 70px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      background-color: #222;
    }
    .search-item-info h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .search-item-info p {
      font-size: 11px;
      color: #888;
    }

    .info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #121212;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      z-index: 105;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
    }
    .info-panel.show {
      transform: translateY(0);
    }
    .panel-content {
      padding: 20px;
    }
    .form-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #fff;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 13px;
    }
    .form-group textarea {
      resize: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: 1px solid #ffdd57;
    }
    .submit-btn {
      background: #ffdd57;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-top: 5px;
    }

    .panel-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      z-index: 104;
      display: none;
    }
    .panel-backdrop.active {
      display: block;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 110;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #888888;
      cursor: pointer;
      font-size: 11px;
    }
    .nav-item.active {
      color: #ffffff;
    }
    .nav-item span {
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="watch-layout">
    <!-- Kontainer utama -->
    <div class="video-main-wrapper" id="videoWrapper">
      <iframe id="filmIframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      
      <!-- Kontrol + Subtitle + Tombol Layar Penuh -->
      <div class="subtitle-layer" id="subLayer">
        <div class="subtitle-text" id="subText"></div>
        <div class="subtitle-controls">
          <button class="ctrl-btn" id="btnMundur">⏪</button>
          <button class="ctrl-btn" id="btnMain">▶️</button>
          <button class="ctrl-btn" id="btnMaju">⏩</button>
          <div class="time-digital" id="jamTayang">00:00:00</div>
          <!-- ✅ TOMBOL LAYAR PENUH BARU -->
          <button class="ctrl-btn" id="btnFullscreen">⛶</button>
        </div>
      </div>
    </div>

    <div class="comments-section">
      <div class="comments-header">
        <i data-lucide="message-square" size="16"></i> Komentar Netizen
      </div>
      <div class="comments-list-container" id="commentList"></div>
    </div>
  </div>

  <div class="search-container" id="searchContainer">
    <div class="search-box">
      <i data-lucide="search" size="18" color="#888"></i>
      <input type="text" id="searchInput" placeholder="Cari film lain...">
    </div>
  </div>

  <div class="search-results-layer" id="searchResultsLayer"></div>

  <div class="panel-backdrop" id="panelBackdrop" onclick="tutupFormKomen()"></div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-content">
      <div class="form-title">Tulis Komentar Kamu</div>
      <div class="form-group">
        <input type="text" id="commentName" placeholder="Nama samaran kamu...">
        <textarea id="commentText" placeholder="Tulis opini/komentar film di sini..." rows="3" maxlength="300"></textarea>
        <button class="submit-btn" onclick="kirimKomentar()">Kirim Komentar</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" id="navSearch">
      <i data-lucide="search" size="24"></i>
      <span>Search</span>
    </div>
    <div class="nav-item" id="navAddComment" style="color: #fff;">
      <i data-lucide="plus-circle" size="28"></i>
      <span>Add</span>
    </div>
    <div class="nav-item" id="navHome">
      <i data-lucide="home" size="24"></i>
      <span>Home</span>
    </div>
  </div>

  <script>
    // KONFIGURASI
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8'; 
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
    const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

    // Elemen
    const videoWrapper = document.getElementById('videoWrapper');
    const filmIframe = document.getElementById('filmIframe');
    const subText = document.getElementById('subText');
    const jamTayang = document.getElementById('jamTayang');
    const btnMain = document.getElementById('btnMain');
    const btnMundur = document.getElementById('btnMundur');
    const btnMaju = document.getElementById('btnMaju');
    const btnFullscreen = document.getElementById('btnFullscreen');

    let currentMovieId = null;
    let allMoviesCache = [];
    let myCustomMovies = [];

    let subtitles = [];
    let waktuSekarang = 0;
    let pemutar = null;
    let sedangMain = false;

    // ====================================
    // FUNGSI SUBTITLE
    // ====================================
    function ubahKeWaktu(detik) {
      const j = Math.floor(detik / 3600).toString().padStart(2, '0');
      const m = Math.floor((detik % 3600) / 60).toString().padStart(2, '0');
      const d = Math.floor(detik % 60).toString().padStart(2, '0');
      return `${j}:${m}:${d}`;
    }

    function ubahKeDetik(teksWaktu) {
      teksWaktu = teksWaktu.replace(',', '.').trim();
      const bagian = teksWaktu.split(':');
      if (bagian.length === 2) return Number(bagian[0]) * 60 + Number(bagian[1]);
      if (bagian.length === 3) return Number(bagian[0]) * 3600 + Number(bagian[1]) * 60 + Number(bagian[2]);
      return 0;
    }

    function perbaruiTampilan() {
      const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
      subText.textContent = aktif ? aktif.teks : "";
      jamTayang.textContent = ubahKeWaktu(waktuSekarang);
    }

    function mulaiSub() {
      if (pemutar) clearInterval(pemutar);
      sedangMain = true;
      btnMain.textContent = "⏸️";
      pemutar = setInterval(() => {
        waktuSekarang += 1;
        perbaruiTampilan();
      }, 1000);
    }

    function hentikanSub() {
      sedangMain = false;
      btnMain.textContent = "▶️";
      clearInterval(pemutar);
    }

    function geserWaktu(ubah) {
      waktuSekarang = Math.max(0, waktuSekarang + ubah);
      perbaruiTampilan();
    }

    // Baca file .vtt
    async function bacaSubtitle(idFilm) {
      const alamat = `${SUBTITLE_URL}${idFilm}.vtt`;
      subtitles = [];
      waktuSekarang = 0;
      perbaruiTampilan();

      try {
        const res = await fetch(alamat);
        if (!res.ok) throw new Error("Tidak ada");
        const teks = await res.text();
        const baris = teks.split('\n').map(b => b.trim());
        let i = 0;

        if (baris[0].toUpperCase().includes("WEBVTT")) i++;

        while (i < baris.length) {
          if (baris[i].includes('-->')) {
            const [mulaiStr, selesaiStr] = baris[i].split('-->').map(w => w.trim());
            i++;
            let teksSub = "";
            while (i < baris.length && baris[i] !== "") {
              teksSub += baris[i] + " ";
              i++;
            }
            subtitles.push({
              mulai: ubahKeDetik(mulaiStr),
              selesai: ubahKeDetik(selesaiStr),
              teks: teksSub.trim()
            });
          }
          i++;
        }
      } catch {
        subText.textContent = "Subtitle tidak tersedia";
      }
    }

    // ✅ Klik sekali jalankan video + sub
    btnMain.addEventListener('click', () => {
      if (sedangMain) {
        hentikanSub();
        try { filmIframe.contentWindow.postMessage('pause', '*'); } catch (e) {}
      } else {
        mulaiSub();
        try { filmIframe.contentWindow.postMessage('play', '*'); } catch (e) {}
      }
    });

    btnMundur.addEventListener('click', () => geserWaktu(-10));
    btnMaju.addEventListener('click', () => geserWaktu(+10));

    // ✅ FUNGSI LAYAR PENUH
    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement && 
          !document.webkitFullscreenElement && 
          !document.mozFullScreenElement && 
          !document.msFullscreenElement) {
        // Masuk layar penuh
        if (videoWrapper.requestFullscreen) {
          videoWrapper.requestFullscreen();
        } else if (videoWrapper.webkitRequestFullscreen) {
          videoWrapper.webkitRequestFullscreen();
        } else if (videoWrapper.mozRequestFullScreen) {
          videoWrapper.mozRequestFullScreen();
        } else if (videoWrapper.msRequestFullscreen) {
          videoWrapper.msRequestFullscreen();
        }
        btnFullscreen.textContent = "⛶";
      } else {
        // Keluar layar penuh
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        btnFullscreen.textContent = "⛶";
      }
    });

    // ====================================
    // FUNGSI UTAMA
    // ====================================
    function ambilIdDariUrl() {
      const param = new URLSearchParams(window.location.search);
      return param.get('id');
    }

    async function muatDataAwal() {
      currentMovieId = parseInt(ambilIdDariUrl());
      if (!currentMovieId) {
        videoWrapper.innerHTML += `<div style="padding:50px; text-align:center;">ID Film tidak ditemukan.</div>`;
        return;
      }

      try {
        const res = await fetch('movies.json');
        if (res.ok) myCustomMovies = await res.json();
      } catch (e) { console.warn("movies.json tidak ditemukan"); }

      pasangPemutar(currentMovieId);
      muatKomentar(currentMovieId);
      await bacaSubtitle(currentMovieId);

      setTimeout(() => {
        const kolomKomen = document.getElementById('commentText');
        if (kolomKomen) {
          kolomKomen.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              kirimKomentar();
            }
          });
        }
      }, 500);

      try {
        const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=1`);
        if (res.ok) allMoviesCache = (await res.json()).results;
      } catch (e) { console.error("Gagal ambil data film"); }
    }

    function pasangPemutar(tmdbId) {
      const custom = myCustomMovies.find(m => m.tmdb_id === tmdbId);
      let sumber = "";

      if (custom) {
        if (custom.iframe && custom.iframe.trim()) sumber = custom.iframe;
        else if (custom.video && custom.video.trim()) sumber = custom.video;
        else sumber = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
      } else {
        sumber = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
      }

      filmIframe.src = sumber;
    }

    async function muatKomentar(tmdbId) {
      commentList.innerHTML = '<div style="opacity:0.5; font-size:12px; padding:10px 0;">Memuat komentar...</div>';
      try {
        const res = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${tmdbId}`);
        const data = await res.json();
        if (data.status === "success" && data.data.length > 0) {
          commentList.innerHTML = data.data.map(c => `
            <div class="comment-item">
              <div class="comment-user">@${c.nama}</div>
              <div class="comment-text">${c.komentar}</div>
            </div>
          `).join('');
        } else {
          commentList.innerHTML = '<div style="opacity:0.4; font-size:12px; padding:15px; text-align:center;">Belum ada komentar.</div>';
        }
      } catch {
        commentList.innerHTML = '<div style="color:#ff6b6b; font-size:12px; padding:10px;">Gagal memuat komentar.</div>';
      }
    }

    async function kirimKomentar() {
      const nama = document.getElementById('commentName').value.trim();
      const teks = document.getElementById('commentText').value.trim();
      if (!nama || !teks) return alert("Isi nama dan komentar dulu!");
      tutupFormKomen();
      try {
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({tmdbId: currentMovieId, nama, komentar: teks})
        });
        setTimeout(() => muatKomentar(currentMovieId), 1200);
      } catch {
        alert("Gagal mengirim komentar.");
      }
    }

    function bukaFormKomen() {
      infoPanel.classList.add('show');
      panelBackdrop.classList.add('active');
    }
    function tutupFormKomen() {
      infoPanel.classList.remove('show');
      panelBackdrop.classList.remove('active');
    }

    // Navigasi & Pencarian
    document.getElementById('navSearch').addEventListener('click', e => {
      e.stopPropagation();
      const buka = searchContainer.classList.toggle('show');
      if (!buka) {
        searchInput.value = "";
        searchResultsLayer.classList.remove('active');
      } else setTimeout(() => searchInput.focus(), 100);
    });

    searchInput.addEventListener('input', e => {
      const kata = e.target.value.toLowerCase().trim();
      if (!kata) return searchResultsLayer.classList.remove('active');
      searchResultsLayer.classList.add('active');
      const hasil = allMoviesCache.filter(m => m.title.toLowerCase().includes(kata));
      searchResultsLayer.innerHTML = hasil.length ? hasil.map(m => `
        <div class="search-item-row" onclick="bukaFilm(${m.id})">
          <div class="search-item-thumb" style="background-image:url('${IMAGE_URL}${m.poster_path}')"></div>
          <div class="search-item-info"><h4>${m.title}</h4><p>${m.release_date?.split('-')[0] || '-'}</p></div>
        </div>
      `).join('') : `<div style="padding:30px; text-align:center;">Tidak ditemukan</div>`;
    });

    function bukaFilm(id) { window.location.href = `watch.html?id=${id}`; }
    document.getElementById('navAddComment').addEventListener('click', bukaFormKomen);
    document.getElementById('navHome').addEventListener('click', () => window.history.back() || (window.location.href = 'index.html'));

    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      muatDataAwal();
    });
  </script>
</body>
</html>
