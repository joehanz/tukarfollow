<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video dengan Subtitle</title>
</head>
<body>
  <video controls width="600">
    <source src="video.mp4" type="video/mp4">
    <track src="subtitle.vtt" kind="subtitles" srclang="id" label="Bahasa Indonesia" default>
  </video>
</body>
</html>
