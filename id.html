    <script>
        // API Key baru Anda yang sudah teruji aktif
        const API_KEY = 'b3b893873ed1bb7f175b2707afeea2a0';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG = 'https://tmdb.org';

        let currentPage = 1;
        let currentQuery = '';

        async function fetchMovies(page = 1) {
            const grid = document.getElementById('movieGrid');
            const loading = document.getElementById('loading');

            loading.style.display = 'block';
            grid.innerHTML = '';

            try {
                let url = '';

                if (currentQuery) {
                    url = `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(currentQuery)}&language=id-ID&page=${page}`;
                } else {
                    // MENGOPTIMALKAN QUERY: Menambahkan parameter keamanan agar lolos dari proteksi ketat browser
                    url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_original_language=id&sort_by=popularity.desc&include_adult=false&language=id-ID&page=${page}`;
                }

                // Melakukan pemanggilan data dengan mode CORS eksplisit
                const res = await fetch(url, { method: 'GET', mode: 'cors' });
                
                if (!res.ok) {
                    throw new Error(`HTTP error! Status: ${res.status}`);
                }

                const data = await res.json();
                loading.style.display = 'none';

                if (!data.results || data.results.length === 0) {
                    grid.innerHTML = '<h2 style="grid-column:1/-1; text-align:center;">Tidak ada film ditemukan</h2>';
                    return;
                }

                for (const movie of data.results) {
                    const card = document.createElement('div');
                    card.className = 'card';

                    card.innerHTML = `
                        <img class="poster" src="${movie.poster_path ? IMG + movie.poster_path : 'https://placehold.co'}">
                        <div class="info">
                            <div class="title">${movie.title}</div>
                            <div class="meta">
                                <span>${movie.release_date ? movie.release_date.slice(0, 4) : 'N/A'}</span>
                                <span class="rating">⭐ ${movie.vote_average.toFixed(1)}</span>
                            </div>
                        </div>
                    `;

                    card.onclick = () => {
                        const playerArea = document.getElementById('playerContainer');
                        const videoWrapper = document.getElementById('videoWrapper');
                        const playerTitle = document.getElementById('playerTitle');

                        const finalEmbedUrl = `https://vidsrc.ru{movie.id}`;

                        videoWrapper.innerHTML = `
                            <iframe src="${finalEmbedUrl}" allowfullscreen frameborder="0" referrerpolicy="origin" width="100%" height="100%"></iframe>
                        `;

                        playerTitle.innerText = `Nonton: ${movie.title}`;
                        playerArea.style.display = 'block';
                        playerArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };

                    grid.appendChild(card);
                }

            } catch (err) {
                // Memberikan detail eror asli di layar untuk memudahkan pelacakan masalah internet Anda
                loading.innerHTML = `Gagal memuat data dari TMDB.<br><small style="color:#ff3d00;">Detail: ${err.message}. Pastikan internet stabil atau jalankan file lewat localhost.</small>`;
                console.error(err);
            }
        }

        function searchMovies() {
            const input = document.getElementById('searchInput');
            currentQuery = input.value.trim();
            currentPage = 1;
            document.getElementById('pageNumber').innerText = currentPage;
            fetchMovies(currentPage);
        }

        function nextPage() {
            currentPage++;
            document.getElementById('pageNumber').innerText = currentPage;
            fetchMovies(currentPage);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                document.getElementById('pageNumber').innerText = currentPage;
                fetchMovies(currentPage);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        fetchMovies();
    </script>
</body>
</html>
