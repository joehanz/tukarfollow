<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watch Movie</title>

<link rel="stylesheet" href="style.css">

<style>
/* ================= WATCH FIX ================= */

.watch-container{
padding:20px;
max-width:1200px;
margin:auto;
}

.player-wrap{
position:relative;
width:100%;
aspect-ratio:16/9;
background:#000;
border-radius:14px;
overflow:hidden;
}

.player-wrap iframe{
width:100%;
height:100%;
border:none;
}

.movie-info{
margin-top:20px;
color:#fff;
}

.movie-info h1{
font-size:24px;
margin-bottom:10px;
}

.movie-info p{
opacity:.85;
line-height:1.6;
}

.related{
margin-top:30px;
position:relative;
}

.related h2{
margin-bottom:10px;
}

.related-track{
display:flex;
gap:10px;
overflow-x:auto;
scroll-behavior:smooth;
padding:10px 0;
}

.related-card{
flex:0 0 auto;
width:160px;
}

.related-card img{
width:100%;
height:240px;
object-fit:cover;
border-radius:10px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
width:50px;
height:50px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.7);
color:#fff;
font-size:22px;
cursor:pointer;
z-index:10;
}

#prev{
left:-10px;
}

#next{
right:-10px;
}

@media(max-width:768px){
.arrow{display:none;}
.related-card{width:140px;}
.related-card img{height:200px;}
}

  .related-track{
overflow:hidden;
}
</style>

</head>
<body>

<!-- NAV (reuse index style) -->
<nav class="navbar">
<div class="nav-logo">
<a href="index.html">TUKARMOVIE</a>
</div>
</nav>

<div class="watch-container">

<!-- PLAYER -->
<div class="player-wrapper">

<div id="playerOverlay" class="player-overlay">
<img id="overlayImg" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgAkJiGKw5otYyJgpBBtop9PZXrNpbMHJUvpja586ANY4sU_n6YWV7axeh02uKQtvfBWJlXCUS67JR6xIuvx_o7__3JZMmz9lFrnB78WQkymFMzqPJE4L2x4uPWH2fNsKJsACIdaQTaVTW4DK1QIgmSJqUzg0DkXIux4DANoKd5QGoQxWwyrxEXEJkBC5U/s1500/segera-dimulai.webp">
</div>

<iframe id="player"></iframe>

</div>

<!-- INFO -->
<div class="movie-info" id="info">
Loading...
</div>

<!-- RELATED -->
<div class="related">
<h2>Related Movies</h2>

<button id="prev" class="arrow">◀</button>
<button id="next" class="arrow">▶</button>

<div class="related-track" id="related"></div>

</div>

</div>

<footer class="footer">
<div class="copyright">© 2026 Tukar Movie</div>
</footer>

<script src="script.js"></script>

<script>
/* ================= WATCH ENGINE ================= */

const params=new URLSearchParams(location.search);
const id=params.get("id");
const title=params.get("title");

const player=document.getElementById("player");
const info=document.getElementById("info");
const related=document.getElementById("related");

async function load(){

let custom=null;

try{
const res=await fetch("movies.json");
const data=await res.json();
custom=data.find(m=>String(m.tmdb_id)===String(id));
}catch(e){}

if(custom && custom.iframe){
player.src=custom.iframe;
}else{
player.src=`https://vsembed.su/embed/movie/${id}`;
}

try{
const res=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}`);
const movie=await res.json();

info.innerHTML=`
<h1>${movie.title}</h1>
<p>${movie.overview||""}</p>
<p><b>Release:</b> ${movie.release_date||"-"}</p>
<p><b>Genre:</b> ${(movie.genres||[]).map(g=>g.name).join(", ")}</p>
`;
}catch(e){}

try{
const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}`);
const data=await res.json();

related.innerHTML="";

(data.results||[]).slice(0,12).forEach(m=>{
related.innerHTML+=`
<a class="related-card" href="watch.html?id=${m.id}&title=${encodeURIComponent(m.title)}">
<img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
</a>`;
});
}catch(e){}

/* arrows */
document.getElementById("prev").onclick=()=>related.scrollBy({left:-800,behavior:"smooth"});
document.getElementById("next").onclick=()=>related.scrollBy({left:800,behavior:"smooth"});
}

load();


  const overlay=document.getElementById("playerOverlay");
const overlayImg=document.getElementById("overlayImg");

const banners=[
"https://via.placeholder.com/1280x720?text=situs1.com",
"https://via.placeholder.com/1280x720?text=situs2.com",
"https://via.placeholder.com/1280x720?text=situs3.com"
];

/* 0–3 detik gambar utama sudah dari HTML */

/* 3–6 detik banner random */
setTimeout(()=>{

const rnd=banners[Math.floor(Math.random()*banners.length)];
overlayImg.src=rnd;

overlay.onclick=()=>{
window.open(rnd,"_blank");
};

},3000);

/* 6 detik hilang */
setTimeout(()=>{
overlay.style.display="none";
},6000);
</script>

</body>
</html>
