<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Nav</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- NAV -->
<nav class="relative border-b border-gray-800 px-6 py-4">

  <div class="flex items-center justify-between">

    <!-- LOGO -->
    <div class="text-xl font-bold text-red-600">
      tukarfollow
    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-4">

      <input type="text" placeholder="Cari film..."
        class="hidden md:block px-3 py-2 bg-gray-900 border border-gray-700 rounded w-64">

      <button onclick="toggleMenu()" class="text-2xl md:hidden">☰</button>

      <button onclick="toggleMenu()" class="hidden md:block px-3 py-2 bg-gray-900 border border-gray-700 rounded">
        Menu
      </button>

    </div>

  </div>

  <!-- DROPDOWN PANEL (keluar dari bawah nav) -->
  <div id="panel" class="hidden absolute left-0 top-full w-full bg-black border-b border-gray-800 p-4 z-50">

    <div class="flex flex-col md:flex-row gap-6">

      <!-- SEARCH MOBILE -->
      <input type="text" placeholder="Cari film..."
        class="px-3 py-2 bg-gray-900 border border-gray-700 rounded w-full md:hidden">

      <!-- GENRE -->
      <ul class="text-sm text-gray-300">
        <li class="font-semibold text-white mb-2">Genre</li>
        <li>Action</li>
        <li>Comedy</li>
        <li>Drama</li>
      </ul>

      <!-- YEAR -->
      <ul class="text-sm text-gray-300">
        <li class="font-semibold text-white mb-2">Tahun</li>
        <li>2026</li>
        <li>2025</li>
        <li>2024</li>
        <li>Classic</li>
      </ul>

    </div>

  </div>

</nav>

<script>
function toggleMenu(){
  document.getElementById('panel').classList.toggle('hidden');
}
</script>

</body>
</html>
