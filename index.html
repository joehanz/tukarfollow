<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamix - Grid Sempurna</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans antialiased">

    <!-- UTAMA -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        
        <h2 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-3">Daftar Film Populer</h2>

        <!-- GRID UTAMA: Mengunci baris tetap sejajar menggunakan grid-rows-auto -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 items-stretch">
            
            <!-- KARTU FILM 1 (Model Potret) -->
            <div class="flex flex-col bg-gray-900 rounded-lg overflow-hidden border border-gray-800 shadow-xl group cursor-pointer">
                <!-- Memaksa gambar mengikuti rasio poster bioskop 2:3 -->
                <div class="relative w-full aspect-[2/3] bg-gray-800 overflow-hidden">
                    <img src="https://unsplash.com" alt="Poster" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                    <span class="absolute top-2 left-2 bg-red-600 text-[10px] font-bold px-2 py-0.5 rounded">4K</span>
                </div>
                <!-- Area Teks Terkunci -->
                <div class="p-3 flex-grow flex flex-col justify-between">
                    <h3 class="font-semibold text-sm line-clamp-2 group-hover:text-red-500 transition-colors">Judul Film Pertama Yang Sangat Panjang Sekali</h3>
                    <p class="text-xs text-gray-400 mt-2">2026 • Action</p>
                </div>
            </div>

            <!-- KARTU FILM 2 -->
            <div class="flex flex-col bg-gray-900 rounded-lg overflow-hidden border border-gray-800 shadow-xl group cursor-pointer">
                <div class="relative w-full aspect-[2/3] bg-gray-800 overflow-hidden">
                    <img src="https://unsplash.com" alt="Poster" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                    <span class="absolute top-2 left-2 bg-blue-600 text-[10px] font-bold px-2 py-0.5 rounded">HD</span>
                </div>
                <div class="p-3 flex-grow flex flex-col justify-between">
                    <h3 class="font-semibold text-sm line-clamp-2 group-hover:text-red-500 transition-colors">Petualangan Singkat</h3>
                    <p class="text-xs text-gray-400 mt-2">2025 • Sci-Fi</p>
                </div>
            </div>

            <!-- KARTU FILM 3 -->
            <div class="flex flex-col bg-gray-900 rounded-lg overflow-hidden border border-gray-800 shadow-xl group cursor-pointer">
                <div class="relative w-full aspect-[2/3] bg-gray-800 overflow-hidden">
                    <img src="https://unsplash.com" alt="Poster" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                    <span class="absolute top-2 left-2 bg-red-600 text-[10px] font-bold px-2 py-0.5 rounded">4K</span>
                </div>
                <div class="p-3 flex-grow flex flex-col justify-between">
                    <h3 class="font-semibold text-sm line-clamp-2 group-hover:text-red-500 transition-colors">Misteri Malam</h3>
                    <p class="text-xs text-gray-400 mt-2">2026 • Thriller</p>
                </div>
            </div>

            <!-- KARTU FILM 4 -->
            <div class="flex flex-col bg-gray-900 rounded-lg overflow-hidden border border-gray-800 shadow-xl group cursor-pointer">
                <div class="relative w-full aspect-[2/3] bg-gray-800 overflow-hidden">
                    <img src="https://unsplash.com" alt="Poster" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                    <span class="absolute top-2 left-2 bg-blue-600 text-[10px] font-bold px-2 py-0.5 rounded">HD</span>
                </div>
                <div class="p-3 flex-grow flex flex-col justify-between">
                    <h3 class="font-semibold text-sm line-clamp-2 group-hover:text-red-500 transition-colors">Kisah Klasik Lama Bioskop Indonesia</h3>
                    <p class="text-xs text-gray-400 mt-2">2024 • Drama</p>
                </div>
            </div>

            <!-- KARTU FILM 5 -->
            <div class="flex flex-col bg-gray-900 rounded-lg overflow-hidden border border-gray-800 shadow-xl group cursor-pointer">
                <div class="relative w-full aspect-[2/3] bg-gray-800 overflow-hidden">
                    <img src="https://unsplash.com" alt="Poster" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                    <span class="absolute top-2 left-2 bg-red-600 text-[10px] font-bold px-2 py-0.5 rounded">4K</span>
                </div>
                <div class="p-3 flex-grow flex flex-col justify-between">
                    <h3 class="font-semibold text-sm line-clamp-2 group-hover:text-red-500 transition-colors">Komedi Romantis</h3>
                    <p class="text-xs text-gray-400 mt-2">2025 • Romance</p>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
