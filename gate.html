<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TukarFollow Gate</title>

<style>

/* semua dikurung tf- agar tidak tabrakan */

html,body{
margin:0;
padding:0;
height:100%;
}

.tf-body{

background:#080808;
color:#fff;
min-height:100vh;
overflow-x:hidden;
font-family:Arial,sans-serif;
position:relative;

}

.tf-body:before{

content:"";
position:fixed;
inset:0;

background:
linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.95)
),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1800");

background-size:cover;
background-position:center;

filter:blur(2px);
transform:scale(1.1);

z-index:-2;

}

.tf-wrap{

max-width:1200px;
margin:auto;
padding:25px;

}

.tf-title{

font-size:35px;
font-weight:bold;
margin-bottom:10px;

}

.tf-title span{

color:gold;

}

.tf-desc{

opacity:.7;
margin-bottom:30px;

}

.tf-grid{

display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(230px,1fr)
);

gap:20px;

}

.tf-card{

height:300px;
border-radius:20px;
overflow:hidden;
cursor:pointer;
position:relative;

transition:.3s;

}

.tf-card:hover{

transform:translateY(-5px);

}

.tf-card img{

width:100%;
height:100%;
object-fit:cover;

}

.tf-overlay{

position:absolute;
left:0;
right:0;
bottom:0;

padding:20px;

background:
linear-gradient(
transparent,
rgba(0,0,0,.95)
);

}

.tf-claim{

display:none;
text-align:center;
margin-top:100px;

}

.tf-claim a{

display:inline-block;

padding:16px 40px;

background:gold;
color:black;

text-decoration:none;

border-radius:100px;
font-weight:bold;

}

</style>
</head>

<body>

<div class="tf-body">

<div class="tf-wrap">

<h1 class="tf-title">
Tukar<span>Follow</span>
</h1>

<div class="tf-desc">

Pilih media sosial lalu kembali.

</div>

<div id="tfGrid" class="tf-grid">

<div class="tf-card"
onclick="buka('https://youtube.com/@tukarfollow')">

<img src="https://picsum.photos/400/700?1">

<div class="tf-overlay">

<h2>YouTube</h2>

</div>

</div>


<div class="tf-card"
onclick="buka('https://instagram.com/AKUNMU')">

<img src="https://picsum.photos/400/700?2">

<div class="tf-overlay">

<h2>Instagram</h2>

</div>

</div>


<div class="tf-card"
onclick="buka('https://tiktok.com/@AKUNMU')">

<img src="https://picsum.photos/400/700?3">

<div class="tf-overlay">

<h2>TikTok</h2>

</div>

</div>

</div>


<div class="tf-claim"
id="tfClaim">

<a href="index.html">

🎬 Klaim Reward

</a>

</div>

</div>

</div>

<script>

let klik=false;

function buka(url){

klik=true;

window.open(
url,
"_blank"
);

}

window.onfocus=function(){

if(klik){

document
.getElementById(
"tfGrid"
)
.style.display=
"none";

document
.getElementById(
"tfClaim"
)
.style.display=
"block";

}

}

</script>

</body>
</html>
