<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemutar + Subtitle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: Arial, sans-serif; }

        /* Wadah Pemutar */
        .player {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Lapisan Subtitle */
        .subtitle {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 999;
            pointer-events: none;
            padding: 0 20px;
        }

        #subText {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 4px #000, 0 0 8px #000, 0 0 12px #000;
            line-height: 1.5;
        }

        /* Kontrol Sederhana */
        .kontrol {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
        }

        .kontrol button {
            background: #222;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .kontrol button:hover {
            background: #444;
        }
    </style>
</head>
<body>

<div class="player">
    <iframe id="filmFrame" allowfullscreen></iframe>

    <div class="subtitle">
        <div id="subText"></div>
    </div>

    <div class="kontrol">
        <button id="btnMain">Putar</button>
        <button id="btnMundur">-10d</button>
        <button id="btnMaju">+10d</button>
        <span id="waktuTayang">00:00:00</span>
    </div>
</div>

<script>
// ====================
// KONFIGURASI
// ====================
const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";
let subtitles = [];
let waktuSekarang = 0;
let timer = null;
let sedangJalankan = false;

// Ambil ID dari alamat
function ambilId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

// Ubah waktu teks ke detik
function ubahKeDetik(teks) {
    teks = teks.replace(/[, ]/g, ".").trim();
    const b = teks.split(":");
    if (b.length === 3) {
        const d = b[2].split(".");
        return Number(b[0]) * 3600 + Number(b[1]) * 60 + Number(d[0]) + (Number(d[1] || 0) / 1000);
    }
    return 0;
}

// Ubah detik ke format jam:menit:detik
function ubahKeWaktu(detik) {
    const j = Math.floor(detik / 3600).toString().padStart(2, "0");
    const m = Math.floor((detik % 3600) / 60).toString().padStart(2, "0");
    const d = Math.floor(detik % 60).toString().padStart(2, "0");
    return `${j}:${m}:${d}`;
}

// Perbarui tampilan subtitle & waktu
function perbarui() {
    const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
    document.getElementById("subText").textContent = aktif ? aktif.teks : "";
    document.getElementById("waktuTayang").textContent = ubahKeWaktu(waktuSekarang);
}

// Baca file subtitle dari GitHub
async function bacaSub(id) {
    const alamat = `${SUBTITLE_URL}${id}.vtt`;
    subtitles = [];
    waktuSekarang = 0;
    perbarui();

    try {
        const res = await fetch(alamat);
        if (!res.ok) throw new Error("Tidak ada");
        const teks = await res.text();
        const baris = teks.split("\n").map(b => b.trim()).filter(b => b);
        let i = 0;

        if (baris[0].toUpperCase().includes("WEBVTT")) i++;

        while (i < baris.length) {
            if (baris[i].includes("-->")) {
                const [awal, akhir] = baris[i].split("-->").map(w => w.trim());
                const mulai = ubahKeDetik(awal);
                const selesai = ubahKeDetik(akhir);
                let teksSub = "";
                i++;
                while (i < baris.length && !baris[i].includes("-->")) {
                    teksSub += baris[i] + " ";
                    i++;
                }
                if (mulai < selesai && teksSub.trim()) {
                    subtitles.push({ mulai, selesai, teks: teksSub.trim() });
                }
            } else {
                i++;
            }
        }
        console.log("✅ Subtitle dimuat:", subtitles.length);
    } catch (err) {
        console.log("ℹ️ Tidak ada subtitle:", err.message);
    }
}

// Mulai hitung waktu
function mulai() {
    if (timer) clearInterval(timer);
    sedangJalankan = true;
    document.getElementById("btnMain").textContent = "Jeda";
    timer = setInterval(() => {
        waktuSekarang += 1;
        perbarui();
    }, 1000);
}

// Hentikan hitungan
function hentikan() {
    sedangJalankan = false;
    document.getElementById("btnMain").textContent = "Putar";
    clearInterval(timer);
}

// Geser waktu
function geser(ubah) {
    waktuSekarang = Math.max(0, waktuSekarang + ubah);
    perbarui();
}

// Jalankan awal
window.addEventListener("load", async () => {
    const id = ambilId();
    if (!id) return alert("Masukkan ID film di alamat: ?id=12345");

    // Muat video dari vsembed
    document.getElementById("filmFrame").src = `https://vsembed.ru/embed/movie?tmdb=${id}`;

    // Muat subtitle
    await bacaSub(id);

    // Pasang tombol
    document.getElementById("btnMain").addEventListener("click", () => sedangJalankan ? hentikan() : mulai());
    document.getElementById("btnMundur").addEventListener("click", () => geser(-10));
    document.getElementById("btnMaju").addEventListener("click", () => geser(+10));
});
</script>

</body>
</html>
