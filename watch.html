<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch - TukarFollow</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<!-- NAV -->
<header>
<nav class="navbar">

<a href="index.html" class="logo">
  <i class="fa-solid fa-film"></i>
  <span>TukarFollow</span>
</a>

<div class="searchBox">
<input type="text" id="search" placeholder="Cari film...">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div id="burger">
<i class="fa-solid fa-bars"></i>
</div>

</nav>

<!-- MOBILE MENU -->
<div id="mobileMenu">
<a onclick="mode='movie'">Movies</a>
<a onclick="mode='tv'">Series</a>
<input id="mobileSearch" placeholder="Cari film...">
</div>
</header>

<!-- PLAYER -->
<div id="heroPlayer">Loading...</div>

<!-- INFO -->
<div id="infoBox"></div>

<!-- RELATED -->
<div id="relatedWrap">
  <div class="scrollWrap" id="relGrid"></div>
</div>

<!-- GRID MODE (SEARCH RESULT) -->
<div id="gridMode"></div>

<!-- TOP BUTTON -->
<button id="topBtn">↑</button>

<!-- SCRIPT ENGINE (WAJIB) -->
<script src="script.js"></script>

</body>
</html>
