<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watch Movie</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= WATCH LAYOUT ================= */

.watch-container{
padding:20px;
max-width:1200px;
margin:auto;
}

/* PLAYER HERO */
.player-wrapper{
position:relative;
width:100%;
height:80vh;
background:#000;
border-radius:14px;
overflow:hidden;
}

.player-wrapper iframe{
width:100%;
height:100%;
border:none;
}

/* OVERLAY */
.player-overlay{
position:absolute;
inset:0;
z-index:999;
display:flex;
align-items:center;
justify-content:center;
background:#000;
cursor:pointer;
}

.player-overlay img{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */
.movie-info{
margin-top:20px;
color:#fff;
}

.movie-info h1{
font-size:24px;
margin-bottom:10px;
}

.movie-info p{
opacity:.85;
line-height:1.6;
}

/* RELATED */
.related{
margin-top:30px;
position:relative;
}

.related h2{
margin-bottom:10px;
color:#fff;
}

.related-track{
display:flex;
gap:10px;
overflow-x:auto;
scroll-behavior:smooth;
-webkit-overflow-scrolling:touch;
}

.related-card{
flex:0 0 auto;
width:160px;
}

.related-card img{
width:100%;
height:240px;
object-fit:cover;
border-radius:10px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
width:45px;
height:45px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.7);
color:#fff;
cursor:pointer;
z-index:10;
}

#prev{left:-10px;}
#next{right:-10px;}

@media(max-width:768px){
.arrow{display:none;}
.related-card{width:140px;}
.related-card img{height:200px;}
}

</style>

</head>

<body>

<!-- ================= NAVBAR (CLONE INDEX) ================= -->
<nav class="navbar">

<div class="nav-logo">
<a href="index.html">TUKARMOVIE</a>
</div>

<div class="nav-right desktop-only">

<input type="text" id="searchInput" placeholder="Cari film...">

<select id="genreFilter"></select>

<select id="yearFilter">
<option value="">Tahun</option>
<option value="2026">2026</option>
<option value="2025">2025</option>
<option value="2024">2024</option>
<option value="classic">Klasik</option>
</select>

</div>

<button id="burgerBtn" class="burger mobile-only">
<span></span><span></span><span></span>
</button>

</nav>

<!-- MOBILE MENU (CLONE INDEX) -->
<div id="mobileMenu" class="mobile-menu">

<input type="text" id="mobileSearchInput" placeholder="Cari film...">

<select id="mobileGenreFilter"></select>

<select id="mobileYearFilter">
<option value="">Tahun</option>
<option value="2026">2026</option>
<option value="2025">2025</option>
<option value="2024">2024</option>
<option value="classic">Klasik</option>
</select>

</div>

<!-- ================= CONTENT ================= -->
<div class="watch-container">

<!-- PLAYER -->
<div class="player-wrapper">

<div id="playerOverlay" class="player-overlay">
<img id="overlayImg"
src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgAkJiGKw5otYyJgpBBtop9PZXrNpbMHJUvpja586ANY4sU_n6YWV7axeh02uKQtvfBWJlXCUS67JR6xIuvx_o7__3JZMmz9lFrnB78WQkymFMzqPJE4L2x4uPWH2fNsKJsACIdaQTaVTW4DK1QIgmSJqUzg0DkXIux4DANoKd5QGoQxWwyrxEXEJkBC5U/s1500/segera-dimulai.webp">
</div>

<iframe id="player"></iframe>

</div>

<!-- INFO -->
<div class="movie-info" id="info">
Loading...
</div>

<!-- RELATED -->
<div class="related">

<h2>Related Movies</h2>

<button id="prev" class="arrow">◀</button>
<button id="next" class="arrow">▶</button>

<div class="related-track" id="related"></div>

</div>

</div>

<!-- FOOTER (CLONE INDEX) -->
<footer class="footer">
<div class="copyright">© 2026 Tukar Movie</div>
</footer>

<script src="script.js"></script>

<script>

/* ================= WATCH ENGINE ================= */

const params=new URLSearchParams(location.search);
const id=params.get("id");

const player=document.getElementById("player");
const info=document.getElementById("info");
const related=document.getElementById("related");

const overlay=document.getElementById("playerOverlay");
const overlayImg=document.getElementById("overlayImg");

const API_KEY="b3b893873ed1bb7f175b2707afeea2a0";

/* ================= LOAD ================= */

async function load(){

let custom=null;

try{
const res=await fetch("movies.json");
const data=await res.json();
custom=data.find(m=>String(m.tmdb_id)===String(id));
}catch(e){}

if(custom && custom.iframe){
player.src=custom.iframe;
}else{
player.src=`https://vsembed.su/embed/movie/${id}`;
}

/* INFO TMDB */
try{
const res=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}`);
const movie=await res.json();

info.innerHTML=`
<h1>${movie.title}</h1>
<p>${movie.overview||""}</p>
<p><b>Release:</b> ${movie.release_date||"-"}</p>
<p><b>Genre:</b> ${(movie.genres||[]).map(g=>g.name).join(", ")}</p>
`;
}catch(e){}

/* RELATED */
try{
const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}`);
const data=await res.json();

related.innerHTML="";

(data.results||[]).slice(0,12).forEach(m=>{
related.innerHTML+=`
<a class="related-card" href="watch.html?id=${m.id}">
<img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
</a>`;
});
}catch(e){}

/* ARROWS */
document.getElementById("prev").onclick=()=>related.scrollBy({left:-800,behavior:"smooth"});
document.getElementById("next").onclick=()=>related.scrollBy({left:800,behavior:"smooth"});

}

load();

/* ================= OVERLAY SYSTEM ================= */

const banners=[
{img:"https://via.placeholder.com/1280x720?text=situs1.com",url:"https://situs1.com"},
{img:"https://via.placeholder.com/1280x720?text=situs2.com",url:"https://situs2.com"},
{img:"https://via.placeholder.com/1280x720?text=situs3.com",url:"https://situs3.com"}
];

let clicked=false;

/* stage 1 */
overlayImg.src=overlayImg.src;

/* stage 2 */
setTimeout(()=>{

const pick=banners[Math.floor(Math.random()*banners.length)];

overlayImg.src=pick.img;

overlay.onclick=()=>{

clicked=true;
window.open(pick.url,"_blank");

};

},3000);

/* stage 3 */
setTimeout(()=>{

overlay.style.display="none";

if(!clicked){
player.src=player.src || `https://vsembed.su/embed/movie/${id}`;
}

},6000);

/* ================= SEARCH (WATCH → INDEX) ================= */

document.getElementById("searchInput")?.addEventListener("keyup",(e)=>{
if(e.key==="Enter"){
const val=e.target.value.trim();
window.location.href=`index.html?search=${encodeURIComponent(val)}`;
}
});

document.getElementById("mobileSearchInput")?.addEventListener("keyup",(e)=>{
if(e.key==="Enter"){
const val=e.target.value.trim();
window.location.href=`index.html?search=${encodeURIComponent(val)}`;
}
});

/* ================= BURGER SAFE ================= */

const burger=document.getElementById("burgerBtn");
const menu=document.getElementById("mobileMenu");

if(burger && menu){
burger.onclick=()=>{
menu.classList.toggle("active");
};
}

</script>

</body>
</html>
