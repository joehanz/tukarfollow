<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Detail</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0b0f;color:#fff}

/* NAV SAMA PERSIS UJI.HTML */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

.logo{color:#ff2e2e;font-weight:bold}

.nav-right{
display:flex;
gap:10px;
align-items:center;
}

.nav-right input{
padding:7px 10px;
border-radius:8px;
border:none;
outline:none;
background:#1a1a1f;
color:#fff;
}

.nav-right a{
color:#ddd;
text-decoration:none;
font-size:13px;
}

/* PLAYER */
.player{
width:100%;
height:77vh;
background:#000;
position:relative;
}

iframe{width:100%;height:100%;border:0}

/* PLAY LAYER */
.playLayer{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.5);
cursor:pointer;
font-size:22px;
font-weight:bold;
}

/* INFO */
.info{
max-width:1200px;
margin:20px auto;
padding:20px;
background:#141420;
border-radius:12px;
}

/* RELATED (SLIDER FIX INDEX BASED) */
.rel-wrap{
max-width:1200px;
margin:20px auto;
position:relative;
overflow:hidden;
}

.rel-box{
display:flex;
gap:12px;
transition:transform .4s ease;
will-change:transform;
}

.rel-card{
min-width:140px;
cursor:pointer;
}

.rel-card img{
width:100%;
border-radius:10px;
}

/* ARROW */
.arrow{
position:absolute;
top:40%;
background:#000;
color:#fff;
border:none;
padding:10px;
cursor:pointer;
opacity:.8;
z-index:10;
}

.arrow:hover{opacity:1}
.left{left:0}
.right{right:0}

@media(max-width:768px){
.arrow{display:none}
}

footer{
background:#000;
padding:30px 15px;
margin-top:40px;
}

.footer-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:1200px;
margin:auto;
font-size:13px;
opacity:.7;
}

@media(max-width:700px){
.footer-grid{grid-template-columns:repeat(2,1fr)}
}

</style>
</head>

<body>

<!-- NAV (SAMA DENGAN UJI.HTML) -->
<nav>
<div class="logo">MOVIE+</div>

<div class="nav-right">
<input placeholder="Search...">
<a href="uji.html">Home</a>
<a href="uji.html">All</a>
<a href="uji.html">Abroad</a>
<a href="uji.html">Local</a>
</div>
</nav>

<!-- PLAYER -->
<div class="player">
<iframe id="player"></iframe>
<div class="playLayer" id="playLayer">▶ PLAY</div>
</div>

<div class="info" id="info"></div>

<!-- RELATED -->
<div class="rel-wrap">
<button class="arrow left" onclick="move(-1)">‹</button>
<button class="arrow right" onclick="move(1)">›</button>

<div class="rel-box" id="rel"></div>
</div>

<footer>
<div class="footer-grid">
<div>About</div>
<div>DMCA</div>
<div>Privacy</div>
<div>Contact</div>
</div>
</footer>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";
const id=new URLSearchParams(location.search).get("id");

const ads=[
"https://rajarayap.com",
"https://caturbangunsentosa.blogspot.com",
"https://ptdwiprima.blogspot.com"
];

let adsState=false;
let index=0;
let items=[];

/* PLAY GATE FIX */
document.getElementById("playLayer").onclick=function(){

if(!adsState){
adsState=true;
window.open(
ads[Math.floor(Math.random()*ads.length)],
"_blank"
);
return;
}

this.style.display="none";

document.getElementById("player").src=
`https://vsembed.ru/embed/movie?tmdb=${id}`;
};

/* LOAD DETAIL */
async function load(){

const m=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
).then(r=>r.json());

document.getElementById("info").innerHTML=`
<h2>${m.title}</h2>
<p>⭐ ${m.vote_average}</p>
<p>🌍 ${m.production_countries.map(c=>c.name).join(", ")}</p>
<p>🎭 ${m.genres.map(g=>g.name).join(", ")}</p>
<p>${m.overview}</p>
`;

const r=await fetch(
`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`
).then(r=>r.json());

items=r.results.slice(0,10);

render();

}

function render(){

let h="";
items.forEach(v=>{
h+=`
<div class="rel-card" onclick="go(${v.id})">
<img src="https://image.tmdb.org/t/p/w200${v.poster_path}">
</div>`;
});

document.getElementById("rel").innerHTML=h;

updateSlider();
}

/* SLIDER FIX PROPER */
function updateSlider(){
document.getElementById("rel").style.transform=
`translateX(${-index * 160}px)`;
}

function move(dir){

const max=Math.max(0,items.length-4);

index+=dir;

if(index<0)index=0;
if(index>max)index=max;

updateSlider();
}

function go(i){
location.href=`uji2.html?id=${i}`;
}

load();

</script>

</body>
</html>
