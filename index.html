<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Splash Grid TMDB</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black overflow-hidden">

  <!-- Grid background -->
  <div id="movie-grid" class="fixed inset-0 grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-1 pointer-events-none z-0"></div>

  <!-- Overlay tombol -->
  <div class="fixed inset-0 flex flex-col items-center justify-center bg-black/70 z-10">
    <h1 class="text-3xl font-bold mb-6">Welcome to TukarFollow</h1>
    <div class="flex gap-6">
      <button onclick="location.href='visitor.html'" class="px-6 py-3 bg-green-400 text-black font-bold rounded-lg">Visitor</button>
      <button onclick="location.href='admin.html'" class="px-6 py-3 bg-blue-400 text-black font-bold rounded-lg">Admin</button>
    </div>
  </div>

  <script>
    const API_KEY = "c000d7b8b0f5ee16b98b6103009745d8";
    const IMG_URL = "https://image.tmdb.org/t/p/w500";
    const grid = document.getElementById("movie-grid");

    async function getMovies() {
      const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=en-US&page=1`);
      const data = await res.json();

      data.results.forEach(movie => {
        if (movie.poster_path) {
          const img = document.createElement("img");
          img.src = IMG_URL + movie.poster_path;
          img.className = "w-full h-full object-cover opacity-30";
          grid.appendChild(img);
        }
      });
    }
    getMovies();
  </script>
</body>
</html>
