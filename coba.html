  <script>
    // KONFIGURASI
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8'; 
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
    const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

    // Elemen
    const videoWrapper = document.getElementById('videoWrapper');
    const filmIframe = document.getElementById('filmIframe');
    const subText = document.getElementById('subText');
    const jamTayang = document.getElementById('jamTayang');
    const btnMain = document.getElementById('btnMain');
    const btnMundur = document.getElementById('btnMundur');
    const btnMaju = document.getElementById('btnMaju');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const commentsSection = document.getElementById('commentsSection');
    const komentarHeader = document.getElementById('komentarHeader');
    const searchContainer = document.getElementById('searchContainer');
    const searchInput = document.getElementById('searchInput');
    const searchResultsLayer = document.getElementById('searchResultsLayer');
    const commentList = document.getElementById('commentList');
    const infoPanel = document.getElementById('infoPanel');
    const panelBackdrop = document.getElementById('panelBackdrop');

    let currentMovieId = null;
    let allMoviesCache = [];

    let subtitles = [];
    let waktuSekarang = 0;
    let pemutar = null;
    let sedangMain = false;
    let isFullscreenCustom = false;

    // ====================================
    // FUNGSI BANTU
    // ====================================
    function ubahKeWaktu(detik) {
      if (isNaN(detik) || detik < 0) detik = 0;
      const j = Math.floor(detik / 3600).toString().padStart(2, '0');
      const m = Math.floor((detik % 3600) / 60).toString().padStart(2, '0');
      const d = Math.floor(detik % 60).toString().padStart(2, '0');
      return `${j}:${m}:${d}`;
    }

    function ubahKeDetik(teksWaktu) {
      if (!teksWaktu) return 0;
      teksWaktu = teksWaktu.replace(/[, \s]/g, '.').trim();
      const bagian = teksWaktu.split(':');
      let hasil = 0;
      if (bagian.length === 3) hasil = Number(bagian[0]) * 3600 + Number(bagian[1]) * 60 + Number(bagian[2]);
      if (bagian.length === 2) hasil = Number(bagian[0]) * 60 + Number(bagian[1]);
      return isNaN(hasil) ? 0 : hasil;
    }

    function perbaruiTampilan() {
      const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
      subText.textContent = aktif ? aktif.teks : "";
      jamTayang.textContent = ubahKeWaktu(waktuSekarang);
    }

    // ====================================
    // FULLSCREEN KUSTOM
    // ====================================
    function toggleFullscreenCustom() {
      isFullscreenCustom = !isFullscreenCustom;
      if (isFullscreenCustom) {
        videoWrapper.classList.add('fullscreen-mode');
        btnFullscreen.textContent = "⛶❌";
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      } else {
        videoWrapper.classList.remove('fullscreen-mode');
        btnFullscreen.textContent = "⛶";
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      }
    }

    // ====================================
    // FUNGSI UTAMA: KAWINKAN PLAY & SUB
    // ====================================
    function mulaiSemua() {
      if (pemutar) clearInterval(pemutar);
      sedangMain = true;
      btnMain.textContent = "⏸️";
      pemutar = setInterval(() => {
        waktuSekarang += 1;
        perbaruiTampilan();
      }, 1000);
      try { filmIframe.contentWindow.postMessage({ cmd: "play" }, "*"); } catch (e) {}
    }

    function hentikanSemua() {
      sedangMain = false;
      btnMain.textContent = "▶️";
      clearInterval(pemutar);
      try { filmIframe.contentWindow.postMessage({ cmd: "pause" }, "*"); } catch (e) {}
    }

    function geserWaktu(ubah) {
      waktuSekarang = Math.max(0, waktuSekarang + ubah);
      perbaruiTampilan();
      if (sedangMain) {
        clearInterval(pemutar);
        pemutar = setInterval(() => {
          waktuSekarang += 1;
          perbaruiTampilan();
        }, 1000);
      }
    }

    // ====================================
    // BACA SUBTITLE
    // ====================================
    async function bacaSubtitle(idFilm) {
      const alamat = `${SUBTITLE_URL}${idFilm}.vtt`;
      subtitles = [];
      waktuSekarang = 0;
      perbaruiTampilan();

      try {
        const res = await fetch(alamat, { cache: 'no-cache' });
        if (!res.ok) throw new Error(`File tidak ditemukan: ${res.status}`);
        const teks = await res.text();
        if (!teks.trim()) throw new Error("File kosong");

        const baris = teks.split('\n').map(b => b.trim()).filter(b => b);
        let i = 0;

        if (baris[0].toUpperCase().includes("WEBVTT")) i++;

        while (i < baris.length) {
          if (baris[i].includes('-->')) {
            const waktu = baris[i].split('-->').map(w => w.trim());
            const mulai = ubahKeDetik(waktu[0]);
            const selesai = ubahKeDetik(waktu[1]);
            i++;
            let teksSub = "";
            while (i < baris.length && !baris[i].includes('-->')) {
              teksSub += baris[i] + " ";
              i++;
            }
            if (mulai < selesai && teksSub.trim()) {
              subtitles.push({ mulai, selesai, teks: teksSub.trim() });
            }
          } else {
            i++;
          }
        }

        if (subtitles.length === 0) throw new Error("Format tidak cocok");
        console.log(`✅ Subtitle ID ${idFilm} dimuat: ${subtitles.length} baris`);
      } catch (err) {
        subText.textContent = "Subtitle tidak tersedia";
        console.log(`❌ Gagal baca sub ID ${idFilm}:`, err.message);
      }
    }

    // ====================================
    // KONTROL UTAMA
    // ====================================
    btnMain.addEventListener('click', () => {
      sedangMain ? hentikanSemua() : mulaiSemua();
    });

    btnMundur.addEventListener('click', () => geserWaktu(-10));
    btnMaju.addEventListener('click', () => geserWaktu(+10));
    btnFullscreen.addEventListener('click', toggleFullscreenCustom);

    // ====================================
    // FUNGSI KOMENTAR - SESUAI PERMINTAAN
    // ====================================
    komentarHeader.addEventListener('click', () => {
      commentsSection.classList.toggle('buka');
    });

    async function muatKomentar(tmdbId) {
      commentList.innerHTML = '<div style="opacity:0.5; font-size:12px; padding:10px 0;">Memuat komentar...</div>';
      try {
        const res = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${tmdbId}`);
        const data = await res.json();
        if (data.status === "success" && data.data.length > 0) {
          commentList.innerHTML = data.data.map(c => `
            <div class="comment-item">
              <div class="comment-user">@${c.nama}</div>
              <div class="comment-text">${c.komentar}</div>
            </div>
          `).join('');
        } else {
          commentList.innerHTML = '<div style="opacity:0.4; font-size:12px; padding:15px; text-align:center;">Belum ada komentar.</div>';
        }
      } catch {
        commentList.innerHTML = '<div style="color:#ff6b6b; font-size:12px; padding:10px;">Gagal memuat komentar.</div>';
      }
    }

    async function kirimKomentar() {
      const nama = document.getElementById('commentName').value.trim();
      const teks = document.getElementById('commentText').value.trim();
      if (!nama || !teks) return alert("Isi nama dan komentar dulu!");
      tutupFormKomen();
      try {
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({tmdbId: currentMovieId, nama, komentar: teks})
        });
        setTimeout(() => muatKomentar(currentMovieId), 1200);
      } catch {
        alert("Gagal mengirim komentar.");
      }
    }

    function bukaFormKomen() {
      infoPanel.classList.add('show');
      panelBackdrop.classList.add('active');
    }
    function tutupFormKomen() {
      infoPanel.classList.remove('show');
      panelBackdrop.classList.remove('active');
    }

    // ====================================
    // FUNGSI PENCARIAN - SAMA SEPERTI INDEX
    // ====================================
    document.getElementById('navSearch').addEventListener('click', e => {
      e.stopPropagation();
      const buka = searchContainer.classList.toggle('show');
      if (!buka) {
        searchInput.value = "";
        searchResultsLayer.classList.remove('active');
      } else setTimeout(() => searchInput.focus(), 100);
    });

    searchInput.addEventListener('input', e => {
      const kata = e.target.value.toLowerCase().trim();
      if (!kata) return searchResultsLayer.classList.remove('active');
      searchResultsLayer.classList.add('active');
      const hasil = allMoviesCache.filter(m => 
        (m.title && m.title.toLowerCase().includes(kata)) || 
        (m.original_title && m.original_title.toLowerCase().includes(kata))
      );
      searchResultsLayer.innerHTML = hasil.length ? hasil.map(m => `
        <div class="search-item-row" onclick="bukaFilm(${m.id})">
          <div class="search-item-thumb" style="background-image:url('${IMAGE_URL}${m.poster_path || '/placeholder.jpg'}')"></div>
          <div class="search-item-info"><h4>${m.title}</h4><p>${m.release_date ? m.release_date.split('-')[0] : 'Tahun tidak diketahui'}</p></div>
        </div>
      `).join('') : `<div style="padding:30px; text-align:center; color:#999;">Tidak ditemukan film yang cocok</div>`;
    });

    function bukaFilm(id) { 
      window.location.href = `watch.html?id=${id}`; 
    }

    // ====================================
    // FUNGSI LAINNYA
    // ====================================
    function ambilIdDariUrl() {
      const param = new URLSearchParams(window.location.search);
      return param.get('id');
    }

    function pasangPemutar(tmdbId) {
      filmIframe.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
    }

    async function muatSemuaFilmTMDB() {
      try {
        let halaman = 1;
        let ambilLagi = true;
        allMoviesCache = [];
        while (ambilLagi && halaman <= 10) {
          const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=${halaman}`);
          if (!res.ok) break;
          const data = await res.json();
          if (data.results && data.results.length > 0) {
            allMoviesCache.push(...data.results);
            halaman++;
          } else {
            ambilLagi = false;
          }
        }
      } catch (e) {
        console.error("❌ Gagal ambil daftar film:", e);
      }
    }

    async function muatDataAwal() {
      currentMovieId = parseInt(ambilIdDariUrl());
      if (!currentMovieId) {
        videoWrapper.innerHTML += `<div style="padding:50px; text-align:center; color:#fff;">ID Film tidak ditemukan.</div>`;
        return;
      }

      pasangPemutar(currentMovieId);
      muatKomentar(currentMovieId);
      await bacaSubtitle(currentMovieId);
      await muatSemuaFilmTMDB();

      setTimeout(() => {
        const kolomKomen = document.getElementById('commentText');
        if (kolomKomen) {
          kolomKomen.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              kirimKomentar();
            }
          });
        }
      }, 500);
    }

    document.getElementById('navAddComment').addEventListener('click', bukaFormKomen);
    document.getElementById('navHome').addEventListener('click', () => window.history.back() || (window.location.href = 'index.html'));

    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      muatDataAwal();
    });
  </script>

</body>
</html>
