<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body{
margin:0;
background:#111;
color:#fff;
font-family:Arial;
}

.hero{

height:400px;
background-size:cover;
padding:40px;
display:flex;
align-items:end;
}

.info{
padding:20px;
}

.player{

height:500px;
padding:20px;
}

iframe{

width:100%;
height:100%;
border:0;
}

</style>

</head>

<body>

<div
id="hero"
class="hero">
</div>

<div
id="info"
class="info">
Loading...
</div>

<div
class="player">

<iframe
id="player"
frameborder="0"
referrerpolicy="origin"
allowfullscreen>
</iframe>

</div>

<script>

const TOKEN=
"eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJiM2I4OTM4NzNlZDFiYjdmMTc1YjI3MDdhZmVlYTJhMCIsIm5iZiI6MTc3Nzg3MTI4My42NDIsInN1YiI6IjY5ZjgyOWIzYTdiOGY1ZDE3MWY1MWUyMCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.lJ8g9RsWHsZN3TQ3KpxUYNe34Im15z3KnWxAi6fYODU";

const id=
new URLSearchParams(
location.search
)
.get("id");

async function load(){

const res=
await fetch(

`https://api.themoviedb.org/3/movie/${id}`,

{
headers:{
Authorization:
`Bearer ${TOKEN}`
}
}

);

const m=
await res.json();

document
.getElementById(
"hero"
)
.style.backgroundImage=

`linear-gradient(
transparent,
#111
),
url(
https://image.tmdb.org/t/p/original${m.backdrop_path}
)`;


document
.getElementById(
"info"
)
.innerHTML=`

<h1>

${m.title}

</h1>

⭐ ${m.vote_average}

<br><br>

${m.release_date}

<br><br>

${m.overview}

`;

document
.getElementById(
"player"
)
.src=

`https://vsembed.ru/embed/movie?tmdb=${id}`;

}

load();

</script>

</body>
</html>
