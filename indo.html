<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioskop Indonesia - Streaming Terpopuler</title>
    <style>
        body { background-color: #141414; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #e50914; margin-bottom: 30px; }
        
        /* Layout Grid Film */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .movie-card { background: #1f1f1f; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; position: relative; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; display: block; }
        .movie-info { padding: 10px; }
        .movie-title { font-size: 14px; font-weight: bold; margin: 0 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-year { font-size: 12px; color: #aaaaaa; }
        
        /* Container Player Video Overlay */
        .player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .player-box { width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: -40px; right: 0; background: #e50914; color: white; border: none; padding: 8px 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .error-msg { text-align: center; color: #ff3333; font-size: 18px; width: 100%; grid-column: 1/-1; }
    </style>
</head>
<body>

    <h1>Bioskop Indonesia</h1>
    
    <!-- Tempat Grid Film Muncul -->
    <div class="movie-grid" id="movieGrid">
        <p style="text-align: center; grid-column: 1/-1;">Memuat film...</p>
    </div>

    <!-- Pop-up Player Video -->
    <div class="player-container" id="playerContainer">
        <div class="player-box">
            <button class="close-btn" onclick="closePlayer()">TUTUP X</button>
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // GANTI TEKS DI BAWAH INI DENGAN API KEY TMDB ANDA
        const TMDB_API_KEY = 'MASUKKAN_API_KEY_TMDB_ANDA_DI_SINI';
        
        const GRID_CONTAINER = document.getElementById('movieGrid');
        const PLAYER_CONTAINER = document.getElementById('playerContainer');
        const VIDEO_PLAYER = document.getElementById('videoPlayer');

        // Mengambil data film Indonesia terpopuler
        async function loadMovies() {
            try {
                const url = `https://themoviedb.org{TMDB_API_KEY}&with_original_language=id&sort_by=popularity.desc`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    GRID_CONTAINER.innerHTML = '';
                    data.results.forEach(movie => {
                        const year = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';
                        const poster = movie.poster_path ? `https://tmdb.org{movie.poster_path}` : 'https://placeholder.com';
                        
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.setAttribute('onclick', `playMovie('${movie.id}')`);
                        card.innerHTML = `
                            <img src="${poster}" alt="${movie.title}">
                            <div class="movie-info">
                                <p class="movie-title">${movie.title}</p>
                                <p class="movie-year">${year}</p>
                            </div>
                        `;
                        GRID_CONTAINER.appendChild(card);
                    });
                } else {
                    GRID_CONTAINER.innerHTML = '<p class="error-msg">Film tidak ditemukan.</p>';
                }
            } catch (error) {
                GRID_CONTAINER.innerHTML = '<p class="error-msg">Gagal memuat data film. Coba lagi nanti.</p>';
            }
        }

        // Fungsi memutar video dengan vsembed.ru
        function playMovie(tmdbId) {
            VIDEO_PLAYER.src = `https://vsembed.ru{tmdbId}`;
            PLAYER_CONTAINER.style.display = 'flex';
        }

        // Fungsi menutup video player
        function closePlayer() {
            PLAYER_CONTAINER.style.display = 'none';
            VIDEO_PLAYER.src = '';
        }

        // Jalankan saat halaman dibuka
        loadMovies();
    </script>
</body>
</html>
