<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>
body {margin:0;font-family:Arial}

/* NAV */
.topnav {
  overflow: hidden;
  background-color: #333;
}

.topnav a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.active {background-color:#04AA6D;color:white;}
.topnav .icon {display:none;}

.dropdown {float:left;overflow:hidden;}

.dropdown .dropbtn {
  font-size:17px;border:none;outline:none;
  color:white;padding:14px 16px;
  background-color:inherit;font-family:inherit;margin:0;
}

.dropdown-content {
  display:none;position:absolute;
  background-color:#f9f9f9;
  min-width:160px;
  box-shadow:0px 8px 16px rgba(0,0,0,0.2);
  z-index:1;
}

.dropdown-content a {
  float:none;color:black;
  padding:12px 16px;text-decoration:none;
  display:block;text-align:left;
}

.topnav a:hover, .dropdown:hover .dropbtn {
  background-color:#555;color:white;
}

.dropdown-content a:hover {background:#ddd;color:black;}
.dropdown:hover .dropdown-content {display:block;}

@media screen and (max-width:600px){
  .topnav a:not(:first-child),
  .dropdown .dropbtn {display:none;}
  .topnav a.icon {float:right;display:block;}
}

@media screen and (max-width:600px){
  .topnav.responsive{position:relative;}
  .topnav.responsive .icon{position:absolute;right:0;top:0;}
  .topnav.responsive a{float:none;display:block;text-align:left;}
  .topnav.responsive .dropdown{float:none;}
  .topnav.responsive .dropdown-content{position:relative;}
  .topnav.responsive .dropdown .dropbtn{
    display:block;width:100%;text-align:left;
  }
}

/* LAYOUT */
* {box-sizing:border-box;}

.column {
  float:left;
  width:50%;
  padding:10px;
  min-height:400px;
}

.row:after {
  content:"";
  display:table;
  clear:both;
}

@media screen and (max-width:600px){
  .column {width:100%;}
}

/* VIDEO PLAYER */
video {
  width:100%;
  height:350px;
  background:black;
}
</style>

</head>

<body>

<div class="topnav" id="myTopnav">
  <a href="index.html" class="active">Home</a>
  <a href="#news">News</a>
  <a href="#contact">Contact</a>

  <div class="dropdown">
    <button class="dropbtn">Dropdown</button>
    <div class="dropdown-content">
      <a href="#">Link 1</a>
      <a href="#">Link 2</a>
      <a href="#">Link 3</a>
    </div>
  </div>

  <a href="#about">About</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">☰</a>
</div>

<div class="row">

  <!-- PLAYER -->
  <div class="column" style="background:#aaa;">
    <div id="player">Loading...</div>
  </div>

  <!-- INFO -->
  <div class="column" style="background:#bbb;">
    <div id="info">Loading film...</div>
  </div>

</div>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  x.className = (x.className === "topnav") ? "topnav responsive" : "topnav";
}

/* GET ID */
const id = new URLSearchParams(window.location.search).get("id");

/* LOAD JSON */
fetch("movies.json")
.then(res => res.json())
.then(data => {

  const film = data.find(m => m.id == id || m.title == id);

  if(!film){
    document.getElementById("player").innerHTML = "Film tidak ditemukan";
    return;
  }

  /* FIX: VIDEO MP4 / STREAM (NO YOUTUBE, NO BLOGSPOT) */
  document.getElementById("player").innerHTML = `
    <video controls autoplay>
      <source src="${film.video}" type="video/mp4">
      Browser tidak support video
    </video>
  `;

  document.getElementById("info").innerHTML = `
    <h2>${film.title || "-"}</h2>
    <p><b>Genre:</b> ${film.genre || "-"}</p>
    <p><b>Tahun:</b> ${film.year || "-"}</p>
    <p>${film.sinopsis || ""}</p>
  `;
})
.catch(err => {
  document.getElementById("player").innerHTML = "Gagal load movies.json";
  console.log(err);
});
</script>

</body>
</html>
