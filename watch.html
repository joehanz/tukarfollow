<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <div class="nav-left">
    <div class="logo">MOVIEHUB</div>
  </div>

  <div class="nav-right" id="navMenu">
    <input type="text" id="search" placeholder="Search movie...">
    <select id="genre"><option>Genre</option></select>
    <select id="year"><option>Rilis</option></select>
  </div>

  <div class="burger" id="burger">☰</div>
</header>

<main>

<div id="playerWrap">
  <div id="overlay" class="overlay hidden"></div>
  <iframe id="player" allowfullscreen></iframe>
</div>

<div id="info"></div>

<h3>Related</h3>
<div class="relatedWrap">
  <button class="left">‹</button>
  <div id="related" class="related"></div>
  <button class="right">›</button>
</div>

</main>

<footer class="footer">
  <div>Home</div><div>Trending</div><div>Genre</div><div>Profile</div>
</footer>

<script src="script.js"></script>
</body>
</html>
