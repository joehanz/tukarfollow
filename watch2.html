<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0"
/>

<title>
Watch2
</title>

<link
rel="stylesheet"
href="style2.css"
/>

</head>
<body>


<!-- NAV -->

<nav class="nav">

<div
class="logo"
onclick="location.href='index2.html'"
style="cursor:pointer"
>

Movie2

</div>

</nav>



<!-- PLAYER -->

<section
class="watchWrap"
>

<div
id="playerArea"
>

<iframe
id="playerFrame"
width="100%"
height="100%"
frameborder="0"
allowfullscreen
allow="autoplay;fullscreen"
>

</iframe>

</div>

</section>



<!-- INFO -->

<section
class="infoWrap"
>

<div
id="mediaInfo"
>

Loading...

</div>


<!-- SERIES PANEL -->

<div
id="seriesBox"
style="display:none"
>

<select
id="seasonSelect"
>

<option>
Season
</option>

</select>


<select
id="episodeSelect"
>

<option>
Episode
</option>

</select>


<button
id="playEpisode"
>

Play

</button>

</div>

</section>



<!-- RELATED -->

<section
class="relatedWrap"
>

<h2>

Related Videos

</h2>

<div
id="relatedGrid"
class="movieGrid"
>

</div>

</section>



<script src="config2.js"></script>

<script src="script2.js"></script>

</body>
</html>
