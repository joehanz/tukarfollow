<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonBioskop - Streaming Film & Series</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🚀 MovieID</a>
            <button class="burger" id="burgerBtn"><span></span><span></span><span></span></button>
            <div class="nav-menu" id="navMenu">
                <form class="search-form" id="searchForm">
                    <input type="text" id="searchInput" placeholder="Cari film atau series...">
                </form>
                <div class="dropdown">
                    <button class="dropbtn">Genre ▾</button>
                    <div class="dropdown-content" id="genreMenu"></div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Tahun ▾</button>
                    <div class="dropdown-content">
                        <a href="#" class="year-filter" data-year="2026">2026</a>
                        <a href="#" class="year-filter" data-year="2025">2025</a>
                        <a href="#" class="year-filter" data-year="2024">2024</a>
                        <a href="#" class="year-filter" data-type="classic">Klasik</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2 id="sectionTitle">Rekomendasi Film & Series</h2>
        <div class="grid-container" id="movieGrid"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
