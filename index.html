<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, maximum-scale=1.0">
  <title>TikTok Movie Feed</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SEARCH BAR -->
  <div id="searchBar" class="search-bar">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Cari semua data movie...">
    </div>
  </div>

  <!-- FEED -->
  <main id="feed" class="feed"></main>

  <!-- INFO PANEL -->
  <div id="infoPanel" class="info-panel hidden">
    <div class="info-content">
      <div class="info-close"><i id="closeInfo" class="fa-solid fa-xmark"></i></div>
      <h2 id="infoTitle"></h2>
      <div class="info-item"><i class="fa-regular fa-circle-info"></i><span id="infoSinopsis"></span></div>
      <div class="info-item"><i class="fa-regular fa-calendar"></i><span id="infoDate"></span></div>
      <div class="info-item"><i class="fa-solid fa-film"></i><span id="infoGenre"></span></div>
      <div class="info-item"><i class="fa-solid fa-earth-asia"></i><span id="infoCountry"></span></div>
    </div>
  </div>

  <!-- PLAYER OVERLAY -->
  <div id="playerOverlay" class="player-overlay hidden">
    <div class="player-container">
      <iframe id="moviePlayer" src="" allowfullscreen frameborder="0"></iframe>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottomNav" class="bottom-nav">
    <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
    <button id="addBtn"><i class="fa-solid fa-circle-plus"></i></button>
    <button id="homeBtn"><i class="fa-regular fa-house"></i></button>
  </nav>

  <!-- TEMPLATE MOVIE -->
  <template id="movieTemplate">
    <section class="movie-card">
      <img class="poster" src="" alt="Movie">
      <div class="play-btn"><div class="play-circle"><i class="fa-solid fa-play"></i></div></div>
      <div class="poster-gradient"></div>
      <div class="movie-caption">
        <h2 class="movie-title"></h2>
        <p class="movie-desc"></p>
      </div>
      <div class="actions">
        <button class="action infoBtn"><i class="fa-regular fa-circle-info"></i></button>
        <button class="action dateBtn"><i class="fa-regular fa-calendar"></i></button>
        <button class="action genreBtn"><i class="fa-solid fa-film"></i></button>
        <button class="action countryBtn"><i class="fa-solid fa-earth-asia"></i></button>
      </div>
    </section>
  </template>

  <!-- LOAD MORE -->
  <div id="loadMore" class="load-more">Load More</div>

  <script src="script.js"></script>
</body>
</html>
