<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- NAV -->
<nav class="border-b border-gray-800 px-6 py-4">

  <div class="flex items-center justify-between">

    <!-- LOGO -->
    <div class="text-xl font-bold text-red-600">
      tukarfollow
    </div>

    <!-- BURGER -->
    <button class="md:hidden text-white text-2xl" onclick="toggleMenu()">
      ☰
    </button>

    <!-- DESKTOP MENU -->
    <div class="hidden md:flex items-start gap-6 w-full ml-10">

      <!-- SEARCH -->
      <input type="text" placeholder="Cari film..."
        class="w-1/3 px-3 py-2 bg-gray-900 border border-gray-700 rounded">

      <!-- FILTER -->
      <ul class="flex flex-col text-sm text-gray-300 gap-1">
        <li class="font-semibold text-white">Genre</li>
        <li>Action</li>
        <li>Comedy</li>
        <li>Drama</li>
      </ul>

      <ul class="flex flex-col text-sm text-gray-300 gap-1">
        <li class="font-semibold text-white">Tahun</li>
        <li>2026</li>
        <li>2025</li>
        <li>2024</li>
        <li>Classic</li>
      </ul>

    </div>
  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu" class="hidden mt-4 flex flex-col gap-4 md:hidden">

    <input type="text" placeholder="Cari film..."
      class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded">

    <ul class="flex flex-col text-sm text-gray-300 gap-1">
      <li class="font-semibold text-white">Genre</li>
      <li>Action</li>
      <li>Comedy</li>
      <li>Drama</li>
    </ul>

    <ul class="flex flex-col text-sm text-gray-300 gap-1">
      <li class="font-semibold text-white">Tahun</li>
      <li>2026</li>
      <li>2025</li>
      <li>2024</li>
      <li>Classic</li>
    </ul>

  </div>
</nav>

<!-- GRID -->
<section class="p-6">
  <h1 class="text-xl font-bold mb-4">All Movies</h1>
  <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
</section>

<script>
function toggleMenu(){
  document.getElementById('mobileMenu').classList.toggle('hidden');
}

fetch('movies.json')
  .then(res => res.json())
  .then(data => {
    const grid = document.getElementById('grid');

    data.forEach(movie => {
      grid.innerHTML += `
        <a href="watch.html?id=${movie.id}" class="bg-gray-900 rounded overflow-hidden hover:scale-105 transition">
          <img src="${movie.image}" class="w-full h-44 object-cover">
          <div class="p-2 text-sm font-semibold">${movie.title}</div>
        </a>
      `;
    });
  });
</script>

</body>
</html>
