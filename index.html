<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Grid</title>

<link href="https://cdn.jsdelivr.net/gh/joehanz/csstukarfollow@main/style.css" rel="stylesheet"/>
</head>

<body>

<!-- NAV -->
<nav id="topNav">
  <a class="logo" href="/">MOVIE</a>
</nav>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PAGINATION -->
<div class="pager">
  <button onclick="prev()">Prev</button>
  <span id="page"></span>
  <button onclick="next()">Next</button>
</div>

<script>
let movies = [];
let page = 1;
const perPage = 12;

fetch("movies.json")
.then(r => r.json())
.then(res => {
  movies = res;
  render();
});

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let start = (page-1)*perPage;
  let end = start + perPage;

  movies.slice(start,end).forEach(m => {
    grid.innerHTML += `
      <div class="card" onclick="openWatch('${m.embed}')">
        <img src="${m.poster}">
        <div class="card-title">${m.title}</div>
      </div>
    `;
  });

  document.getElementById("page").innerText = page;
}

function next(){
  if(page * perPage < movies.length){
    page++;
    render();
  }
}

function prev(){
  if(page > 1){
    page--;
    render();
  }
}

function openWatch(link){
  location.href = "watch.html?play=" + encodeURIComponent(link);
}
</script>

</body>
</html>
