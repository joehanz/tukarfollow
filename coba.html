  <!-- PWA MANIFEST -->

  <!-- GAYA SESUAI STRUKTUR YANG KAMU MAU -->
  <style>
    /* Wrapper berisi panel + tombol */
    #panelWrapper {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 60px; /* Jarak agar tidak ketutup navigasi bawah */
      height: 320px; /* total tinggi panel */
      transform: translateY(calc(100% - 42px)); 
      transition: transform .32s ease;
      z-index: 9999;
      pointer-events: none;
    }

    /* TOMBOL YANG MENEMPEL DI ATAS PANEL */
    #panelBtn {
      width: 140px;
      margin: 0 auto;
      display: block;
      background: #ff0066;
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 18px 18px 0 0;
      font-size: 16px;
      cursor: pointer;
      pointer-events: auto;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
    }

    /* PANEL UTAMA */
    #panel {
      background: #111;
      height: calc(320px - 42px);
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      box-shadow: 0 -6px 18px rgba(0,0,0,.5);
      padding: 15px;
      pointer-events: auto;
      color: #fff;
      overflow-y: auto;
    }

    /* Saat panel dibuka penuh */
    #panelWrapper.open {
      transform: translateY(0);
    }

    /* Item komentar */
    .comment-item {
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .comment-user {
      font-weight: 600;
      font-size: 13px;
      color: #5ea8ff;
      margin-bottom: 4px;
    }
    .comment-text {
      font-size: 14px;
      color: #e0e0e0;
      line-height: 1.5;
    }

    /* Pencarian sama persis seperti index */
    .search-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #1a1a1a;
      padding: 12px 15px;
      z-index: 999;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .search-container.show {
      transform: translateY(0);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #2b2b2b;
      border-radius: 25px;
      padding: 0 15px;
    }

    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      color: #fff;
      padding: 12px 0;
      font-size: 15px;
      outline: none;
    }

    .search-results-layer {
      position: fixed;
      top: 55px;
      left: 0;
      width: 100%;
      height: calc(100vh - 55px);
      background: #121212;
      z-index: 998;
      overflow-y: auto;
      display: none;
    }

    .search-results-layer.active {
      display: block;
    }

    .search-item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .search-item-row:hover {
      background: #1e1e1e;
    }

    .search-item-thumb {
      width: 50px;
      height: 75px;
      border-radius: 4px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }

    .search-item-info h4 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .search-item-info p {
      font-size: 12px;
      color: #999;
    }

    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      font-family: 'Poppins', sans-serif;
      padding-bottom: 60px;
    }
  </style>

  <!-- CALL EXTERNAL CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="watch-layout">
    <div class="video-main-wrapper" id="videoWrapper">
      <iframe id="filmIframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>

      <div class="watermark-logo">
        <img src="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" alt="TukarFollow" />
      </div>
      
      <div class="subtitle-layer" id="subLayer">
        <div class="subtitle-text" id="subText"></div>
        <div class="subtitle-controls">
          <button class="ctrl-btn" id="btnMundur">⏪</button>
          <button class="ctrl-btn" id="btnMain">▶️</button>
          <button class="ctrl-btn" id="btnMaju">⏩</button>
          <div class="time-digital" id="jamTayang">00:00:00</div>
          <button class="ctrl-btn" id="btnFullscreen">⛶</button>
        </div>
      </div>
    </div>

    <!-- Bagian Komentar Sesuai Struktur Baru -->
    <div id="panelWrapper">
      <button id="panelBtn">Komentar Netizen</button>
      <div id="panel">
        <div id="commentList"></div>
      </div>
    </div>
  </div>

  <div class="search-container" id="searchContainer">
    <div class="search-box">
      <i data-lucide="search" size="18" color="#888"></i>
      <input type="text" id="searchInput" placeholder="Cari film...">
    </div>
  </div>

  <div class="search-results-layer" id="searchResultsLayer"></div>

  <div class="panel-backdrop" id="panelBackdrop" onclick="tutupFormKomen()"></div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-content">
      <div class="form-title">Tulis Komentar Kamu</div>
      <div class="form-group">
        <input type="text" id="commentName" placeholder="Nama samaran kamu...">
        <textarea id="commentText" placeholder="Tulis opini/komentar film di sini..." rows="3" maxlength="300"></textarea>
        <button class="submit-btn" onclick="kirimKomentar()">Kirim Komentar</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" id="navSearch">
      <i data-lucide="search" size="24"></i>
      <span>Search</span>
    </div>
    <div class="nav-item" id="navAddComment" style="color: #fff;">
      <i data-lucide="plus-circle" size="28"></i>
      <span>Add</span>
    </div>
    <div class="nav-item" id="navHome" onclick="if (history.length > 1) history.back(); else window.location.href = 'index.html';">
      <i data-lucide="home" size="24"></i>
      <span>Home</span>
    </div>
  </div>

  <script>
    // KONFIGURASI
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8'; 
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
    const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

    // Elemen
    const videoWrapper = document.getElementById('videoWrapper');
    const filmIframe = document.getElementById('filmIframe');
    const subText = document.getElementById('subText');
    const jamTayang = document.getElementById('jamTayang');
    const btnMain = document.getElementById('btnMain');
    const btnMundur = document.getElementById('btnMundur');
    const btnMaju = document.getElementById('btnMaju');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const panelWrapper = document.getElementById('panelWrapper');
    const panelBtn = document.getElementById('panelBtn');
    const commentList = document.getElementById('commentList');
    const searchContainer = document.getElementById('searchContainer');
    const searchInput = document.getElementById('searchInput');
    const searchResultsLayer = document.getElementById('searchResultsLayer');
    const infoPanel = document.getElementById('infoPanel');
    const panelBackdrop = document.getElementById('panelBackdrop');

    let currentMovieId = null;
    let allMoviesCache = [];

    let subtitles = [];
    let waktuSekarang = 0;
    let pemutar = null;
    let sedangMain = false;

    // Tombol buka/tutup panel komentar
    panelBtn.addEventListener('click', () => {
      panelWrapper.classList.toggle('open');
      panelBtn.textContent = panelWrapper.classList.contains('open') ? '❌ Tutup' : 'Komentar Netizen';
    });

    // ====================================
    // FUNGSI BANTU
    // ====================================
    function ubahKeWaktu(detik) {
      if (isNaN(detik) || detik < 0) detik = 0;
      const j = Math.floor(detik / 3600).toString().padStart(2, '0');
      const m = Math.floor((detik % 3600) / 60).toString().padStart(2, '0');
      const d = Math.floor(detik % 60).toString().padStart(2, '0');
      return `${j}:${m}:${d}`;
    }

    function ubahKeDetik(teksWaktu) {
      if (!teksWaktu) return 0;
      teksWaktu = teksWaktu.replace(/[, \s]/g, '.').trim();
      const bagian = teksWaktu.split(':');
      let hasil = 0;
      if (bagian.length === 3) hasil = Number(bagian[0]) * 3600 + Number(bagian[1]) * 60 + Number(bagian[2]);
      if (bagian.length === 2) hasil = Number(bagian[0]) * 60 + Number(bagian[1]);
      return isNaN(hasil) ? 0 : hasil;
    }

    function perbaruiTampilan() {
      const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
      subText.textContent = aktif ? aktif.teks : "";
      jamTayang.textContent = ubahKeWaktu(waktuSekarang);
    }

    // ====================================
    // FUNGSI UTAMA
    // ====================================
    function mulaiSemua() {
      if (pemutar) clearInterval(pemutar);
      sedangMain = true;
      btnMain.textContent = "⏸️";
      pemutar = setInterval(() => {
        waktuSekarang += 1;
        perbaruiTampilan();
      }, 1000);
      try { filmIframe.contentWindow.postMessage({ cmd: "play" }, "*"); } catch (e) {}
    }

    function hentikanSemua() {
      sedangMain = false;
      btnMain.textContent = "▶️";
      clearInterval(pemutar);
      try { filmIframe.contentWindow.postMessage({ cmd: "pause" }, "*"); } catch (e) {}
    }

    function geserWaktu(ubah) {
      waktuSekarang = Math.max(0, waktuSekarang + ubah);
      perbaruiTampilan();
      if (sedangMain) {
        clearInterval(pemutar);
        pemutar = setInterval(() => {
          waktuSekarang += 1;
          perbaruiTampilan();
        }, 1000);
      }
    }

    // ====================================
    // BACA SUBTITLE
    // ====================================
    async function bacaSubtitle(idFilm) {
      const alamat = `${SUBTITLE_URL}${idFilm}.vtt`;
      subtitles = [];
      waktuSekarang = 0;
      perbaruiTampilan();

      try {
        const res = await fetch(alamat, { cache: 'no-cache' });
        if (!res.ok) throw new Error(`File tidak ditemukan: ${res.status}`);
        const teks = await res.text();
        if (!teks.trim()) throw new Error("File kosong");

        const baris = teks.split('\n').map(b => b.trim()).filter(b => b);
        let i = 0;
        if (baris[0].toUpperCase().includes("WEBVTT")) i++;

        while (i < baris.length) {
          if (baris[i].includes('-->')) {
            const waktu = baris[i].split('-->').map(w => w.trim());
            const mulai = ubahKeDetik(waktu[0]);
            const selesai = ubahKeDetik(waktu[1]);
            i++;
            let teksSub = "";
            while (i < baris.length && !baris[i].includes('-->')) {
              teksSub += baris[i] + " ";
              i++;
            }
            if (mulai < selesai && teksSub.trim()) {
              subtitles.push({ mulai, selesai, teks: teksSub.trim() });
            }
          } else {
            i++;
          }
        }
      } catch (err) {
        subText.textContent = "Subtitle tidak tersedia";
      }
    }

    // ====================================
    // KONTROL UTAMA
    // ====================================
    btnMain.addEventListener('click', () => {
      sedangMain ? hentikanSemua() : mulaiSemua();
    });

    btnMundur.addEventListener('click', () => geserWaktu(-10));
    btnMaju.addEventListener('click', () => geserWaktu(+10));

    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        videoWrapper.requestFullscreen?.() || videoWrapper.webkitRequestFullscreen?.() || videoWrapper.msRequestFullscreen?.();
      } else {
        document.exitFullscreen?.() || document.webkitExitFullscreen?.() || document.msExitFullscreen?.();
      }
    });

    // ====================================
    // FUNGSI KOMENTAR
    // ====================================
    async function muatKomentar(tmdbId) {
      commentList.innerHTML = '<div style="opacity:0.5; padding:10px;">Memuat komentar...</div>';
      try {
        const res = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${tmdbId}`);
        const data = await res.json();
        if (data.status === "success" && data.data.length > 0) {
          commentList.innerHTML = data.data.map(c => `
            <div class="comment-item">
              <div class="comment-user">@${c.nama}</div>
              <div class="comment-text">${c.komentar}</div>
            </div>
          `).join('');
        } else {
          commentList.innerHTML = '<div style="opacity:0.4; padding:20px; text-align:center;">Belum ada komentar.</div>';
        }
      } catch {
        commentList.innerHTML = '<div style="color:#ff6b6b; padding:10px;">Gagal memuat komentar.</div>';
      }
    }

    async function kirimKomentar() {
      const nama = document.getElementById('commentName').value.trim();
      const teks = document.getElementById('commentText').value.trim();
      if (!nama || !teks) return alert("Isi nama dan komentar dulu!");
      tutupFormKomen();
      try {
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({tmdbId: currentMovieId, nama, komentar: teks})
        });
        setTimeout(() => muatKomentar(currentMovieId), 1200);
      } catch {
        alert("Gagal mengirim komentar.");
      }
    }

    function bukaFormKomen() {
      infoPanel.classList.add('show');
      panelBackdrop.classList.add('active');
    }
    function tutupFormKomen() {
      infoPanel.classList.remove('show');
      panelBackdrop.classList.remove('active');
    }

    // ====================================
    // FUNGSI PENCARIAN
    // ====================================
    document.getElementById('navSearch').addEventListener('click', e => {
      e.stopPropagation();
      const buka = searchContainer.classList.toggle('show');
      if (!buka) {
        searchInput.value = "";
        searchResultsLayer.classList.remove('active');
      } else setTimeout(() => searchInput.focus(), 100);
    });

    searchInput.addEventListener('input', e => {
      const kata = e.target.value.toLowerCase().trim();
      if (!kata) return searchResultsLayer.classList.remove('active');
      searchResultsLayer.classList.add('active');
      const hasil = allMoviesCache.filter(m => 
        (m.title && m.title.toLowerCase().includes(kata)) || 
        (m.original_title && m.original_title.toLowerCase().includes(kata))
      );
      searchResultsLayer.innerHTML = hasil.length ? hasil.map(m => `
        <div class="search-item-row" onclick="bukaFilm(${m.id})">
          <div class="search-item-thumb" style="background-image:url('${IMAGE_URL}${m.poster_path || '/placeholder.jpg'}')"></div>
          <div class="search-item-info"><h4>${m.title}</h4><p>${m.release_date ? m.release_date.split('-')[0] : '-'}</p></div>
        </div>
      `).join('') : `<div style="padding:30px; text-align:center;">Tidak ditemukan</div>`;
    });

    function bukaFilm(id) { window.location.href = `watch.html?id=${id}`; }

    // ====================================
    // INISIALISASI
    // ====================================
    function ambilIdDariUrl() {
      return new URLSearchParams(window.location.search).get('id');
    }

    function pasangPemutar(tmdbId) {
      filmIframe.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
    }

    async function muatSemuaFilmTMDB() {
      try {
        let halaman = 1;
        allMoviesCache = [];
        while (halaman <= 10) {
          const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=${halaman}`);
          if (!res.ok) break;
          const data = await res.json();
          allMoviesCache.push(...data.results);
          halaman++;
        }
      } catch (e) {
        console.error("Gagal ambil daftar film:", e);
      }
    }

    async function muatDataAwal() {
      currentMovieId = parseInt(ambilIdDariUrl());
      if (!currentMovieId) {
        videoWrapper.innerHTML += `<div style="padding:50px; text-align:center; color:#fff;">ID Film tidak ditemukan.</div>`;
        return;
      }
      pasangPemutar(currentMovieId);
      muatKomentar(currentMovieId);
      await bacaSubtitle(currentMovieId);
      await muatSemuaFilmTMDB();
    }

    document.getElementById('navAddComment').addEventListener('click', bukaFormKomen);
    document.getElementById('navHome').addEventListener('click', () => window.history.back() || (window.location.href = 'index.html'));

    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      muatDataAwal();
    });
  </script>

</body>
