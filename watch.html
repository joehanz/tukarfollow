<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Movie</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href='https://cdn.jsdelivr.net/gh/joehanz/csstukarfollow@main/style.css' rel='stylesheet'/>

<style>

/* SAFE WRAPPER */
.watch-container{
  display:flex;
  gap:20px;
  padding:70px 15px 15px;
}

/* LEFT PLAYER */
.watch-left{
  flex:2;
}

.player-wrap iframe{
  width:100%;
  height:75vh;
  border:0;
  background:#000;
}

/* RIGHT INFO */
.watch-right{
  flex:1;
  background:#0d0d12;
  padding:15px;
  border-radius:10px;
  overflow-y:auto;
  max-height:75vh;
}

/* TITLE */
.watch-title{
  font-size:22px;
  margin-bottom:10px;
}

/* META */
.meta{
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
}

/* GENRE TAG */
.tag{
  display:inline-block;
  padding:3px 8px;
  margin:2px;
  background:#222;
  font-size:12px;
  border-radius:4px;
}

/* RELATED */
.related-title{
  margin:20px 15px 10px;
}

.related-row{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px 15px 20px;
}

.related-row::-webkit-scrollbar{
  display:none;
}

.related-card{
  min-width:140px;
  cursor:pointer;
}

.related-card img{
  width:140px;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}

.related-card .t{
  font-size:12px;
  margin-top:5px;
  opacity:.8;
}

/* MOBILE */
@media(max-width:900px){
  .watch-container{
    flex-direction:column;
  }

  .watch-right{
    max-height:none;
  }
}

</style>
</head>

<body>

<nav id='topNav'>
  <a class='logo' href='/'>STREAM</a>
  <div class='burger' onclick='history.back()'>⬅</div>
</nav>

<!-- MAIN -->
<div class="watch-container">

  <!-- LEFT -->
  <div class="watch-left">

    <div class="player-wrap">
      <iframe id="frame" allowfullscreen></iframe>
    </div>

  </div>

  <!-- RIGHT INFO -->
  <div class="watch-right">

    <div class="watch-title" id="title">Loading...</div>

    <div class="meta" id="meta"></div>

    <div id="tags"></div>

    <p id="desc"></p>

  </div>

</div>

<!-- RELATED -->
<div class="related-title">Related Movies</div>
<div class="related-row" id="related"></div>

<script>

const API = "9e335d21d35f04917b218bae7adc881f";
const id = new URLSearchParams(location.search).get("id");

const frame = document.getElementById("frame");

async function loadMovie(){

  if(!id) return;

  const res = await fetch(
    "https://api.themoviedb.org/3/movie/"
    + id
    + "?api_key="
    + API
    + "&append_to_response=external_ids"
  );

  const d = await res.json();

  document.getElementById("title").innerText = d.title;

  document.getElementById("meta").innerText =
    "⭐ " + d.vote_average +
    " | 📅 " + d.release_date +
    " | 🌍 " + (d.origin_country?.join(", ") || "N/A");

  document.getElementById("desc").innerText = d.overview;

  // genre
  document.getElementById("tags").innerHTML =
    (d.genres || []).map(g => `<span class='tag'>${g.name}</span>`).join("");

  const imdb = d.external_ids?.imdb_id;

  if(imdb){
    frame.src = "https://vsembed.su/embed/movie?imdb=" + imdb;
  }

  loadRelated();
}

/* RELATED HORIZONTAL */
async function loadRelated(){

  const res = await fetch(
    "https://api.themoviedb.org/3/movie/"
    + id
    + "/recommendations?api_key="
    + API
  );

  const d = await res.json();

  const box = document.getElementById("related");

  box.innerHTML = "";

  d.results.forEach(m => {

    if(!m.poster_path) return;

    const div = document.createElement("div");
    div.className = "related-card";

    div.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
      <div class="t">${m.title}</div>
    `;

    div.onclick = () => {
      location.href = "watch.html?id=" + m.id;
    };

    box.appendChild(div);
  });

}

loadMovie();

</script>

</body>
</html>
