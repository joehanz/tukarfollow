<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streaming Movie TikTok Style</title>
  <link href="style.css" rel="stylesheet" />
</head>
<body class="bg-black text-white">
  <div class="sidebar">
    <ul>
      <li>Home</li>
      <li>Action</li>
      <li>Drama</li>
      <li>Anime</li>
      <li>Favorites</li>
    </ul>
  </div>

  <div class="feed">
    <div class="movie-card">
      <video src="trailer1.mp4" autoplay loop muted></video>
      <div class="overlay">
        <h2>The Witcher</h2>
        <p>Fantasy • 2 Seasons</p>
        <button>Watch Now</button>
      </div>
      <div class="actions">
        <span>❤️ 12.4K</span>
        <span>💬 567</span>
        <span>🔁 8.2K</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
