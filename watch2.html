<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watch Movie</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#0b0b0b;
color:#fff
}

/* NAV */

header{

position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:15px 20px;

background:#111;

border-bottom:1px solid rgba(255,255,255,.08)

}

.logo{

color:#fff;
text-decoration:none;
font-size:22px;
font-weight:bold

}


/* MAIN */

.container{

max-width:1400px;
margin:auto;
padding:20px

}


/* PLAYER */

.playerWrap{

width:100%;
border-radius:20px;
overflow:hidden;
background:#151515;

}

.player{

width:100%;
aspect-ratio:16/9;

display:flex;
justify-content:center;
align-items:center;

background:black;

}

.player iframe{

width:100%;
height:100%;
border:0

}

.notfound{

display:flex;
justify-content:center;
align-items:center;

width:100%;
height:100%;

font-size:22px;
opacity:.8;
padding:20px;
text-align:center

}


/* INFO */

.info{

padding:20px 0

}

.info h1{

font-size:30px;
margin-bottom:10px

}

.meta{

display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px

}

.tag{

background:#191919;
padding:8px 12px;
border-radius:30px;
font-size:13px

}

.sinopsis{

line-height:1.8;
opacity:.85

}


/* REKOMENDASI */

.sectionTitle{

margin:30px 0 20px;
font-size:22px

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(170px,1fr)
);

gap:20px

}

.card{

background:#151515;
border-radius:15px;
overflow:hidden;
cursor:pointer;

transition:.3s

}

.card:hover{

transform:translateY(-5px)

}

.card img{

width:100%;
height:250px;
object-fit:cover

}

.card h3{

padding:10px;
font-size:14px;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis

}


/* MOBILE */

@media(max-width:768px){

.info h1{

font-size:22px

}

.grid{

grid-template-columns:
repeat(
2,1fr
)

}

.player{

aspect-ratio:16/10

}

}

</style>
</head>

<body>

<header>

<a href="index2.html" class="logo">
TukarFollow
</a>

</header>


<div class="container">


<div class="playerWrap">

<div
class="player"
id="playerBox"
>

<div class="notfound">

🎬 Memuat video...

</div>

</div>

</div>


<div class="info">

<h1 id="judul">

Loading...

</h1>


<div
class="meta"
id="meta"
>

</div>


<div
class="sinopsis"
id="sinopsis"
>

Memuat informasi film...

</div>

</div>



<h2 class="sectionTitle">

Rekomendasi

</h2>


<div
class="grid"
id="recommendGrid"
>

</div>


</div>

<script src="js/watch2.js"></script>

</body>
</html>
