<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TukarFollow</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
}

body{
background:#080808;
color:#fff;
min-height:100vh;
overflow-x:hidden;
}

/* background bioskop tipis */
body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.95)),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1800");
background-size:cover;
background-position:center;
filter:blur(2px);
transform:scale(1.1);
z-index:-2;
}

body::after{
content:"";
position:fixed;
top:-100px;
right:-100px;
width:400px;
height:400px;
background:
radial-gradient(
rgba(255,190,90,.25),
transparent 70%
);
z-index:-1;
}

.container{
padding:30px 20px;
max-width:1100px;
margin:auto;
}

.title{
font-size:35px;
font-weight:bold;
margin-bottom:8px;
}

.title span{
color:gold;
}

.desc{
opacity:.7;
margin-bottom:30px;
line-height:1.6;
}

/* grid poster */

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* card */

.card{

position:relative;
height:300px;
overflow:hidden;
border-radius:20px;
cursor:pointer;

background:#111;

transition:.4s;
}

.card:hover{

transform:translateY(-8px);

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

.overlay{

position:absolute;
left:0;
right:0;
bottom:0;

padding:20px;

background:
linear-gradient(
transparent,
rgba(0,0,0,.95)
);

}

.name{

font-size:20px;
font-weight:bold;
margin-bottom:5px;
}

.sub{

font-size:13px;
opacity:.7;
}

/* klaim */

.claim{

display:none;
text-align:center;
margin-top:80px;

}

.claim button{

border:none;
padding:18px 40px;
font-size:18px;
font-weight:bold;
border-radius:100px;
cursor:pointer;

background:gold;

}

.claim button:hover{

transform:scale(1.05);

}

</style>
</head>

<body>

<div class="container">

<div class="title">
Tukar<span>Follow</span>
</div>

<div class="desc">
Pilih media sosial lalu kembali untuk membuka bioskop.
</div>

<div id="socialGrid" class="grid">

<div class="card"
onclick="buka('https://youtube.com/@AKUNMU')">

<img src="https://images.unsplash.com/photo-1611162618071-b39a2ec055fb?w=900">

<div class="overlay">

<div class="name">
YouTube
</div>

<div class="sub">
Buka channel
</div>

</div>
</div>


<div class="card"
onclick="buka('https://instagram.com/AKUNMU')">

<img src="https://images.unsplash.com/photo-1611262588024-d12430b98920?w=900">

<div class="overlay">

<div class="name">
Instagram
</div>

<div class="sub">
Buka profil
</div>

</div>
</div>


<div class="card"
onclick="buka('https://tiktok.com/@AKUNMU')">

<img src="https://images.unsplash.com/photo-1611605698335-8b1569810432?w=900">

<div class="overlay">

<div class="name">
TikTok
</div>

<div class="sub">
Buka profil
</div>

</div>
</div>

</div>


<div class="claim" id="claim">

<h2 style="margin-bottom:20px">
🔥 Reward Siap
</h2>

<button onclick="masuk()">

🎬 Klaim Bioskop

</button>

</div>

</div>

<script>

let sudahKlik=false;

function buka(url){

sudahKlik=true;

window.open(
url,
"_blank"
);

}

/* saat user balik ke tab */

window.onfocus=function(){

if(sudahKlik){

document
.getElementById(
"socialGrid"
).style.display="none";

document
.getElementById(
"claim"
).style.display="block";

}

}

function masuk(){

location.href="index.html";

}

</script>

</body>
</html>
