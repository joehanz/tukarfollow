<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pemutar TMDB + Subtitle VTT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #121212; color: #fff; padding: 20px; }

        /* Daftar Poster */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            max-width: 1100px;
            margin: 0 auto 30px;
        }
        .movie-card {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            background: #222;
            transition: transform 0.2s ease;
        }
        .movie-card:hover { transform: scale(1.05); }
        .poster { width: 100%; height: auto; display: block; }
        .title { padding: 8px; text-align: center; font-size: 14px; line-height: 1.3; }

        /* Wadah Pemutar */
        .player-wrap {
            max-width: 960px;
            margin: 0 auto;
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: none;
        }
        iframe {
            width: 100%;
            height: 540px;
            border: none;
            display: block;
        }
        /* Lapisan Subtitle */
        .subtitle-layer {
            position: absolute;
            bottom: 75px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 999;
            pointer-events: none;
            padding: 0 20px;
        }
        .subtitle-text {
            font-size: 23px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 4px #000, 0 0 8px #000, 0 0 12px #000;
            line-height: 1.5;
            min-height: 45px;
        }
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        @media (max-width: 768px) {
            iframe { height: 320px; }
            .subtitle-text { font-size: 18px; bottom: 60px; }
        }
    </style>
</head>
<body>

<!-- Daftar Film dari TMDB -->
<div class="movie-grid" id="movieList"></div>

<!-- Pemutar + Subtitle -->
<div class="player-wrap" id="playerArea">
    <button class="back-btn" onclick="showList()">← Kembali</button>
    <iframe id="videoFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
    <div class="subtitle-layer">
        <div class="subtitle-text" id="subDisplay"></div>
    </div>
</div>

<script>
// --------------------------
// 🔧 PENGATURAN
// --------------------------
const TMDB_KEY = "c000d7b8b0f5ee16b98b6103009745d8";
const EMBED_URL = "https://vsembed.ru/embed/movie?tmdb=";
const SUB_FOLDER = "./subs/"; // Tempat simpan file .vtt
let subtitles = [];
let syncTimer = null;
let currentTime = 0;
let isPlaying = false;

// --------------------------
// 📥 Ambil Data Film TMDB
// --------------------------
async function loadMovies() {
    try {
        const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_KEY}&language=id-ID&page=1`);
        const data = await res.json();
        const container = document.getElementById("movieList");
        container.innerHTML = "";

        data.results.forEach(movie => {
            if (!movie.poster_path) return;
            const card = document.createElement("div");
            card.className = "movie-card";
            card.innerHTML = `
                <img class="poster" src="https://image.tmdb.org/t/p/w300${movie.poster_path}" alt="${movie.title}">
                <div class="title">${movie.title}</div>
            `;
            card.addEventListener("click", () => playMovie(movie.id));
            container.appendChild(card);
        });
    } catch (err) {
        console.error("Gagal memuat data TMDB:", err);
    }
}

// --------------------------
// 🎬 Jalankan Film & Muat Subtitle
// --------------------------
function playMovie(tmdbId) {
    document.getElementById("movieList").style.display = "none";
    const player = document.getElementById("playerArea");
    player.style.display = "block";

    // Muat video dari vsembed
    document.getElementById("videoFrame").src = EMBED_URL + tmdbId;

    // Reset semua data lama
    subtitles = [];
    currentTime = 0;
    isPlaying = false;
    document.getElementById("subDisplay").textContent = "";
    if (syncTimer) clearInterval(syncTimer);

    // Muat file subtitle sesuai ID TMDB
    loadVTT(`${SUB_FOLDER}${tmdbId}.vtt`);
}

// --------------------------
// 📖 Baca File VTT
// --------------------------
async function loadVTT(filePath) {
    try {
        const res = await fetch(filePath);
        if (!res.ok) throw new Error("Tidak ada file subtitle");
        const vttText = await res.text();
        subtitles = parseVTT(vttText);
        startSync(); // Mulai jalankan sinkronisasi
    } catch (err) {
        document.getElementById("subDisplay").textContent = "Subtitle tidak tersedia";
        console.warn(err);
    }
}

// Ubah format VTT jadi daftar waktu dan teks
function parseVTT(vtt) {
    const lines = vtt.trim().split("\n");
    const hasil = [];
    const polaWaktu = /(\d+:\d+:\d+\.\d+)\s*-->\s*(\d+:\d+:\d+\.\d+)/;

    for (let i = 0; i < lines.length; i++) {
        const cocok = lines[i].match(polaWaktu);
        if (cocok) {
            const mulai = ubahKeDetik(cocok[1]);
            const selesai = ubahKeDetik(cocok[2]);
            let teks = "";
            while (i + 1 < lines.length && !lines[i + 1].includes("-->") && lines[i + 1].trim() !== "") {
                teks += lines[++i].trim() + " ";
            }
            hasil.push({ mulai, selesai, teks: teks.trim() });
        }
    }
    return hasil;
}

// Ubah format jam:menit:detik → angka detik
function ubahKeDetik(waktu) {
    const [jam, menit, detik] = waktu.split(":");
    const [dt, milidetik] = detik.split(".");
    return Number(jam) * 3600 + Number(menit) * 60 + Number(dt) + (Number(milidetik || 0) / 1000);
}

// --------------------------
// ⏱️ Sinkronisasi yang Jelas & Bisa Dikontrol
// --------------------------
function startSync() {
    // Cek setiap 250ms, sama seperti logika sebelumnya
    syncTimer = setInterval(() => {
        if (!isPlaying) {
            // Saat video diputar, mulai hitung
            isPlaying = true;
        } else {
            currentTime += 0.25; // Naik 0,25 detik setiap kali cek
        }

        let teksTampil = "";
        for (const sub of subtitles) {
            if (currentTime >= sub.mulai && currentTime <= sub.selesai) {
                teksTampil = sub.teks;
                break;
            }
        }
        document.getElementById("subDisplay").textContent = teksTampil;
    }, 250);
}

// Tombol kembali ke daftar film
function showList() {
    document.getElementById("playerArea").style.display = "none";
    document.getElementById("movieList").style.display = "grid";
    if (syncTimer) clearInterval(syncTimer);
    document.getElementById("videoFrame").src = "";
    currentTime = 0;
    isPlaying = false;
}

// Jalankan saat halaman pertama dibuka
loadMovies();
</script>

</body>
</html>
