<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Netflix Pro Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* TOP BAR */
.topbar {
  position: sticky;
  top: 0;
  background: #000;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}

.logo {
  color: red;
  font-weight: bold;
  font-size: 20px;
}

/* SEARCH */
input {
  padding: 6px;
  border-radius: 5px;
  border: none;
  outline: none;
}

/* HERO */
.hero {
  height: 55vh;
  background:
    linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.2), rgba(0,0,0,0.85)),
    url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

/* SECTION */
.section {
  padding: 10px 0;
}

.section h2 {
  margin: 10px;
  font-size: 16px;
}

/* ROW */
.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 0 10px;
  scroll-padding: 10px;
}

.row::-webkit-scrollbar {
  display: none;
}

/* CARD */
.card {
  min-width: 140px;
  cursor: pointer;
  transition: 0.2s;
}

.card img {
  width: 140px;
  height: 200px;
  border-radius: 8px;
  object-fit: cover;
  transition: 0.2s;
}

.card:hover img {
  transform: scale(1.1);
  box-shadow: 0 10px 20px rgba(255,0,0,0.3);
}

.title {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

/* FILTER */
.filters {
  padding: 10px;
}

.btn {
  padding: 5px 10px;
  margin-right: 5px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  background: #222;
  color: white;
}

.btn.active {
  background: red;
}

@media (max-width: 600px) {
  .card {
    min-width: 120px;
  }

  .card img {
    width: 120px;
    height: 180px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">NETFLIX PRO</div>
  <input type="text" id="search" placeholder="Search movie...">
</div>

<div class="hero">
  <div>
    <h1>Unlimited Movies</h1>
    <p style="opacity:0.7">Stream anytime anywhere</p>
  </div>
</div>

<div class="filters">
  <button class="btn active" onclick="filterGenre('all')">All</button>
  <button class="btn" onclick="filterGenre('action')">Action</button>
  <button class="btn" onclick="filterGenre('drama')">Drama</button>
  <button class="btn" onclick="filterGenre('anime')">Anime</button>
</div>

<div class="section">
  <h2>Continue Watching</h2>
  <div class="row" id="continueRow"></div>
</div>

<div class="section">
  <h2>Trending Now</h2>
  <div class="row" id="movieRow"></div>
</div>

<script>

let allMovies = [];

fetch('movies.json')
.then(res => res.json())
.then(data => {
  allMovies = data;
  renderMovies(data);
  renderContinue(data);
});

function renderMovies(list){
  const row = document.getElementById('movieRow');
  row.innerHTML = "";

  list.forEach(movie => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${movie.poster}">
      <div class="title">${movie.title}</div>
    `;

    div.onclick = () => {
      window.location.href = "watch.html?play=" + encodeURIComponent(movie.embed);
    };

    row.appendChild(div);
  });
}

function renderContinue(list){
  const row = document.getElementById('continueRow');
  row.innerHTML = "";

  list.slice(0,5).forEach(movie => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${movie.poster}">
      <div class="title">▶ ${movie.title}</div>
    `;

    div.onclick = () => {
      window.location.href = "watch.html?play=" + encodeURIComponent(movie.embed);
    };

    row.appendChild(div);
  });
}

document.getElementById('search').addEventListener('input', function(){
  let value = this.value.toLowerCase();
  let filtered = allMovies.filter(m => m.title.toLowerCase().includes(value));
  renderMovies(filtered);
});

function filterGenre(genre){
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if(genre === 'all'){
    renderMovies(allMovies);
  } else {
    renderMovies(allMovies.filter(m => (m.extra || '').includes(genre)));
  }
}

</script>

</body>
</html>
