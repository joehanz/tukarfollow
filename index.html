<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Hub</title>

</head>

<body>

<!-- NAV CLEAN -->
<nav>
<div class="logo">MOVIE+</div>

<div class="nav-right">
<input id="search" placeholder="Search..." oninput="searchMovie()">
<a href="index.html">Home</a>
<a href="#" onclick="setMode('id')">Local</a>
</div>

<div class="burger" onclick="toggleMenu()">â˜°</div>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
<input placeholder="Search..." oninput="searchMovieMobile()">
<a href="index.html">Home</a>
<a href="#" onclick="setMode('id')">Local</a>
</div>

<!-- GRID -->
<div id="grid" class="grid"></div>

<!-- PAGINATION -->
<div class="pagination" id="pagination"></div>

<!-- FOOTER -->
<footer>
<div class="footer-grid">
<div>About</div>
<div>DMCA</div>
<div>Privacy</div>
<div>Contact</div>
</div>
</footer>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";

let page=1,mode="all",query="";

function toggleMenu(){
document.getElementById("mobileMenu")
.classList.toggle("show");
}

/* LOAD */
async function load(){

let url="";

if(query){
url=`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${query}&page=${page}`;
}else if(mode==="id"){
url=`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_origin_country=ID&page=${page}`;
}else if(mode==="luar"){
url=`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&without_origin_country=ID&page=${page}`;
}else{
url=`https://api.themoviedb.org/3/trending/movie/week?api_key=${KEY}&page=${page}`;
}

const data=await fetch(url).then(r=>r.json());

render(data.results);
renderPagination(data.page);

}

function render(d){
let h="";
d.forEach(m=>{
if(!m.poster_path)return;
h+=`
<div class="card" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div class="title">${m.title}</div>
</div>`;
});
document.getElementById("grid").innerHTML=h;
}

function renderPagination(p){
let h="";
for(let i=p;i<p+6;i++){
h+=`<button onclick="goPage(${i})">${i}</button>`;
}
h+=`<button onclick="nextSet()">â€º</button>`;
document.getElementById("pagination").innerHTML=h;
}

function goPage(p){page=p;load()}
function nextSet(){page+=6;load()}
function go(id){location.href=`watch.html?id=${id}`}

function setMode(m){mode=m;query="";page=1;load()}
function searchMovie(){query=document.getElementById("search").value;page=1;load()}
function searchMovieMobile(){query=document.querySelector("#mobileMenu input").value;page=1;load()}

load();

</script>

</body>
</html>
