<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Streaming - MIDASXXI</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <!-- Navigasi Atas (Sama dengan Index agar Konsisten) -->
    <nav class="navbar2">
        <div class="nav-container2">
            <!-- Kiri: Logo Tulisan -->
            <a href="index2.html" class="logo2">MIDASXXI</a>
            
            <!-- Burger Menu Icon (Muncul saat Mobile) -->
            <div class="burger-menu2" id="burgerToggle2">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Kanan: Menu Navigasi & Search -->
            <div class="nav-menu2" id="navMenu2">
                <a href="index2.html">Movies</a>
                <a href="index2.html">Series</a>
                <div class="search-box2">
                    <input type="text" id="searchInput2" placeholder="Cari film...">
                </div>
            </div>
        </div>
    </nav>

    <!-- Area Pemutar Video -->
    <main class="watch-container2">
        <!-- Judul Film dari TMDB -->
        <h1 class="movie-title2" id="movieTitle2">Memuat Judul...</h1>
        
        <div class="player-wrapper2">
            <!-- Iframe Pemutar Video (Disembunyikan saat error) -->
            <iframe id="videoPlayer2" src="" allowfullscreen frameborder="0" style="display: none;"></iframe>
            
            <!-- Notifikasi Merah Jika Tidak Lolos Matching 80% / Link Kosong -->
            <div id="errorNotif2" class="error-notif2" style="display: none;">
                <p>⚠️ Video belum diupdate oleh admin.</p>
            </div>
        </div>

        <!-- Detail Informasi & Sinopsis -->
        <div class="movie-info2">
            <h3>Sinopsis / Catatan:</h3>
            <p id="movieSinopsis2">Memuat informasi film...</p>
        </div>
    </main>

    <script src="script2.js"></script>
</body>
</html>
