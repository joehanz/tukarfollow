<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>TUKARFOLLOW - Nonton Film Subtitle Indonesia</title>
  <meta name="description" content="Nonton film terbaru dengan subtitle Indonesia." />
  <meta name="keywords" content="nonton film, streaming, sub indo" />
  <meta name="robots" content="index, follow" />

  <link rel="icon" href="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" type="image/x-icon" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #0a0a0a; color: #fff; overflow-x: hidden; }

    body.fullscreen-active { overflow: hidden; }
    .video-main-wrapper.fullscreen {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      max-width: none; border-radius: 0; z-index: 9999; background: #000;
    }

    .watch-layout { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .video-main-wrapper {
      position: relative; width: 100%; max-width: 1200px; aspect-ratio: 16/9;
      background: #000; overflow: hidden; border-radius: 12px;
    }
    #filmIframe {
      width: 100%; height: 100%; border: none; background: #000;
      display: block;
    }
    .watermark { position: absolute; top: 16px; left: 16px; opacity: 0.6; pointer-events: none; z-index: 10; }
    .watermark img { width: 40px; }

    .subtitle-layer {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
      padding: 24px 16px 20px; display: flex; flex-direction: column; gap: 14px;
    }
    .subtitle-text {
      text-align: center; font-size: 19px; font-weight: 500;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9); min-height: 36px; line-height: 1.5;
      transition: all 0.15s ease;
    }
    .subtitle-controls {
      display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 14px;
      background: rgba(255,255,255,0.1); padding: 12px 18px;
      border-radius: 14px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15);
    }
    .ctrl-btn {
      width: 42px; height: 42px; border-radius: 10px; border: none;
      background: rgba(255,255,255,0.2); color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.08); }
    .ctrl-btn svg { width: 21px; height: 21px; }
    .time-digital { font-size: 15px; font-weight: 500; min-width: 95px; text-align: center; color: #f8f8f8; }

    @media (max-width:768px) {
      .watch-layout { padding:0; }
      .video-main-wrapper { border-radius:0; }
      .subtitle-text { font-size:17px; }
      .ctrl-btn { width:38px; height:38px; }
      .ctrl-btn svg { width:19px; height:19px; }
      .time-digital { font-size:14px; }
    }
  </style>
</head>
<body>

<div class="watch-layout">
  <div class="video-main-wrapper" id="videoWrapper">
    <!-- Tetap vsembed.ru, izin lengkap biar nggak gelap -->
    <iframe 
      id="filmIframe" 
      src="" 
      allowfullscreen
      allow="autoplay; encrypted-media; picture-in-picture; fullscreen; gyroscope; accelerometer"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <div class="watermark"><img src="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" alt="Logo"></div>

    <div class="subtitle-layer" id="subLayer">
      <div class="subtitle-text" id="subText"></div>
      <div class="subtitle-controls">
        <button class="ctrl-btn" id="btnMundur" title="Mundur 10 Detik"><i data-lucide="rotate-ccw"></i></button>
        <button class="ctrl-btn" id="btnMain" title="Putar / Jeda"><i data-lucide="play"></i></button>
        <button class="ctrl-btn" id="btnMaju" title="Maju 10 Detik"><i data-lucide="rotate-cw"></i></button>
        <div class="time-digital" id="jamTayang">00:00:00</div>
        <button class="ctrl-btn" id="btnHome" title="Kembali"><i data-lucide="home"></i></button>
        <button class="ctrl-btn" id="btnFullscreen" title="Layar Penuh"><i data-lucide="maximize"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

const filmIframe = document.getElementById('filmIframe');
const subText = document.getElementById('subText');
const jamTayang = document.getElementById('jamTayang');
const btnMain = document.getElementById('btnMain');
const btnMundur = document.getElementById('btnMundur');
const btnMaju = document.getElementById('btnMaju');
const btnFullscreen = document.getElementById('btnFullscreen');
const btnHome = document.getElementById('btnHome');
const videoWrapper = document.getElementById('videoWrapper');

let subtitles = [];
let waktuSekarang = 0;
let timerSub = null;   // Timer khusus kendali subtitle
let sedangPutar = false;
let isFullscreen = false;

// Format waktu ke jam:menit:detik
function ubahKeWaktu(detik) {
  if (isNaN(detik) || detik < 0) detik = 0;
  const j = String(Math.floor(detik / 3600)).padStart(2, '0');
  const m = String(Math.floor((detik % 3600) / 60)).padStart(2, '0');
  const d = String(Math.floor(detik % 60)).padStart(2, '0');
  return `${j}:${m}:${d}`;
}

// Ubah teks waktu ke angka detik
function ubahKeDetik(waktuStr) {
  if (!waktuStr) return 0;
  waktuStr = waktuStr.replace(',', '.').trim();
  const bagian = waktuStr.split(':');
  if (bagian.length === 3) return (+bagian[0] * 3600) + (+bagian[1] * 60) + (+parseFloat(bagian[2]));
  if (bagian.length === 2) return (+bagian[0] * 60) + (+parseFloat(bagian[1]));
  return 0;
}

// Perbarui tampilan teks subtitle sesuai waktu
function tampilkanSubtitle() {
  const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
  subText.textContent = aktif ? aktif.teks : "";
  jamTayang.textContent = ubahKeWaktu(waktuSekarang);
}

// ✅ FUNGSI UTAMA: Kendali penuh subtitle
function mulaiSub() {
  if (timerSub) clearInterval(timerSub);
  sedangPutar = true;
  btnMain.innerHTML = '<i data-lucide="pause"></i>';
  lucide.createIcons();
  
  // Jalankan hitungan detik sendiri
  timerSub = setInterval(() => {
    waktuSekarang++;
    tampilkanSubtitle();
  }, 1000);
}

function jedaSub() {
  sedangPutar = false;
  btnMain.innerHTML = '<i data-lucide="play"></i>';
  lucide.createIcons();
  clearInterval(timerSub);
}

function geserSub(detik) {
  waktuSekarang = Math.max(0, waktuSekarang + detik);
  tampilkanSubtitle();
}

// Baca file subtitle VTT
async function muatSubtitle(idFilm) {
  subtitles = [];
  waktuSekarang = 0;
  tampilkanSubtitle();

  try {
    const res = await fetch(`${SUBTITLE_URL}${idFilm}.vtt`, { cache: 'no-cache' });
    if (!res.ok) throw new Error("File tidak ada");
    const teks = await res.text();
    if (!teks.trim()) throw new Error("Kosong");

    const baris = teks.split('\n').map(b => b.trim()).filter(Boolean);
    let i = baris[0].toUpperCase() === "WEBVTT" ? 1 : 0;

    while (i < baris.length) {
      if (baris[i].includes('-->')) {
        const [mulaiStr, selesaiStr] = baris[i].split('-->');
        const mulai = ubahKeDetik(mulaiStr);
        const selesai = ubahKeDetik(selesaiStr);
        let teksSub = "";
        i++;
        while (i < baris.length && !baris[i].includes('-->')) {
          teksSub += baris[i] + " ";
          i++;
        }
        if (mulai < selesai && teksSub.trim()) {
          subtitles.push({ mulai, selesai, teks: teksSub.trim() });
        }
      } else {
        i++;
      }
    }
  } catch (err) {
    subText.textContent = "Subtitle tidak tersedia";
  }
}

// Fungsi layar penuh
function toggleLayarPenuh() {
  if (!isFullscreen) {
    videoWrapper.classList.add("fullscreen");
    btnFullscreen.innerHTML = '<i data-lucide="minimize"></i>';
    lucide.createIcons();
    isFullscreen = true;
    if (videoWrapper.requestFullscreen) videoWrapper.requestFullscreen().catch(() => {});
    else if (videoWrapper.webkitRequestFullscreen) videoWrapper.webkitRequestFullscreen();
  } else {
    videoWrapper.classList.remove("fullscreen");
    btnFullscreen.innerHTML = '<i data-lucide="maximize"></i>';
    lucide.createIcons();
    isFullscreen = false;
    if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

// Pasang vsembed.ru
function pasangPemutar(tmdbId) {
  filmIframe.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
}

// Ambil ID dari URL
function ambilIdDariURL() {
  return new URLSearchParams(window.location.search).get("id") || "";
}

// Jalankan saat halaman siap
window.addEventListener("DOMContentLoaded", async () => {
  lucide.createIcons();
  const id = ambilIdDariURL();
  if (!id) {
    subText.textContent = "ID Film tidak ditemukan";
    return;
  }
  pasangPemutar(id);
  await muatSubtitle(id);
});

// Pasang aksi tombol
btnMain.addEventListener("click", () => sedangPutar ? jedaSub() : mulaiSub());
btnMundur.addEventListener("click", () => geserSub(-10));
btnMaju.addEventListener("click", () => geserSub(+10));
btnFullscreen.addEventListener("click", toggleLayarPenuh);
btnHome.addEventListener("click", () => window.history.back());

// Tangani keluar layar penuh
document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement && isFullscreen) toggleLayarPenuh();
});
document.addEventListener("webkitfullscreenchange", () => {
  if (!document.webkitFullscreenElement && isFullscreen) toggleLayarPenuh();
});
</script>

</body>
</html>
