<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Series Streaming</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

/* ===== GRID ===== */
#gridView{
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:10px;
}

.card{
cursor:pointer;
transition:.2s;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.card:hover{
transform:scale(1.05);
}

/* ===== PAGINATION ===== */
.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.pagination button{
background:#222;
color:#fff;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.pagination button.active{
background:#e50914;
}

/* ===== PLAYER ===== */
#playerView{
display:none;
padding:15px;
}

.player-box{
width:100%;
aspect-ratio:16/9;
background:#000;
border-radius:10px;
overflow:hidden;
}

.player-box iframe{
width:100%;
height:100%;
border:none;
}

/* ===== CONTROL ===== */
.controls{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

select{
padding:8px;
border-radius:6px;
border:none;
background:#222;
color:#fff;
}

#playBtn{
padding:8px 12px;
border:none;
border-radius:6px;
background:#e50914;
color:#fff;
cursor:pointer;
font-weight:bold;
}

.backBtn{
padding:8px 12px;
border:none;
border-radius:6px;
background:#444;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<!-- GRID -->
<div id="gridView">
<div class="grid" id="grid"></div>
<div class="pagination" id="pagination"></div>
</div>

<!-- PLAYER -->
<div id="playerView">

<div class="player-box">
<iframe id="iframe"></iframe>
</div>

<div class="controls">

<button class="backBtn" onclick="backToGrid()">← Back</button>

<select id="seasonSel"></select>
<select id="episodeSel"></select>

<button id="playBtn">▶ Play</button>

</div>

</div>

<script>
const API_KEY = "ISI_API_KEY_KAMU";

let page = 1;
let totalPages = 1000;

let currentId = null;

let selectedSeason = 1;
let selectedEpisode = 1;

/* ===== ELEMENT ===== */
const grid = document.getElementById("grid");
const pagination = document.getElementById("pagination");

const gridView = document.getElementById("gridView");
const playerView = document.getElementById("playerView");

const iframe = document.getElementById("iframe");

const seasonSel = document.getElementById("seasonSel");
const episodeSel = document.getElementById("episodeSel");

const playBtn = document.getElementById("playBtn");

/* ================= LOAD SERIES ================= */
async function loadSeries(p){
page = p;

const res = await fetch(
`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&page=${p}`
);
const data = await res.json();

grid.innerHTML = "";

data.results.forEach(tv=>{
grid.innerHTML += `
<div class="card" onclick="openSeries(${tv.id})">
<img src="https://image.tmdb.org/t/p/w500${tv.poster_path}">
</div>
`;
});

totalPages = data.total_pages;
renderPagination();
}

/* ================= PAGINATION INDEX STYLE ================= */
function renderPagination(){

pagination.innerHTML = "";

let start = Math.floor((page-1)/5)*5 + 1;
let end = start + 4;

if(start > 1){
pagination.innerHTML += `<button onclick="loadSeries(${start-1})"><</button>`;
}

for(let i=start;i<=end;i++){
if(i > totalPages) break;

pagination.innerHTML += `
<button class="${i===page?'active':''}" onclick="loadSeries(${i})">${i}</button>
`;
}

if(end < totalPages){
pagination.innerHTML += `<button onclick="loadSeries(${end+1})">></button>`;
}
}

/* ================= OPEN SERIES ================= */
async function openSeries(id){

currentId = id;

gridView.style.display = "none";
playerView.style.display = "block";

/* get TV detail */
const res = await fetch(
`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`
);
const tv = await res.json();

/* seasons */
seasonSel.innerHTML = "";

tv.seasons.forEach(s=>{
if(s.season_number !== undefined){
seasonSel.innerHTML += `
<option value="${s.season_number}">Season ${s.season_number}</option>
`;
}
});

selectedSeason = tv.seasons[0]?.season_number || 1;

loadEpisodes(selectedSeason);
}

/* ================= LOAD EPISODES ================= */
async function loadEpisodes(season){

selectedSeason = season;

const res = await fetch(
`https://api.themoviedb.org/3/tv/${currentId}/season/${season}?api_key=${API_KEY}`
);
const data = await res.json();

episodeSel.innerHTML = "";

data.episodes.forEach(ep=>{
episodeSel.innerHTML += `
<option value="${ep.episode_number}">Episode ${ep.episode_number}</option>
`;
});

selectedEpisode = 1;
}

/* ================= PLAY ================= */
function playVideo(){

iframe.src = `https://vsembed.su/embed/tv/${currentId}/${selectedSeason}/${selectedEpisode}`;
}

/* ================= EVENTS ================= */
seasonSel.onchange = ()=>{
loadEpisodes(seasonSel.value);
};

episodeSel.onchange = ()=>{
selectedEpisode = episodeSel.value;
};

playBtn.onclick = ()=>{
playVideo();
};

function backToGrid(){
playerView.style.display = "none";
gridView.style.display = "block";
}

/* INIT */
loadSeries(1);
</script>

</body>
</html>
