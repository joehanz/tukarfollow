  <style>
    * {
      margin: 0;

    body {
      background-color: #0a0a0a;

    /* LAYAR UTAMA TONTONAN */

    }

    .watermark-logo {

      z-index: 10;

      pointer-events: none;
    }

    .watermark-logo img {

    }

    /* SUBTITLE */
    .subtitle-layer {

    /* NAVIGASI BAWAH: KONTROL VIDEO */

      transition: all 0.3s;

    .search-container.show {

    .search-box {

    .panel-backdrop {

    /* KOMENTAR */

    .comments-header {

      background: #1e1e1e;

    /* KHUSUS MOBILE */
    @media (max-width: 768px) {

      /* Sembunyikan otomatis hanya di HP */
      .side-nav.auto-hide,
      .bottom-nav.auto-hide {
        transition: transform 0.5s ease, opacity 0.4s ease;

    /* DESKTOP: Tetap tampilkan semua */
    @media (min-width: 769px) {
      .side-nav.hidden,
      .bottom-nav.hidden {
        transform: none;
        opacity: 1;
        pointer-events: auto;

  </style>

<body>

    <div class="time-display" id="jamTayang">00:00:00</div>

  <script>
    // KONFIGURASI
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8'; 
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
    const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

    // ELEMEN UTAMA
    const filmIframe = document.getElementById('filmIframe');
    const subText = document.getElementById('subText');
    const jamTayang = document.getElementById('jamTayang');
    const btnMain = document.getElementById('btnMain');
    const btnMundur = document.getElementById('btnMundur');
    const btnMaju = document.getElementById('btnMaju');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const btnSearch = document.getElementById('btnSearch');
    const btnAddComment = document.getElementById('btnAddComment');
    const btnHome = document.getElementById('btnHome');
    const btnViewComments = document.getElementById('btnViewComments');
    const commentsPanel = document.getElementById('commentsPanel');
    const closeCommentsBtn = document.getElementById('closeCommentsBtn');
    const commentListEl = document.getElementById('commentList');
    const searchContainer = document.getElementById('searchContainer');
    const searchInput = document.getElementById('searchInput');
    const searchResultsLayer = document.getElementById('searchResultsLayer');
    const infoPanel = document.getElementById('infoPanel');
    const panelBackdrop = document.getElementById('panelBackdrop');
    const sideNav = document.getElementById('sideNav');
    const bottomNav = document.getElementById('bottomNav');
    const mainArea = document.getElementById('mainArea');

    let currentMovieId = null;
    let allMoviesCache = [];
    let subtitles = [];
    let waktuSekarang = 0;
    let pemutar = null;
    let sedangMain = false;
    let hideTimer;

    // ====================================
    // FUNGSI BANTU
    // ====================================
    function ubahKeWaktu(detik) {
      if (isNaN(detik) || detik < 0) detik = 0;
      const j = Math.floor(detik / 3600).toString().padStart(2, '0');
      const m = Math.floor((detik % 3600) / 60).toString().padStart(2, '0');
      const d = Math.floor(detik % 60).toString().padStart(2, '0');
      return `${j}:${m}:${d}`;
    }

    function ubahKeDetik(teksWaktu) {
      if (!teksWaktu) return 0;
      teksWaktu = teksWaktu.replace(/[, \s]/g, '.').trim();
      const bagian = teksWaktu.split(':');
      let hasil = 0;
      if (bagian.length === 3) hasil = Number(bagian[0]) * 3600 + Number(bagian[1]) * 60 + Number(bagian[2]);
      if (bagian.length === 2) hasil = Number(bagian[0]) * 60 + Number(bagian[1]);
      return isNaN(hasil) ? 0 : hasil;
    }

    function perbaruiTampilan() {
      const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
      subText.textContent = aktif ? aktif.teks : "";
      jamTayang.textContent = ubahKeWaktu(waktuSekarang);
    }

    // ====================================
    // KONTROL PEMUTAR
    // ====================================
    function mulaiSemua() {
      if (pemutar) clearInterval(pemutar);
      sedangMain = true;
      btnMain.innerHTML = '<i data-lucide="pause"></i>';
      lucide.createIcons();
      pemutar = setInterval(() => {
        waktuSekarang += 1;
        perbaruiTampilan();
      }, 1000);
      try { filmIframe.contentWindow.postMessage({ cmd: "play" }, "*"); } catch (e) {}
    }

    function hentikanSemua() {
      sedangMain = false;
      btnMain.innerHTML = '<i data-lucide="play"></i>';
      lucide.createIcons();
      clearInterval(pemutar);
      try { filmIframe.contentWindow.postMessage({ cmd: "pause" }, "*"); } catch (e) {}
    }

    function geserWaktu(ubah) {
      waktuSekarang = Math.max(0, waktuSekarang + ubah);
      perbaruiTampilan();
      if (sedangMain) {
        clearInterval(pemutar);
        pemutar = setInterval(() => {
          waktuSekarang += 1;
          perbaruiTampilan();
        }, 1000);
      }
    }

    // ====================================
    // BACA SUBTITLE
    // ====================================
    async function bacaSubtitle(idFilm) {
      const alamat = `${SUBTITLE_URL}${idFilm}.vtt`;
      subtitles = [];
      waktuSekarang = 0;
      perbaruiTampilan();

      try {
        const res = await fetch(alamat, { cache: 'no-cache' });
        if (!res.ok) throw new Error(`Tidak ditemukan`);
        const teks = await res.text();
        if (!teks.trim()) throw new Error("Kosong");

        const baris = teks.split('\n').map(b => b.trim()).filter(b => b);
        let i = 0;
        if (baris[0].toUpperCase().includes("WEBVTT")) i++;

        while (i < baris.length) {
          if (baris[i].includes('-->')) {
            const waktu = baris[i].split('-->').map(w => w.trim());
            const mulai = ubahKeDetik(waktu[0]);
            const selesai = ubahKeDetik(waktu[1]);
            i++;
            let teksSub = "";
            while (i < baris.length && !baris[i].includes('-->')) {
              teksSub += baris[i] + " ";
              i++;
            }
            if (mulai < selesai && teksSub.trim()) {
              subtitles.push({ mulai, selesai, teks: teksSub.trim() });
            }
          } else {
            i++;
          }
        }
      } catch (err) {
        subText.textContent = "Subtitle tidak tersedia";
      }
    }

    // ====================================
    // FUNGSI AUTO HIDE NAV DI HP
    // ====================================
    function resetHideTimer() {
      if (window.innerWidth > 768) return; // Jalan hanya di HP
      clearTimeout(hideTimer);
      sideNav.classList.remove('hidden');
      bottomNav.classList.remove('hidden');
      hideTimer = setTimeout(() => {
        sideNav.classList.add('hidden');
        bottomNav.classList.add('hidden');
      }, 3000);
    }

    // ====================================
    // KONTROL LAYAR PENUH
    // ====================================
    function toggleFullscreen() {
      const elem = document.documentElement;
      if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
      }
      resetHideTimer();
    }

    // ====================================
    // MENGAMBIL DATA DARI URL
    // ====================================
    function ambilIdDariUrl() {
      const param = new URLSearchParams(window.location.search);
      return param.get('id');
    }

    function pasangPemutar(tmdbId) {
      filmIframe.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}&autoplay=1`;
    }

    async function muatDataAwal() {
      currentMovieId = parseInt(ambilIdDariUrl());
      if (!currentMovieId) {
        document.querySelector('.video-main-wrapper').innerHTML = `<div style="padding:50px; text-align:center;">ID Film tidak ditemukan.</div>`;
        return;
      }

      pasangPemutar(currentMovieId);
      await bacaSubtitle(currentMovieId);
      setTimeout(mulaiSemua, 1200); // Otomatis putar setelah dimuat

      try {
        const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=1`);
        if (res.ok) allMoviesCache = (await res.json()).results;
      } catch (e) { console.error("Gagal memuat daftar film"); }
    }

    // ====================================
    // KOMENTAR
    // ====================================
    async function muatKomentar() {
      if (!currentMovieId) return;
      commentListEl.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">Memuat komentar...</div>';

      try {
        const res = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${currentMovieId}`);
        const hasil = await res.json();
        if (hasil.status !== "success") throw new Error(hasil.message);

        if (!hasil.data.length) {
          commentListEl.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">Belum ada komentar.</div>';
          return;
        }

        commentListEl.innerHTML = hasil.data.map(item => `
          <div class="comment-item">
            <div class="comment-name">${item.nama || 'Anonim'}</div>
            <div class="comment-text">${item.komentar}</div>
            <div class="comment-date">${new Date(item.timestamp).toLocaleString('id-ID')}</div>
          </div>
        `).join('');
      } catch (err) {
        commentListEl.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">Gagal memuat komentar.</div>';
      }
    }

    function bukaFormKomen() {
      panelBackdrop.classList.add('active');
      infoPanel.classList.add('show');
      resetHideTimer();
    }

    function tutupFormKomen() {
      panelBackdrop.classList.remove('active');
      infoPanel.classList.remove('show');
    }

    async function kirimKomentar() {
      const nama = document.getElementById('commentName').value.trim();
      const teks = document.getElementById('commentText').value.trim();
      if (!nama || !teks) return alert("Isi nama dan komentar!");
      tutupFormKomen();

      try {
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ tmdbId: currentMovieId, nama, komentar: teks })
        });
        setTimeout(muatKomentar, 1000);
      } catch {
        alert("Gagal mengirim komentar.");
      }
    }

    // ====================================
    // PENCARIAN
    // ====================================
    searchInput.addEventListener('input', e => {
      const kata = e.target.value.toLowerCase().trim();
      if (!kata) {
        searchResultsLayer.classList.remove('active');
        searchResultsLayer.style.display = 'none';
        return;
      }
      const hasil = allMoviesCache.filter(m => m.title.toLowerCase().includes(kata));
      searchResultsLayer.style.display = 'block';
      searchResultsLayer.innerHTML = hasil.length ? hasil.map(m => `
        <div onclick="bukaFilm(${m.id})" style="display:flex; gap:10px; padding:8px; cursor:pointer;">
          <div style="width:40px; height:55px; background:url('${IMAGE_URL}${m.poster_path}') center/cover; border-radius:4px;"></div>
          <div><div>${m.title}</div><div style="font-size:11px; color:#888;">${m.release_date?.split('-')[0] || '-'}</div></div>
        </div>
      `).join('') : `<div style="padding:15px; text-align:center;">Tidak ditemukan</div>`;
    });

    function bukaFilm(id) {
      window.location.href = `watch.html?id=${id}`;
    }

    // ====================================
    // EVENT LISTENER
    // ====================================
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      muatDataAwal();
      resetHideTimer();
    });

    // Kontrol video
    btnMain.addEventListener('click', () => sedangMain ? hentikanSemua() : mulaiSemua());
    btnMundur.addEventListener('click', () => geserWaktu(-10));
    btnMaju.addEventListener('click', () => geserWaktu(+10));
    btnFullscreen.addEventListener('click', toggleFullscreen);

    // Menu navigasi
    btnSearch.addEventListener('click', () => {
      const buka = searchContainer.classList.toggle('show');
      if (buka) setTimeout(() => searchInput.focus(), 100);
      resetHideTimer();
    });
    btnAddComment.addEventListener('click', bukaFormKomen);
    btnHome.addEventListener('click', () => window.location.href = 'index.html');
    btnViewComments.addEventListener('click', () => {
      commentsPanel.classList.toggle('open');
      if (commentsPanel.classList.contains('open')) muatKomentar();
      resetHideTimer();
    });
    closeCommentsBtn.addEventListener('click', () => commentsPanel.classList.remove('open'));
    panelBackdrop.addEventListener('click', tutupFormKomen);

    // Deteksi sentuhan/gerakan untuk memunculkan kembali nav
    mainArea.addEventListener('touchstart', resetHideTimer);
    mainArea.addEventListener('mousemove', resetHideTimer);
    mainArea.addEventListener('click', resetHideTimer);
  </script>

</body>
</html>
