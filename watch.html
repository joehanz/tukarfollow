<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Detail</title>

bbbbbbb
</head>

<body>

<nav>
<div class="logo">MOVIE+</div>

<div class="nav-right">
<input id="search" placeholder="Search..." oninput="searchMovie()">
<a href="index.html">Home</a>
<a href="#" onclick="loadLocal()">Local</a>
</div>

<div class="burger" onclick="toggleMenu()">☰</div>
</nav>

<div class="mobile-menu" id="mobileMenu">
<input placeholder="Search..." oninput="searchMovieMobile()">
<a href="index.html">Home</a>
<a href="#" onclick="loadLocal()">Local</a>
</div>

<!-- 🔥 OVERLAY SEARCH/LOCAL -->
<div id="overlay">
<div id="overlayGrid" class="overlay-grid"></div>

<div id="overlayPagination" style="
display:flex;
justify-content:center;
gap:8px;
padding:25px;
flex-wrap:wrap;
"></div>
</div>

<div class="player">
<iframe id="player" allowfullscreen></iframe>
<div class="playLayer" id="playLayer">▶ PLAY</div>
</div>

<div class="info" id="info"></div>

<div class="rel-wrap">
<button class="arrow left" onclick="move(-1)">‹</button>
<button class="arrow right" onclick="move(1)">›</button>
<div class="rel-box" id="rel"></div>
</div>

<footer>
<div class="footer-grid">
<div>About</div>
<div>DMCA</div>
<div>Privacy</div>
<div>Contact</div>
</div>
</footer>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";
const id=new URLSearchParams(location.search).get("id");

const ads=[
"https://rajarayap.com",
"https://caturbangunsentosa.blogspot.com",
"https://ptdwiprima.blogspot.com"
];

let adsState=false;
let items=[];

/* OVERLAY STATE */
let overlayPage=1;
let overlayMode="";
let currentQuery="";

/* BURGER */
function toggleMenu(){
document.getElementById("mobileMenu")
.classList.toggle("show");
}

/* OVERLAY LOAD */
async function loadOverlay(){

let url="";

if(overlayMode==="search"){
url=`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${encodeURIComponent(currentQuery)}&page=${overlayPage}`;
}

if(overlayMode==="local"){
url=`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_origin_country=ID&page=${overlayPage}`;
}

const data=await fetch(url)
.then(r=>r.json());

showOverlay(data.results);

renderOverlayPagination(
data.page,
data.total_pages
);

}

/* SHOW OVERLAY */
function showOverlay(data){

document.getElementById("overlay").style.display="block";

let h="";

data.forEach(v=>{

if(!v.poster_path) return;

h+=`
<div class="card" onclick="go(${v.id})">

<img src="https://image.tmdb.org/t/p/w300${v.poster_path}">

<div class="title">
${v.title||v.name}
</div>

</div>
`;

});

document.getElementById(
"overlayGrid"
).innerHTML=h;

}

/* PAGINATION */
function renderOverlayPagination(
page,
total
){

let h="";

let start=Math.max(
1,
page-2
);

let end=Math.min(
total,
start+5
);

for(
let i=start;
i<=end;
i++
){

h+=`
<button
onclick="changeOverlayPage(${i})"
style="
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:${i===page?'#ff2e2e':'#1a1a22'};
color:#fff;
"
>

${i}

</button>
`;

}

if(page<total){

h+=`
<button
onclick="changeOverlayPage(${page+1})"
style="
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1a1a22;
color:#fff;
"
>

›

</button>
`;

}

document.getElementById(
"overlayPagination"
).innerHTML=h;

}

function changeOverlayPage(p){

overlayPage=p;

loadOverlay();

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* SEARCH */
function searchMovie(){

const val=
document.getElementById(
"search"
).value;

if(!val.trim()) return;

currentQuery=val;

overlayMode="search";

overlayPage=1;

loadOverlay();

}

/* MOBILE SEARCH */
function searchMovieMobile(){

const val=
document.querySelector(
"#mobileMenu input"
).value;

if(!val.trim()) return;

currentQuery=val;

overlayMode="search";

overlayPage=1;

loadOverlay();

}

/* LOCAL */
function loadLocal(){

overlayMode="local";

overlayPage=1;

loadOverlay();

}

/* PLAY GATE */
document.getElementById(
"playLayer"
).onclick=function(){

if(!adsState){

adsState=true;

window.open(
ads[
Math.floor(
Math.random()*ads.length
)
],
"_blank"
);

return;

}

this.style.display="none";

document.getElementById(
"player"
).src=
`https://vsembed.ru/embed/movie?tmdb=${id}`;

};

/* LOAD DETAIL */
async function load(){

let m=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}&language=id-ID`
).then(r=>r.json());

/* fallback kalau sinopsis Indonesia kosong */
if(!m.overview){

const backup=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
).then(r=>r.json());

m.overview=backup.overview;

}

document.getElementById("info").innerHTML=`

<h2>${m.title}</h2>

<p>⭐ Rating : ${m.vote_average.toFixed(1)}</p>

<p>📅 Rilis : ${m.release_date || "-"}</p>

<p>🌍 Negara : ${
m.production_countries.map(
c=>c.name
).join(", ")
}</p>

<p>🎭 Genre : ${
m.genres.map(
g=>g.name
).join(", ")
}</p>

<p style="
margin-top:15px;
line-height:1.7;
opacity:.9;
">
${m.overview || "Sinopsis tidak tersedia"}
</p>

`;

const r=await fetch(
`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`
)
.then(r=>r.json());

items=r.results.slice(
0,
15
);

render();

}

/* RELATED */
function render(){

let h="";

items.forEach(v=>{

if(!v.poster_path)return;

h+=`

<div
class="rel-card"
onclick="go(${v.id})"
>

<img src="https://image.tmdb.org/t/p/w200${v.poster_path}">

</div>

`;

});

document.getElementById(
"rel"
).innerHTML=h;

}

function move(dir){

document.getElementById(
"rel"
).scrollBy({

left:dir*300,
behavior:"smooth"

});

}

function go(i){

location.href=
`watch.html?id=${i}`;

}

load();

</script>

</body>
</html>
