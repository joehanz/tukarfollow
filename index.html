<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- NAV -->
<nav class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
  <div class="text-red-600 font-bold text-xl">MOVIE+</div>

  <div class="hidden md:flex gap-6 text-sm text-gray-300">
    <a href="index.html">Home</a>
    <a href="movies.html">Movies</a>
  </div>
</nav>

<!-- GRID -->
<section class="p-6">
  <h1 class="text-xl font-bold mb-4">All Movies</h1>

  <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
</section>

<!-- FOOTER -->
<footer class="border-t border-gray-800 p-6 grid grid-cols-2 md:grid-cols-4 gap-4 text-sm text-gray-400">
  <div>Movie+</div>
  <div>Menu</div>
  <div>Genre</div>
  <div>Info</div>
</footer>

<script>
fetch('movies.json')
  .then(res => res.json())
  .then(data => {
    const grid = document.getElementById('grid');

    data.forEach(movie => {
      grid.innerHTML += `
        <a href="watch.html?id=${movie.id}" class="bg-gray-900 rounded overflow-hidden hover:scale-105 transition">
          <img src="${movie.image}" class="w-full h-44 object-cover">
          <div class="p-2 text-sm font-semibold">${movie.title}</div>
        </a>
      `;
    });
  });
</script>

</body>
</html>
