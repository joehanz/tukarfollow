<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pemutar TMDB + Subtitle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial}
        body {background:#121212; color:#fff; padding:20px}

        /* Daftar Poster */
        .grid {display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:16px; max-width:1100px; margin:0 auto 30px}
        .item {cursor:pointer; border-radius:8px; overflow:hidden; background:#222; transition:0.2s}
        .item:hover {transform:scale(1.05)}
        .poster {width:100%; display:block}
        .judul {padding:8px; text-align:center; font-size:14px}

        /* Pemutar + Subtitle */
        .pemutar {max-width:960px; margin:0 auto; position:relative; background:#000; border-radius:8px; overflow:hidden; display:none}
        iframe {width:100%; height:520px; border:none; display:block}
        .subtitle {position:absolute; bottom:70px; left:0; right:0; text-align:center; z-index:10; pointer-events:none; padding:0 20px}
        .teks-sub {font-size:22px; font-weight:bold; color:#fff; text-shadow:0 0 4px #000,0 0 8px #000; line-height:1.5; min-height:45px}
        @media (max-width:768px) {iframe {height:320px} .teks-sub {font-size:18px}}
    </style>
</head>
<body>

<div class="grid" id="daftarFilm"></div>
<div class="pemutar" id="wadahPemutar">
    <iframe id="iframeVideo" allowfullscreen allow="autoplay; fullscreen"></iframe>
    <div class="subtitle"><div class="teks-sub" id="tampilSub"></div></div>
</div>

<script>
const TMDB_KEY = "c000d7b8b0f5ee16b98b6103009745d8";
const EMBED_URL = "https://vsembed.ru/embed/movie?tmdb="; // Bisa ganti ke vidsrc dll
let daftarSub = [];

// Ambil daftar film populer dari TMDB
async function muatFilm() {
  const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_KEY}&language=id-ID`);
  const data = await res.json();
  const wadah = document.getElementById("daftarFilm");
  wadah.innerHTML = "";

  data.results.forEach(film => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <img class="poster" src="https://image.tmdb.org/t/p/w300${film.poster_path}" alt="${film.title}">
      <div class="judul">${film.title}</div>`;
    div.onclick = () => putarFilm(film.id);
    wadah.appendChild(div);
  });
}

// Jalankan saat poster diklik
function putarFilm(tmdbId) {
  document.getElementById("daftarFilm").style.display = "none";
  const pemutar = document.getElementById("wadahPemutar");
  pemutar.style.display = "block";

  // Muat video hanya pakai ID TMDB
  document.getElementById("iframeVideo").src = EMBED_URL+tmdbId;

  // === SUBTITLE KAMU ===
  daftarSub = [
    {start:2, end:5, teks:"Selamat menonton"},
    {start:6, end:10, teks:"ID TMDB: "+tmdbId},
    {start:12, end:16, teks:"Subtitle tetap bisa jalan terpisah"}
  ];

  // Sinkronisasi subtitle
  let waktu = 0;
  setInterval(() => {
    waktu += 0.2; // Simulasi waktu, bisa disesuaikan lebih akurat
    let tampil = "";
    daftarSub.forEach(s => {
      if (waktu >= s.start && waktu <= s.end) tampil = s.teks;
    });
    document.getElementById("tampilSub").textContent = tampil;
  }, 200);
}

muatFilm();
</script>
</body>
</html>
