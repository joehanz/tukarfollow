<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Movie</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
}

/* top bar */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 10px;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  z-index: 10;
}

.back {
  background: red;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
}

/* player */
.player {
  width: 100%;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* loading */
.loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 16px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="back" onclick="history.back()">⬅ Back</div>
</div>

<div class="player">
  <div class="loading" id="loading">Loading player...</div>
  <iframe id="frame" allowfullscreen></iframe>
</div>

<script>
// ambil link dari index
const urlParams = new URLSearchParams(window.location.search);
const video = urlParams.get("play");

const frame = document.getElementById("frame");
const loading = document.getElementById("loading");

if(video){
  frame.src = video;

  frame.onload = () => {
    loading.style.display = "none";
  };
} else {
  loading.innerHTML = "No video found";
}
</script>

</body>
</html>
