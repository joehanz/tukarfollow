/* ✅ Navigasi kontrol: selalu terlihat di semua kondisi */
.subtitle-layer {

  justify-content: center;
  align-items: center;

  /* Induk none agar area lobang di kanan bisa tembus klik ke subtitle asli */
  pointer-events: none !important; 
}

/* Supaya tombol-tombol nav situs Anda TETAP BISA DIKLIK */
.subtitle-layer * {
  pointer-events: auto;
}

/* ⬇️ SISIPAN BARU: Seting otomatis untuk menggeser grup kontrol situs ke kiri dari titik 0 ⬇️ */
/* Ganti .grup-kontrol-situs dengan class wrapper/pembungkus ikon grup kontrol situs Anda */
.grup-kontrol-situs {
  position: absolute;
  
  /* PANDUAN GESER: Patokan kiri layar adalah 0 */
  left: 35%; /* Semakin KECIL persennya (misal: 30%, 25%), grup kontrol akan semakin geser ke KIRI secara otomatis di semua perangkat */
  
  transform: translateX(-50%); /* Menjaga titik pusat ikon agar tetap presisi */
}

/* TAMENG KIRI: Tak terlihat tapi memblokir klik */
.subtitle-layer::before {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 150px; /* Batas kiri lobang Anda */
  
  /* TRIK: Menggunakan rgba dengan alpha 0. Visualnya 100% transparan (tidak norak), 
     tapi browser tetap menganggapnya ada wujud untuk memblokir klik! */
  background: rgba(0, 0, 0, 0); 
  
  z-index: -1;
  pointer-events: auto; /* AKTIF MEMBLOKIR KLIK */
}

/* TAMENG KANAN: Tak terlihat tapi memblokir klik */
.subtitle-layer::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: calc(100% - 60px); /* Batas kanan lobang Anda */
  right: 0;
  
  /* TRIK yang sama: Transparan tapi tetap berwujud menahan klik */
  background: rgba(0, 0, 0, 0); 
  
  z-index: -1;
  pointer-events: auto; /* AKTIF MEMBLOKIR KLIK */
}

<script>
    // Konfigurasi
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
    const MOVIES_JSON_PATH = './movies.json'; // Jalur file json kamu

    // Sumber cadangan jika tidak ada di movies.json
    const SUMBER_EMBED = {
      utama: (id) => `https://vsembed.ru/embed/movie?tmdb=${id}`,
      cadangan1: (id) => `https://vidsrc.me/embed/movie?tmdb=${id}`,
      cadangan2: (id) => `https://vidsrc.in/embed/movie?tmdb=${id}`
    };

    const videoWrapper = document.getElementById('videoWrapper');
    const filmIframe = document.getElementById('filmIframe');
    const btnHomeBack = document.getElementById('btnHomeBack');
    const btnAddComment = document.getElementById('btnAddComment');
    const btnViewComments = document.getElementById('btnViewComments');
    const btnPlayer2 = document.getElementById('btnPlayer2');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const commentsPanel = document.getElementById('commentsPanel');
    const closeCommentsBtn = document.getElementById('closeCommentsBtn');
    const commentListEl = document.getElementById('commentList');
    const infoPanel = document.getElementById('infoPanel');
    const panelBackdrop = document.getElementById('panelBackdrop');

    let currentMovieId = null;

    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.unlock();
    }

    function ambilIdDariUrl() {
      const param = new URLSearchParams(window.location.search);
      return param.get('id');
    }

// ✅ Logika baru: Cek movies.json DULU baru TMDB
async function cekDanMuatFilm(tmdbId) {
  try {
    const res = await fetch(MOVIES_JSON_PATH, { cache: "no-store" });
    if (res.ok) {
      const daftar = await res.json();
      const ketemu = daftar.find(f => Number(f.tmdb_id) === Number(tmdbId));
      if (ketemu && ketemu.iframe) {
        filmIframe.src = ketemu.iframe;
        return;
      }
    }
  } catch {}

  // Hanya kalau tidak ketemu, baru pakai TMDB
  filmIframe.src = SUMBER_EMBED.utama(tmdbId);
  filmIframe.onerror = () => {
    filmIframe.src = SUMBER_EMBED.cadangan1(tmdbId);
    filmIframe.onerror = () => {
      filmIframe.src = SUMBER_EMBED.cadangan2(tmdbId);
    };
  };
}

    // ✅ Fungsi tombol Player 2: Buka alternate.html dengan parameter id yang sama
    btnPlayer2.addEventListener('click', () => {
      if (currentMovieId) {
        window.location.href = `alternate.html?id=${currentMovieId}`;
      } else {
        alert("ID film tidak ditemukan, tidak bisa beralih ke Player 2.");
      }
    });

    // Kontrol layar penuh
    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen();
        } else if (document.documentElement.webkitRequestFullscreen) {
          document.documentElement.webkitRequestFullscreen();
        } else if (document.documentElement.mozRequestFullScreen) {
          document.documentElement.mozRequestFullScreen();
        } else if (document.documentElement.msRequestFullscreen) {
          document.documentElement.msRequestFullscreen();
        }
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      }
      lucide.createIcons();
    });

    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
    document.addEventListener('mozfullscreenchange', updateFullscreenIcon);
    document.addEventListener('MSFullscreenChange', updateFullscreenIcon);

    function updateFullscreenIcon() {
      const isFull = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
      btnFullscreen.innerHTML = isFull ? '<i data-lucide="minimize"></i>' : '<i data-lucide="maximize"></i>';
      lucide.createIcons();
    }

    btnHomeBack.addEventListener('click', () => {
      if (window.history.length > 1) window.history.back();
      else window.location.href = 'index.html';
    });

    btnAddComment.addEventListener('click', bukaFormKomen);
    panelBackdrop.addEventListener('click', tutupFormKomen);

    function bukaFormKomen() {
      infoPanel.classList.add('show');
      panelBackdrop.classList.add('active');
    }

    function tutupFormKomen() {
      infoPanel.classList.remove('show');
      panelBackdrop.classList.remove('active');
    }

    async function kirimKomentar() {
      const nama = document.getElementById('commentName').value.trim();
      const teks = document.getElementById('commentText').value.trim();
      if (!nama || !teks) return alert("Isi nama dan komentar dulu!");
      try {
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ tmdbId: currentMovieId, nama, komentar: teks })
        });
        alert("Komentar berhasil dikirim!");
        tutupFormKomen();
        setTimeout(muatKomentar, 800);
      } catch {
        alert("Gagal mengirim komentar. Coba lagi.");
      }
    }

    btnViewComments.addEventListener('click', () => {
      const buka = commentsPanel.classList.toggle('open');
      if (buka) muatKomentar();
    });

    closeCommentsBtn.addEventListener('click', () => commentsPanel.classList.remove('open'));

    async function muatKomentar() {
      if (!currentMovieId) return;
      commentListEl.innerHTML = '<div class="empty-comments">Memuat komentar...</div>';
      try {
        const res = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${currentMovieId}`);
        const hasil = await res.json();
        if (hasil.status !== "success" || !hasil.data.length) {
          commentListEl.innerHTML = '<div class="empty-comments">Belum ada komentar. Jadilah yang pertama!</div>';
          return;
        }
        commentListEl.innerHTML = hasil.data.map(item => `
          <div class="comment-item">
            <div class="comment-name">${item.nama || 'Anonim'}</div>
            <div class="comment-text">${item.komentar || ''}</div>
            <div class="comment-date">${new Date(item.timestamp).toLocaleString('id-ID')}</div>
          </div>
        `).join('');
      } catch {
        commentListEl.innerHTML = '<div class="empty-comments">Gagal memuat komentar.</div>';
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      currentMovieId = ambilIdDariUrl();
      if (!currentMovieId) {
        videoWrapper.innerHTML = `<div style="padding:50px; text-align:center; color:#fff;">ID Film tidak ditemukan</div>`;
        return;
      }
      // Panggil fungsi cek urutan baru
      cekDanMuatFilm(currentMovieId);
    });
</script>
</body>
</html>
