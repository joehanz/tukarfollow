<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grid Film</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #1a1a1a;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    .search-box {
      margin-top: 10px;
    }

    .search-box input {
      width: 90%;
      max-width: 400px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      padding: 15px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card .title {
      padding: 8px;
      font-size: 14px;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎬 Grid Film</h1>
  <div class="search-box">
    <input type="text" id="search" placeholder="Cari film..." onkeyup="filterFilm()">
  </div>
</header>

<div class="grid" id="grid">

  <div class="card" onclick="openFilm('https://example.com')">
    <img src="https://picsum.photos/300/450?1">
    <div class="title">Film 1</div>
  </div>

  <div class="card" onclick="openFilm('https://example.com')">
    <img src="https://picsum.photos/300/450?2">
    <div class="title">Film 2</div>
  </div>

  <div class="card" onclick="openFilm('https://example.com')">
    <img src="https://picsum.photos/300/450?3">
    <div class="title">Film 3</div>
  </div>

  <div class="card" onclick="openFilm('https://example.com')">
    <img src="https://picsum.photos/300/450?4">
    <div class="title">Film 4</div>
  </div>

</div>

<footer>
  © 2026 Grid Film Simple
</footer>

<script>
  function openFilm(url) {
    window.open(url, "_blank");
  }

  function filterFilm() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
      let title = card.querySelector(".title").innerText.toLowerCase();
      card.style.display = title.includes(input) ? "block" : "none";
    });
  }
</script>

</body>
</html>
