<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemutar Film TMDB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #111; color: #fff; padding: 15px; }

        /* Daftar Poster */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .film {
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            background: #222;
        }
        .film img { width: 100%; display: block; }
        .film p { padding: 6px; text-align: center; font-size: 13px; }

        /* Pemutar */
        .pemutar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .sub {
            position: absolute;
            bottom: 70px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 24px;
            color: #fff;
            text-shadow: 0 0 4px #000, 0 0 8px #000;
            padding: 0 20px;
            pointer-events: none;
        }
        .kembali {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10;
            font-size: 15px;
        }
    </style>
</head>
<body>

<!-- Daftar Film -->
<div class="grid" id="daftarFilm"></div>

<!-- Layar Pemutar -->
<div class="pemutar" id="layarPutar">
    <button class="kembali" onclick="kembaliKeDaftar()">← Kembali</button>
    <iframe id="frameVideo" allowfullscreen></iframe>
    <div class="sub" id="teksSub"></div>
</div>

<script>
// =====================
// PENGATURAN SUDAH SESUAI
// =====================
const API_KEY = "c000d7b8b0f5ee16b98b6103009745d8";
const EMBED_URL = "https://vsembed.ru/embed/movie?tmdb=";
// ✅ ALAMAT LENGKAP: MASUK KE FOLDER subtitles
const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

let daftarSub = [];
let waktuSekarang = 0;
let timerJalankan = null;

// =====================
// TAMPILKAN DAFTAR POSTER
// =====================
async function muatDaftarFilm() {
    try {
        const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=id-ID&page=1`);
        const data = await res.json();
        const wadah = document.getElementById("daftarFilm");
        wadah.innerHTML = "";

        data.results.forEach(film => {
            if (!film.poster_path) return;
            const kartu = document.createElement("div");
            kartu.className = "film";
            kartu.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w300${film.poster_path}" alt="${film.title}">
                <p>${film.title}</p>
            `;
            kartu.onclick = () => putarFilm(film.id);
            wadah.appendChild(kartu);
        });
    } catch (err) {
        console.log("Gagal memuat daftar:", err);
    }
}

// =====================
// PUTAR FILM & MUAT SUBTITLE
// =====================
function putarFilm(idTMDB) {
    document.getElementById("daftarFilm").style.display = "none";
    document.getElementById("layarPutar").style.display = "block";

    // Muat video
    document.getElementById("frameVideo").src = EMBED_URL + idTMDB;

    // Reset data
    waktuSekarang = 0;
    daftarSub = [];
    document.getElementById("teksSub").textContent = "";
    if (timerJalankan) clearInterval(timerJalankan);

    // ✅ BACA FILE DALAM FOLDER subtitles
    bacaFileSubtitle(idTMDB);

    // Mulai hitung waktu
    timerJalankan = setInterval(() => {
        waktuSekarang += 1;
        tampilkanSubtitle();
    }, 1000);
}

// =====================
// BACA FILE .vtt DARI DALAM FOLDER
// =====================
async function bacaFileSubtitle(id) {
    try {
        // Contoh: https://raw.githubusercontent.com/.../subtitles/12345.vtt
        const res = await fetch(SUBTITLE_URL + id + ".vtt");
        if (!res.ok) return; // Tidak ada file = langsung kosong
        const teksVTT = await res.text();
        daftarSub = olahFormatVTT(teksVTT);
    } catch (err) {
        daftarSub = [];
    }
}

// =====================
// OLAH FORMAT VTT
// =====================
function olahFormatVTT(teks) {
    const baris = teks.split("\n").map(b => b.trim()).filter(b => b);
    const hasil = [];
    let i = 0;

    if (baris[0].toUpperCase() === "WEBVTT") i++;

    while (i < baris.length) {
        if (baris[i].includes("-->")) {
            const [waktuMulai, waktuSelesai] = baris[i].split("-->").map(w => w.trim());
            const mulai = ubahKeDetik(waktuMulai);
            const selesai = ubahKeDetik(waktuSelesai);
            let teks = "";
            i++;
            while (i < baris.length && !baris[i].includes("-->")) {
                teks += baris[i] + " ";
                i++;
            }
            hasil.push({ mulai, selesai, teks: teks.trim() });
        } else {
            i++;
        }
    }
    return hasil;
}

// =====================
// UBAH WAKTU KE DETIK
// =====================
function ubahKeDetik(waktu) {
    const bagian = waktu.split(":");
    const detikBagian = bagian[2].split(".");
    return Number(bagian[0]) * 3600 + Number(bagian[1]) * 60 + Number(detikBagian[0]) + (Number(detikBagian[1] || 0) / 1000);
}

// =====================
// TAMPILKAN SUBTITLE
// =====================
function tampilkanSubtitle() {
    const aktif = daftarSub.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
    document.getElementById("teksSub").textContent = aktif ? aktif.teks : "";
}

// =====================
// KEMBALI KE DAFTAR
// =====================
function kembaliKeDaftar() {
    document.getElementById("layarPutar").style.display = "none";
    document.getElementById("daftarFilm").style.display = "grid";
    document.getElementById("frameVideo").src = "";
    if (timerJalankan) clearInterval(timerJalankan);
}

// Jalankan awal
muatDaftarFilm();
</script>

</body>
</html>
