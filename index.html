<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Netflix Hybrid Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* TOP NAV */
.topbar{
  position:sticky;
  top:0;
  background:#000;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  border-bottom:1px solid #111;
}

.logo{
  color:red;
  font-weight:bold;
}

/* BURGER */
.burger{
  font-size:22px;
  cursor:pointer;
}

/* SIDE MENU */
.side{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.3s;
  z-index:2000;
}

.side.open{
  left:0;
}

.side a{
  display:block;
  padding:10px 0;
  color:#fff;
  text-decoration:none;
  border-bottom:1px solid #222;
}

/* HERO */
.hero{
  height:55vh;
  background:
    linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.2), rgba(0,0,0,0.85)),
    url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

/* SECTION */
.section{
  padding:10px;
}

.section h2{
  margin:10px 0;
}

/* GRID TMDB */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
}

/* CARD */
.card{
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}

.title{
  font-size:12px;
  opacity:0.8;
  margin-top:5px;
}

/* PAGINATION */
.pagination{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
}

.pagination button{
  padding:6px 12px;
  background:#222;
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:5px;
}

.pagination button.active{
  background:red;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="burger" onclick="toggleMenu()">☰</div>
  <div class="logo">STREAM LOCK</div>
</div>

<div class="side" id="side">
  <a href="#" onclick="loadManual()">Manual Posts</a>
  <a href="#" onclick="loadTMDB()">TMDB Grid</a>
  <a href="#" onclick="loadAll()">All Movies</a>
</div>

<div class="hero">
  <div>
    <h1>Watch Unlimited Movies</h1>
    <p>Hybrid Manual + TMDB System</p>
  </div>
</div>

<div class="section">
  <h2 id="sectionTitle">Movies</h2>
  <div class="grid" id="grid"></div>
</div>

<div class="pagination" id="pagination"></div>

<script>

let mode = "all";
let page = 1;
let perPage = 12;

let manualMovies = [];
let tmdbMovies = [];

/* ===== SAMPLE MANUAL ===== */
manualMovies = [
  {
    title:"Manual Movie 1",
    poster:"https://via.placeholder.com/300x450",
    embed:"https://example.com"
  },
  {
    title:"Manual Movie 2",
    poster:"https://via.placeholder.com/300x450",
    embed:"https://example.com"
  }
];

/* ===== SAMPLE TMDB ===== */
for(let i=1;i<=60;i++){
  tmdbMovies.push({
    title:"TMDB Movie "+i,
    poster:"https://via.placeholder.com/300x450",
    embed:"https://example.com"
  });
}

function toggleMenu(){
  document.getElementById("side").classList.toggle("open");
}

/* LOAD MODES */
function loadManual(){
  mode="manual";
  page=1;
  render();
  closeMenu();
}

function loadTMDB(){
  mode="tmdb";
  page=1;
  render();
  closeMenu();
}

function loadAll(){
  mode="all";
  page=1;
  render();
  closeMenu();
}

function closeMenu(){
  document.getElementById("side").classList.remove("open");
}

/* RENDER */
function render(){

  let data = [];

  if(mode==="manual") data = manualMovies;
  else if(mode==="tmdb") data = tmdbMovies;
  else data = manualMovies.concat(tmdbMovies);

  document.getElementById("sectionTitle").innerText = mode.toUpperCase();

  let start = (page-1)*perPage;
  let end = start + perPage;

  let paged = data.slice(start,end);

  let grid = document.getElementById("grid");
  grid.innerHTML="";

  paged.forEach(m=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${m.poster}">
      <div class="title">${m.title}</div>
    `;

    div.onclick=()=>{
      window.location.href="watch.html?play="+encodeURIComponent(m.embed);
    };

    grid.appendChild(div);
  });

  renderPagination(data.length);
}

/* PAGINATION */
function renderPagination(total){

  let totalPages = Math.ceil(total/perPage);
  let pag = document.getElementById("pagination");
  pag.innerHTML="";

  for(let i=1;i<=totalPages;i++){
    let btn=document.createElement("button");
    btn.innerText=i;

    if(i===page) btn.classList.add("active");

    btn.onclick=()=>{
      page=i;
      render();
    };

    pag.appendChild(btn);
  }
}

loadAll();

</script>

</body>
</html>
