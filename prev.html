<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemutar Film TMDB</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        .watch-layout {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        #videoWrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #filmIframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Lapisan Subtitle */
        .sub-layer {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 999;
            pointer-events: none;
            padding: 0 20px;
            transition: opacity 0.3s ease;
        }

        .sub-layer.hidden {
            opacity: 0;
        }

        #subText {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 4px #000, 0 0 8px #000, 0 0 12px #000;
            line-height: 1.5;
            min-height: 45px;
        }

        /* Bilah Kontrol */
        .control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px 30px;
            z-index: 1000;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            transform: translateY(100%);
        }

        .watch-layout.nav-visible .control-bar {
            opacity: 1;
            transform: translateY(0);
        }

        .kontrol-atas {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .kontrol-tombol {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .kontrol-tombol button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .kontrol-tombol button:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Panel Tambahan */
        .panel {
            position: absolute;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1100;
            transition: right 0.3s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .panel.open {
            right: 0;
        }

        .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1050;
            display: none;
        }

        .backdrop.active {
            display: block;
        }

        .search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            width: 90%;
            max-width: 600px;
            background: #222;
            border-radius: 8px;
            z-index: 1200;
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .search-container.show {
            transform: translateX(-50%) translateY(0);
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            background: #333;
            color: #fff;
            font-size: 16px;
        }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
        }

        .search-item-row {
            display: flex;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #444;
        }

        .search-item-row:hover {
            background: #444;
        }

        .search-item-thumb {
            width: 50px;
            height: 70px;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
        }

        .comment-item {
            background: #222;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .comment-name {
            font-weight: bold;
            margin-bottom: 4px;
            color: #4CAF50;
        }

        .comment-date {
            font-size: 12px;
            color: #aaa;
            margin-top: 6px;
        }

        @media (max-width: 768px) {
            #subText { font-size: 20px; }
            .control-bar { padding: 15px; }
            .kontrol-tombol button { width: 36px; height: 36px; font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="watch-layout" id="watchLayout">
    <div id="videoWrapper">
        <iframe id="filmIframe" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>

    <!-- Lapisan Subtitle -->
    <div class="sub-layer" id="subLayer">
        <div id="subText"></div>
    </div>

    <!-- Bilah Kontrol -->
    <div class="control-bar">
        <div class="kontrol-atas">
            <span id="jamTayang">00:00:00</span>
        </div>
        <div class="kontrol-tombol">
            <button id="btnMain"><i data-lucide="play"></i></button>
            <button id="btnMundur"><i data-lucide="rotate-ccw"></i></button>
            <button id="btnMaju"><i data-lucide="rotate-cw"></i></button>
            <button id="btnFullscreen"><i data-lucide="maximize"></i></button>
            <button id="btnSearch"><i data-lucide="search"></i></button>
            <button id="btnViewComments"><i data-lucide="message-square"></i></button>
            <button id="btnAddComment"><i data-lucide="plus-circle"></i></button>
            <button id="btnHome"><i data-lucide="home"></i></button>
        </div>
    </div>

    <!-- Panel Pencarian -->
    <div class="search-container" id="searchContainer">
        <input type="text" id="searchInput" class="search-input" placeholder="Cari judul film...">
        <div class="search-results" id="searchResultsLayer"></div>
    </div>

    <!-- Panel Komentar & Form -->
    <div class="panel backdrop" id="panelBackdrop"></div>
    <div class="panel" id="commentsPanel">
        <div class="commentsHeader" id="commentsHeader">
            <h3>Komentar</h3>
            <button class="close-comments" id="closeCommentsBtn">&times;</button>
        </div>
        <div id="commentList"></div>
    </div>

    <div class="panel" id="infoPanel">
        <h3>Tambah Komentar</h3>
        <input type="text" id="commentName" placeholder="Nama Anda" style="width:100%; padding:8px; margin:10px 0; background:#333; border:none; color:#fff; border-radius:4px;">
        <textarea id="commentText" rows="4" placeholder="Tulis komentar..." style="width:100%; padding:8px; background:#333; border:none; color:#fff; border-radius:4px;"></textarea>
        <button onclick="kirimKomentar()" style="margin-top:10px; padding:8px 15px; background:#2196F3; border:none; color:#fff; border-radius:4px; cursor:pointer;">Kirim</button>
    </div>
</div>

<script>
      // KONFIGURASI
      const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8';
      const BASE_URL = 'https://api.themoviedb.org/3';
      const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
      const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
      const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

      // Elemen
      const videoWrapper = document.getElementById('videoWrapper');
      const filmIframe = document.getElementById('filmIframe');
      const subText = document.getElementById('subText');
      const subLayer = document.getElementById('subLayer');
      const jamTayang = document.getElementById('jamTayang');
      const btnMain = document.getElementById('btnMain');
      const btnMundur = document.getElementById('btnMundur');
      const btnMaju = document.getElementById('btnMaju');
      const btnFullscreen = document.getElementById('btnFullscreen');
      const btnSearch = document.getElementById('btnSearch');
      const btnAddComment = document.getElementById('btnAddComment');
      const btnHome = document.getElementById('btnHome');
      const btnViewComments = document.getElementById('btnViewComments');
      const commentsPanel = document.getElementById('commentsPanel');
      const commentsHeader = document.getElementById('commentsHeader');
      const closeCommentsBtn = document.getElementById('closeCommentsBtn');
      const commentListEl = document.getElementById('commentList');
      const searchContainer = document.getElementById('searchContainer');
      const searchInput = document.getElementById('searchInput');
      const searchResultsLayer = document.getElementById('searchResultsLayer');
      const infoPanel = document.getElementById('infoPanel');
      const panelBackdrop = document.getElementById('panelBackdrop');
      const watchLayout = document.getElementById('watchLayout');

      let currentMovieId = null;
      let allMoviesCache = [];
      let autoFullscreen = false;

      let subtitles = [];
      let waktuSekarang = 0;
      let pemutar = null;
      let sedangMain = false;

      // ====================================
      // FUNGSI BANTU
      // ====================================
      function ubahKeWaktu(detik) {
        if (isNaN(detik) || detik < 0) detik = 0;
        const j = Math.floor(detik / 3600).toString().padStart(2, '0');
        const m = Math.floor((detik % 3600) / 60).toString().padStart(2, '0');
        const d = Math.floor(detik % 60).toString().padStart(2, '0');
        return `${j}:${m}:${d}`;
      }

      function ubahKeDetik(teksWaktu) {
        if (!teksWaktu) return 0;
        teksWaktu = teksWaktu.replace(/[, \s]/g, '.').trim();
        const bagian = teksWaktu.split(':');
        let hasil = 0;
        if (bagian.length === 3) hasil = Number(bagian[0]) * 3600 + Number(bagian[1]) * 60 + Number(bagian[2]);
        if (bagian.length === 2) hasil = Number(bagian[0]) * 60 + Number(bagian[1]);
        return isNaN(hasil) ? 0 : hasil;
      }

      function perbaruiTampilan() {
        const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
        subText.textContent = aktif ? aktif.teks : "";
        jamTayang.textContent = ubahKeWaktu(waktuSekarang);
      }

      // ====================================
      // FUNGSI UTAMA: KAWINKAN PLAY & SUB
      // ====================================
      function mulaiSemua() {
        if (pemutar) clearInterval(pemutar);
        sedangMain = true;
        btnMain.innerHTML = '<i data-lucide="pause"></i>';
        lucide.createIcons();
        pemutar = setInterval(() => {
          waktuSekarang += 1;
          perbaruiTampilan();
        }, 1000);
        try { filmIframe.contentWindow.postMessage({ cmd: "play" }, "*"); } catch (e) {}

        if (autoFullscreen) {
          aktifkanFullscreenOtomatis();
        }
      }

      function hentikanSemua() {
        sedangMain = false;
        btnMain.innerHTML = '<i data-lucide="play"></i>';
        lucide.createIcons();
        clearInterval(pemutar);
        try { filmIframe.contentWindow.postMessage({ cmd: "pause" }, "*"); } catch (e) {}
      }

      function geserWaktu(ubah) {
        waktuSekarang = Math.max(0, waktuSekarang + ubah);
        perbaruiTampilan();
        if (sedangMain) {
          clearInterval(pemutar);
          pemutar = setInterval(() => {
            waktuSekarang += 1;
            perbaruiTampilan();
          }, 1000);
        }
      }

      function aktifkanFullscreenOtomatis() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
          if (videoWrapper.requestFullscreen) {
            videoWrapper.requestFullscreen().catch(err => console.log("Fullscreen diblokir:", err));
          } else if (videoWrapper.webkitRequestFullscreen) {
            videoWrapper.webkitRequestFullscreen();
          } else if (videoWrapper.mozRequestFullScreen) {
            videoWrapper.mozRequestFullScreen();
          } else if (videoWrapper.msRequestFullscreen) {
            videoWrapper.msRequestFullscreen();
          }
        }
      }

      // ====================================
      // BACA SUBTITLE DARI GITHUB RAW
      // ====================================
      async function bacaSubtitle(idFilm) {
        const alamat = `${SUBTITLE_URL}${idFilm}.vtt`;
        subtitles = [];
        waktuSekarang = 0;
        perbaruiTampilan();

        try {
          const res = await fetch(alamat, { 
            cache: 'no-cache',
            headers: { 'Accept': 'text/plain' }
          });
          if (!res.ok) throw new Error(`File tidak ditemukan: ${res.status}`);
          const teks = await res.text();
          if (!teks.trim()) throw new Error("File kosong");

          const baris = teks.split('\n').map(b => b.trim()).filter(b => b);
          let i = 0;

          if (baris[0].toUpperCase().includes("WEBVTT")) i++;

          while (i < baris.length) {
            if (baris[i].includes('-->')) {
              const waktu = baris[i].split('-->').map(w => w.trim());
              const mulai = ubahKeDetik(waktu[0]);
              const selesai = ubahKeDetik(waktu[1]);
              i++;
              let teksSub = "";
              while (i < baris.length && !baris[i].includes('-->')) {
                teksSub += baris[i] + " ";
                i++;
              }
              if (mulai < selesai && teksSub.trim()) {
                subtitles.push({ mulai, selesai, teks: teksSub.trim() });
              }
            } else {
              i++;
            }
          }

          if (subtitles.length === 0) throw new Error("Format tidak cocok");
          console.log(`✅ Subtitle ID ${idFilm} berhasil dimuat: ${subtitles.length} baris`);
        } catch (err) {
          subText.textContent = "";
          console.log(`❌ Gagal baca sub ID ${idFilm}:`, err.message);
        }
      }

      // ====================================
      // KONTROL UTAMA
      // ====================================
      btnMain.addEventListener('click', () => {
        sedangMain ? hentikanSemua() : mulaiSemua();
      });

      btnMundur.addEventListener('click', () => geserWaktu(-10));
      btnMaju.addEventListener('click', () => geserWaktu(+10));

      btnFullscreen.addEventListener('click', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
          if (videoWrapper.requestFullscreen) videoWrapper.requestFullscreen();
          else if (videoWrapper.webkitRequestFullscreen) videoWrapper.webkitRequestFullscreen();
          else if (videoWrapper.mozRequestFullScreen) videoWrapper.mozRequestFullScreen();
          else if (videoWrapper.msRequestFullscreen) videoWrapper.msRequestFullscreen();
        } else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
          else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
          else if (document.msExitFullscreen) document.msExitFullscreen();
        }
      });

      btnSearch.addEventListener('click', () => {
        const buka = searchContainer.classList.toggle('show');
        if (!buka) {
          searchInput.value = "";
          searchResultsLayer.innerHTML = "";
        } else setTimeout(() => searchInput.focus(), 100);
      });

      btnAddComment.addEventListener('click', bukaFormKomen);

      btnHome.addEventListener('click', () => {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = 'index.html';
        }
      });

      btnViewComments.addEventListener('click', () => {
        const isOpen = commentsPanel.classList.toggle('open');
        if (isOpen) muatKomentar();
      });

      commentsHeader.addEventListener('click', function(e) {
        if (!e.target.closest('.close-comments')) {
          const isOpen = commentsPanel.classList.toggle('open');
          if (isOpen) muatKomentar();
        }
      });

      closeCommentsBtn.addEventListener('click', function() {
        commentsPanel.classList.remove('open');
      });

      async function muatKomentar() {
        if (!currentMovieId) return;
        commentListEl.innerHTML = '<div style="padding:15px; text-align:center;">Memuat komentar...</div>';

        try {
          const res = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${currentMovieId}`, {
            method: 'GET',
            redirect: 'follow'
          });

          const hasil = await res.json();

          if (hasil.status !== "success") {
            commentListEl.innerHTML = `<div style="padding:15px; color:#ff9999;">${hasil.message || "Gagal memuat"}</div>`;
            return;
          }

          const komentar = hasil.data;

          if (!komentar || komentar.length === 0) {
            commentListEl.innerHTML = '<div style="padding:15px; color:#aaa;">Belum ada komentar. Jadilah yang pertama berkomentar!</div>';
            return;
          }

          let html = '';
          komentar.forEach(item => {
            html += `
              <div class="comment-item">
                <div class="comment-name">${item.nama || 'Anonim'}</div>
                <div class="comment-text">${item.komentar || ''}</div>
                <div class="comment-date">${item.timestamp ? new Date(item.timestamp).toLocaleString('id-ID') : 'Baru saja'}</div>
              </div>
            `;
          });

          commentListEl.innerHTML = html;

        } catch (err) {
          console.error("❌ Error:", err);
          commentListEl.innerHTML = '<div style="padding:15px; color:#ff9999;">Gagal memuat. Coba klik lagi.</div>';
        }
      }

      // ====================================
      // FUNGSI LAINNYA
      // ====================================
      function ambilIdDariUrl() {
        const param = new URLSearchParams(window.location.search);
        autoFullscreen = param.get('auto_fs') === '1';
        return param.get('id');
      }

      function pasangPemutar(tmdbId) {
        filmIframe.src = `https://vsembed.ru/embed/movie?tmdb=${tmdbId}`;
      }

      async function muatDataAwal() {
        currentMovieId = parseInt(ambilIdDariUrl());
        if (!currentMovieId) {
          videoWrapper.innerHTML += `<div style="padding:50px; text-align:center;">ID Film tidak ditemukan.</div>`;
          return;
        }

        pasangPemutar(currentMovieId);
        await bacaSubtitle(currentMovieId);

        try {
          const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=1`);
          if (res.ok) allMoviesCache = (await res.json()).results;
        } catch (e) { console.error("Gagal ambil daftar film:", e); }
      }

      async function kirimKomentar() {
        const nama = document.getElementById('commentName').value.trim();
        const teks = document.getElementById('commentText').value.trim();
        if (!nama || !teks) return alert("Isi nama dan komentar dulu!");
        tutupFormKomen();

        try {
          await fetch(URL_APPS_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tmdbId: currentMovieId, nama, komentar: teks })
          });

          setTimeout(muatKomentar, 800);

        } catch {
          alert("Gagal mengirim komentar.");
        }
      }

      function bukaFormKomen() {
        infoPanel.classList.add('show');
        panelBackdrop.classList.add('active');
      }
      function tutupFormKomen() {
        infoPanel.classList.remove('show');
        panelBackdrop.classList.remove('active');
      }

      searchInput.addEventListener('input', e => {
        const kata = e.target.value.toLowerCase().trim();
        if (!kata) return searchResultsLayer.innerHTML = "";
        searchResultsLayer.innerHTML = "";
        const hasil = allMoviesCache.filter(m => m.title.toLowerCase().includes(kata));
        if (hasil.length) {
          hasil.forEach(m => {
            const div = document.createElement('div');
            div.className = 'search-item-row';
            div.innerHTML = `
              <div class="search-item-thumb" style="background-image:url('${IMAGE_URL}${m.poster_path}')"></div>
              <div class="search-item-info"><h4>${m.title}</h4><p>${m.release_date?.split('-')[0] || '-'}</p></div>
            `;
            div.onclick = () => { bukaFilm(m.id); };
            searchResultsLayer.appendChild(div);
          });
        } else {
          searchResultsLayer.innerHTML = `<div style="padding:30px; text-align:center;">Tidak ditemukan</div>`;
        }
      });

      function bukaFilm(id) { window.location.href = `watch.html?id=${id}`; }

      window.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        muatDataAwal();
      });

      // Sembunyi/Tampil Kontrol
let timerSembunyiKontrol;
const WAKTU_TUNGGU = 1800;
const AMBANG_SENSITIVITAS = 1;
let posisiTerakhir = { x: -9999, y: -9999 };

function tampilkanKontrol() {
  if (!subLayer.classList.contains('hidden')) return;
  subLayer.classList.remove('hidden');
  watchLayout.classList.add('nav-visible');
  resetTimerSembunyi();
}

function sembunyikanKontrol() {
  if (subLayer.classList.contains('hidden')) return;
  subLayer.classList.add('hidden');
  watchLayout.classList.remove('nav-visible');
}

function resetTimerSembunyi() {
  clearTimeout(timerSembunyiKontrol);
  timerSembunyiKontrol = setTimeout(sembunyikanKontrol, WAKTU_TUNGGU);
}

document.addEventListener('mousemove', (e) => {
  const jarak = Math.hypot(e.clientX - posisiTerakhir.x, e.clientY - posisiTerakhir.y);
  if (jarak > AMBANG_SENSITIVITAS) {
    posisiTerakhir = { x: e.clientX, y: e.clientY };
    tampilkanKontrol();
  }
}, { passive: true });

document.addEventListener('mouseenter', tampilkanKontrol);
document.addEventListener('touchstart', tampilkanKontrol, { passive: true });
document.addEventListener('touchmove', tampilkanKontrol, { passive: true });
document.addEventListener('click', tampilkanKontrol);
</script>

</body>
</html>
