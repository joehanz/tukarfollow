<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMDB Vertical Feed Movie - Pro Version</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .feed-container {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .feed-container::-webkit-scrollbar { display: none; }

        .movie-card {
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Pagination Load More Card */
        .load-more-card {
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .load-more-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
            transition: transform 0.2s;
        }

        .load-more-btn:active { transform: scale(0.95); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        .top-title {
            position: absolute;
            top: 12%; left: 50%; transform: translateX(-50%);
            z-index: 2; font-size: 1.8rem; font-weight: 300; letter-spacing: 6px;
            text-transform: uppercase; text-align: center; width: 90%;
            text-shadow: 0 4px 12px rgba(0,0,0,0.9);
        }

        .play-btn-container {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 3; cursor: pointer;
        }

        .play-circle {
            width: 85px; height: 85px; background: rgba(255, 255, 255, 0.15);
            border: 2.5px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }

        /* UI Samping Kanan Saja (Kiri Bersih Total) */
        .main-content {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: flex-end; /* Dorong ke kanan */
            padding: 20px;
            margin-bottom: 80px;
        }

        .side-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 60px;
        }

        .action-item span {
            font-size: 0.75rem; margin-top: 4px; color: #eee;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); text-align: center;
        }

        /* Video Player Layer Penuh */
        .video-player-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 200;
            display: none;
        }

        .video-player-container.active { display: block; }

        .video-player-container iframe, .video-player-container video {
            width: 100%; height: 100%; border: none;
        }

        .close-player {
            position: absolute;
            top: 30px; right: 20px; z-index: 210;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Fixed Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 75px;
            background: rgba(0, 0, 0, 0.95); border-top: 1px solid #1a1a1a;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100; padding-bottom: 12px; transition: transform 0.3s;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #777; cursor: pointer; font-size: 0.75rem; width: 60px;
        }

        .nav-item.active { color: #fff; }
        .nav-item span { margin-top: 4px; }

        /* Search Bar Dropdown */
        .search-container {
            position: fixed; top: -90px; left: 0; width: 100vw; height: 75px;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); z-index: 110;
            display: flex; align-items: center; padding: 0 20px;
            transition: top 0.4s cubic-bezier(0.1, 1, 0.1, 1); border-bottom: 1px solid #222;
        }

        .search-container.show { top: 0; }

        .search-box {
            width: 100%; height: 44px; background: #1c1c1e;
            border: 1px solid #2c2c2e; border-radius: 10px;
            display: flex; align-items: center; padding: 0 14px;
        }

        .search-box input {
            width: 100%; background: transparent; border: none; color: #fff;
            padding-left: 10px; font-size: 1rem; outline: none;
        }

        /* Info Panel Cicilan */
        .info-panel {
            position: fixed; bottom: -250px; left: 0; width: 100vw;
            background: #121212; border-top-left-radius: 20px; border-top-right-radius: 20px;
            z-index: 90; padding: 24px; transition: bottom 0.3s cubic-bezier(0.1, 1, 0.1, 1);
            border-top: 1px solid #222; box-shadow: 0 -8px 24px rgba(0,0,0,0.6);
        }

        .info-panel.show { bottom: 75px; }

        .panel-content {
            display: flex; gap: 14px; align-items: flex-start; font-size: 0.95rem; color: #ccc; line-height: 1.4;
        }

        .panel-content i { color: #fff; flex-shrink: 0; }
    </style>
</head>
<body>

    <!-- Search Bar -->
    <div class="search-container" id="searchContainer">
        <div class="search-box">
            <i data-lucide="search" size="18" color="#888"></i>
            <input type="text" id="searchInput" placeholder="Cari film...">
        </div>
    </div>

    <!-- Video Player Screen -->
    <div class="video-player-container" id="videoPlayerContainer">
        <div class="close-player" id="closePlayerBtn">
            <i data-lucide="x" size="24" color="#fff"></i>
        </div>
        <div id="playerArea" style="width:100%; height:100%;"></div>
    </div>

    <!-- Feed Container Utama -->
    <div class="feed-container" id="feedContainer"></div>

    <!-- Info Panel Cicilan Dinamis -->
    <div class="info-panel" id="infoPanel">
        <div class="panel-content" id="panelContentArea">
            <!-- Isi Konten di-inject dinamis berdasarkan tombol yang diklik -->
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item" id="navSearch">
            <i data-lucide="search" size="24"></i>
            <span>Search</span>
        </div>
        <div class="nav-item">
            <i data-lucide="plus-circle" size="28" color="#fff"></i>
            <span>Add</span>
        </div>
        <div class="nav-item active" id="navHome">
            <i data-lucide="home" size="24"></i>
            <span>Home</span>
        </div>
    </div>

    <script>
        const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_URL = 'https://image.tmdb.org/t/p/w780';

        const feedContainer = document.getElementById('feedContainer');
        const searchContainer = document.getElementById('searchContainer');
        const infoPanel = document.getElementById('infoPanel');
        const panelContentArea = document.getElementById('panelContentArea');
        const videoPlayerContainer = document.getElementById('videoPlayerContainer');
        const playerArea = document.getElementById('playerArea');

        let moviesData = [];
        let activeMovieIndex = 0;
        let currentPage = 1;
        let currentActiveSection = null; // Menyimpan status kategori info aktif (info/release/film/country)
        let myCustomMovies = []; // Menyimpan data dari movies.json

        // Ambil data lokal movies.json terlebih dahulu
        async function loadLocalMovies() {
            try {
                const res = await fetch('movies.json');
                if(res.ok) myCustomMovies = await res.json();
            } catch(e) {
                console.log("Belum ada movies.json / gagal load lokal.");
            }
        }

        // Ambil Data TMDB berdasarkan halaman aktif
        async function fetchMovies(page = 1) {
            try {
                const response = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=en-US&page=${page}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                if(page === 1) moviesData = data.results;
                else moviesData = [...moviesData, ...data.results];

                renderFeed(moviesData);
            } catch (error) {
                // Fallback otomatis jika API masih dummy
                loadFallbackData();
            }
        }

        function loadFallbackData() {
            const fallback = [
                { id: 157336, title: 'Interstellar', overview: 'Ketika Bumi semakin tidak layak dihuni...', release_date: '2014-11-05', poster_path: '/gEU2Qv0vHB77Yp7v6v94goI86v3.jpg', country: 'USA, UK', genre: 'Sci-Fi, Adventure' },
                { id: 155, title: 'The Dark Knight', overview: 'Batman menghadapi tantangan psikologis terbesar...', release_date: '2008-07-16', poster_path: '/qJ2tWw7mUN67wz79E84gbiwJAO1.jpg', country: 'USA', genre: 'Action, Crime' }
            ];
            moviesData = [...moviesData, ...fallback];
            renderFeed(moviesData);
        }

        // Render data ke dalam feed
        function renderFeed(movies) {
            feedContainer.innerHTML = '';
            movies.forEach((movie, index) => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.style.backgroundImage = `url('${IMAGE_URL}${movie.poster_path}')`;
                
                const year = movie.release_date ? movie.release_date.split('-')[0] : '-';

                card.innerHTML = `
                    <div class="overlay"></div>
                    <div class="top-title">${movie.title}</div>
                    
                    <div class="play-btn-container" onclick="playMovie(${movie.id})">
                        <div class="play-circle"><i data-lucide="play" fill="#fff" size="32" style="margin-left:5px;"></i></div>
                    </div>

                    <div class="main-content">
                        <div class="side-actions">
                            <div class="action-item" onclick="toggleSection(event, ${index}, 'info')">
                                <i data-lucide="info" size="28"></i>
                                <span>info</span>
                            </div>
                            <div class="action-item" onclick="toggleSection(event, ${index}, 'release')">
                                <i data-lucide="calendar" size="28"></i>
                                <span>${year}</span>
                            </div>
                            <div class="action-item" onclick="toggleSection(event, ${index}, 'genre')">
                                <i data-lucide="clapperboard" size="28"></i>
                                <span>Film</span>
                            </div>
                            <div class="action-item" onclick="toggleSection(event, ${index}, 'country')">
                                <i data-lucide="globe" size="28"></i>
                                <span>Negara</span>
                            </div>
                        </div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });

            // Tambahkan Slot "Load More" di akhir halaman scroll
            const loadMoreCard = document.createElement('div');
            loadMoreCard.className = 'load-more-card';
            loadMoreCard.innerHTML = `<button class="load-more-btn" onclick="loadNextPage()">Load More (Page ${currentPage + 1})</button>`;
            feedContainer.appendChild(loadMoreCard);

            lucide.createIcons();
        }

        function loadNextPage() {
            currentPage++;
            fetchMovies(currentPage);
        }

        // Logika Cicilan Info (Klik buka, klik lagi nutup)
        function toggleSection(event, index, section) {
            event.stopPropagation();
            const movie = moviesData[index];
            if (!movie) return;

            // Jika mengklik icon yang sama kedua kalinya, tutup panel info
            if (infoPanel.classList.contains('show') && currentActiveSection === section) {
                infoPanel.classList.remove('show');
                currentActiveSection = null;
                return;
            }

            currentActiveSection = section;
            let htmlContent = '';

            // Tampilkan isi data secara dicicil sesuai kebutuhan tombol
            switch(section) {
                case 'info':
                    htmlContent = `<i data-lucide="info" size="22"></i><p>${movie.overview || 'Tidak ada deskripsi.'}</p>`;
                    break;
                case 'release':
                    htmlContent = `<i data-lucide="calendar" size="22"></i><p>Tanggal Rilis: <strong>${movie.release_date || '-'}</strong></p>`;
                    break;
                case 'genre':
                    htmlContent = `<i data-lucide="clapperboard" size="22"></i><p>Kategori: <strong>${movie.genre || 'Movie (TMDB)'}</strong></p>`;
                    break;
                case 'country':
                    htmlContent = `<i data-lucide="globe" size="22"></i><p>Negara Produksi: <strong>${movie.country || 'International'}</strong></p>`;
                    break;
            }

            panelContentArea.innerHTML = htmlContent;
            infoPanel.classList.add('show');
            lucide.createIcons();
        }

        // Fitur Pemutar Video Pintar (Cek movies.json dulu baru Fallback)
        function playMovie(tmdbId) {
            // Cari data di JSON lokal kita
            const customMovie = myCustomMovies.find(m => m.tmdb_id === tmdbId);
            playerArea.innerHTML = ''; // Reset player

            if (customMovie) {
                // Putar video manual dari JSON kamu (.mp4/hls/dll)
                console.log("Memutar video lokal hasil postingan kamu...");
                playerArea.innerHTML = `<video src="${customMovie.video_url}" controls autoplay playsinline></video>`;
            } else {
                // Fallback otomatis menggunakan vidsrcme API menggunakan id tmdb
                console.log("Video lokal tidak ada, otomatis memutar vidsrc...");
                playerArea.innerHTML = `<iframe src="https://vidsrc.me/embed/movie?tmdb=${tmdbId}" allowfullscreen></iframe>`;
            }

            videoPlayerContainer.classList.add('active');
        }

        document.getElementById('closePlayerBtn').addEventListener('click', () => {
            playerArea.innerHTML = ''; // Stop video
            videoPlayerContainer.classList.remove('active');
        });

        // Pantau Scroll untuk auto-close panel
        feedContainer.addEventListener('scroll', () => {
            const index = Math.round(feedContainer.scrollTop / window.innerHeight);
            if (index !== activeMovieIndex) {
                activeMovieIndex = index;
                infoPanel.classList.remove('show');
                currentActiveSection = null;
            }
        });

        // Search Bar Toggle
        document.getElementById('navSearch').addEventListener('click', (e) => {
            e.stopPropagation();
            searchContainer.classList.toggle('show');
        });

        document.getElementById('navHome').addEventListener('click', () => {
            feedContainer.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Inisialisasi awal aplikasi
        async function init() {
            await loadLocalMovies();
            await fetchMovies(currentPage);
        }
        
        init();
    </script>
</body>
</html>
