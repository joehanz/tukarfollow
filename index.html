<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- =========================
     NAVBAR
========================= -->

<header class="navbar">

  <div class="nav-left">
    <a href="index.html" class="logo-wrap">
      <div class="logo-icon">▶</div>
      <div class="logo-text">MovieHub</div>
    </a>
  </div>

  <div class="nav-right desktop-nav">

    <input
      type="text"
      id="searchInput"
      placeholder="Cari film atau series..."
      class="search-input"
    >

    <select id="genreSelect">
      <option value="">Semua Genre</option>
    </select>

    <select id="yearSelect">
      <option value="">Semua Rilis</option>
      <option value="2026">2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="classic">Klasik</option>
    </select>

  </div>

  <button id="burgerBtn" class="burger-btn">
    ☰
  </button>

</header>

<!-- =========================
     MOBILE MENU
========================= -->

<div id="mobileMenu" class="mobile-menu">

  <input
    type="text"
    id="searchInputMobile"
    placeholder="Cari film atau series..."
    class="search-input"
  >

  <select id="genreSelectMobile">
    <option value="">Semua Genre</option>
  </select>

  <select id="yearSelectMobile">
    <option value="">Semua Rilis</option>
    <option value="2026">2026</option>
    <option value="2025">2025</option>
    <option value="2024">2024</option>
    <option value="classic">Klasik</option>
  </select>

</div>

<!-- =========================
     CONTENT
========================= -->

<main class="container">

  <div id="movieGrid" class="movie-grid">

    <!-- generated by script -->

  </div>

</main>

<!-- =========================
     PAGINATION
========================= -->

<section class="pagination-wrap">

  <button id="prevBlock" class="page-btn">
    &lt;
  </button>

  <div id="paginationNumbers" class="pagination-numbers">

  </div>

  <button id="nextBlock" class="page-btn">
    &gt;
  </button>

</section>

<!-- =========================
     FOOTER
========================= -->

<footer class="footer">

  <div class="footer-col">
    <h3>Tentang</h3>
    <p>
      Portal film dan series berbasis TMDB.
    </p>
  </div>

  <div class="footer-col">
    <h3>Kategori</h3>
    <ul>
      <li>Movie</li>
      <li>TV Series</li>
      <li>Indonesia</li>
    </ul>
  </div>

  <div class="footer-col">
    <h3>Informasi</h3>
    <ul>
      <li>Disclaimer</li>
      <li>Privacy Policy</li>
      <li>DMCA</li>
    </ul>
  </div>

  <div class="footer-col">
    <h3>Kontak</h3>
    <ul>
      <li>Email</li>
      <li>Telegram</li>
      <li>Facebook</li>
    </ul>
  </div>

</footer>

<!-- =========================
     CONFIG
========================= -->

<script>

const TMDB_API =
"b3b893873ed1bb7f175b2707afeea2a0";

const MOVIES_JSON =
"https://raw.githubusercontent.com/joehanz/csstukarfollow/main/movies.json";

</script>

<script src="script.html"></script>

</body>
</html>
