<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioskop Indonesia - Grid Otomatis</title>
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #e50914; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; }
        .movie-card { background: #222; border-radius: 6px; overflow: hidden; cursor: pointer; transition: 0.2s; text-align: center; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 225px; object-fit: cover; }
        .movie-title { font-size: 13px; font-weight: bold; padding: 8px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; justify-content: center; align-items: center; }
        .player-box { width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: -35px; right: 0; background: #e50914; color: #fff; border: none; padding: 6px 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Bioskop Indonesia</h1>
    <div class="movie-grid" id="grid">Memuat film...</div>

    <div class="player-overlay" id="overlay">
        <div class="player-box">
            <button class="close-btn" onclick="tutupPlayer()">TUTUP X</button>
            <iframe id="iframe-player" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // MASUKKAN API KEY TMDB ANDA DI SINI
        const API_KEY = 'MASUKKAN_API_KEY_TMDB_ANDA_DI_SINI'; 

        async function ambilFilmIndo() {
            try {
                // Ambil daftar film Indonesia terpopuler
                const respon = await fetch(`https://themoviedb.org{API_KEY}&with_original_language=id&sort_by=popularity.desc`);
                const data = await respon.json();
                const kontainer = document.getElementById('grid');
                kontainer.innerHTML = '';

                data.results.forEach(film => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    // Memicu pencarian IMDb ID terlebih dahulu sebelum memutar
                    card.onclick = () => putarFilm(film.id);
                    card.innerHTML = `
                        <img src="https://tmdb.org{film.poster_path}" alt="${film.title}">
                        <p class="movie-title">${film.title}</p>
                    `;
                    kontainer.appendChild(card);
                });
            } catch (e) {
                document.getElementById('grid').innerHTML = 'Gagal memuat data film. Coba lagi nanti.';
            }
        }

        async function putarFilm(tmdbId) {
            try {
                // WAJIB: Ambil external_ids dari TMDB untuk mendapatkan IMDb ID (format: ttXXXXXX)
                const responId = await fetch(`https://themoviedb.org{tmdbId}/external_ids?api_key=${API_KEY}`);
                const dataId = await responId.json();
                const imdbId = dataId.imdb_id;

                if (imdbId) {
                    // Masukkan IMDb ID ke vsembed.ru sesuai standarnya
                    document.getElementById('iframe-player').src = `https://vsembed.ru{imdbId}`;
                    document.getElementById('overlay').style.display = 'flex';
                } else {
                    alert('Maaf, film ini belum memiliki ID video internasional (IMDb ID) di database.');
                }
            } catch (e) {
                alert('Gagal mengambil jalur video.');
            }
        }

        function tutupPlayer() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('iframe-player').src = '';
        }

        ambilFilmIndo();
    </script>
</body>
</html>
