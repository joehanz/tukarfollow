<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch</title>

<link href="https://cdn.jsdelivr.net/gh/joehanz/csstukarfollow@main/style.css" rel="stylesheet"/>

<style>
.watch-wrap{
  display:flex;
  gap:20px;
  padding:20px;
  flex-wrap:wrap;
}

.player-box{
  flex:2;
  min-width:300px;
}

.info-box{
  flex:1;
  min-width:260px;
}

.related{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.related::-webkit-scrollbar{display:none;}

.rel-card{
  min-width:120px;
  cursor:pointer;
}

.rel-card img{
  width:120px;
  height:160px;
  object-fit:cover;
  border-radius:8px;
}
</style>

</head>
<body>

<!-- NAV -->
<nav id="topNav">
  <a class="logo" href="/">BACK</a>
</nav>

<div class="watch-wrap">

  <!-- PLAYER -->
  <div class="player-box">
    <iframe id="player" width="100%" height="400px" frameborder="0"></iframe>
  </div>

  <!-- INFO -->
  <div class="info-box">
    <h2 id="title"></h2>
    <p id="desc"></p>
  </div>

</div>

<!-- RELATED -->
<h3 style="padding:10px;">Related</h3>
<div class="related" id="related"></div>

<script>

const params = new URLSearchParams(location.search);
const embed = params.get("play");
const id = params.get("id");

document.getElementById("player").src = embed || "";

let movies = [];

fetch("movies.json")
.then(r => r.json())
.then(data => {
  movies = data;
  renderRelated();
});

function renderRelated(){
  const box = document.getElementById("related");

  movies.slice(0,10).forEach(m => {
    box.innerHTML += `
      <div class="rel-card" onclick="openMovie('${m.embed}')">
        <img src="${m.poster}">
      </div>
    `;
  });
}

function openMovie(link){
  location.href = "watch.html?play="+encodeURIComponent(link);
}

</script>

</body>
</html>
