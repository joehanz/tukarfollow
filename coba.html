<!DOCTYPE html>
<html lang="id">
<head>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background-color: #0a0a0a; color: #ffffff; overflow-x: hidden; }

    body.fullscreen-active { overflow: hidden; }
    .video-main-wrapper.fullscreen {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important; max-width: none !important;
      border-radius: 0 !important; z-index: 9999 !important; background: #000;
    }

    .watch-layout { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .video-main-wrapper {
      position: relative; width: 100%; max-width: 1200px; aspect-ratio: 16 / 9;
      background: #000; overflow: hidden; border-radius: 12px;
      transition: all 0.3s ease;
    }
    /* Perbaikan iframe */
    #filmIframe { 
      width: 100%; height: 100%; border: none; 
      background: #000; display: block;
    }
    .watermark-logo { position: absolute; top: 16px; left: 16px; z-index: 10; opacity: 0.6; pointer-events: none; }
    .watermark-logo img { width: 40px; height: auto; }

    .subtitle-layer {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 20px 16px 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .subtitle-text {
      text-align: center; font-size: 18px; font-weight: 500; color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8); min-height: 32px; line-height: 1.4;
    }
    .subtitle-controls {
      display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 12px;
      background: rgba(255,255,255,0.08); padding: 10px 16px; border-radius: 12px;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.12);
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      width: 40px; height: 40px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
    .ctrl-btn svg { width: 20px; height: 20px; }
    .time-digital { font-size: 14px; font-weight: 500; color: #eee; padding: 0 8px; min-width: 90px; text-align: center; }

    .search-container {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 90; width: 90%; max-width: 600px; opacity: 0; visibility: hidden;
      transition: all 0.3s ease;
    }
    .search-container.show { opacity: 1; visibility: visible; }
    .search-box {
      background: rgba(20,20,20,0.95); border-radius: 12px; display: flex;
      align-items: center; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2);
    }
    .search-box i { margin-right: 10px; color: #aaa; }
    #searchInput { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; }
    #searchInput::placeholder { color: #888; }
    .search-results-layer { margin-top: 8px; background: rgba(20,20,20,0.95); border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); max-height: 400px; overflow-y: auto; display: none; }
    .search-results-layer.active { display: block; }
    .search-item-row { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; transition: background 0.2s; }
    .search-item-row:hover { background: rgba(255,255,255,0.1); }
    .search-item-thumb { width: 50px; height: 70px; background-size: cover; background-position: center; border-radius: 6px; }
    .search-item-info h4 { font-size: 14px; margin-bottom: 2px; }
    .search-item-info p { font-size: 12px; color: #999; }

    @media (max-width: 768px) {
      .watch-layout { padding: 0; }
      .video-main-wrapper { border-radius: 0; }
      .subtitle-text { font-size: 16px; }
      .ctrl-btn { width: 36px; height: 36px; }
      .time-digital { font-size: 13px; }
      .subtitle-controls { gap: 8px; padding: 8px 12px; }
    }
  </style>
</head>
<body>

  <div class="watch-layout">
    <div class="video-main-wrapper" id="videoWrapper">
      <!-- ✅ IZIN DIPERLUAS BIAR TIDAK SEMBUNYI -->
      <iframe 
        id="filmIframe" 
        src="" 
        allowfullscreen 
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen; clipboard-write; gyroscope; accelerometer"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
      <div class="watermark-logo"><img src="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" alt="TukarFollow" /></div>
      
      <div class="subtitle-layer" id="subLayer">
        <div class="subtitle-text" id="subText"></div>
        <div class="subtitle-controls">
          <button class="ctrl-btn" id="btnMundur" title="Mundur 10 detik"><i data-lucide="rotate-ccw"></i></button>
          <button class="ctrl-btn" id="btnMain" title="Putar / Jeda"><i data-lucide="play"></i></button>
          <button class="ctrl-btn" id="btnMaju" title="Maju 10 detik"><i data-lucide="rotate-cw"></i></button>
          <div class="time-digital" id="jamTayang">00:00:00</div>

          <button class="ctrl-btn" id="btnSearch" title="Cari Film"><i data-lucide="search"></i></button>
          <button class="ctrl-btn" id="btnHome" title="Kembali ke Beranda"><i data-lucide="home"></i></button>
          <button class="ctrl-btn" id="btnFullscreen" title="Layar Penuh"><i data-lucide="maximize"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="search-container" id="searchContainer">
    <div class="search-box"><i data-lucide="search" size="18" color="#888"></i><input type="text" id="searchInput" placeholder="Cari film lain..."></div>
  </div>
  <div class="search-results-layer" id="searchResultsLayer"></div>

  <script>
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8'; 
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const SUBTITLE_URL = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

    const videoWrapper = document.getElementById('videoWrapper');
    const filmIframe = document.getElementById('filmIframe');
    const subText = document.getElementById('subText');
    const jamTayang = document.getElementById('jamTayang');
    const btnMain = document.getElementById('btnMain');
    const btnMundur = document.getElementById('btnMundur');
    const btnMaju = document.getElementById('btnMaju');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const btnSearch = document.getElementById('btnSearch');
    const btnHome = document.getElementById('btnHome');
    const searchContainer = document.getElementById('searchContainer');
    const searchInput = document.getElementById('searchInput');
    const searchResultsLayer = document.getElementById('searchResultsLayer');

    let currentMovieId = null;
    let subtitles = [];
    let waktuSekarang = 0;
    let pemutar = null;
    let sedangMain = false;
    let isFullscreen = false;

    function ubahKeWaktu(detik) {
      if (isNaN(detik) || detik < 0) detik = 0;
      const j = Math.floor(detik / 3600).toString().padStart(2, '0');
      const m = Math.floor((detik % 3600) / 60).toString().padStart(2, '0');
      const d = Math.floor(detik % 60).toString().padStart(2, '0');
      return `${j}:${m}:${d}`;
    }

    function ubahKeDetik(teksWaktu) {
      if (!teksWaktu) return 0;
      teksWaktu = teksWaktu.replace(/[, \s]/g, '.').trim();
      const bagian = teksWaktu.split(':');
      let hasil = 0;
      if (bagian.length === 3) hasil = Number(bagian[0]) * 3600 + Number(bagian[1]) * 60 + Number(bagian[2]);
      if (bagian.length === 2) hasil = Number(bagian[0]) * 60 + Number(bagian[1]);
      return isNaN(hasil) ? 0 : hasil;
    }

    function perbaruiTampilan() {
      const aktif = subtitles.find(s => waktuSekarang >= s.mulai && waktuSekarang <= s.selesai);
      subText.textContent = aktif ? aktif.teks : "";
      jamTayang.textContent = ubahKeWaktu(waktuSekarang);
    }

    // Perintah ke pemutar
    function mulaiSemua() {
      if (pemutar) clearInterval(pemutar);
      sedangMain = true;
      btnMain.innerHTML = '<i data-lucide="pause"></i>';
      lucide.createIcons();
      pemutar = setInterval(() => { waktuSekarang += 1; perbaruiTampilan(); }, 1000);
      try {
        filmIframe.contentWindow.postMessage({ type: "play" }, "*");
        filmIframe.contentWindow.postMessage({ cmd: "play" }, "*");
        filmIframe.contentWindow.postMessage({ event: "play" }, "*");
      } catch (e) {}
    }

    function hentikanSemua() {
      sedangMain = false;
      btnMain.innerHTML = '<i data-lucide="play"></i>';
      lucide.createIcons();
      clearInterval(pemutar);
      try {
        filmIframe.contentWindow.postMessage({ type: "pause" }, "*");
        filmIframe.contentWindow.postMessage({ cmd: "pause" }, "*");
        filmIframe.contentWindow.postMessage({ event: "pause" }, "*");
      } catch (e) {}
    }

    function geserWaktu(ubah) {
      waktuSekarang = Math.max(0, waktuSekarang + ubah);
      perbaruiTampilan();
      try {
        filmIframe.contentWindow.postMessage({ type: "seek", time: waktuSekarang }, "*");
        filmIframe.contentWindow.postMessage({ cmd: "seek", time: waktuSekarang }, "*");
        filmIframe.contentWindow.postMessage({ event: "seek", time: waktuSekarang }, "*");
      } catch (e) {}
      if (sedangMain) {
        clearInterval(pemutar);
        pemutar = setInterval(() => { waktuSekarang += 1; perbaruiTampilan(); }, 1000);
      }
    }

    async function bacaSubtitle(idFilm) {
      const alamat = `${SUBTITLE_URL}${idFilm}.vtt`;
      subtitles = [];
      waktuSekarang = 0;
      perbaruiTampilan();
      try {
        const res = await fetch(alamat, { cache: 'no-cache' });
        if (!res.ok) throw new Error(`Tidak ada`);
        const teks = await res.text();
        if (!teks.trim()) throw new Error(`Kosong`);
        const baris = teks.split('\n').map(b => b.trim()).filter(b => b);
        let i = baris[0].toUpperCase().includes("WEBVTT") ? 1 : 0;
        while (i < baris.length) {
          if (baris[i].includes('-->')) {
            const waktu = baris[i].split('-->').map(w => w.trim());
            const mulai = ubahKeDetik(waktu[0]);
            const selesai = ubahKeDetik(waktu[1]);
            i++;
            let teksSub = "";
            while (i < baris.length && !baris[i].includes('-->')) teksSub += baris[i++] + " ";
            if (mulai < selesai && teksSub.trim()) subtitles.push({ mulai, selesai, teks: teksSub.trim() });
          } else i++;
        }
      } catch (err) {
        subText.textContent = "Subtitle tidak tersedia";
      }
    }

    function toggleFullscreen() {
      if (!isFullscreen) {
        document.body.classList.add('fullscreen-active');
        videoWrapper.classList.add('fullscreen');
        btnFullscreen.innerHTML = '<i data-lucide="minimize"></i>';
        lucide.createIcons();
        isFullscreen = true;
        if (videoWrapper.requestFullscreen) videoWrapper.requestFullscreen().catch(() => {});
        else if (videoWrapper.webkitRequestFullscreen) videoWrapper.webkitRequestFullscreen();
      } else {
        document.body.classList.remove('fullscreen-active');
        videoWrapper.classList.remove('fullscreen');
        btnFullscreen.innerHTML = '<i data-lucide="maximize"></i>';
        lucide.createIcons();
        isFullscreen = false;
        if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    }

    document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement && isFullscreen) toggleFullscreen(); });
    document.addEventListener('webkitfullscreenchange', () => { if (!document.webkitFullscreenElement && isFullscreen) toggleFullscreen(); });

    btnMain.addEventListener('click', () => sedangMain ? hentikanSemua() : mulaiSemua());
    btnMundur.addEventListener('click', () => geserWaktu(-10));
    btnMaju.addEventListener('click', () => geserWaktu(+10));
    btnFullscreen.addEventListener('click', toggleFullscreen);

    btnSearch.addEventListener('click', () => {
      const buka = searchContainer.classList.toggle('show');
      if (!buka) { searchInput.value = ""; searchResultsLayer.classList.remove('active'); }
      else setTimeout(() => searchInput.focus(), 100);
    });
    btnHome.addEventListener('click', () => window.history.length > 1 ? history.back() : (window.location.href = 'index.html'));

    searchInput.addEventListener('input', async e => {
      const kata = e.target.value.toLowerCase().trim();
      if (!kata) return searchResultsLayer.classList.remove('active');
      searchResultsLayer.classList.add('active');
      try {
        const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(kata)}&language=id-ID`);
        const data = await res.json();
        const hasil = data.results.slice(0, 8);
        searchResultsLayer.innerHTML = hasil.length ? hasil.map(m => `<div class="search-item-row" onclick="bukaFilm(${m.id})"><div class="search-item-thumb" style="background-image:url('${m.poster_path ? IMAGE_URL + m.poster_path : ''}')"></div><div class="search-item-info"><h4>${m.title}</h4><p>${m.release_date?.split('-')[0] || '-'}</p></div></div>`).join('') : `<div style="padding:30px; text-align:center;">Tidak ditemukan</div>`;
      } catch {
        searchResultsLayer.innerHTML = `<div style="padding:30px; text-align:center;">Gagal cari data</div>`;
      }
    });

    function ambilIdDariUrl() { return new URLSearchParams(window.location.search).get('id'); }

    // ✅ PEMUTAR DIPILIH YANG PALING MUDAH NONGOL
    function pasangPemutar(tmdbId) {
      // Utama: Multiembed (paling jarang ngumpet)
      filmIframe.src = `https://multiembed.mov/directstream.php?video_id=${tmdbId}&tmdb=1&autoplay=0`;

      // Cadangan 1:
      // filmIframe.src = `https://autoembed.to/movie/${tmdbId}`;

      // Cadangan 2:
      // filmIframe.src = `https://embed.su/embed/movie/${tmdbId}`;

      // Cadangan 3: Kalau semuanya ngumpet
      // filmIframe.src = `https://vidsrc.xyz/embed/movie?tmdb=${tmdbId}`;
    }

    async function muatDataAwal() {
      currentMovieId = parseInt(ambilIdDariUrl());
      if (!currentMovieId) { videoWrapper.innerHTML += `<div style="padding:50px; text-align:center; color:#fff;">ID Film tidak ditemukan.</div>`; return; }
      pasangPemutar(currentMovieId);
      await bacaSubtitle(currentMovieId);
    }

    function bukaFilm(id) { window.location.href = `watch.html?id=${id}`; }

    window.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); muatDataAwal(); });
  </script>

</body>
</html>
