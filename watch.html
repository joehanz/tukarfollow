<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <meta name="keywords" content="nonton film gratis, streaming movie sub indo, bioskop online" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="id" />

  <link rel="icon" href="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" type="image/x-icon" />
  <link rel="apple-touch-icon" href="https://tukarfollow.web.id/banner/tukarfollow.icon.webp" />

  <meta property="og:type" content="video.movie" />
  <meta property="og:title" content="TUKARFOLLOW" />
  <meta property="og:description" content="Nonton film dan serial TV terbaru sub Indonesia." />
  <meta property="og:url" content="https://tukarfollow.web.id/watch.html" />
  <meta property="og:image" content="https://tukarfollow.web.id/banner/banner-tukarfollow.webp" />
  <meta property="og:site_name" content="TUKARFOLLOW" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="search-container" id="searchContainer">
    <div class="search-box">
      <i data-lucide="search" size="18" color="#888"></i>
      <input type="text" id="searchInput" placeholder="Cari film...">
    </div>
  </div>

  <div class="video-player-container" id="videoPlayerContainer">
    <div class="close-player" id="closePlayerBtn">
      <i data-lucide="x" size="24" color="#fff"></i>
    </div>
    <div id="playerArea" style="width:100%; height:100%;"></div>
  </div>

  <div class="feed-container" id="feedContainer"></div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-content" id="panelContentArea"></div>
  </div>

  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item" id="navSearch">
      <i data-lucide="search" size="24"></i>
      <span>Search</span>
    </div>
    <div class="nav-item">
      <i data-lucide="plus-circle" size="28" color="#fff"></i>
      <span>Add</span>
    </div>
    <div class="nav-item active" id="navHome">
      <a href="index.html" style="color:inherit; text-decoration:none;">
        <i data-lucide="home" size="24"></i>
        <span>Home</span>
      </a>
    </div>
  </div>

  <div class="desktop-notifier" id="desktopNotifier">
    <div class="notifier-content">
      <i data-lucide="smartphone" size="40"></i>
      <h3>Tampilan Lebih Asyik di HP!</h3>
      <p>Situs ini didesain khusus untuk kenyamanan layar mobile.</p>
      <button onclick="closeNotifier()">Siap, Paham!</button>
    </div>
  </div>

<!-- INI SCRIPT YANG DIPERBAIKI TOTAL -->
<script>
const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8';
const BASE_URL = 'https://api.themoviedb.org/3';
const IMAGE_URL = 'https://image.tmdb.org/t/p/w780';
const MOVIES_JSON_PATH = './movies.json'; // Jalur relatif yang benar

let currentMovie = null;

// Ambil ID dari URL
function getTmdbId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

// Fungsi utama cek data
async function cekDanMuatFilm() {
  const tmdbId = getTmdbId();
  if (!tmdbId) {
    document.getElementById('feedContainer').innerHTML = '<p style="color:#fff; text-align:center; padding:2rem;">ID film tidak ada</p>';
    return;
  }

  try {
    // 1. Coba baca movies.json
    const res = await fetch(MOVIES_JSON_PATH, { cache: "no-store" }); // Hindari cache
    if (!res.ok) throw new Error("File tidak ditemukan");

    const daftarFilm = await res.json();
    const filmKetemu = daftarFilm.find(film => Number(film.tmdb_id) === Number(tmdbId));

    if (filmKetemu) {
      // ✅ KETEMU DI JSON → PAKAI PLAYCINEMATIC
      console.log("✅ Ditemukan di JSON:", filmKetemu.title);
      currentMovie = filmKetemu;
      tampilkanInfoFilm(filmKetemu);
      putarVideo(filmKetemu.iframe);
    } else {
      // ❌ TIDAK KETEMU → AMBIL DARI TMDB & PAKAI VSEMBED
      console.log("❌ Tidak ada di JSON, ambil dari TMDB");
      const dataTMDB = await ambilDariTMDB(tmdbId);
      if (!dataTMDB) throw new Error("Data TMDB gagal dimuat");
      currentMovie = dataTMDB;
      tampilkanInfoFilm(dataTMDB);
      putarVideo(`https://vsembed.ru/embed/${tmdbId}`);
    }

  } catch (err) {
    console.error("Error:", err);
    document.getElementById('feedContainer').innerHTML = '<p style="color:#fff; text-align:center; padding:2rem;">Gagal memuat data</p>';
  }
}

// Ambil data dari TMDB
async function ambilDariTMDB(tmdbId) {
  const res = await fetch(`${BASE_URL}/movie/${tmdbId}?api_key=${API_KEY}&language=id-ID`);
  if (!res.ok) return null;
  return await res.json();
}

// Tampilkan poster dan info
function tampilkanInfoFilm(film) {
  const poster = film.image || (film.poster_path ? `${IMAGE_URL}${film.poster_path}` : 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500');
  const tahun = film.release_date ? film.release_date.split('-')[0] : '-';

  document.getElementById('feedContainer').innerHTML = `
    <div class="movie-card" style="background-image: url('${poster}');">
      <div class="overlay"></div>
      <div class="top-title">${film.title}</div>
      <div class="play-btn-container">
        <div class="play-circle"><i data-lucide="play" fill="#fff" size="32"></i></div>
      </div>
      <div class="main-content">
        <div class="side-actions">
          <div class="action-item" onclick="bukaInfo('sinopsis')">
            <i data-lucide="info" size="28"></i>
            <span>Info</span>
          </div>
          <div class="action-item" onclick="bukaInfo('rilis')">
            <i data-lucide="calendar" size="28"></i>
            <span>${tahun}</span>
          </div>
          <div class="action-item" onclick="bukaInfo('genre')">
            <i data-lucide="clapperboard" size="28"></i>
            <span>Genre</span>
          </div>
          <div class="action-item" onclick="bukaInfo('negara')">
            <i data-lucide="globe" size="28"></i>
            <span>Negara</span>
          </div>
        </div>
      </div>
    </div>
  `;
  lucide.createIcons();
}

// Fungsi putar video
function putarVideo(sumber) {
  if (!sumber) {
    document.getElementById('playerArea').innerHTML = '<p style="color:#fff; text-align:center; padding:2rem;">Sumber video tidak tersedia</p>';
    return;
  }
  document.getElementById('playerArea').innerHTML = `<iframe src="${sumber}" frameborder="0" allowfullscreen allow="autoplay; fullscreen; picture-in-picture" style="width:100%; height:100%; border:none;"></iframe>`;
  document.getElementById('videoPlayerContainer').classList.add('active');
}

// Buka panel info
function bukaInfo(jenis) {
  const panel = document.getElementById('infoPanel');
  const konten = document.getElementById('panelContentArea');
  panel.classList.add('show');
  let teks = '';

  if (currentMovie.sinopsis) {
    // Data dari JSON
    switch(jenis) {
      case 'sinopsis': teks = currentMovie.sinopsis; break;
      case 'rilis': teks = `Tanggal Rilis: ${currentMovie.release_date}`; break;
      case 'genre': teks = `Genre: ${currentMovie.genre.join(', ')}`; break;
      case 'negara': teks = `Negara: ${currentMovie.country}`; break;
    }
  } else {
    // Data dari TMDB
    switch(jenis) {
      case 'sinopsis': teks = currentMovie.overview || 'Tidak ada sinopsis'; break;
      case 'rilis': teks = `Tanggal Rilis: ${currentMovie.release_date || '-'}`; break;
      case 'genre': teks = `Genre: ${currentMovie.genres?.map(g => g.name).join(', ') || '-'}`; break;
      case 'negara': teks = `Negara: ${currentMovie.production_countries?.map(c => c.name).join(', ') || '-'}`; break;
    }
  }
  konten.innerHTML = `<p style="color:#fff; padding:15px;">${teks}</p>`;
}

// Tutup pemutar
document.getElementById('closePlayerBtn').addEventListener('click', () => {
  document.getElementById('videoPlayerContainer').classList.remove('active');
  document.getElementById('playerArea').innerHTML = '';
});

// Tutup notifikasi
function closeNotifier() {
  document.getElementById('desktopNotifier').style.display = 'none';
}

// Jalankan semuanya saat halaman siap
window.addEventListener('load', cekDanMuatFilm);
</script>

</body>
</html>
