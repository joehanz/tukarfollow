<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Detail</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0b0f;color:#fff}

/* NAV FIX PROPER */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
color:#ff2e2e;
font-weight:bold;
flex:0 0 auto;
}

.nav-right{
display:flex;
gap:12px;
align-items:center;
flex:0 0 auto;
}

.nav-right input{
padding:7px 10px;
border-radius:8px;
border:none;
outline:none;
background:#1a1a1f;
color:#fff;
min-width:140px;
}

.nav-right a{
color:#ddd;
text-decoration:none;
font-size:13px;
white-space:nowrap;
}

.burger{
display:none;
font-size:22px;
cursor:pointer;
color:#fff;
}

.mobile-menu{
position:fixed;
top:60px;
right:0;
width:220px;
background:#000;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
transform:translateX(100%);
transition:.3s;
z-index:999;
}

.mobile-menu.show{
transform:translateX(0);
}

.mobile-menu a{
color:#fff;
text-decoration:none;
padding:8px 0;
border-bottom:1px solid #222;
}

@media(max-width:768px){
.nav-right{display:none;}
.burger{display:block;}
}

/* PLAYER */
.player{
width:100%;
height:77vh;
background:#000;
position:relative;
}

iframe{width:100%;height:100%;border:0}

.playLayer{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.5);
cursor:pointer;
font-size:22px;
font-weight:bold;
}

.info{
max-width:1200px;
margin:20px auto;
padding:20px;
background:#141420;
border-radius:12px;
}

/* RELATED */
.rel-wrap{
max-width:1200px;
margin:20px auto;
position:relative;
padding:10px;
}

.rel-box{
display:flex;
gap:12px;
overflow-x:auto;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
scrollbar-width:none;
}

.rel-box::-webkit-scrollbar{display:none}

.rel-card{
min-width:140px;
scroll-snap-align:start;
flex:0 0 auto;
cursor:pointer;
}

.rel-card img{
width:100%;
border-radius:10px;
}

.arrow{
position:absolute;
top:40%;
background:#000;
color:#fff;
border:none;
padding:10px;
cursor:pointer;
opacity:.8;
z-index:10;
}

.arrow:hover{opacity:1}
.left{left:0}
.right{right:0}

@media(max-width:768px){
.arrow{display:none}
}

/* FOOTER */
footer{
background:#000;
padding:30px 15px;
margin-top:40px;
}

.footer-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:1200px;
margin:auto;
font-size:13px;
opacity:.7;
}

@media(max-width:700px){
.footer-grid{grid-template-columns:repeat(2,1fr)}
}

/* 🔥 OVERLAY MODE (FIX UTAMA) */
#overlay{
display:none;
position:absolute;
top:60px;
left:0;
width:100%;
min-height:90vh;
background:#0b0b0f;
z-index:999;
padding:20px;
}

  body.overlay-open{
overflow:hidden;
}

.overlay-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:14px;
}

@media(max-width:1000px){
.overlay-grid{grid-template-columns:repeat(4,1fr)}
}

@media(max-width:600px){
.overlay-grid{grid-template-columns:repeat(2,1fr)}
}

.card{
cursor:pointer;
background:#141420;
border-radius:10px;
overflow:hidden;
transition:.2s;
}

.card:hover{transform:scale(1.05)}

.card img{width:100%;display:block}

.title{
font-size:12px;
padding:6px;
opacity:.8;
}

</style>
</head>

<body>

<nav>
<div class="logo">MOVIE+</div>

<div class="nav-right">
<input id="search" placeholder="Search..." oninput="searchMovie()">
<a href="uji.html">Home</a>
<a href="#" onclick="loadLocal()">Local</a>
</div>

<div class="burger" onclick="toggleMenu()">☰</div>
</nav>

<div class="mobile-menu" id="mobileMenu">
<input placeholder="Search..." oninput="searchMovieMobile()">
<a href="uji.html">Home</a>
<a href="#" onclick="loadLocal()">Local</a>
</div>

<!-- 🔥 OVERLAY SEARCH/LOCAL -->
<div id="overlay">
<div id="overlayGrid" class="overlay-grid"></div>

<div id="overlayPagination" style="
display:flex;
justify-content:center;
gap:8px;
padding:25px;
flex-wrap:wrap;
"></div>
</div>

<div class="player">
<iframe id="player"></iframe>
<div class="playLayer" id="playLayer">▶ PLAY</div>
</div>

<div class="info" id="info"></div>

<div class="rel-wrap">
<button class="arrow left" onclick="move(-1)">‹</button>
<button class="arrow right" onclick="move(1)">›</button>
<div class="rel-box" id="rel"></div>
</div>

<footer>
<div class="footer-grid">
<div>About</div>
<div>DMCA</div>
<div>Privacy</div>
<div>Contact</div>
</div>
</footer>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";
const id=new URLSearchParams(location.search).get("id");

const ads=[
"https://rajarayap.com",
"https://caturbangunsentosa.blogspot.com",
"https://ptdwiprima.blogspot.com"
];

let adsState=false;
let items=[];

/* OVERLAY STATE */
let overlayPage=1;
let overlayMode="";
let currentQuery="";

/* BURGER */
function toggleMenu(){
document.getElementById("mobileMenu")
.classList.toggle("show");
}

/* OVERLAY LOAD */
async function loadOverlay(){

let url="";

if(overlayMode==="search"){
url=`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=${encodeURIComponent(currentQuery)}&page=${overlayPage}`;
}

if(overlayMode==="local"){
url=`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_origin_country=ID&page=${overlayPage}`;
}

const data=await fetch(url)
.then(r=>r.json());

showOverlay(data.results);

renderOverlayPagination(
data.page,
data.total_pages
);

}

/* SHOW OVERLAY */
function showOverlay(data){

document.getElementById("overlay").style.display="block";

let h="";

data.forEach(v=>{

if(!v.poster_path) return;

h+=`
<div class="card" onclick="go(${v.id})">

<img src="https://image.tmdb.org/t/p/w300${v.poster_path}">

<div class="title">
${v.title||v.name}
</div>

</div>
`;

});

document.getElementById(
"overlayGrid"
).innerHTML=h;

}

/* PAGINATION */
function renderOverlayPagination(
page,
total
){

let h="";

let start=Math.max(
1,
page-2
);

let end=Math.min(
total,
start+5
);

for(
let i=start;
i<=end;
i++
){

h+=`
<button
onclick="changeOverlayPage(${i})"
style="
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:${i===page?'#ff2e2e':'#1a1a22'};
color:#fff;
"
>

${i}

</button>
`;

}

if(page<total){

h+=`
<button
onclick="changeOverlayPage(${page+1})"
style="
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1a1a22;
color:#fff;
"
>

›

</button>
`;

}

document.getElementById(
"overlayPagination"
).innerHTML=h;

}

function changeOverlayPage(p){

overlayPage=p;

loadOverlay();

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* SEARCH */
function searchMovie(){

const val=
document.getElementById(
"search"
).value;

if(!val.trim()) return;

currentQuery=val;

overlayMode="search";

overlayPage=1;

loadOverlay();

}

/* MOBILE SEARCH */
function searchMovieMobile(){

const val=
document.querySelector(
"#mobileMenu input"
).value;

if(!val.trim()) return;

currentQuery=val;

overlayMode="search";

overlayPage=1;

loadOverlay();

}

/* LOCAL */
function loadLocal(){

overlayMode="local";

overlayPage=1;

loadOverlay();

}

/* PLAY GATE */
document.getElementById(
"playLayer"
).onclick=function(){

if(!adsState){

adsState=true;

window.open(
ads[
Math.floor(
Math.random()*ads.length
)
],
"_blank"
);

return;

}

this.style.display="none";

document.getElementById(
"player"
).src=
`https://vsembed.ru/embed/movie?tmdb=${id}`;

};

/* LOAD DETAIL */
async function load(){

let m=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}&language=id-ID`
).then(r=>r.json());

/* fallback kalau sinopsis Indonesia kosong */
if(!m.overview){

const backup=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
).then(r=>r.json());

m.overview=backup.overview;

}

document.getElementById("info").innerHTML=`

<h2>${m.title}</h2>

<p>⭐ Rating : ${m.vote_average.toFixed(1)}</p>

<p>📅 Rilis : ${m.release_date || "-"}</p>

<p>🌍 Negara : ${
m.production_countries.map(
c=>c.name
).join(", ")
}</p>

<p>🎭 Genre : ${
m.genres.map(
g=>g.name
).join(", ")
}</p>

<p style="
margin-top:15px;
line-height:1.7;
opacity:.9;
">
${m.overview || "Sinopsis tidak tersedia"}
</p>

`;

const r=await fetch(
`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`
)
.then(r=>r.json());

items=r.results.slice(
0,
15
);

render();

}

/* RELATED */
function render(){

let h="";

items.forEach(v=>{

if(!v.poster_path)return;

h+=`

<div
class="rel-card"
onclick="go(${v.id})"
>

<img src="https://image.tmdb.org/t/p/w200${v.poster_path}">

</div>

`;

});

document.getElementById(
"rel"
).innerHTML=h;

}

function move(dir){

document.getElementById(
"rel"
).scrollBy({

left:dir*300,
behavior:"smooth"

});

}

function go(i){

location.href=
`uji2.html?id=${i}`;

}

load();

</script>

</body>
</html>
