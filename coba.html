<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemutar TMDB dengan Poster</title>
    <!-- Pakai Plyr agar tampilan lebih rapi -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.8.2/plyr.css">
    <script src="https://cdn.plyr.io/3.8.2/plyr.js"></script>
    <style>
        body { font-family: Arial; max-width: 900px; margin: 20px auto; padding: 0 15px; }
        #posterArea { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        #poster { width: 185px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        #info { flex: 1; }
        #player { width: 100%; height: 480px; background: #000; border-radius: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Bagian Poster & Info Film -->
    <div id="posterArea">
        <img id="poster" alt="Poster Film">
        <div id="info">
            <h2 id="judul"></h2>
            <p id="ringkasan"></p>
            <small>Klik poster untuk mulai memutar</small>
        </div>
    </div>

    <!-- Pemutar Video -->
    <div id="playerContainer" class="hidden">
        <video id="player" controls playsinline></video>
    </div>

    <script>
        // === DATA KONFIGURASI DARI KAMU ===
        const API_KEY        = 'c000d7b8b0f5ee16b98b6103009745d8';
        const BASE_URL       = 'https://api.themoviedb.org/3';
        const IMAGE_URL      = 'https://image.tmdb.org/t/p/w185';
        const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec';
        const SUBTITLE_URL   = "https://raw.githubusercontent.com/joehanz/tukarfollow/refs/heads/main/subtitles/";

        // === INISIALISASI PEMUTAR ===
        let player = new Plyr('#player');

        // === FUNGSI AMBIL DATA DAN TAMPILKAN POSTER ===
        async function tampilkanPosterDanInfo(tmdbId) {
            try {
                const res = await fetch(`${BASE_URL}/movie/${tmdbId}?api_key=${API_KEY}&language=id-ID`);
                if (!res.ok) throw new Error("ID TMDB tidak valid");
                const data = await res.json();

                // Isi poster dan keterangan
                document.getElementById('poster').src = data.poster_path ? `${IMAGE_URL}${data.poster_path}` : 'placeholder.png';
                document.getElementById('judul').textContent = data.title;
                document.getElementById('ringkasan').textContent = data.overview || "Tidak ada ringkasan";

                // Simpan ID TMDB untuk dipakai nanti
                document.getElementById('posterArea').dataset.id = tmdbId;

            } catch (err) {
                alert("Gagal mengambil data: " + err.message);
            }
        }

        // === FUNGSI PUTAR VIDEO SETELAH POSTER DIKLIK ===
        async function putarSaatDiklik() {
            const tmdbId = this.dataset.id;
            if (!tmdbId) return;

            // Ambil link video
            const resLink = await fetch(`${URL_APPS_SCRIPT}?id=${tmdbId}`);
            const hasil = await resLink.json();
            const linkVideo = hasil.data?.[0]?.link;

            if (!linkVideo) {
                alert("Link video belum tersedia untuk ID ini");
                return;
            }

            // Ambil subtitle
            const linkSub = `${SUBTITLE_URL}${tmdbId}/id.vtt`;

            // Tampilkan pemutar dan masukkan sumbernya
            document.getElementById('playerContainer').classList.remove('hidden');
            player.source = {
                type: 'video',
                title: document.getElementById('judul').textContent,
                poster: document.getElementById('poster').src,
                sources: [{ src: linkVideo, type: 'video/mp4' }],
                tracks: [{
                    kind: 'subtitles',
                    label: 'Bahasa Indonesia',
                    srclang: 'id',
                    src: linkSub,
                    default: true
                }]
            };

            // Gulir ke pemutar
            document.getElementById('playerContainer').scrollIntoView({ behavior: 'smooth' });
        }

        // === JALANKAN AWAL + PASANG EVENT KLIK ===
        tampilkanPosterDanInfo(550); // Ganti 550 dengan ID TMDB yang kamu mau
        document.getElementById('posterArea').addEventListener('click', putarSaatDiklik);
    </script>

</body>
</html>
