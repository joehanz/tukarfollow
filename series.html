<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Series Streaming - TukarFollow</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
SERIES GRID
========================= */

.series-container{
max-width:1400px;
margin:auto;
padding:20px;
}

.series-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(180px,1fr));
gap:20px;
padding-bottom:40px;
}

.series-card{
position:relative;
overflow:hidden;
border-radius:14px;
background:#141b22;
cursor:pointer;
transition:.3s;
}

.series-card:hover{
transform:translateY(-5px);
box-shadow:
0 0 25px rgba(0,212,255,.25);
}

.series-poster{
width:100%;
height:270px;
object-fit:cover;
display:block;
}

.series-title{
padding:10px;
font-size:14px;
font-weight:600;
text-align:center;
color:#fff;
}

.series-year{
position:absolute;
top:10px;
right:10px;
background:#00d4ff;
color:#000;
font-size:12px;
font-weight:bold;
padding:4px 8px;
border-radius:8px;
}

/* =========================
PAGINATION
========================= */

.pagination-wrap{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
flex-wrap:wrap;
margin:30px 0;
}

.pagination-wrap button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#141b22;
color:#fff;
cursor:pointer;
}

.pagination-wrap button.active{
background:#00d4ff;
color:#000;
font-weight:bold;
}

@media(max-width:768px){

.series-grid{
grid-template-columns:
repeat(auto-fill,minmax(140px,1fr));
gap:12px;
}

.series-poster{
height:220px;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="nav-logo">

<a href="index.html">

TUKARFOLLOW

</a>

</div>

</nav>

<div class="series-container">

<div
class="series-grid"
id="seriesGrid">
</div>

<div
class="pagination-wrap"
id="pagination">
</div>

</div>

  <script>

const API_KEY="b3b893873ed1bb7f175b2707afeea2a0";

let currentPage=1;
let totalPages=1;

const seriesGrid=
document.getElementById("seriesGrid");

const pagination=
document.getElementById("pagination");

/* =========================
HELPER
========================= */

function safeYear(date){

if(!date) return "";

return String(date).substring(0,4);

}

function poster(path){

if(!path){

return "https://via.placeholder.com/500x750?text=No+Image";

}

return `https://image.tmdb.org/t/p/w500${path}`;

}

/* =========================
LOAD SERIES
========================= */

async function loadSeries(page=1){

currentPage=page;

try{

const res=
await fetch(
`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&page=${page}`
);

const data=
await res.json();

totalPages=
Math.min(
data.total_pages || 1,
500
);

renderGrid(
data.results || []
);

renderPagination();

window.scrollTo({
top:0,
behavior:"smooth"
});

}catch(e){

console.log(e);

}

}

/* =========================
GRID
========================= */

function renderGrid(list){

seriesGrid.innerHTML="";

list.forEach(tv=>{

const title=
tv.name || "Unknown";

const year=
safeYear(
tv.first_air_date
);

seriesGrid.innerHTML+=`

<a
class="series-card"
href="serieswatch.html?id=${tv.id}">

<span class="series-year">
${year}
</span>

<img
class="series-poster"
src="${poster(tv.poster_path)}"
alt="${title}"
loading="lazy">

<div class="series-title">
${title}
</div>

</a>

`;

});

}

/* =========================
PAGINATION
========================= */

function renderPagination(){

pagination.innerHTML="";

let start=
Math.floor(
(currentPage-1)/5
)*5+1;

let end=
start+4;

/* tombol < */

if(start>1){

pagination.innerHTML+=`

<button
onclick="loadSeries(${start-1})">

&lt;

</button>

`;

}

/* nomor */

for(
let i=start;
i<=end;
i++
){

if(i>totalPages)
break;

pagination.innerHTML+=`

<button
class="${
i===currentPage
?
'active'
:
''
}"

onclick="loadSeries(${i})">

${i}

</button>

`;

}

/* tombol > */

if(end<totalPages){

pagination.innerHTML+=`

<button
onclick="loadSeries(${end+1})">

&gt;

</button>

`;

}

}

/* =========================
INIT
========================= */

loadSeries(1);

</script>

</body>
</html>
