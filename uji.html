<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
}

header{
padding:15px;
background:#000;
position:sticky;
top:0;
z-index:100;
}

.menu{
display:flex;
gap:10px;
}

button{
padding:10px 15px;
border:none;
cursor:pointer;
border-radius:6px;
}

.active{
background:#ff4444;
color:#fff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#222;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
display:block;
}

.title{
padding:10px;
font-size:14px;
}

.playerBox{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.playerWrap{
width:90%;
height:80%;
position:relative;
}

iframe{
width:100%;
height:100%;
border:0;
}

.close{
position:absolute;
right:0;
top:-40px;
font-size:30px;
cursor:pointer;
}

</style>
</head>
<body>

<header>

<div class="menu">

<button class="active"
onclick="loadIndonesia(this)">
Film Indonesia
</button>

<button
onclick="loadLuar(this)">
Film Luar
</button>

</div>

</header>

<div id="movies" class="grid">

Loading...

</div>

<div class="playerBox" id="playerBox">

<div class="playerWrap">

<div class="close"
onclick="tutup()">
✕
</div>

<iframe id="player"></iframe>

</div>

</div>

<script>

const API_KEY="b3b893873ed1bb7f175b2707afeea2a0";

const movies=
document.getElementById("movies");

async function ambil(url){

movies.innerHTML="Loading...";

try{

const res=
await fetch(url);

const data=
await res.json();

tampil(data.results);

}catch{

movies.innerHTML=
"Gagal ambil data";

}

}

function tampil(data){

movies.innerHTML="";

data.forEach(m=>{

if(!m.poster_path) return;

movies.innerHTML+=`

<div class="card"
onclick="putar(${m.id})">

<img src=
"https://image.tmdb.org/t/p/w500${m.poster_path}">

<div class="title">

${m.title||m.name}

</div>

</div>

`;

});

}

function putar(id){

document.getElementById(
"playerBox"
).style.display="flex";

document.getElementById(
"player"
).src=
`https://vidsrc.su/embed/movie/${id}`;

}

function tutup(){

document.getElementById(
"playerBox"
).style.display="none";

document.getElementById(
"player"
).src="";

}

function aktif(btn){

document.querySelectorAll(
"button"
).forEach(x=>
x.classList.remove(
"active"
));

btn.classList.add(
"active"
);

}

function loadIndonesia(btn){

aktif(btn);

ambil(
`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_origin_country=ID`
);

}

function loadLuar(btn){

aktif(btn);

ambil(
`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&without_origin_country=ID`
);

}

loadIndonesia(
document.querySelector(
"button"
)
);

</script>

</body>
</html>
