<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Detail</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

body{background:#111;color:#fff}

/* NAV FULL WIDTH */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:#000;
}

.logo{color:#e50914;font-weight:bold}

.nav-right a{
color:#fff;
margin-left:10px;
text-decoration:none;
font-size:13px;
opacity:.8;
}

/* PLAYER */
.player{
width:100%;
height:77vh;
background:#000;
}

iframe{
width:100%;
height:100%;
border:0;
}

/* INFO */
.info{
width:100%;
max-width:1200px;
margin:auto;
padding:20px;
}

/* RELATED */
.rel-wrap{
width:100%;
max-width:1200px;
margin:auto;
position:relative;
padding:10px 0;
}

.rel-box{
display:flex;
gap:10px;
overflow-x:auto;
scroll-behavior:smooth;
}

.rel-card{
min-width:140px;
cursor:pointer;
}

.rel-card img{
width:100%;
border-radius:8px;
}

.arrow{
position:absolute;
top:40%;
background:#000;
border:none;
color:#fff;
font-size:20px;
padding:10px;
cursor:pointer;
z-index:10;
}

.left{left:0}
.right{right:0}

@media(max-width:768px){
.arrow{display:none;}
}

</style>
</head>

<body>

<nav>
<div class="logo">MOVIE+</div>
<div class="nav-right">
<a href="uji.html">Home</a>
<a href="uji.html">All</a>
<a href="uji.html">Abroad</a>
<a href="uji.html">Local</a>
</div>
</nav>

<div class="player">
<iframe id="player"></iframe>
</div>

<div class="info" id="info"></div>

<div class="rel-wrap">

<button class="arrow left" onclick="scrollRel(-300)">‹</button>
<button class="arrow right" onclick="scrollRel(300)">›</button>

<div class="rel-box" id="rel"></div>

</div>

<script>

const KEY="b3b893873ed1bb7f175b2707afeea2a0";
const id=new URLSearchParams(location.search).get("id");

async function load(){

// DETAIL
const m=await fetch(
`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}`
).then(r=>r.json());

document.getElementById("player").src=
`https://vsembed.ru/embed/movie?tmdb=${id}`;

document.getElementById("info").innerHTML=`
<h2>${m.title}</h2>
<p>⭐ ${m.vote_average}</p>
<p>🌍 ${m.production_countries.map(c=>c.name).join(", ")}</p>
<p>🎭 ${m.genres.map(g=>g.name).join(", ")}</p>
<p>📅 ${m.release_date}</p>
<p>${m.overview}</p>
`;

// RELATED
const r=await fetch(
`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`
).then(r=>r.json());

let html="";

r.results.slice(0,10).forEach(v=>{
html+=`
<div class="rel-card" onclick="go(${v.id})">
<img src="https://image.tmdb.org/t/p/w200${v.poster_path}">
</div>
`;
});

document.getElementById("rel").innerHTML=html;

}

function go(id){
location.href=`uji2.html?id=${id}`;
}

function scrollRel(x){
document.getElementById("rel").scrollBy({
left:x,
behavior:"smooth"
});
}

load();

</script>

</body>
</html>
