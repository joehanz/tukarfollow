<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamFlix</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- NAVBAR -->
<header class="flex items-center justify-between px-6 py-4 bg-black/80 backdrop-blur border-b border-gray-800">
  <h1 class="text-2xl font-bold text-red-600">StreamFlix</h1>

  <input type="text" placeholder="Cari film..."
    class="w-1/3 px-4 py-2 rounded bg-gray-900 border border-gray-700 focus:outline-none">

  <button class="px-4 py-2 bg-red-600 rounded hover:bg-red-700">
    Login
  </button>
</header>

<!-- HERO PLAYER -->
<section class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- VIDEO PLAYER -->
  <div class="lg:col-span-2">
    <video id="player" controls class="w-full rounded-lg border border-gray-800">
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <h2 class="text-xl font-bold mt-4">Judul Film Contoh</h2>
    <p class="text-gray-400 text-sm mt-2">
      Deskripsi film di sini. Ini hanya template UI streaming modern.
    </p>
  </div>

  <!-- SIDEBAR -->
  <div class="space-y-3">

    <div class="bg-gray-900 p-3 rounded hover:bg-gray-800 cursor-pointer" onclick="play('https://www.w3schools.com/html/movie.mp4','Film 1')">
      🎬 Film Action 1
    </div>

    <div class="bg-gray-900 p-3 rounded hover:bg-gray-800 cursor-pointer" onclick="play('https://www.w3schools.com/html/mov_bbb.mp4','Film 2')">
      🔥 Film Drama 2
    </div>

    <div class="bg-gray-900 p-3 rounded hover:bg-gray-800 cursor-pointer" onclick="play('https://www.w3schools.com/html/movie.mp4','Film 3')">
      ⚡ Film Sci-Fi 3
    </div>

  </div>
</section>

<!-- GRID MOVIE -->
<section class="px-6 pb-10">
  <h3 class="text-lg font-bold mb-4">Rekomendasi</h3>

  <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">

    <div class="bg-gray-900 rounded overflow-hidden hover:scale-105 transition cursor-pointer"
         onclick="play('https://www.w3schools.com/html/mov_bbb.mp4','Movie A')">
      <div class="h-32 bg-gray-700"></div>
      <div class="p-2 text-sm">Movie A</div>
    </div>

    <div class="bg-gray-900 rounded overflow-hidden hover:scale-105 transition cursor-pointer"
         onclick="play('https://www.w3schools.com/html/movie.mp4','Movie B')">
      <div class="h-32 bg-gray-700"></div>
      <div class="p-2 text-sm">Movie B</div>
    </div>

    <div class="bg-gray-900 rounded overflow-hidden hover:scale-105 transition cursor-pointer"
         onclick="play('https://www.w3schools.com/html/mov_bbb.mp4','Movie C')">
      <div class="h-32 bg-gray-700"></div>
      <div class="p-2 text-sm">Movie C</div>
    </div>

  </div>
</section>

<!-- SCRIPT PLAYER -->
<script>
function play(url, title){
  const player = document.getElementById('player');
  player.src = url;
  player.play();
  document.querySelector('h2').innerText = title;
}
</script>

</body>
</html>
