<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href='https://cdn.jsdelivr.net/gh/joehanz/csstukarfollow@main/style.css' rel='stylesheet'/>

<style>

/* WRAPPER */
.watch-wrap{
  padding:70px 15px 15px;
}

/* TOP BAR FIX + CLOSE */
.watch-topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  z-index:9999;
}

.close-btn{
  background:red;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:5px;
  cursor:pointer;
}

/* MAIN LAYOUT FIX */
.watch-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

/* PLAYER */
.player-wrap iframe{
  width:100%;
  height:70vh;
  border:0;
  background:#000;
}

/* INFO */
.info-box{
  background:#0d0d12;
  padding:15px;
  border-radius:10px;
  max-height:70vh;
  overflow-y:auto;
}

.title{
  font-size:22px;
  margin-bottom:10px;
}

.meta{
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
}

.tag{
  display:inline-block;
  padding:3px 8px;
  margin:2px;
  background:#222;
  font-size:12px;
  border-radius:4px;
}

.desc{
  font-size:13px;
  line-height:1.5;
}

/* RELATED */
.related-wrap{
  margin-top:20px;
  position:relative;
}

/* ARROW BUTTONS */
.arrow{
  position:absolute;
  top:40%;
  background:#000;
  color:#fff;
  border:none;
  font-size:20px;
  width:35px;
  height:60px;
  cursor:pointer;
  z-index:10;
  opacity:.7;
}

.arrow:hover{opacity:1;}

.arrow.left{left:0;}
.arrow.right{right:0;}

/* SCROLL ROW */
.related-row{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px 40px;
  scroll-behavior:smooth;
}

.related-row::-webkit-scrollbar{
  display:none;
}

.related-card{
  min-width:140px;
  cursor:pointer;
}

.related-card img{
  width:140px;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}

.related-card .t{
  font-size:12px;
  margin-top:5px;
  opacity:.8;
}

/* MOBILE */
@media(max-width:900px){
  .watch-grid{
    grid-template-columns:1fr;
  }

  .player-wrap iframe{
    height:45vh;
  }

  .arrow{
    display:none;
  }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="watch-topbar">
  <div style="color:#fff;font-weight:bold;">STREAM</div>
  <button class="close-btn" onclick="goBack()">✕</button>
</div>

<div class="watch-wrap">

  <!-- GRID -->
  <div class="watch-grid">

    <!-- LEFT PLAYER -->
    <div class="player-wrap">
      <iframe id="frame" allowfullscreen></iframe>
    </div>

    <!-- RIGHT INFO -->
    <div class="info-box">

      <div class="title" id="title">Loading...</div>

      <div class="meta" id="meta"></div>

      <div id="tags"></div>

      <p class="desc" id="desc"></p>

    </div>

  </div>

  <!-- RELATED -->
  <div class="related-wrap">

    <button class="arrow left" onclick="scrollRel(-300)">‹</button>
    <button class="arrow right" onclick="scrollRel(300)">›</button>

    <div class="related-row" id="related"></div>

  </div>

</div>

<script>

const API = "9e335d21d35f04917b218bae7adc881f";
const id = new URLSearchParams(location.search).get("id");

function goBack(){
  history.back();
}

/* PLAYER + INFO */
async function load(){

  if(!id) return;

  const r = await fetch(
    "https://api.themoviedb.org/3/movie/"
    + id
    + "?api_key="
    + API
    + "&append_to_response=external_ids"
  );

  const d = await r.json();

  document.getElementById("title").innerText = d.title;

  document.getElementById("meta").innerText =
    "⭐ " + d.vote_average +
    " | 📅 " + d.release_date;

  document.getElementById("desc").innerText = d.overview;

  document.getElementById("tags").innerHTML =
    (d.genres||[]).map(g=>`<span class='tag'>${g.name}</span>`).join("");

  const imdb = d.external_ids?.imdb_id;

  if(imdb){
    document.getElementById("frame").src =
      "https://vsembed.su/embed/movie?imdb=" + imdb;
  }

  loadRelated();
}

/* RELATED */
async function loadRelated(){

  const r = await fetch(
    "https://api.themoviedb.org/3/movie/"
    + id +
    "/recommendations?api_key=" + API
  );

  const d = await r.json();

  const box = document.getElementById("related");

  d.results.forEach(m => {

    if(!m.poster_path) return;

    const div = document.createElement("div");
    div.className = "related-card";

    div.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
      <div class="t">${m.title}</div>
    `;

    div.onclick = () => {
      location.href = "watch.html?id=" + m.id;
    };

    box.appendChild(div);
  });
}

/* ARROW SCROLL */
function scrollRel(x){
  document.getElementById("related").scrollBy({
    left:x,
    behavior:"smooth"
  });
}

load();

</script>

</body>
</html>
