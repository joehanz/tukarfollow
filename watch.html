<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TukarFollow: Streaming Movie Terlengkap & Bioskop Keren Gratis</title>
    <meta name="description" content="Nonton and streaming movie sub indo terlengkap gratis dengan kualitas super jernih ala bioskop online tanpa ribet.">
    <meta name="keywords" content="streaming movie sub indo, nonton film gratis, bioskop online, streaming film">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/joehanz/csstukarfollow/refs/heads/main/banner/logo%20tukar%20follow.webp">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6458870303612779" crossorigin="anonymous"></script>
    <!-- Struktur SEO JSON-LD Sitelink Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "tukarfollow",
      "url": "https://github.io",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://github.ioindex.html?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


</head>

<body>

<!-- NAV -->
<header>
<nav class="navbar">

<a href="index.html" class="logo">
  <i class="fa-solid fa-film"></i>
  <span>TukarFollow</span>
</a>

<div class="searchBox">
<input type="text" id="search" placeholder="Cari film..." oninput="searchMovie()">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<div id="burger">
<i class="fa-solid fa-bars"></i>
</div>
</nav>

<div id="mobileMenu">
<a onclick="setMode('movie')">Movies</a>
<a onclick="setMode('tv')">Series</a>
<input id="mobileSearch" oninput="searchMovie()" placeholder="Cari film...">
</div>
</header>

<!-- PLAYER -->
<div id="heroPlayer">Loading...</div>

<!-- INFO -->
<div id="infoBox"></div>

<!-- GRID MODE RESULT -->
<div id="gridMode"></div>

<!-- RELATED -->
<div id="relatedWrap">

<button id="leftArrow" class="arrowFloat" onclick="scrollRel(-1)">‹</button>
<button id="rightArrow" class="arrowFloat" onclick="scrollRel(1)">›</button>

<div class="scrollWrap" id="relGrid"></div>

</div>

<script>
const KEY="b3b893873ed1bb7f175b2707afeea2a0";

let moviesData=[];

const id=new URLSearchParams(location.search).get("id");

/* LOAD DATABASE */
fetch("movies.json")
  .then(r=>r.json())
  .then(d=>{
    moviesData=d;
    init();
  });

/* INIT */
async function init(){

  const movie = moviesData.find(m => String(m.tmdb_id) === String(id));

  if(!movie){
    document.getElementById("heroPlayer").innerHTML="This media is unavailable at the moment.";
    document.getElementById("infoBox").innerHTML="<p>Fresh content is cooking! Stay tuned</p>";
    return;
  }

  renderPlayer(movie);
  renderInfo(movie);
  loadRelated();
}

/* SEARCH MODE (TMDB ONLY UI) */
let mode="movie";

function setMode(m){
mode=m;
toggleView();
searchMovie();
}

function searchMovie(){
const q=document.getElementById("search").value;
if(!q)return;

toggleView(true);

fetch(`https://api.themoviedb.org/3/search/${mode}?api_key=${KEY}&query=${q}`)
.then(r=>r.json())
.then(d=>{
renderGrid(d.results||[]);
});
}

/* VIEW TOGGLE */
function toggleView(showGrid=false){
document.getElementById("heroPlayer").style.display=showGrid?"none":"flex";
document.getElementById("infoBox").style.display=showGrid?"none":"block";
document.getElementById("gridMode").style.display=showGrid?"grid":"none";
}

/* GRID RESULT */
function renderGrid(list){
const el=document.getElementById("gridMode");
el.innerHTML="";

list.forEach(m=>{
if(!m.poster_path)return;

el.innerHTML+=`
<div class="card" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div>${m.title||m.name}</div>
</div>
`;
});
}

/* PLAYER */
function renderPlayer(m){
const el=document.getElementById("heroPlayer");

if(!m || !m.iframe){
el.innerHTML="This media is unavailable at the moment.";
return;
}

el.innerHTML=`<iframe src="${m.iframe}" allowfullscreen></iframe>`;
}

/* INFO */
function renderInfo(m){
const el=document.getElementById("infoBox");

el.innerHTML=`
<h2>${m.title}</h2>
<div>
<span class="badge">${(m.genre||[]).join(", ")}</span>
<span class="badge">${m.release_date||"-"}</span>
<span class="badge">${m.country||"-"}</span>
</div>
<p>${m.sinopsis||""}</p>
`;
}

/* RELATED (optional TMDB only) */
function loadRelated(){
fetch(`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>renderRelated(d.results||[]));
}

function renderRelated(list){
const el=document.getElementById("relGrid");
el.innerHTML="";

list.slice(0,10).forEach(m=>{
if(!m.poster_path)return;

el.innerHTML+=`
<div class="relCard" onclick="go(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<div class="relTitle">${m.title}</div>
</div>
`;
});
}

function scrollRel(d){
document.getElementById("relGrid")
.scrollBy({left:d*300,behavior:"smooth"});
}

/* NAV */
function go(id){
location.href="watch.html?id="+id;
}
</script>

</body>
</html>
