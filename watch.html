<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Watch Movie - TUKARFOLLOW</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* ====================================
       1. BASIC RESET & CORE STYLE
       ==================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #000000;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ====================================
       2. WATCH LAYOUT (77vh PLAYER & KOMENTAR)
       ==================================== */
    .watch-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 70px); /* Kurangi tinggi nav bawah (70px) */
      width: 100%;
    }

    /* Player Area (77vh) */
    .video-player-section {
      width: 100%;
      height: 77vh;
      background: #000;
      position: relative;
    }
    .video-player-section iframe, 
    .video-player-section video {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ====================================
       ✅ BARU: STYLES UNTUK SUBTITLE & TIMER
       ==================================== */
    /* Kontainer tetap di paling depan */
    .subtitle-container {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999; /* Lebih tinggi dari semua elemen */
      width: 90%;
      max-width: 800px;
      text-align: center;
      pointer-events: none; /* Tidak menghalangi klik di bawahnya */
    }

    /* Teks subtitle: latar hanya mengikuti teks */
    .subtitle-text {
      display: inline-block;
      background: rgba(0, 0, 0, 0.75);
      color: #ffff00;
      font-size: 22px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 4px;
      line-height: 1.5;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
      margin: 0 auto;
      max-width: 100%;
      word-wrap: break-word;
    }

    /* Kontrol timer: bisa diklik dan diatur */
    .timer-control {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: auto; /* Bisa diklik */
    }
    .timer-btn {
      background: rgba(255, 221, 87, 0.9);
      color: #000;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .timer-display {
      background: rgba(0,0,0,0.8);
      color: #ffdd57;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 500;
      min-width: 90px;
      text-align: center;
    }

    /* ====================================
       3. KOMENTAR, SEARCH, PANEL, NAV BAWAH
       ==================================== */
    .comments-section {
      width: 100%;
      flex: 1;
      background: #0d0d0d;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 15px;
      display: flex;
      flex-direction: column;
    }
    .comments-header {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ffdd57;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .comments-list-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }
    .comment-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }
    .comment-user {
      font-weight: 600;
      color: #38b6ff;
      margin-bottom: 2px;
    }
    .comment-text {
      color: #e0e0e0;
      line-height: 1.4;
    }

    .search-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #000000;
      z-index: 100;
      padding: 15px;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
    }
    .search-container.show {
      transform: translateY(0);
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 0 15px;
      height: 45px;
    }
    .search-box input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      padding-left: 10px;
    }
    .search-box input:focus {
      outline: none;
    }

    .search-results-layer {
      position: fixed;
      top: 75px;
      left: 0;
      width: 100%;
      height: calc(100vh - 145px);
      background: #050505;
      z-index: 99;
      overflow-y: auto;
      padding: 15px;
      display: none;
    }
    .search-results-layer.active {
      display: block;
    }
    .search-item-row {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }
    .search-item-thumb {
      width: 50px;
      height: 70px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      background-color: #222;
    }
    .search-item-info h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .search-item-info p {
      font-size: 11px;
      color: #888;
    }

    .info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #121212;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      z-index: 105;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
    }
    .info-panel.show {
      transform: translateY(0);
    }
    .panel-content {
      padding: 20px;
    }
    .form-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #fff;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 13px;
    }
    .form-group textarea {
      resize: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: 1px solid #ffdd57;
    }
    .submit-btn {
      background: #ffdd57;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-top: 5px;
    }

    .panel-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      z-index: 104;
      display: none;
    }
    .panel-backdrop.active {
      display: block;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 110;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #888888;
      cursor: pointer;
      font-size: 11px;
    }
    .nav-item.active {
      color: #ffffff;
    }
    .nav-item span {
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- ✅ BARU: ELEMEN SUBTITLE & TIMER -->
  <div class="subtitle-container" id="subtitleContainer">
    <div class="subtitle-text" id="subtitleText"></div>
    <div class="timer-control">
      <button class="timer-btn" id="btnMinus">-5s</button>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <button class="timer-btn" id="btnPlus">+5s</button>
    </div>
  </div>

  <div class="search-container" id="searchContainer">
    <div class="search-box">
      <i data-lucide="search" size="18" color="#888"></i>
      <input type="text" id="searchInput" placeholder="Cari film lain...">
    </div>
  </div>

  <div class="search-results-layer" id="searchResultsLayer"></div>

  <div class="watch-layout">
    <div class="video-player-section" id="playerArea">
      </div>

    <div class="comments-section">
      <div class="comments-header">
        <i data-lucide="message-square" size="16"></i> Komentar Netizen
      </div>
      <div class="comments-list-container" id="commentList">
        </div>
    </div>
  </div>

  <div class="panel-backdrop" id="panelBackdrop" onclick="closeCommentForm()"></div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-content">
      <div class="form-title">Tulis Komentar Kamu</div>
      <div class="form-group">
        <input type="text" id="commentName" placeholder="Nama samaran kamu...">
        <textarea id="commentText" placeholder="Tulis opini/komentar film di sini..." rows="3" maxlength="300"></textarea>
        <button class="submit-btn" onclick="submitComment()">Kirim Komentar</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" id="navSearch">
      <i data-lucide="search" size="24"></i>
      <span>Search</span>
    </div>
    <div class="nav-item" id="navAddComment" style="color: #fff;">
      <i data-lucide="plus-circle" size="28"></i>
      <span>Add</span>
    </div>
    <div class="nav-item" id="navHome">
      <i data-lucide="home" size="24"></i>
      <span>Home</span>
    </div>
  </div>

  <script>
    // KONFIGURASI API UTAMA
    const API_KEY = 'c000d7b8b0f5ee16b98b6103009745d8'; 
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_URL = 'https://image.tmdb.org/t/p/w185';
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbzoTAiVa0gMhNB-BJs3fLb4y9gKe-MzRWorDOF0y3TgvaRb2lWtj3docQ0abSCIEMBi/exec'; 

    // DOM Elements
    const searchContainer = document.getElementById('searchContainer');
    const searchInput = document.getElementById('searchInput');
    const searchResultsLayer = document.getElementById('searchResultsLayer');
    const playerArea = document.getElementById('playerArea');
    const commentList = document.getElementById('commentList');
    const infoPanel = document.getElementById('infoPanel');
    const panelBackdrop = document.getElementById('panelBackdrop');

    // ✅ BARU: ELEMEN SUBTITLE & TIMER
    const subtitleTextEl = document.getElementById('subtitleText');
    const timerDisplayEl = document.getElementById('timerDisplay');
    const btnMinus = document.getElementById('btnMinus');
    const btnPlus = document.getElementById('btnPlus');

    let currentMovieId = null;
    let allMoviesCache = [];
    let myCustomMovies = [];

    // ✅ BARU: DATA SUBTITLE & LOGIKA WAKTU
    let subtitles = [];
    let currentTime = 0;
    let timerInterval = null;

    // Format waktu ke hh:mm:ss
    function formatTime(sec) {
      const h = Math.floor(sec / 3600).toString().padStart(2, '0');
      const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    // Perbarui tampilan subtitle sesuai waktu
    function updateSubtitle() {
      const active = subtitles.find(sub => currentTime >= sub.start && currentTime <= sub.end);
      subtitleTextEl.textContent = active ? active.text : '';
      timerDisplayEl.textContent = formatTime(currentTime);
    }

    // Atur waktu maju/mundur
    function adjustTime(change) {
      currentTime = Math.max(0, currentTime + change);
      updateSubtitle();
    }

    // Mulai jalankan timer
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        currentTime += 1;
        updateSubtitle();
      }, 1000);
    }

    // Contoh data subtitle (ganti dengan sumber asli jika ada)
    function loadSubtitles() {
      // Contoh format: { start: detik, end: detik, text: "teks" }
      subtitles = [
        { start: 5, end: 10, text: "Selamat datang di film ini" },
        { start: 12, end: 18, text: "Ini adalah percakapan pertama" },
        { start: 20, end: 28, text: "Cerita akan dimulai dari sini" },
        { start: 32, end: 40, text: "Kita akan melihat perjalanan tokoh utama" }
      ];
      currentTime = 0;
      updateSubtitle();
      startTimer();
    }

    // Tombol kontrol
    btnMinus.addEventListener('click', () => adjustTime(-5));
    btnPlus.addEventListener('click', () => adjustTime(+5));

    // 1. Ambil Parameter ID Film dari URL (?id=123)
    function getMovieIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // 2. Memuat Database Movies & Data Kustom Lokal
    async function loadInitialData() {
      currentMovieId = parseInt(getMovieIdFromUrl());
      if (!currentMovieId) {
        playerArea.innerHTML = `<div style="padding:50px; text-align:center;">ID Film tidak ditemukan.</div>`;
        return;
      }

      try {
        const res = await fetch('movies.json');
        if(res.ok) myCustomMovies = await res.json();
      } catch(e) { console.warn("movies.json belum terbaca."); }

      setupVideoPlayer(currentMovieId);
      loadComments(currentMovieId);
      loadSubtitles(); // ✅ Muat subtitle

      setTimeout(() => {
        const commentTextArea = document.getElementById('commentText');
        if (commentTextArea) {
          commentTextArea.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
              event.preventDefault();
              submitComment();
            }
          });
        }
      }, 500);

      try {
        const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=en-US&page=1`);
        if(res.ok) {
          const data = await res.json();
          allMoviesCache = data.results;
        }
      } catch(e) { console.error("Gagal membuat cache pencarian."); }
    }

    // 3. Setup Pemutar Video
    function setupVideoPlayer(tmdbId) {
      const customMovie = myCustomMovies.find(m => m.tmdb_id === tmdbId);
      playerArea.innerHTML = ''; 

      if (customMovie) {
        if (customMovie.iframe && customMovie.iframe.trim() !== "") {
          playerArea.innerHTML = `<iframe src="${customMovie.iframe}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        } else if (customMovie.video && customMovie.video.trim() !== "") {
          playerArea.innerHTML = `<video src="${customMovie.video}" controls autoplay playsinline></video>`;
        } else {
          playerArea.innerHTML = `<iframe src="https://vsembed.ru/embed/movie?tmdb=${tmdbId}" allowfullscreen></iframe>`;
        }
      } else {
        playerArea.innerHTML = `<iframe src="https://vsembed.ru/embed/movie?tmdb=${tmdbId}" allowfullscreen></iframe>`;
      }
    }
    
    // 4. Ambil Komentar
    async function loadComments(tmdbId) {
      commentList.innerHTML = '<div style="opacity:0.5; font-size:12px; padding:10px 0;">Memuat komentar netizen...</div>';
      try {
        const response = await fetch(`${URL_APPS_SCRIPT}?tmdbId=${tmdbId}`);
        const resData = await response.json();
        
        if (resData.status === "success" && resData.data.length > 0) {
          commentList.innerHTML = resData.data.map(c => `
            <div class="comment-item">
              <div class="comment-user">@${c.nama}</div>
              <div class="comment-text">${c.komentar}</div>
            </div>
          `).join('');
        } else {
          commentList.innerHTML = '<div style="opacity:0.4; font-size:12px; font-style:italic; padding:15px 0; text-align:center;">Belum ada komentar. Yuk jadi yang pertama coret-coret!</div>';
        }
      } catch (e) {
        commentList.innerHTML = '<div style="color:#ff6b6b; font-size:12px; padding:10px 0;">Gagal memuat komentar. Pastikan URL Apps Script benar.</div>';
      }
    }

    // 5. Kirim Komentar Baru
    async function submitComment() {
      const nameInput = document.getElementById('commentName');
      const textInput = document.getElementById('commentText');
      const nama = nameInput.value.trim();
      const komentar = textInput.value.trim();

      if (!nama || !komentar) {
        alert("Isi nama dan komentar dulu, brader!");
        return;
      }

      commentList.innerHTML = '<div style="opacity:0.5; font-size:12px; padding:10px 0;">Mengirim komentar baru...</div>';
      closeCommentForm();

      try {
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tmdbId: currentMovieId, nama: nama, komentar: komentar })
        });
        
        textInput.value = '';
        setTimeout(() => { loadComments(currentMovieId); }, 1200);
      } catch(e) {
        alert("Gagal mengirim data.");
        loadComments(currentMovieId);
      }
    }

    // 6. Kontrol Form Input Komen
    function openCommentForm() {
      infoPanel.classList.add('show');
      panelBackdrop.classList.add('active');
    }
    function closeCommentForm() {
      infoPanel.classList.remove('show');
      panelBackdrop.classList.remove('active');
    }

    // LOGIKA NAVIGASI & SEARCH
    document.getElementById('navSearch').addEventListener('click', (e) => {
      e.stopPropagation();
      const isShowing = searchContainer.classList.toggle('show');
      if (!isShowing) {
        searchInput.value = "";
        searchResultsLayer.classList.remove('active');
      } else {
        setTimeout(() => searchInput.focus(), 100);
      }
    });

    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase().trim();
        
        if (keyword === "") {
          searchResultsLayer.classList.remove('active');
          return;
        }

        searchResultsLayer.classList.add('active');
        const cleanKeyword = keyword.replace(/\s+/g, '');

        const filtered = allMoviesCache.filter(movie => {
          const customData = myCustomMovies.find(m => m.tmdb_id === movie.id);
          const rawTitle = customData ? customData.title : movie.title;
          return rawTitle.toLowerCase().replace(/\s+/g, '').includes(cleanKeyword);
        });

        if(filtered.length > 0) {
          searchResultsLayer.innerHTML = filtered.map(movie => {
            const customData = myCustomMovies.find(m => m.tmdb_id === movie.id);
            const poster = (customData && customData.image) ? customData.image : `${IMAGE_URL}${movie.poster_path}`;
            const title = customData ? customData.title : movie.title;
            const date = customData ? customData.release_date : movie.release_date;
            const year = date ? date.split('-')[0] : '-';

            return `
              <div class="search-item-row" onclick="navigateToMovie(${movie.id})">
                <div class="search-item-thumb" style="background-image:url('${poster}')"></div>
                <div class="search-item-info">
                  <h4>${title}</h4>
                  <p>Tahun: ${year}</p>
                </div>
              </div>
            `;
          }).join('');
        } else {
          searchResultsLayer.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.5; font-size:13px;">Film tidak ditemukan, coba kata kunci lain.</div>';
        }
      });
    }

    function navigateToMovie(id) {
      window.location.href = `watch.html?id=${id}`;
    }

    document.getElementById('navAddComment').addEventListener('click', openCommentForm);

    document.getElementById('navHome').addEventListener('click', () => {
      if (document.referrer && document.referrer.includes(window.location.hostname)) {
        window.history.back();
      } else {
        window.location.href = 'index.html';
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
      loadInitialData();
    });
  </script>
</body>
</html>
