<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watch Movie</title>
  <style>
    body { background:#000; margin:0; display:flex; flex-direction:column; gap:20px; }
    iframe { width:100%; height:500px; border:none; }
  </style>
</head>
<body>
  <iframe id="vidsrc-player"></iframe>
  <iframe id="cinematic-player"></iframe>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get("id");

    document.getElementById("vidsrc-player").src = `https://vidsrc.ru/embed/movie/${movieId}`;
    document.getElementById("cinematic-player").src = `https://playcinematic.com/embed/${movieId}`;
  </script>
</body>
</html>
