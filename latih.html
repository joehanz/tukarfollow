<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozi Stream - Koleksi Film TMDB Anda</title>
    <style>
        /* Gaya Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0d0d12; color: #f3f4f6; overflow-x: hidden; line-height: 1.5; }
        
        /* Desain Kaca Melayang (Navbar) */
        .navbar {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1140px; z-index: 100; padding: 16px 24px;
            border-radius: 16px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(25, 25, 35, 0.65); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #ef4444, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 24px; font-size: 14px; font-weight: 500; color: #9ca3af; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .btn-subscribe { background: linear-gradient(to right, #dc2626, #7c3aed); border: none; color: white; padding: 10px 18px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; }

        /* Banner Sinematik (Hero) */
        .hero { position: relative; width: 100%; height: 75vh; display: flex; align-items: flex-end; padding-top: 96px; overflow: hidden; }
        #hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center top; filter: brightness(40%); z-index: 0; transition: background-image 0.6s ease-in-out; }
        .hero-overlay-v { position: absolute; inset: 0; background: linear-gradient(to top, #0d0d12, rgba(13,13,18,0.2), transparent); z-index: 1; }
        .hero-content { position: relative; z-index: 2; width: 90%; max-width: 1140px; margin: 0 auto; padding-bottom: 48px; transition: all 0.4s ease; }
        .tag { display: inline-block; background: rgba(239, 68, 68, 0.2); color: #f87171; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 6px; margin-bottom: 16px; border: 1px solid rgba(239, 68, 68, 0.3); }
        #hero-title { font-size: 42px; font-weight: 800; margin-bottom: 12px; color: #ffffff; max-width: 700px; line-height: 1.2; }
        #hero-desc { font-size: 14px; color: #9ca3af; max-width: 600px; margin-bottom: 24px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-play { background: #dc2626; color: white; border: none; font-weight: 700; padding: 12px 24px; border-radius: 12px; cursor: pointer; box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); display: flex; align-items: center; gap: 8px; }

        /* Grid Daftar Film */
        .content-container { width: 90%; max-width: 1140px; margin: 40px auto; padding-bottom: 96px; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; letter-spacing: 0.5px; border-left: 4px solid #ef4444; padding-left: 10px; }
        .movie-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
        .movie-card { background: #15151f; border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.6); }
        .poster-wrapper { aspect-ratio: 2/3; width: 100%; overflow: hidden; background: #1f2937; position: relative; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .movie-card:hover .poster-img { transform: scale(1.05); }
        .card-details { padding: 14px; }
        .card-meta { display: flex; justify-content: space-between; font-size: 11px; color: #6b7280; margin-bottom: 6px; }
        .rating { color: #f59e0b; font-weight: 700; }
        .movie-title { font-size: 14px; font-weight: 700; color: #e5e7eb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-card:hover .movie-title { color: #ef4444; }

        /* Responsif Layar */
        @media (max-width: 992px) { .movie-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 576px) { .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } .navbar { width: 95%; } #hero-title { font-size: 28px; } }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="logo">MOZI</div>
        <div class="nav-links">
            <span style="color: #fff; cursor: pointer;">Beranda</span>
        </div>
        <div class="nav-right">
            <button class="btn-subscribe">Langganan</button>
        </div>
    </nav>
    <!-- HERO SECTION -->
    <header class="hero">
        <div id="hero-bg"></div>
        <div class="hero-overlay-v"></div>
        <div class="hero-content" id="hero-text-box">
            <span class="tag">SOROTAN UTAMA</span>
            <h1 id="hero-title">Memuat...</h1>
            <p id="hero-desc">Menghubungkan ke API Key TMDB Anda...</p>
            <button class="btn-play">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Tonton Sekarang
            </button>
        </div>
    </header>

    <!-- CONTENT SECTION -->
    <main class="content-container">
        <h2 class="section-title">Sedang Tren Sekarang</h2>
        <div class="movie-grid" id="movie-display-box"></div>
    </main>

    <!-- JAVASCRIPT: Logika API dan Fitur Klik Ganti Banner -->
    <script>
        // ========================================================
        // SILAKAN MASUKKAN API KEY TMDB ANDA DI BAWAH INI:
        const API_KEY = 'b3b893873ed1bb7f175b2707afeea2a0'; 
        // ========================================================

        const TMDB_URL = `https://themoviedb.org{API_KEY}&language=id-ID`;
        const IMG_PATH = 'https://tmdb.org';
        const BG_PATH = 'https://tmdb.org';
        
        let listFilmData = []; // Tempat menyimpan data film sementara

        async function loadMovies() {
            if(API_KEY === 'b3b893873ed1bb7f175b2707afeea2a0' || API_KEY === '') {
                document.getElementById('hero-title').innerText = "API Key Belum Diisi";
                document.getElementById('hero-desc').innerText = "Silakan buka file index.html di notepad, lalu ganti tulisan 'MASUKKAN_API_KEY_ANDA_DI_SINI' dengan kode API Key dari akun TMDB Anda.";
                return;
            }

            try {
                const response = await fetch(TMDB_URL);
                const data = await response.json();
                listFilmData = data.results;

                // Set default film pertama untuk banner atas
                updateHeroBanner(0);

                // Render daftar film ke bawah grid
                const gridContainer = document.getElementById('movie-display-box');
                gridContainer.innerHTML = '';

                listFilmData.forEach((movie, index) => {
                    const posterUrl = movie.poster_path ? `${IMG_PATH}${movie.poster_path}` : 'https://placeholder.com';
                    const releaseYear = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';
                    
                    const cardHtml = `
                        <div class="movie-card" onclick="updateHeroBanner(${index})">
                            <div class="poster-wrapper">
                                <img src="${posterUrl}" class="poster-img" alt="${movie.title}">
                            </div>
                            <div class="card-details">
                                <div class="card-meta">
                                    <span>${releaseYear}</span>
                                    <span class="rating">★ ${movie.vote_average.toFixed(1)}</span>
                                </div>
                                <h3 class="movie-title">${movie.title}</h3>
                            </div>
                        </div>
                    `;
                    gridContainer.innerHTML += cardHtml;
                });

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('movie-display-box').innerHTML = "<p style='color:red; grid-column: 1/-1; text-align:center;'>Gagal mengambil data. Pastikan API Key benar dan internet aktif.</p>";
            }
        }

        // Fungsi interaktif untuk mengubah isi banner atas saat kartu di bawahnya diklik
        function updateHeroBanner(index) {
            const film = listFilmData[index];
            if (!film) return;

            // Efek transisi halus (fade out teks sebentar)
            const textBox = document.getElementById('hero-text-box');
            textBox.style.opacity = 0.3;

            setTimeout(() => {
                const backdropUrl = film.backdrop_path ? `${BG_PATH}${film.backdrop_path}` : `${BG_PATH}${film.poster_path}`;
                document.getElementById('hero-bg').style.backgroundImage = `url('${backdropUrl}')`;
                document.getElementById('hero-title').innerText = film.title;
                document.getElementById('hero-desc').innerText = film.overview || "Sinopsis tidak tersedia dalam bahasa Indonesia untuk film ini.";
                textBox.style.opacity = 1;
            }, 200);
            
            // Otomatis scroll perlahan ke atas agar banner terlihat jelas saat diklik di HP
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        loadMovies();
    </script>
</body>
</html>
