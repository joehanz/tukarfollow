<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stream GOD MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* TOP */
.topbar {
  position: sticky;
  top: 0;
  background: #000;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

.logo {
  color: red;
  font-weight: bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  position: relative;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
}

.title {
  font-size: 12px;
  margin-top: 5px;
  opacity: 0.7;
}

/* HEART */
.heart {
  position: absolute;
  top: 5px;
  right: 5px;
  background: rgba(0,0,0,0.6);
  padding: 4px;
  border-radius: 50%;
  cursor: pointer;
}

/* MODAL PLAYER */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

iframe {
  width: 90%;
  height: 70%;
  border: none;
}

.close {
  margin-top: 10px;
  background: red;
  padding: 6px 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🔥 GOD STREAM</div>
  <input id="search" placeholder="Search..." style="padding:5px;">
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="modal" id="modal">
  <iframe id="player"></iframe>
  <div class="close" onclick="closePlayer()">Close</div>
</div>

<script>

let movies = [];

// load data
fetch('movies.json')
.then(r => r.json())
.then(data => {
  movies = data;
  render(data);
});

// render
function render(list){
  const grid = document.getElementById('grid');
  grid.innerHTML = "";

  list.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = "card";

    div.innerHTML = `
      <img src="${m.poster}">
      <div class="heart" onclick="toggleFav(event, ${i})">❤️</div>
      <div class="title">${m.title}</div>
    `;

    div.onclick = () => openPlayer(m.embed, m.title);

    grid.appendChild(div);
  });
}

// PLAYER MODAL
function openPlayer(url, title){
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('player').src = url;

  localStorage.setItem("lastWatch", title);
}

function closePlayer(){
  document.getElementById('modal').style.display = 'none';
  document.getElementById('player').src = "";
}

// FAVORITE
function toggleFav(e, i){
  e.stopPropagation();

  let fav = JSON.parse(localStorage.getItem("fav") || "[]");

  if(fav.includes(i)){
    fav = fav.filter(x => x !== i);
  } else {
    fav.push(i);
  }

  localStorage.setItem("fav", JSON.stringify(fav));
}

// SEARCH
document.getElementById('search').addEventListener('input', function(){
  let v = this.value.toLowerCase();
  render(movies.filter(m => m.title.toLowerCase().includes(v)));
});

</script>

</body>
</html>
