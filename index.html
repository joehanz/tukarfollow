<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Movie Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Search bar -->
  <div id="searchBar" class="search-bar hidden">
    <input type="text" id="searchInput" placeholder="Cari film...">
  </div>

  <!-- Info panel -->
  <div id="infoPanel" class="info-panel hidden"></div>

  <!-- Feed -->
  <div id="feed" class="feed"></div>

  <!-- Load More -->
  <div id="loadMore" class="load-more">Load More</div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button id="searchBtn">🔍</button>
    <button id="addBtn">➕</button>
    <button id="homeBtn">🏠</button>
  </div>

  <!-- Player overlay -->
  <div id="playerOverlay" class="player-overlay hidden"></div>

  <script src="script.js"></script>
</body>
</html>
