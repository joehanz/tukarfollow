<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>TukarFollow Movies</title>

<meta name="description"
content="Streaming Movie dan TV Series">

<link rel="stylesheet"
href="style2.css">

<link rel="preconnect"
href="https://image.tmdb.org">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>


<!-- NAVBAR -->
<header>

<nav class="navbar">

<div class="logo">
<i class="fa-solid fa-film"></i>
<span>TukarFollow</span>
</div>

<ul id="navMenu">
<li><a href="#" id="moviesBtn">Movies</a></li>
<li><a href="#" id="seriesBtn">Series</a></li>
</ul>

<div class="searchBox">
<input type="text" id="search" placeholder="Cari film...">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

<!-- BURGER -->
<div id="burger" data-state="closed">
  <i class="fa-solid fa-bars"></i>
</div>

</nav>

<!-- MOBILE MENU -->
<div id="mobileMenu">
<input type="text" id="mobileSearch" placeholder="Cari film...">
  <ul id="navMenu">
<li><a href="#" id="moviesBtn">Movies</a></li>
<li><a href="#" id="seriesBtn">Series</a></li>
</ul>

</div>
  

</header>



<!-- HERO -->

<section id="hero">

<div id="slider">

<div class="loading">

Loading...

</div>

</div>

</section>



<!-- MOVIES -->

<section class="movies">

<div class="titleBar">

<h2>

Trending Movies

</h2>

</div>



<div id="movieGrid">

<div class="loading">

Loading Movie...

</div>

</div>

</section>



<!-- PAGINATION -->

<div id="pagination">

<button>

&lt;

</button>

<button class="active">

1

</button>

<button>

2

</button>

<button>

3

</button>

<button>

4

</button>

<button>

5

</button>

<button>

6

</button>

<button>

&gt;

</button>

</div>



<button id="topBtn">

<i class="fa-solid fa-arrow-up"></i>

</button>



<script src="script.js"></script>
  <script>
const burger = document.getElementById("burger");
const mobileMenu = document.getElementById("mobileMenu");

burger?.addEventListener("click", () => {
  const isOpen = burger.dataset.state === "open";

  burger.dataset.state = isOpen ? "closed" : "open";

  if (mobileMenu) {
    mobileMenu.style.display = isOpen ? "none" : "flex";
  }

  // HARD SET ICON (NO INNERHTML REPLACE PARENT)
  const icon = burger.querySelector("i");

  if (icon) {
    icon.className = isOpen
      ? "fa-solid fa-bars"
      : "fa-solid fa-xmark";
  }
});
  </script>

</body>
</html>
